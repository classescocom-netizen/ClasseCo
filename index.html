function PaymentsPage({ ctx, onOpen }) {
  const { students, payments, setPayments, t } = ctx;
  const [filter, setFilter] = useState("all");
  const [expandedGroups, setExpandedGroups] = useState({});
  const [receiveModal, setReceiveModal] = useState(null);
  const [slipModal, setSlipModal] = useState(null); // url string

  const isUnpaid = (p) => p.status === "pending" || p.status === "overdue";

  const totalUnpaid = useMemo(() => payments.filter(isUnpaid).reduce((s, p) => s + Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)), 0), [payments]);
  const totalPartial = useMemo(() => payments.filter(p => p.status === "partial").reduce((s, p) => s + Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)), 0), [payments]);
  const totalPaidMonth = useMemo(() => payments.filter(p => p.status === "paid" && new Date(p.date).getMonth() === new Date().getMonth()).reduce((s, p) => s + (p.totalAmount || p.amount), 0), [payments]);

  // Group by orderId — 1 order = 1 group เสมอ ไม่ merge ไม่ว่าจะขายซ้ำแค่ไหน
  const groups = useMemo(() => {
    const parentPayments = payments.filter(p => !p._txRecord);
    const groupMap = {};
    parentPayments.forEach(p => {
      const baseNote = (p.note || "").replace(/ · ค้างชำระ$/, "");
      const key = p.orderId || p.id;
      groupMap[key] = { key, studentId: p.studentId, note: baseNote, parentId: p.id, orderId: p.orderId || null, payments: [p] };
    });

    return Object.values(groupMap).map(g => {
      const parent = g.payments[0];
      const totalAmt = parent?.totalAmount || parent?.amount || 0;
      const paidAmt = parent?.paidAmount || (parent?.status === "paid" ? totalAmt : 0);
      const remaining = Math.max(0, totalAmt - paidAmt);
      const status = parent?.status || "pending";
      const txLines = payments.filter(p => p._parentId === parent?.id || (p._txRecord && p.studentId === g.studentId && p.note === g.note));
      return { ...g, totalAmt, paidAmt, remaining, status, txLines };
    }).filter(g =>
      filter === "all" || (filter === "unpaid" ? isUnpaid({ status: g.status }) : g.status === filter)
    ).sort((a, b) => {
      const pa = a.payments[0]?.date || "";
      const pb = b.payments[0]?.date || "";
      return pb.localeCompare(pa);
    });
  }, [payments, filter]);

  const toggleGroup = (key) => setExpandedGroups(prev => ({ ...prev, [key]: !prev[key] }));

  const statusChip = (status) => status === "paid"
    ? { bg: "var(--success-soft)", fg: "var(--success)", label: "ชำระเต็ม" }
    : status === "partial"
    ? { bg: "var(--info-soft)", fg: "var(--info)", label: "ชำระบางส่วน" }
    : { bg: "var(--warning-soft)", fg: "var(--warning)", label: "ยังไม่ชำระ" };

  const COLS = "2fr 100px 90px 90px 90px 90px 180px";

  return (
    <div className="responsive-page-pad p-8 space-y-5">
      {/* Stat cards */}
      <div className="grid grid-cols-3" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)" }}>
        <StatCard label={t("paidThisMonth")} value={formatBaht(totalPaidMonth)} trend={t("monthRevenue")} up />
        <StatCard label={t("unpaidAmount")} value={formatBaht(totalUnpaid)} trend={`${payments.filter(isUnpaid).length} ${t("record")}`} up={false} />
        <StatCard label={t("partialPaid")} value={formatBaht(totalPartial)} trend={`${payments.filter(p => p.status === "partial").length} ${t("record")}`} up={false} />
      </div>

      {/* Filter pills */}
      <div className="flex gap-2 flex-wrap">
        {[
          { id: "all", label: t("allItems") },
          { id: "unpaid", label: t("unpaidAmount") },
          { id: "partial", label: t("partialPaid") },
          { id: "paid", label: t("paidFull") },
        ].map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)}
            className={`filter-pill ${filter === f.id ? "active" : ""}`}>
            {f.label}
          </button>
        ))}
      </div>

      {/* Accordion table */}
      <div className="table-scroll" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", overflow: "hidden" }}>
       <div style={{ minWidth: 720 }}>
        {/* Header row */}
        <div className="grid text-[9px] font-medium px-4 py-2.5 label-eyebrow"
          style={{ gridTemplateColumns: COLS, background: "var(--bg-muted)", borderBottom: "0.5px solid var(--border-soft)" }}>
          <div>{t("student")} / {t("courseList")}</div>
          <div>{t("status")}</div>
          <div className="font-mono" style={{ fontSize: 8 }}>Order ID</div>
          <div className="text-right">{t("totalAmount")}</div>
          <div className="text-right">{t("paid")}</div>
          <div className="text-right">{t("remaining")}</div>
          <div></div>
        </div>

        {groups.length === 0 && (
          <div className="p-12 text-center heading-serif text-[18px] italic" style={{ color: "var(--text-tertiary)" }}>ไม่มีรายการ</div>
        )}

        {groups.map(g => {
          const s = students.find(st => st.id === g.studentId);
          const sc = statusChip(g.status);
          const isOpen = !!expandedGroups[g.key];
          const txCount = g.payments.length;

          return (
            <div key={g.key} style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
              {/* ===== GROUP HEADER ===== */}
              <div className="grid items-center px-4 py-3.5 cursor-pointer transition-colors hover:bg-[var(--accent-sage-hover)]"
                style={{ gridTemplateColumns: COLS, background: isOpen ? "var(--accent-sage-hover)" : "transparent" }}
                onClick={() => toggleGroup(g.key)}>

                {/* Student + nickname + course */}
                <div className="flex items-center gap-3 min-w-0">
                  <div className="w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-semibold flex-shrink-0"
                    style={{ background: "var(--bg-muted)", color: "var(--text-secondary)" }}>
                    {s?.name?.charAt(0) || "?"}
                  </div>
                  <div className="min-w-0">
                    <div className="text-[13px] font-medium flex items-baseline gap-1.5">
                      <span className="truncate">{s?.name || "—"}</span>
                      {s?.nickname && <span className="text-[11px] italic flex-shrink-0" style={{ color: "var(--text-tertiary)" }}>"{s.nickname}"</span>}
                    </div>
                    <div className="text-[11px] truncate" style={{ color: "var(--text-secondary)" }}>{g.note}</div>
                  </div>
                </div>

                {/* Status */}
                <div>
                  <span className="text-[10px] px-2 py-0.5 font-medium" style={{ background: sc.bg, color: sc.fg }}>{sc.label}</span>
                </div>

                {/* Order ID */}
                <div className="font-mono text-[10px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.02em" }}>
                  {g.payments[0]?.orderId || "—"}
                </div>

                {/* Amounts */}
                <div className="text-right num-display text-[13px]">{formatBaht(g.totalAmt)}</div>
                <div className="text-right num-display text-[13px]" style={{ color: g.paidAmt > 0 ? "var(--success)" : "var(--text-tertiary)" }}>
                  {g.paidAmt > 0 ? formatBaht(g.paidAmt) : "—"}
                </div>
                <div className="text-right num-display text-[13px]" style={{ color: g.remaining > 0 ? "var(--danger)" : "var(--text-tertiary)" }}>
                  {g.remaining > 0 ? formatBaht(g.remaining) : "—"}
                </div>

                {/* Action + toggle */}
                <div className="flex items-center justify-end gap-1.5 pl-1">
                  {g.remaining > 0 && (
                    <button onClick={e => {
                      e.stopPropagation();
                      const parent = g.payments[0];
                      setReceiveModal({
                        ...parent,
                        totalAmount: g.totalAmt,
                        paidAmount: g.paidAmt,
                        _groupNote: g.note,
                        _realParentId: parent.id,
                      });
                    }}
                      className="text-[10px] px-2 py-1.5 font-medium flex items-center gap-1 flex-shrink-0 whitespace-nowrap"
                      style={{ background: "#1A1A17", color: "#C4A878" }}>
                      <IconCheck size={9} /> รับเงิน
                    </button>

                  {(() => {

                    const parent = g.payments[0];
                    const parentPaid = parent?.paidAmount || (parent?.status === "paid" ? g.totalAmt : 0);
                    const total = paidCount + (parentPaid > 0 && paidCount === 0 ? 1 : 0);

                        style={{ color: "var(--text-tertiary)" }}>
                        <span className="text-[10px]">{total}</span>
                        <span style={{ fontSize: 12, transition: "transform 0.2s", transform: isOpen ? "rotate(180deg)" : "none" }}>▾</span>
                      </button>
                    );
                  })()}
                </div>
              </div>

              {/* ===== TRANSACTION LINES ===== */}
              {(() => {
                const paidLines = g.txLines.filter(p => (p.paidAmount || 0) > 0 || p.status === "paid")
                  .sort((a, b) => a.date.localeCompare(b.date));
                // เพิ่ม initial payment ถ้ามีการจ่ายใน parent record
                const parent = g.payments[0];
                const parentPaid = parent?.paidAmount || (parent?.status === "paid" ? g.totalAmt : 0);
                const initialLines = parentPaid > 0 && paidLines.length === 0 ? [{
                  id: parent.id + "_init",
                  date: parent.date,
                  paidAmount: parentPaid,
                  status: parent.status,
                  slipUrl: parent.slipUrl,
                }] : paidLines;

                if (!isOpen || initialLines.length === 0) return null;

                return (
                  <div style={{ background: "var(--bg-muted)", borderTop: "0.5px solid var(--border-soft)" }}>
                    <div className="grid px-10 py-1.5 label-eyebrow text-[8px]"
                      style={{ gridTemplateColumns: "120px 1fr 1fr 60px", color: "var(--text-quaternary)" }}>
                      <div>วันที่</div>
                      <div className="text-right">จำนวนที่รับ</div>
                      <div className="text-right">สถานะ</div>
                      <div className="text-right">สลิป</div>
                    </div>
                    {initialLines.map((p, idx) => {
                      const lsc = statusChip(p.status);
                      const txPaid = p.paidAmount || 0;
                      return (
                        <div key={p.id} className="grid items-center px-10 py-2.5"
                          style={{ gridTemplateColumns: "120px 1fr 1fr 60px", borderTop: idx > 0 ? "0.5px solid var(--border-hairline)" : "none" }}>
                          <div className="text-[11px]" style={{ color: "var(--text-secondary)" }}>{formatDate(p.date)}</div>
                          <div className="text-right num-display text-[13px]" style={{ color: "var(--success)" }}>
                            +{formatBaht(txPaid)}
                          </div>
                          <div className="text-right">
                            <span className="text-[9px] px-1.5 py-0.5 font-medium" style={{ background: lsc.bg, color: lsc.fg }}>{lsc.label}</span>
                          </div>
                          <div className="text-right pr-1">
                            {p.slipUrl ? (
                              <button onClick={() => setSlipModal(p.slipUrl)}
                                className="block overflow-hidden ml-auto transition-all hover:opacity-90 hover:scale-105"
                                style={{ width: 36, height: 48, border: "1.5px solid var(--border-default)", borderRadius: 4, background: "var(--bg-surface)" }}
                                title="ดูสลิป">
                                <img src={p.slipUrl} alt="slip" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                              </button>
                            ) : <span className="text-[10px]" style={{ color: "var(--text-quaternary)" }}>—</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </div>
          );
        })}
       </div>
      </div>

      {/* Slip Lightbox */}
      {slipModal && (
        <div className="fixed inset-0 z-[60] flex items-center justify-center fade-in"
          style={{ background: "rgba(0,0,0,0.85)", backdropFilter: "blur(4px)" }}
          onClick={() => setSlipModal(null)}>
          <div onClick={e => e.stopPropagation()} className="relative flex items-center justify-center" style={{ maxWidth: "90vw", maxHeight: "90vh" }}>
            <img src={slipModal} alt="slip"
              style={{ maxWidth: "480px", maxHeight: "85vh", objectFit: "contain", borderRadius: 8, boxShadow: "0 20px 60px rgba(0,0,0,0.5)" }} />
            <button onClick={() => setSlipModal(null)}
              className="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-full"
              style={{ background: "rgba(0,0,0,0.6)", color: "#fff", fontSize: 16 }}>
              ✕
            </button>
          </div>
        </div>
      )}
      {receiveModal && (
        <ReceivePaymentModal
          payment={receiveModal}
          student={students.find(s => s.id === receiveModal.studentId)}
          onClose={() => setReceiveModal(null)}
          onConfirm={(paidAmt, isDeposit, slipUrl) => {
            const total = receiveModal.totalAmount || receiveModal.amount;
            const alreadyPaid = receiveModal.paidAmount || 0;
            const newTotalPaid = alreadyPaid + paidAmt;
            const newStatus = newTotalPaid >= total ? "paid" : newTotalPaid > 0 ? "partial" : "pending";
            const realParentId = receiveModal._realParentId || receiveModal.id;

            setPayments(prev => {
              // อัปเดต parent record — paidAmount รวม + status
              const updated = prev.map(p => p.id === realParentId ? {
                ...p,
                paidAmount: newTotalPaid,
                totalAmount: total,
                status: newStatus,
              } : p);
              // เพิ่ม _txRecord ใหม่สำหรับการรับเงินครั้งนี้
              if (paidAmt > 0) {
                updated.push({
                  id: `p${Date.now()}`,
                  studentId: receiveModal.studentId,
                  amount: paidAmt,
                  totalAmount: total,
                  paidAmount: paidAmt,
                  date: todayISO(),
                  status: "paid",
                  note: receiveModal._groupNote || receiveModal.note || "",
                  slipUrl: slipUrl || "",
                  _txRecord: true,
                  _parentId: realParentId,
                });
              }
              return updated;
            });
            setReceiveModal(null);
          }}
        />
      )}
    </div>
  );
}

// ============ RECEIVE PAYMENT MODAL ============
function ReceivePaymentModal({ payment, student, onClose, onConfirm }) {
  const total = payment.totalAmount || payment.amount;
  const alreadyPaid = payment.paidAmount || 0;
  const remaining = Math.max(0, total - alreadyPaid);

  const [mode, setMode] = useState("full"); // 'full' | 'deposit' | 'custom'
  const [customAmt, setCustomAmt] = useState(remaining);
  const [slipPreview, setSlipPreview] = useState(null);
  const [slipUrl, setSlipUrl] = useState("");

  const depositAmt = Math.round(remaining * 0.5);
  const paidAmt = mode === "full" ? remaining : mode === "deposit" ? depositAmt : Number(customAmt) || 0;

  const handleSlip = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const result = await processImage(file, { maxWidth: 1000, maxHeight: 1400, quality: 0.75, targetKB: 50 });
      setSlipPreview(result.dataUrl);
      setSlipUrl(result.dataUrl);
    } catch (err) {
      console.error("Slip processing failed:", err);
      alert("ไม่สามารถประมวลผลรูปได้ — ลองรูปอื่น");
    }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in"
      style={{ background: "rgba(15,31,24,0.5)", backdropFilter: "blur(4px)" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="w-full max-w-md"
        style={{ background: "var(--bg-surface)", boxShadow: "var(--shadow-elevated)", border: "0.5px solid var(--border-soft)" }}>

        <div className="flex justify-between items-center px-6 py-5" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
          <div>
            <div className="label-eyebrow mb-1">รับชำระเงิน</div>
            <div className="heading-serif text-[20px]">{student?.name}</div>
          </div>
          <button onClick={onClose} className="p-1.5" style={{ color: "var(--text-tertiary)" }}><IconX size={15} /></button>
        </div>

        <div className="px-6 py-5 space-y-5">

          {/* Summary */}
          <div className="grid grid-cols-3 grid-cols-3-resp gap-3">
            {[
              { label: "ยอดเต็ม", val: formatBaht(total), color: "var(--text-primary)" },
              { label: "จ่ายแล้ว", val: formatBaht(alreadyPaid), color: "var(--success)" },
              { label: "ยอดคงเหลือ", val: formatBaht(remaining), color: "var(--danger)" },
            ].map((item, i) => (
              <div key={i} className="p-3 text-center" style={{ background: "var(--bg-muted)" }}>
                <div className="label-eyebrow mb-1" style={{ fontSize: 9 }}>{item.label}</div>
                <div className="num-display text-[16px]" style={{ color: item.color }}>{item.val}</div>
              </div>
            ))}
          </div>

          {/* Mode selector */}
          <div>
            <div className="label-eyebrow mb-2.5">รูปแบบการรับเงิน</div>
            <div className="space-y-2">
              {[
                { id: "full", icon: "💳", label: "รับเต็มจำนวน", desc: formatBaht(remaining) },
                { id: "deposit", icon: "🤝", label: "รับมัดจำ 50%", desc: formatBaht(depositAmt) },
                { id: "custom", icon: "✏️", label: "กำหนดเอง", desc: "ระบุจำนวน" },
              ].map(opt => (
                <button key={opt.id} onClick={() => setMode(opt.id)}
                  className="w-full flex items-center gap-3 px-4 py-3 text-left transition-all"
                  style={{
                    border: mode === opt.id ? "2px solid var(--accent-bronze)" : "0.5px solid var(--border-soft)",
                    background: mode === opt.id ? "var(--accent-bronze-ivory)" : "var(--bg-surface)",
                  }}>
                  <span style={{ fontSize: 18 }}>{opt.icon}</span>
                  <div className="flex-1">
                    <div className="text-[12px] font-medium">{opt.label}</div>
                    <div className="text-[11px]" style={{ color: "var(--text-tertiary)" }}>{opt.desc}</div>
                  </div>
                  {mode === opt.id && <IconCheck size={14} style={{ color: "var(--accent-bronze)", flexShrink: 0 }} />}
                </button>
              ))}
            </div>
          </div>

          {/* Custom amount */}
          {mode === "custom" && (
            <FormRow label="จำนวนเงินที่รับ (฿)">
              <input type="number" className={inputCls} style={inputSty}
                value={customAmt} onChange={e => setCustomAmt(e.target.value)}
                max={remaining} placeholder={`สูงสุด ${formatBaht(remaining)}`} />
            </FormRow>
          )}

          {/* Slip upload */}
          <div>
            <div className="label-eyebrow mb-2">แนบสลิป (ถ้ามี)</div>
            {slipPreview ? (
              <div className="relative">
                <img src={slipPreview} alt="slip"
                  className="w-full object-contain max-h-48"
                  style={{ border: "0.5px solid var(--border-default)" }} />
                <button onClick={() => { setSlipPreview(null); setSlipUrl(""); }}
                  className="absolute top-2 right-2 w-6 h-6 flex items-center justify-center"
                  style={{ background: "rgba(15,31,24,0.7)", color: "#fff" }}>
                  <IconX size={12} />
                </button>
              </div>
            ) : (
              <label className="flex flex-col items-center justify-center gap-2 py-8 cursor-pointer transition-colors hover:bg-[var(--accent-sage-hover)]"
                style={{ border: "0.5px dashed var(--border-strong)", color: "var(--text-tertiary)" }}>
                <IconSend size={18} stroke={1.5} />
                <span className="text-[11px]">คลิกเพื่อเลือกรูปสลิป</span>
                <input type="file" accept="image/*" className="hidden" onChange={handleSlip} />
              </label>
            )}
          </div>

          {/* Amount preview */}
          <div className="flex items-center justify-between px-4 py-3" style={{ background: "#1A1A17" }}>
            <span className="text-[12px]" style={{ color: "rgba(232,228,214,0.6)" }}>รับเงินวันนี้</span>
            <span className="num-display text-[22px]" style={{ color: "#C4A878" }}>{formatBaht(Math.min(paidAmt, remaining))}</span>
          </div>
        </div>

        <div className="flex gap-2 px-6 pb-6">
          <button onClick={onClose}
            className="flex-1 text-[13px] py-3 font-medium"
            style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
            ยกเลิก
          </button>
          <button onClick={() => onConfirm(Math.min(paidAmt, remaining), mode === "deposit", slipUrl)}
            disabled={paidAmt <= 0}
            className="flex-1 text-[13px] py-3 font-medium transition-all hover:opacity-90"
            style={{ background: paidAmt > 0 ? "#1A1A17" : "var(--bg-muted)", color: paidAmt > 0 ? "#C4A878" : "var(--text-tertiary)" }}>
            ยืนยันรับเงิน {formatBaht(Math.min(paidAmt, remaining))}
          </button>
        </div>
      </div>
    </div>
  );
}

function SettingsPage({ ctx }) {
  const { settings, setSettings, students, setStudents, t } = ctx;
  const [activeTab, setActiveTab] = useState("categories");
  const [selectedCatId, setSelectedCatId] = useState(null);

  // Pref tab states
  const [newPin, setNewPin] = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  const [pinMsg, setPinMsg] = useState("");

  // Student credentials tab states
  const [credsMsg, setCredsMsg] = useState({ studentId: null, msg: "" });
  const [credsDraft, setCredsDraft] = useState({}); // { [studentId]: { username, password } }

  // Teachers tab
  const [tForm, setTForm] = useState({ name: "", nickname: "", color: "#C4A878", phone: "", email: "" });
  const [editingTeacherId, setEditingTeacherId] = useState(null);

  const cats = settings?.categories || DEFAULT_SETTINGS.categories;
  const lvls = settings?.levels || DEFAULT_SETTINGS.levels;
  const topics = settings?.topics || DEFAULT_SETTINGS.topics;
  const levelsByCategory = settings?.levelsByCategory || DEFAULT_SETTINGS.levelsByCategory;
  const locations = settings?.locations || DEFAULT_SETTINGS.locations;

  const activeCats = cats.filter(c => c.active);
  const resolvedCatId = selectedCatId || activeCats[0]?.id;
  const catTopics = topics[resolvedCatId] || [];
  const catLevels = levelsByCategory[resolvedCatId] || [];

  // Location CRUD
  const addLocation = () => {
    setSettings(s => ({
      ...s,
      locations: [...(s.locations || []), { id: `loc${Date.now()}`, name: "สถานที่ใหม่", icon: "📍", active: true }],
    }));
  };
  const updateLocation = (id, field, val) => {
    setSettings(s => ({
      ...s,
      locations: (s.locations || []).map(l => l.id === id ? { ...l, [field]: val } : l),
    }));
  };
  const removeLocation = (id) => {
    const loc = (settings?.locations || []).find(l => l.id === id);
    if (loc) {
      const usage = countLocationUsage(loc.name);
      if (usage.total > 0) {
        alert(`ไม่สามารถลบได้\n\nสถานที่ "${loc.name}" มีการใช้งาน:\n• คลาส: ${usage.classes} คลาส\n• คอร์ส: ${usage.courses} คอร์ส\n\nแนะนำ: ปิดการใช้งาน (toggle off) แทนการลบ`);
        return;
      }
    }
    if (!confirm(`ลบสถานที่ "${loc?.name}"?`)) return;
    setSettings(s => ({ ...s, locations: (s.locations || []).filter(l => l.id !== id) }));
  };
  const moveLocation = (idx, dir) => {
    setSettings(s => {
      const arr = [...(s.locations || [])];
      const to = idx + dir;
      if (to < 0 || to >= arr.length) return s;
      [arr[idx], arr[to]] = [arr[to], arr[idx]];
      return { ...s, locations: arr };
    });
  };

  const updateCat = (id, field, val) =>
    setSettings(s => ({ ...s, categories: s.categories.map(c => c.id === id ? { ...c, [field]: val } : c) }));
  const updateLvl = (id, field, val) =>
    setSettings(s => ({ ...s, levels: s.levels.map(l => l.id === id ? { ...l, [field]: val } : l) }));

  const addCat = () => {
    const newCat = { id: `cat${Date.now()}`, name: "หมวดหมู่ใหม่", color: "var(--text-tertiary)", bg: "var(--bg-muted)", text: "var(--text-primary)", active: true };
    setSettings(s => ({ ...s, categories: [...s.categories, newCat] }));
  };
  const removeCat = (id) => {
    const cat = cats.find(c => c.id === id);
    const usage = countCategoryUsage(id);
    if (usage.total > 0) {
      alert(`ไม่สามารถลบได้\n\nหมวด "${cat?.name || id}" มีการใช้งาน:\n• นักเรียน: ${usage.students} คน\n• คอร์ส: ${usage.courses} คอร์ส\n\nแนะนำ: ปิดการใช้งาน (toggle off) แทนการลบ`);
      return;
    }
    if (!confirm(`ลบหมวดหมู่ "${cat?.name || id}"?`)) return;
    setSettings(s => ({ ...s, categories: s.categories.filter(c => c.id !== id) }));
  };
  const addLvl = () => {
    const newLvl = { id: `lv${Date.now()}`, name: "ระดับใหม่", desc: "", active: true };
    setSettings(s => ({ ...s, levels: [...s.levels, newLvl] }));
  };
  const removeLvl = (id) => {
    const lvl = lvls.find(l => l.id === id);
    const usage = countLevelUsage(id);
    if (usage.total > 0) {
      alert(`ไม่สามารถลบได้\n\nระดับ "${lvl?.name || id}" มีการใช้งาน:\n• นักเรียน: ${usage.students} คน\n• คอร์ส: ${usage.courses} คอร์ส\n\nแนะนำ: ปิดการใช้งาน (toggle off) แทนการลบ`);
      return;
    }
    if (!confirm(`ลบระดับ "${lvl?.name || id}"?`)) return;
    setSettings(s => ({ ...s, levels: s.levels.filter(l => l.id !== id) }));
  };

  // Category-level CRUD
  const addCatLevel = (catId) => {
    setSettings(s => {
      const lbc = s.levelsByCategory || {};
      const arr = lbc[catId] || [];
      return { ...s, levelsByCategory: { ...lbc, [catId]: [...arr, { id: `lv${Date.now()}`, name: "ระดับใหม่", desc: "", active: true }] } };
    });
  };
  const updateCatLevel = (catId, idx, field, val) => {
    setSettings(s => {
      const lbc = s.levelsByCategory || {};
      const arr = [...(lbc[catId] || [])];
      arr[idx] = { ...arr[idx], [field]: val };
      return { ...s, levelsByCategory: { ...lbc, [catId]: arr } };
    });
  };
  const removeCatLevel = (catId, idx) => {
    const catLvl = (levelsByCategory[catId] || [])[idx];
    if (catLvl) {
      const usage = countLevelUsage(catLvl.id);
      if (usage.total > 0) {
        alert(`ไม่สามารถลบได้\n\nระดับ "${catLvl.name}" มีการใช้งาน:\n• นักเรียน: ${usage.students} คน\n• คอร์ส: ${usage.courses} คอร์ส\n\nแนะนำ: ปิดการใช้งาน (toggle off) แทนการลบ`);
        return;
      }
    }
    setSettings(s => {
      const lbc = s.levelsByCategory || {};
      return { ...s, levelsByCategory: { ...lbc, [catId]: (lbc[catId] || []).filter((_, i) => i !== idx) } };
    });
  };
  const moveCatLevel = (catId, idx, dir) => {
    setSettings(s => {
      const lbc = s.levelsByCategory || {};
      const arr = [...(lbc[catId] || [])];
      const to = idx + dir;
      if (to < 0 || to >= arr.length) return s;
      [arr[idx], arr[to]] = [arr[to], arr[idx]];
      return { ...s, levelsByCategory: { ...lbc, [catId]: arr } };
    });
  };

  // Topic management
  const addTopic = (catId) => {
    setSettings(s => {
      const t = s.topics || {};
      return { ...s, topics: { ...t, [catId]: [...(t[catId] || []), ""] } };
    });
  };
  const updateTopic = (catId, idx, val) => {
    setSettings(s => {
      const t = s.topics || {};
      const arr = [...(t[catId] || [])];
      arr[idx] = val;
      return { ...s, topics: { ...t, [catId]: arr } };
    });
  };
  // ===== Master usage checkers — prevent deleting master data that has references =====
  const { courses, classes, notes } = ctx;

  const countCategoryUsage = (catId) => {
    const studentCount = (students || []).filter(s => (s.categoryId || s.category) === catId).length;
    const courseCount = (courses || []).filter(c => (c.categoryId || c.category) === catId).length;
    return { students: studentCount, courses: courseCount, total: studentCount + courseCount };
  };

  const countLevelUsage = (levelId) => {
    // global levels
    const studentCount = (students || []).filter(s => s.levelId === levelId).length;
    const courseCount = (courses || []).filter(c => c.levelId === levelId).length;
    return { students: studentCount, courses: courseCount, total: studentCount + courseCount };
  };

  const countTopicUsage = (catId, topicName) => {
    // topics reference in notes (strings stored in note.topics array)
    const noteCount = (notes || []).filter(n => (n.topics || []).includes(topicName)).length;
    // topics in courses (stored in course.topics array)
    const courseCount = (courses || []).filter(c => (c.topics || []).includes(topicName)).length;
    return { notes: noteCount, courses: courseCount, total: noteCount + courseCount };
  };

  const countLocationUsage = (locName) => {
    const classCount = (classes || []).filter(c => c.location === locName).length;
    const courseCount = (courses || []).filter(c => c.location === locName).length;
    return { classes: classCount, courses: courseCount, total: classCount + courseCount };
  };

  const removeTopic = (catId, idx) => {
    const topicName = (topics[catId] || [])[idx];
    if (topicName) {
      const usage = countTopicUsage(catId, topicName);
      if (usage.total > 0) {

function AnalyticsPage({ ctx }) {
  const { students, notes, classes, courses, enrollments, payments, settings, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;

  const [selectedStudentId, setSelectedStudentId] = useState(students.filter(s => s.active)[0]?.id || "");
  const [studentDropdownOpen, setStudentDropdownOpen] = useState(false);
  const [studentSearch, setStudentSearch] = useState("");
  const [aiInsight, setAiInsight] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState(null);
  const [photoPreviewOpen, setPhotoPreviewOpen] = useState(false);

  const student = students.find(s => s.id === selectedStudentId);
  const sCat = student ? (allCats.find(c => c.id === (student.categoryId || student.category)) || CATEGORIES[student.category] || CATEGORIES.other) : CATEGORIES.other;

  // Aggregate data
  const studentNotes = notes.filter(n => n.studentId === selectedStudentId).sort((a, b) => b.date.localeCompare(a.date));
  const studentClasses = classes.filter(c => c.studentId === selectedStudentId);
  const completedClasses = studentClasses.filter(c => c.status === "completed");
  const studentEnrollments = (enrollments || []).filter(e => e.studentId === selectedStudentId);
  const studentPayments = payments.filter(p => p.studentId === selectedStudentId);

  // Total hours taught
  const totalMinutes = completedClasses.reduce((sum, c) => sum + (c.duration || 0), 0);
  const totalHours = totalMinutes / 60;

  // Topic analysis
  const topicMap = {}; // { topic: { count, totalMinutes, lastDate, comments: [] } }
  studentNotes.forEach(n => {
    const topics = n.topics || [];
    const dur = n.duration || 60;
    topics.forEach(t => {
      if (!topicMap[t]) topicMap[t] = { count: 0, totalMinutes: 0, lastDate: null, comments: [] };
      topicMap[t].count++;
      topicMap[t].totalMinutes += dur;
      if (!topicMap[t].lastDate || n.date > topicMap[t].lastDate) topicMap[t].lastDate = n.date;
      if (n.content) topicMap[t].comments.push({ date: n.date, content: n.content });
    });
  });

  const topicStats = Object.entries(topicMap)
    .map(([topic, data]) => ({ topic, ...data, hours: data.totalMinutes / 60 }))
    .sort((a, b) => b.totalMinutes - a.totalMinutes);

  const topTopic = topicStats[0];
  const firstClass = studentClasses.sort((a, b) => a.date.localeCompare(b.date))[0];
  const lastClass = completedClasses.sort((a, b) => b.date.localeCompare(a.date))[0];

  const activeStudents = students.filter(s => s.active);
  const filteredStudents = studentSearch
    ? activeStudents.filter(s => s.name.toLowerCase().includes(studentSearch.toLowerCase()))
    : activeStudents;

  const generateAIInsight = async () => {
    if (!student) return;
    setAiLoading(true);
    setAiError(null);
    setAiInsight(null);

    const topicSummary = topicStats.slice(0, 10).map(t =>
      `- ${t.topic}: สอนไป ${t.hours.toFixed(1)} ชม. (${t.count} ครั้ง) — บันทึกล่าสุด ${t.lastDate}`
    ).join("\n");

    const recentComments = studentNotes.slice(0, 8).map(n =>
      `${n.date} [${n.title}]${n.content ? ": " + n.content : ""}`
    ).join("\n");

    const prompt = `คุณเป็นโค้ชผู้เชี่ยวชาญ กำลังวิเคราะห์นักเรียนชื่อ "${student.name}" ระดับ ${student.level || "-"} ในหมวด ${sCat.name || "-"}

ข้อมูลการเรียน:
- เรียนมาแล้ว ${completedClasses.length} คลาส รวม ${totalHours.toFixed(1)} ชั่วโมง
- เริ่มเรียน ${firstClass?.date || "-"} · คลาสล่าสุด ${lastClass?.date || "-"}

หัวข้อที่เรียน (เรียงตามชั่วโมงที่ใช้):
${topicSummary || "(ยังไม่มีข้อมูลหัวข้อ)"}

บันทึกของครูล่าสุด:
${recentComments || "(ยังไม่มีบันทึก)"}

กรุณาวิเคราะห์ ตอบเป็นภาษาไทย แบบกระชับ เน้นใจความ ในรูปแบบ JSON:
{
  "strengths": ["จุดแข็ง 1", "จุดแข็ง 2", ...],
  "improvements": ["จุดที่ควรพัฒนา 1", "จุดที่ควรพัฒนา 2", ...],
  "recommendations": ["คำแนะนำ 1 สำหรับคลาสต่อไป", "คำแนะนำ 2", ...],

}

ตอบเฉพาะ JSON เท่านั้น ไม่ต้องมี markdown code block`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {

          {/* Help text below card */}

// ============ NOTES ============
function NotesPage({ ctx }) {
  const { students, notes, setNotes, settings, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const rows = notes.map(n => ({ ...n, student: students.find(s => s.id === n.studentId) })).sort((a, b) => b.date.localeCompare(a.date));

  return (
    <div className="responsive-page-pad p-8 space-y-3">
      {rows.length === 0 ? (
        <div className="bg-[var(--bg-surface)] rounded-2xl p-10 text-center" style={{ border: "0.5px solid var(--border-default)" }}>
          <IconBook size={28} />
          <div className="text-[12px] mt-3" style={{ color: "var(--text-tertiary)" }}>ยังไม่มีบันทึกการสอน</div>
        </div>
      ) : (
        rows.map(n => {
          const settingCat = n.student ? allCats.find(c => c.id === (n.student.categoryId || n.student.category)) : null;
          const cat = settingCat || CATEGORIES[n.student?.category || "other"] || CATEGORIES.other;
          return (
            <div key={n.id} className="bg-[var(--bg-surface)] rounded-2xl p-4" style={{ border: "0.5px solid var(--border-default)" }}>
              <div className="flex items-start gap-3">
                {n.student?.photo ? (
                  <img src={n.student.photo} alt={n.student.name} className="w-8 h-8 object-cover flex-shrink-0"
                    style={{ borderRadius: "50%", border: `1px solid ${cat.color}` }} />
                ) : (
                  <div className="w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-medium flex-shrink-0" style={{ background: cat.bg, color: cat.text }}>
                    {n.student?.name?.charAt(0)}
                  </div>
                )}
                <div className="flex-1 min-w-0">
                  <div className="flex justify-between items-baseline mb-1">
                    <div className="text-[13px] font-medium">{n.title}</div>
                    <div className="text-[10px] flex-shrink-0 ml-3" style={{ color: "var(--text-secondary)" }}>
                      {formatDate(n.date)}
                      {n.duration && <span> · {n.duration} นาที</span>}
                    </div>
                  </div>
                  <div className="text-[11px] mb-2" style={{ color: "var(--text-secondary)" }}>{n.student?.name} · {n.student?.subcategory}</div>

                  {n.topics && n.topics.length > 0 && (
                    <div className="flex flex-wrap gap-1 mb-2">
                      {n.topics.map((t, i) => (
                        <span key={i} className="text-[10px] px-2 py-0.5 font-medium"
                          style={{ background: cat.bg, color: cat.text, border: `0.5px solid ${cat.color}` }}>
                          {t}
                        </span>
                      ))}
                    </div>
                  )}

                  {n.content && (
                    <div className="text-[12px] leading-relaxed p-3 rounded-md" style={{ background: "var(--bg-muted)", color: "var(--text-primary)", borderLeft: `2px solid ${cat.color}` }}>
                      {n.content}
                    </div>
                  )}
                </div>
                <button onClick={() => { if (confirm("ลบบันทึกนี้?")) setNotes(prev => prev.filter(x => x.id !== n.id)); }}
                  className="p-1 rounded opacity-40 hover:opacity-100"><IconTrash size={13} /></button>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

  const isWide = modal.type === "student-new" || modal.type === "student-edit";

    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in"
      style={{ background: "rgba(31,42,29,0.35)", backdropFilter: "blur(4px)" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className={`modal-mobile-full rounded-3xl w-full ${isWide ? "max-w-3xl" : "max-w-xl"} max-h-[88vh] overflow-hidden flex flex-col`}
        style={{ background: "var(--bg-surface)", boxShadow: "var(--shadow-elevated)", border: "0.5px solid var(--border-soft)" }}>

        {modal.type === "student-edit" && <StudentForm ctx={ctx} onClose={onClose} existing={modal.data} />}

        {modal.type === "course-new" && <CourseForm ctx={ctx} onClose={onClose} />}
        {modal.type === "course-edit" && <CourseForm ctx={ctx} onClose={onClose} existing={modal.data} />}
        {modal.type === "sell-course" && <SellCourseModal ctx={ctx} onClose={onClose} course={modal.data} onNavigate={(t) => { onClose(); setTab(t); }} />}
        {modal.type === "booking-new" && <BookingModal ctx={ctx} onClose={onClose} onNavigate={(t) => { onClose(); setTab(t); }} />}
        {modal.type === "class-new" && <ClassForm ctx={ctx} onClose={onClose} />}
        {modal.type === "class-edit" && <ClassForm ctx={ctx} onClose={onClose} existing={modal.data} />}
        {modal.type === "slip-preview" && (
          <div className="fixed inset-0 z-[60] flex items-center justify-center fade-in"
            style={{ background: "rgba(0,0,0,0.85)", backdropFilter: "blur(4px)" }}
            onClick={onClose}>
            <div onClick={e => e.stopPropagation()} className="relative">
              <img src={modal.data} alt="slip"
                style={{ maxWidth: "480px", maxHeight: "85vh", objectFit: "contain", borderRadius: 8, boxShadow: "0 20px 60px rgba(0,0,0,0.5)" }} />
              <button onClick={onClose}
                className="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-full"
                style={{ background: "rgba(0,0,0,0.6)", color: "#fff", fontSize: 16 }}>
                ✕
              </button>
            </div>
          </div>
        )}
        {modal.type === "payment-new" && <PaymentForm ctx={ctx} onClose={onClose} />}
        {modal.type === "payment-qr" && <PromptPayQR payment={modal.data} ctx={ctx} onClose={onClose} />}
        {modal.type === "note-new" && <NoteForm ctx={ctx} onClose={onClose} prefill={modal.data} />}
      </div>
    </div>
  );
}

const inputCls = "w-full text-[13px] px-3.5 py-2.5 rounded-xl";
const inputSty = { border: "0.5px solid var(--border-default)", background: "var(--bg-surface)", color: "var(--text-primary)" };

function StudentForm({ ctx, onClose, existing }) {
  const { t } = ctx;
  const settings = ctx.settings || DEFAULT_SETTINGS;
  const cats = (settings.categories || DEFAULT_SETTINGS.categories).filter(c => c.active !== false);
  const levelsByCategory = settings.levelsByCategory || DEFAULT_SETTINGS.levelsByCategory;
  const activeLocs = (settings.locations || DEFAULT_SETTINGS.locations).filter(l => l.active);

  const [form, setForm] = useState(existing || {
    name: "", nickname: "", age: "",
    categoryId: cats[0]?.id || "music",
    category: cats[0]?.id || "music",
    subcategory: "",
    levelId: "",
    level: "",
    parent: "", phone: "", lineId: "",
    address: activeLocs[0]?.name || "",
    rate: 500, active: true, startDate: todayISO(), photo: "",
  });

  const currentCat = cats.find(c => c.id === (form.categoryId || form.category)) || cats[0];
  const catLvlsActive = (levelsByCategory[currentCat?.id] || []).filter(l => l.active);

  const handlePhoto = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      alert("รูปใหญ่เกินไป (จำกัด 10MB)");
      return;
    }
    try {
      // Square crop friendly: 600x600 for student avatar
      const result = await processImage(file, { maxWidth: 400, maxHeight: 400, quality: 0.75, targetKB: 20 });
      setForm(f => ({ ...f, photo: result.dataUrl }));
    } catch (err) {
      console.error("Photo processing failed:", err);
      alert("ไม่สามารถประมวลผลรูปได้ — ลองรูปอื่น");
    }
  };

  const submit = () => {
    if (!form.name || !form.subcategory) return alert("กรุณากรอกชื่อและประเภทคลาส");
    const lvlObj = catLvlsActive.find(l => l.id === form.levelId);
    const n = {
      ...form,
      id: existing?.id || `s${Date.now()}`,
      age: Number(form.age) || 0,
      rate: Number(form.rate) || 0,
      categoryId: form.categoryId || form.category,
      category: form.category || form.categoryId,
      levelId: form.levelId,
      level: lvlObj?.name || form.level || "",
    };
    ctx.setStudents(prev => existing ? prev.map(s => s.id === existing.id ? n : s) : [...prev, n]);
    onClose();
  };

  return (
    <>
      <ModalHeader title={existing ? "แก้ไขนักเรียน" : "เพิ่มนักเรียนใหม่"} onClose={onClose} />

        {/* LEFT: Form fields */}
        <div className="p-5 space-y-3 overflow-y-auto" style={{ maxHeight: "calc(88vh - 140px)" }}>
          <FormRow label="ชื่อ-นามสกุล">
            <input className={inputCls} style={inputSty} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="น้องฝน วรรณวิภา" />
          </FormRow>
          <FormRow label={t("nickname")}>
            <input className={inputCls} style={inputSty} value={form.nickname || ""} onChange={e => setForm({ ...form, nickname: e.target.value })} placeholder="ฝน" />
          </FormRow>
          <FormRow label={t("age")}><input className={inputCls} style={inputSty} type="number" value={form.age} onChange={e => setForm({ ...form, age: e.target.value })} /></FormRow>
          <div className="grid grid-cols-2 gap-3">
            <FormRow label="ประเภท">
              <select className={inputCls} style={inputSty} value={form.categoryId || form.category}
                onChange={e => setForm({ ...form, categoryId: e.target.value, category: e.target.value, levelId: "" })}>
                {cats.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
          </FormRow>
          <FormRow label="รายละเอียดคลาส">
            <input className={inputCls} style={inputSty} value={form.subcategory} onChange={e => setForm({ ...form, subcategory: e.target.value })} placeholder="เช่น ร้องเพลง+เปียโน" />
          </FormRow>
        </div>
        <FormRow label={t("level")}>
          {catLvlsActive.length === 0 ? (
            <div className="text-[11px] px-3 py-2.5"
              style={{ background: "var(--info-soft)", color: "var(--info)", borderLeft: "2px solid var(--info)" }}>
              ℹ ยังไม่มีระดับสำหรับหมวด "{currentCat?.name}" — เพิ่มได้ที่ Settings → ระดับ
            </div>
          ) : (
            <select className={inputCls} style={inputSty} value={form.levelId}
              onChange={e => setForm({ ...form, levelId: e.target.value })}>
              <option value="">— เลือกระดับ —</option>
              {catLvlsActive.map(l => (
                <option key={l.id} value={l.id}>{l.name}{l.desc ? ` — ${l.desc}` : ""}</option>
              ))}
            </select>
          )}
        </FormRow>
        <FormRow label={t("parent")}><input className={inputCls} style={inputSty} value={form.parent} onChange={e => setForm({ ...form, parent: e.target.value })} placeholder="คุณวิภา (แม่)" /></FormRow>
        <div className="grid grid-cols-2 gap-3">
          <FormRow label={t("phone")}><input className={inputCls} style={inputSty} value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })} placeholder="081-234-5678" /></FormRow>
          <FormRow label="Line ID"><input className={inputCls} style={inputSty} value={form.lineId} onChange={e => setForm({ ...form, lineId: e.target.value })} /></FormRow>
        </div>
        <FormRow label="สถานที่เรียน">
          <select className={inputCls} style={inputSty} value={form.address} onChange={e => setForm({ ...form, address: e.target.value })}>
            <option value="">— เลือกสถานที่ —</option>
            {(ctx.settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active).map(l => (
              <option key={l.id} value={l.name}>{l.icon} {l.name}</option>
            ))}
          </select>
        </FormRow>

        {/* Student Login Credentials */}
        <div className="p-3 mt-2" style={{ background: "var(--accent-sage-hover)", border: "0.5px solid rgba(94,122,99,0.3)" }}>
          <div className="text-[10px] font-medium mb-2 flex items-center gap-1.5" style={{ color: "#3F5D45", letterSpacing: "0.05em" }}>
            🔑 ข้อมูลเข้าระบบนักเรียน
            <span className="text-[9px] font-normal" style={{ color: "rgba(63,93,69,0.7)" }}>(สำหรับให้นักเรียน Login เข้า Portal)</span>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <FormRow label="Username">
              <input className={inputCls} style={inputSty} value={form.username || ""}
                onChange={e => setForm({ ...form, username: e.target.value })}
                placeholder="เช่น nakk2026" />
            </FormRow>
            <FormRow label="Password">
              <input type="text" className={inputCls} style={inputSty} value={form.password || ""}
                onChange={e => setForm({ ...form, password: e.target.value })}
                placeholder="ตั้งรหัสให้นักเรียน" />
            </FormRow>
          </div>
          {form.username && form.password && (
            <div className="text-[9px] mt-2 italic" style={{ color: "rgba(63,93,69,0.7)" }}>
              💡 ส่งให้นักเรียน: <strong>Username:</strong> {form.username} · <strong>Password:</strong> {form.password}
            </div>
          )}
        </div>
        </div>

        {/* RIGHT: Photo column */}
        <div className="p-5 flex flex-col gap-3" style={{ background: "var(--bg-muted)", borderLeft: "0.5px solid var(--border-soft)" }}>
          <div className="label-eyebrow">รูปนักเรียน</div>

          <label className="cursor-pointer block">
            {form.photo ? (
              <div className="relative group">
                <img src={form.photo} alt="preview"
                  className="w-full object-cover"
                  style={{ aspectRatio: "1", border: "0.5px solid var(--border-default)" }} />
                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                  style={{ background: "rgba(15,31,24,0.6)", color: "#fff" }}>
                  <div className="text-center">
                    <div style={{ fontSize: 24 }}>📷</div>
                    <div style={{ fontSize: 11, fontWeight: 500 }}>เปลี่ยนรูป</div>
                  </div>
                </div>
              </div>
            ) : (
              <div className="w-full flex flex-col items-center justify-center gap-2 transition-colors hover:bg-[var(--bg-surface)]"
                style={{ aspectRatio: "1", border: "0.5px dashed var(--border-strong)", background: "var(--bg-surface)", color: "var(--text-tertiary)" }}>
                <span style={{ fontSize: 36 }}>📷</span>
                <span style={{ fontSize: 12, fontWeight: 500 }}>คลิกเพื่ออัปโหลด</span>
                <span style={{ fontSize: 10 }}>JPG, PNG, WEBP</span>
              </div>
            )}
            <input type="file" accept="image/*" className="hidden" onChange={handlePhoto} />
          </label>

          <div className="text-[10px]" style={{ color: "var(--text-tertiary)", lineHeight: 1.5 }}>
            ขนาดไม่เกิน <strong>2MB</strong><br/>
            แนะนำรูปสี่เหลี่ยมจัตุรัส
          </div>

          {form.photo && (
            <button onClick={() => setForm(f => ({ ...f, photo: "" }))}
              className="text-[11px] py-2 font-medium transition-colors hover:opacity-80"
              style={{ border: "0.5px solid var(--danger)", color: "var(--danger)", background: "var(--bg-surface)" }}>
              ลบรูป
            </button>
          )}
        </div>
      </div>

      <div className="flex gap-2 px-6 py-4" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
        <button onClick={onClose} className="flex-1 text-[13px] py-3 rounded-full font-medium transition-colors hover:bg-[var(--accent-sage-hover)]" style={{ border: "0.5px solid var(--border-default)", color: "var(--text-primary)" }}>ยกเลิก</button>
        <button onClick={submit} className="flex-1 text-[13px] py-3 rounded-full font-medium transition-all hover:opacity-90" style={{ background: "#1A1A17", color: "#C4A878", boxShadow: "var(--shadow-soft)" }}>บันทึก</button>
      </div>
    </>
  );
}

function StudentDetail({ student, ctx, onClose }) {
  const { classes, payments, notes, enrollments, courses, settings } = ctx;
  const [showPayments, setShowPayments] = useState(false);

  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const settingCat = allCats.find(c => c.id === (student.categoryId || student.category));
  const cat = settingCat || CATEGORIES[student.category] || CATEGORIES.other;

  const studentClasses = classes.filter(c => c.studentId === student.id).sort((a, b) => b.date.localeCompare(a.date));
  const studentPayments = payments.filter(p => p.studentId === student.id).sort((a, b) => b.date.localeCompare(a.date));
  const studentNotes = notes.filter(n => n.studentId === student.id).sort((a, b) => b.date.localeCompare(a.date));
  const studentEnrollments = (enrollments || []).filter(e => e.studentId === student.id).sort((a, b) => b.date.localeCompare(a.date));

  const completed = studentClasses.filter(c => c.status === "completed").length;
  const pending = studentPayments.filter(p => p.status !== "paid").reduce((sum, p) => sum + Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)), 0);
  const totalPaid = studentPayments.filter(p => p.status === "paid").reduce((sum, p) => sum + (p.totalAmount || p.amount), 0);
  const activeEnrollments = studentEnrollments.filter(e => e.status === "active");
  const paidCount = studentPayments.filter(p => p.status === "paid").length;
  const pendingCount = studentPayments.filter(p => p.status !== "paid").length;

  const remove = () => {
    if (!confirm(`ลบข้อมูล ${student.name}?`)) return;
    ctx.setStudents(prev => prev.filter(s => s.id !== student.id));
    ctx.setClasses(prev => prev.filter(c => c.studentId !== student.id));
    ctx.setPayments(prev => prev.filter(p => p.studentId !== student.id));
    ctx.setNotes(prev => prev.filter(n => n.studentId !== student.id));
    onClose();
  };

  return (
    <>
      <div className="px-6 py-5 flex items-center gap-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
        {student.photo ? (
          <img src={student.photo} alt={student.name} className="w-14 h-14 object-cover flex-shrink-0"
            style={{ border: `1px solid ${cat.color}` }} />
        ) : (
          <div className="w-12 h-12 flex items-center justify-center text-[16px] font-medium flex-shrink-0"
            style={{ background: cat.bg, color: cat.text }}>
            {student.name.charAt(0)}
          </div>
        )}
        <div className="flex-1 min-w-0">
          <div className="flex items-baseline gap-2">
            <div className="text-[16px] font-medium">{student.name}</div>
            {student.nickname && <div className="text-[12px] italic" style={{ color: "var(--text-tertiary)" }}>"{student.nickname}"</div>}
          </div>
          <div className="flex items-center gap-1.5 mt-0.5">
            <span className="text-[10px] px-1.5 py-0.5 rounded font-medium" style={{ background: cat.bg, color: cat.text }}>{cat.name || cat.label}</span>
            <span className="text-[11px]" style={{ color: "var(--text-secondary)" }}>· {student.level}</span>
          </div>
        </div>
        <button onClick={() => ctx.setModal({ type: "student-edit", data: student })}
          className="text-[11px] px-3 py-1.5 font-medium flex items-center gap-1 transition-colors hover:bg-[var(--accent-sage-hover)]"
          style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
          แก้ไข
        </button>
        <button onClick={remove} className="p-1.5 rounded" style={{ color: "var(--danger)" }}><IconTrash size={15} /></button>
        <button onClick={onClose} className="p-1.5 rounded" style={{ color: "var(--text-secondary)" }}><IconX size={16} /></button>
      </div>

      <div className="overflow-y-auto flex-1">
        <div className="p-6 space-y-5">

          {/* Stats */}
          <div className="grid grid-cols-4" style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)" }}>
            <StatCard compact label="คลาสรวม" value={completed} />
            <StatCard compact label="ได้รับแล้ว" value={formatBaht(totalPaid)} up />
            <StatCard compact label="ค้างชำระ" value={formatBaht(pending)} up={pending === 0} />
            <StatCard compact label="บันทึก" value={studentNotes.length} />
          </div>

          {/* Active Enrollments */}
          {studentEnrollments.length > 0 && (
            <div>
              <div className="label-eyebrow mb-3">คอร์สที่ลงทะเบียน</div>
              <div className="space-y-2">
                {studentEnrollments.map(en => {
                  const course = (courses || []).find(c => c.id === en.courseId);
                  if (!course) return null;
                  const courseCat = allCats.find(c => c.id === (course.categoryId || course.category)) || CATEGORIES[course.category] || CATEGORIES.other;
                  const progress = en.totalSessions > 0 ? Math.round((en.completedSessions / en.totalSessions) * 100) : 0;
                  const remaining = (en.totalPrice || 0) - (en.paidAmount || 0);
                  const statusMap = {
                    active: { bg: "var(--success-soft)", color: "var(--success)", label: "กำลังเรียน" },
                    completed: { bg: "var(--info-soft)", color: "var(--info)", label: "เสร็จแล้ว" },
                    cancelled: { bg: "var(--danger-soft)", color: "var(--danger)", label: "ยกเลิก" },
                  };
                  const st = statusMap[en.status] || statusMap.active;
                  return (
                    <div key={en.id} className="p-4" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", borderLeft: `3px solid ${courseCat.color || "#888"}` }}>
                      <div className="flex items-start justify-between gap-3 mb-3">
                        <div className="flex-1 min-w-0">
                          <div className="text-[13px] font-medium leading-snug">{course.name}</div>
                          <div className="flex items-center gap-2 mt-0.5">
                            <span className="text-[10px] px-1.5 py-0.5 rounded font-medium" style={{ background: courseCat.bg, color: courseCat.text }}>{courseCat.name || courseCat.label}</span>
                            <span className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>ลงทะเบียน {formatDate(en.date)}</span>
                          </div>
                        </div>
                        <span className="text-[10px] px-2 py-1 font-medium flex-shrink-0"
                          style={{ background: st.bg, color: st.color }}>
                          {st.label}
                        </span>
                      </div>

                      <div className="grid grid-cols-3 gap-4 mb-3">
                        <div>
                          <div className="text-[9px] mb-1 label-eyebrow" style={{ fontSize: 9 }}>ความคืบหน้า</div>
                          <div className="text-[13px] font-medium">{en.completedSessions}/{en.totalSessions} ชม.</div>
                          <div className="mt-1.5 h-1.5 rounded-full overflow-hidden" style={{ background: "var(--bg-muted)" }}>
                            <div className="h-full rounded-full transition-all"
                              style={{ width: `${progress}%`, background: progress === 100 ? "var(--info)" : "var(--success)" }} />
                          </div>
                        </div>
                        <div>
                          <div className="text-[9px] mb-1 label-eyebrow" style={{ fontSize: 9 }}>ชำระแล้ว</div>
                          <div className="text-[13px] font-medium" style={{ color: "var(--success)" }}>{formatBaht(en.paidAmount || 0)}</div>
                          <div className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>จาก {formatBaht(en.totalPrice || 0)}</div>
                        </div>
                        <div>
                          <div className="text-[9px] mb-1 label-eyebrow" style={{ fontSize: 9 }}>ค้างชำระ</div>
                          <div className="text-[13px] font-medium" style={{ color: remaining > 0 ? "var(--danger)" : "var(--success)" }}>
                            {remaining > 0 ? formatBaht(remaining) : "ครบแล้ว ✓"}
                          </div>
                        </div>
                      </div>

                      {en.note && (
                        <div className="text-[10px] px-2.5 py-1.5 rounded" style={{ background: "var(--warning-soft)", color: "var(--warning)" }}>
                          📝 {en.note}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

                          <div>
                            <div className="label-eyebrow mb-0.5" style={{ fontSize: 9 }}>จ่ายแล้ว</div>

                            <div className="label-eyebrow mb-0.5" style={{ fontSize: 9 }}>ยอดเหลือ</div>

                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}

                  {/* Total summary */}
                  <div className="flex justify-between items-center px-4 py-3 mt-3" style={{ background: "#1A1A17", color: "#E8E4D6" }}>
                    <span className="text-[11px]" style={{ color: "rgba(232,228,214,0.6)" }}>รวมทั้งหมด</span>
                    <div className="flex items-baseline gap-4">
                      <div className="text-right">
                        <div className="text-[9px] label-eyebrow" style={{ color: "rgba(232,228,214,0.5)" }}>จ่ายแล้ว</div>
                        <div className="num-display text-[14px]" style={{ color: "#8FBF7F" }}>{formatBaht(totalPaid)}</div>
                      </div>
                      {pending > 0 && (
                        <div className="text-right">
                          <div className="text-[9px] label-eyebrow" style={{ color: "rgba(232,228,214,0.5)" }}>ค้างชำระ</div>
                          <div className="num-display text-[14px]" style={{ color: "#E88D7F" }}>{formatBaht(pending)}</div>

                      )}

                  </div>
                </div>
              )}
            </div>
          )}

          {/* Contact */}
          <div>
            <div className="label-eyebrow mb-2.5">ข้อมูลติดต่อ</div>
            <div className="rounded-xl p-4 space-y-2 text-[12px]" style={{ background: "var(--bg-muted)" }}>

                <div className="flex justify-between">
                  <span style={{ color: "var(--text-secondary)" }}>สถานที่</span>

              {student.startDate && (
                <div className="flex justify-between" style={{ borderTop: "0.5px solid var(--border-soft)", paddingTop: 8 }}>

          {/* Notes */}
          {studentNotes.length > 0 && (
            <div>
              <div className="label-eyebrow mb-2.5">บันทึกการสอนล่าสุด</div>
              <div className="space-y-2">

                    <div className="flex justify-between items-baseline mb-1.5">

                      <div className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>{formatDate(n.date)}</div>

        </div>

}

// ============ REQUESTS PAGE (teacher view) ============
function RequestsPage({ ctx, onNavigate }) {
  const { students, courses, enrollments, bookingRequests, setBookingRequests, classes, setClasses, setEnrollments, settings, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;

  const [filter, setFilter] = useState("pending");
  const [rejectingId, setRejectingId] = useState(null);
  const [rejectReason, setRejectReason] = useState("");
  const [conflictModal, setConflictModal] = useState(null); // { req, conflicts: [...] }
  const [toast, setToast] = useState(null); // { msg, type, req? }

  const sorted = [...bookingRequests].sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
  const pendingList = sorted.filter(r => r.status === "pending");
  const approvedList = sorted.filter(r => r.status === "approved");
  const rejectedList = sorted.filter(r => r.status === "rejected");

  const filtered = filter === "pending" ? pendingList
    : filter === "approved" ? approvedList
    : filter === "rejected" ? rejectedList
    : sorted;

  const formatThaiDate = (iso) => {
    if (iso === todayISO()) return "วันนี้";
    if (iso === addDays(todayISO(), 1)) return "พรุ่งนี้";
    const [y, m, d] = iso.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString("th-TH", { weekday: "short", day: "numeric", month: "long" });
  };

  const endTime = (start, dur) => {
    const [h, m] = start.split(":").map(Number);
    const em = h * 60 + m + dur;
    return `${String(Math.floor(em/60)).padStart(2,"0")}:${String(em%60).padStart(2,"0")}`;
  };

  // Convert time + date to absolute minutes for comparison
  const toMinutes = (dateStr, timeStr) => {
    const [y, mo, d] = dateStr.split("-").map(Number);
    const [h, mi] = timeStr.split(":").map(Number);
    return new Date(y, mo - 1, d, h, mi).getTime();
  };

  // Check overlap between two time ranges [start, end) in ms
  const overlaps = (s1, e1, s2, e2) => s1 < e2 && s2 < e1;

  // Find conflicts for a request: existing classes + other pending requests
  const findConflicts = (req) => {
    const reqStart = toMinutes(req.requestedDate, req.requestedTime);
    const reqEnd = reqStart + req.duration * 60000;

    const classConflicts = classes
      .filter(c => c.status === "scheduled" && c.date === req.requestedDate)
      .filter(c => {
        const cs = toMinutes(c.date, c.startTime);
        const ce = cs + (c.duration || 60) * 60000;
        return overlaps(reqStart, reqEnd, cs, ce);
      })
      .map(c => ({ type: "class", data: c }));

    const requestConflicts = pendingList
      .filter(r => r.id !== req.id && r.requestedDate === req.requestedDate)
      .filter(r => {
        const rs = toMinutes(r.requestedDate, r.requestedTime);
        const re = rs + r.duration * 60000;
        return overlaps(reqStart, reqEnd, rs, re);
      })
      .map(r => ({ type: "request", data: r }));

    return [...classConflicts, ...requestConflicts];
  };

  const doApprove = (req) => {
    const newClassId = `c${Date.now()}`;
    setClasses(prev => [...prev, {
      id: newClassId,
      studentId: req.studentId,
      courseId: req.courseId || null,
      date: req.requestedDate,
      startTime: req.requestedTime,
      duration: req.duration,
      location: req.location,
      status: "scheduled",
      price: 0,
      note: req.note || "",
    }]);
    if (req.courseId) {
      setEnrollments(prev => prev.map(en => {
        if (en.studentId === req.studentId && en.courseId === req.courseId && en.status === "active") {
          const newCompleted = en.completedSessions + (req.duration / 60);
          return { ...en, completedSessions: newCompleted };
        }
        return en;
      }));
    }
    setBookingRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "approved", approvedClassId: newClassId, respondedAt: new Date().toISOString() } : r));
    // Show success toast
    const s = students.find(st => st.id === req.studentId);
    setToast({
      msg: `อนุมัติคำขอของ ${s?.name || "นักเรียน"} เรียบร้อย`,
      detail: `เพิ่มคลาสในตารางสอน ${formatThaiDate(req.requestedDate)} เวลา ${req.requestedTime} แล้ว`,
      type: "success",
    });
    setTimeout(() => setToast(null), 5000);
  };

  const tryApprove = (req) => {
    const conflicts = findConflicts(req);
    if (conflicts.length > 0) {
      setConflictModal({ req, conflicts });
    } else {
      doApprove(req);
    }
  };

  const reject = (req, reason) => {
    setBookingRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "rejected", rejectedReason: reason || "", respondedAt: new Date().toISOString() } : r));
    setRejectingId(null);
    setRejectReason("");
  };

  return (
    <div className="responsive-page-pad p-8 space-y-5">

      {/* Header */}
      <div className="flex items-baseline justify-between pb-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
        <div>
          <div className="label-eyebrow mb-1">Booking Requests</div>
          <div className="heading-serif text-[26px]">คำขอจองเรียน</div>
          <div className="text-[12px] mt-1" style={{ color: "var(--text-secondary)" }}>
            คำขอจากนักเรียนที่รอการอนุมัติ
          </div>
        </div>
        {pendingList.length > 0 && (
          <div className="flex items-center gap-2 px-4 py-2"
            style={{ background: "var(--warning-soft)", color: "var(--warning)", border: "0.5px solid rgba(164,125,72,0.3)" }}>
            <div className="w-2 h-2 rounded-full" style={{ background: "var(--warning)" }} />
            <span className="text-[12px] font-medium">{pendingList.length} คำขอรอดำเนินการ</span>
          </div>
        )}
      </div>

      {/* Filter pills */}
      <div className="flex gap-2">
        {[
          { id: "pending", label: "รอดำเนินการ", count: pendingList.length },
          { id: "approved", label: "อนุมัติแล้ว", count: approvedList.length },
          { id: "rejected", label: "ปฏิเสธ", count: rejectedList.length },
          { id: "all", label: "ทั้งหมด", count: sorted.length },
        ].map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)}
            className={`filter-pill ${filter === f.id ? "active" : ""}`}>
            {f.label}
            <span className="pill-count">{f.count}</span>
          </button>
        ))}
      </div>

      {/* Request list */}
      {filtered.length === 0 ? (
        <div className="flex flex-col items-center justify-center py-20 gap-3"
          style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)" }}>
          <div style={{ color: "var(--text-quaternary)" }}><IconSend size={40} stroke={1} /></div>
          <div className="heading-serif text-[18px] italic" style={{ color: "var(--text-tertiary)" }}>
            {filter === "pending" ? "ไม่มีคำขอที่รอดำเนินการ" : "ไม่มีคำขอ"}
          </div>
          <div className="text-[11px]" style={{ color: "var(--text-quaternary)" }}>
            นักเรียนส่งคำขอผ่าน Student Portal
          </div>
        </div>
      ) : (
        <div className="space-y-3">
          {filtered.map(req => {
            const s = students.find(st => st.id === req.studentId);
            const c = req.courseId ? courses.find(cc => cc.id === req.courseId) : null;
            const en = req.courseId ? (enrollments || []).find(e => e.studentId === req.studentId && e.courseId === req.courseId && e.status === "active") : null;
            const remainingHrs = en ? Math.round((en.totalSessions - en.completedSessions) * 10) / 10 : null;
            const sCat = s ? (allCats.find(cc => cc.id === (s.categoryId || s.category)) || CATEGORIES[s.category] || CATEGORIES.other) : CATEGORIES.other;
            const isPending = req.status === "pending";
            const isApproved = req.status === "approved";
            const isRejected = req.status === "rejected";
            const isRejecting = rejectingId === req.id;

            return (
              <div key={req.id} className="p-5"
                style={{
                  background: "var(--bg-surface)",
                  border: isPending ? `1.5px solid ${sCat.color}` : "0.5px solid var(--border-soft)",
                  borderLeft: `3px solid ${sCat.color}`,
                  opacity: isRejected ? 0.65 : 1,
                }}>

                <div className="flex gap-4">
                  {/* Left: avatar + date/time */}
                  <div className="flex-shrink-0" style={{ minWidth: 110 }}>
                    <div className="flex items-center gap-2 mb-3">
                      <div className="w-9 h-9 flex items-center justify-center text-[13px] font-medium flex-shrink-0"
                        style={{ background: sCat.bg, color: sCat.text }}>
                        {s?.name?.charAt(0) || "?"}
                      </div>
                    </div>
                    <div className="num-display text-[22px] leading-none">{req.requestedTime}</div>
                    <div className="num-display text-[13px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>
                      — {endTime(req.requestedTime, req.duration)}
                    </div>
                    <div className="text-[11px] mt-1.5" style={{ color: "var(--text-secondary)" }}>
                      {formatThaiDate(req.requestedDate)}
                    </div>
                  </div>

                  <div className="w-px self-stretch" style={{ background: sCat.color, opacity: 0.25 }} />

                  {/* Middle: details */}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-2 flex-wrap">
                      <div className="text-[14px] font-medium">{s?.name || "ไม่พบนักเรียน"}</div>
                      <span className="text-[9px] px-2 py-0.5 font-medium"
                        style={{
                          background: isPending ? "var(--warning-soft)" : isApproved ? "var(--success-soft)" : "var(--danger-soft)",
                          color: isPending ? "var(--warning)" : isApproved ? "var(--success)" : "var(--danger)",
                        }}>
                        {isPending ? "⧖ รอดำเนินการ" : isApproved ? "✓ อนุมัติแล้ว" : "✕ ปฏิเสธ"}
                      </span>
                      {isPending && (() => {
                        const conflicts = findConflicts(req);
                        if (conflicts.length === 0) return null;
                        return (
                          <span className="text-[9px] px-2 py-0.5 font-medium flex items-center gap-1"
                            style={{ background: "var(--danger-soft)", color: "var(--danger)" }}>
                            ⚠ ชนเวลา {conflicts.length}
                          </span>
                        );
                      })()}
                    </div>

                    {c && (
                      <div className="text-[12px] mb-1" style={{ color: "var(--text-primary)" }}>
                        {c.name}
                        {remainingHrs !== null && (
                          <span className="text-[11px] ml-2" style={{ color: remainingHrs < 2 ? "var(--danger)" : "var(--text-tertiary)" }}>
                            (เหลือ {remainingHrs} ชม.)
                          </span>
                        )}
                      </div>
                    )}

                    <div className="text-[11px] flex flex-wrap gap-x-2 gap-y-0.5" style={{ color: "var(--text-secondary)" }}>
                      <span>⏱ {req.duration} นาที</span>
                      <span style={{ color: "var(--text-quaternary)" }}>·</span>
                      <span>📍 {req.location}</span>
                    </div>

                    {req.note && (
                      <div className="text-[11px] mt-2 px-3 py-2" style={{ background: "var(--bg-muted)", color: "var(--text-secondary)", borderLeft: `2px solid ${sCat.color}` }}>
                        💬 {req.note}
                      </div>
                    )}

                    {req.rejectedReason && (
                      <div className="text-[11px] mt-2" style={{ color: "var(--danger)" }}>
                        เหตุผลปฏิเสธ: {req.rejectedReason}
                      </div>
                    )}

                    <div className="text-[10px] mt-2" style={{ color: "var(--text-quaternary)" }}>
                      ส่งคำขอเมื่อ {req.createdAt ? new Date(req.createdAt).toLocaleString("th-TH", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }) : "—"}
                    </div>
                  </div>

                  {/* Right: actions */}
                  {isPending && !isRejecting && (() => {
                    const conflicts = findConflicts(req);
                    const hasConflict = conflicts.length > 0;
                    return (
                      <div className="flex flex-col gap-1.5 flex-shrink-0">
                        <button onClick={() => tryApprove(req)}
                          className="text-[11px] px-4 py-2 font-medium flex items-center gap-1.5 transition-all hover:opacity-90"
                          style={{
                            background: hasConflict ? "var(--warning)" : "var(--success)",
                            color: "#fff",
                          }}>
                          <IconCheck size={12} /> {hasConflict ? "อนุมัติ (ชน)" : "อนุมัติ"}
                        </button>
                        <button onClick={() => { setRejectingId(req.id); setRejectReason(""); }}
                          className="text-[11px] px-4 py-2 font-medium transition-colors"
                          style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
                          ปฏิเสธ
                        </button>
                      </div>
                    );
                  })()}

                  {isRejecting && (
                    <div className="flex-shrink-0 flex flex-col gap-2" style={{ width: 220 }}>
                      <input autoFocus type="text" value={rejectReason}
                        onChange={e => setRejectReason(e.target.value)}
                        placeholder="เหตุผล (ไม่บังคับ)"
                        className="text-[11px] px-2.5 py-2"
                        style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", outline: "none" }} />
                      <div className="flex gap-1.5">
                        <button onClick={() => reject(req, rejectReason)}
                          className="flex-1 text-[11px] px-3 py-1.5 font-medium"
                          style={{ background: "var(--danger)", color: "#fff" }}>
                          ยืนยันปฏิเสธ
                        </button>
                        <button onClick={() => setRejectingId(null)}
                          className="text-[11px] px-3 py-1.5"
                          style={{ border: "0.5px solid var(--border-default)", color: "var(--text-tertiary)" }}>
                          {t("cancelBookingShort")}
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Success toast */}
      {toast && (
        <div className="fixed bottom-6 right-6 z-50 fade-in"
          style={{ background: "#1A1A17", color: "#E8E4D6", boxShadow: "var(--shadow-elevated)", border: "0.5px solid rgba(212,182,120,0.3)", minWidth: 320, maxWidth: 420 }}>

            <div className="flex items-center justify-center w-8 h-8 flex-shrink-0" style={{ background: "var(--success)", color: "#fff", borderRadius: "50%" }}>
              <IconCheck size={14} />

              <div className="text-[11px]" style={{ color: "rgba(232,228,214,0.65)" }}>{toast.detail}</div>
