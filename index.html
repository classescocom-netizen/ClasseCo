<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassesCo — ระบบครูสอนพิเศษ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    /* Luxury editorial palette — Aesop / Frette / Le Labo inspired (Soft Premium) */
    --bg-primary: #F5F1E8;          /* warmer paper */
    --bg-surface: #FAF7F0;          /* elevated surface, warmer */
    --bg-muted: #ECE7DB;            /* warm beige, slightly warmer */
    --bg-subtle: #E0DBCE;           /* deeper warm */
    --bg-dark: #1A1A17;             /* near-black warm */
    --bg-dark-soft: #262622;

    --text-primary: #2A2724;        /* softened from pure near-black */
    --text-secondary: #5C5A52;      /* warm gray */
    --text-tertiary: #8F8C81;       /* light warm */
    --text-quaternary: #B8B6AB;     /* very subtle */
    --text-on-dark: #E8E4D6;
    --text-muted-on-dark: rgba(232,228,214,0.52);

    --border-hairline: rgba(42,39,36,0.04);
    --border-soft: rgba(42,39,36,0.07);
    --border-default: rgba(42,39,36,0.10);
    --border-strong: rgba(42,39,36,0.16);

    /* Refined accents — bronze and muted sage green */
    --accent-bronze: #8B6F47;       /* deep bronze gold */
    --accent-bronze-soft: #D4C3A3;
    --accent-bronze-ivory: #EBE4D2;
    --accent-sage: #5A7A5C;         /* muted sage (was deep forest #2F5D3E) */
    --accent-sage-deep: #3F5D45;    /* deeper sage for active states */
    --accent-sage-soft: #DBE3DC;
    --accent-sage-hover: #EBF1EC;   /* even lighter green for hover */
    --accent-ink: #2D4234;          /* softened forest ink */

    /* Semantic — deeply muted, green-shifted */
    --success: #5A7A5C;
    --success-soft: #DCE5DB;
    --warning: #A47D48;
    --warning-soft: #EDE1CE;
    --danger: #9B4A3D;
    --danger-soft: #EAD3CD;
    --info: #6B7A8F;
    --info-soft: #DCE0E7;

    /* Refined shadows - barely visible but present */
    --shadow-hairline: 0 1px 0 rgba(42,39,36,0.03);
    --shadow-soft: 0 1px 2px rgba(42,39,36,0.02), 0 2px 6px rgba(42,39,36,0.03);
    --shadow-card: 0 1px 3px rgba(42,39,36,0.03), 0 12px 32px rgba(42,39,36,0.04);
    --shadow-elevated: 0 4px 12px rgba(42,39,36,0.05), 0 32px 64px rgba(42,39,36,0.06);

    /* Soft transition curve */
    --ease-soft: cubic-bezier(0.32, 0.72, 0, 1);
  }

  [data-theme="dark"] {
    --bg-primary: #141412;
    --bg-surface: #1E1E1B;
    --bg-muted: #26251F;
    --bg-subtle: #2F2E27;
    --bg-dark: #0A0A09;
    --bg-dark-soft: #1A1A17;

    --text-primary: #F0EDE4;
    --text-secondary: #B5B3A8;
    --text-tertiary: #8A887E;
    --text-quaternary: #57554E;
    --text-on-dark: #F0EDE4;
    --text-muted-on-dark: rgba(240,237,228,0.52);

    --border-hairline: rgba(240,237,228,0.05);
    --border-soft: rgba(240,237,228,0.08);
    --border-default: rgba(240,237,228,0.14);
    --border-strong: rgba(240,237,228,0.22);

    --accent-bronze: #C4A878;
    --accent-bronze-soft: #5C4A2D;
    --accent-bronze-ivory: #2D2416;
    --accent-sage: #7FB28A;
    --accent-sage-soft: #2E4032;
    --accent-sage-hover: rgba(127,178,138,0.12);
    --accent-ink: #F0EDE4;

    --success: #8FAE7F;
    --success-soft: rgba(95,122,82,0.18);
    --warning: #D4A06F;
    --warning-soft: rgba(164,125,72,0.18);
    --danger: #D17869;
    --danger-soft: rgba(155,74,61,0.18);
    --info: #8699B3;
    --info-soft: rgba(90,107,130,0.18);

    --shadow-hairline: 0 1px 0 rgba(0,0,0,0.3);
    --shadow-soft: 0 1px 2px rgba(0,0,0,0.2), 0 1px 3px rgba(0,0,0,0.25);
    --shadow-card: 0 2px 4px rgba(0,0,0,0.25), 0 8px 24px rgba(0,0,0,0.3);
    --shadow-elevated: 0 8px 20px rgba(0,0,0,0.4), 0 24px 48px rgba(0,0,0,0.45);
  }

  body, html {
    margin: 0;
    padding: 0;
    font-family: "Prompt", system-ui, -apple-system, sans-serif;
    font-weight: 400;
    background: var(--bg-primary);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
    font-size: 14px;
  }
  * { box-sizing: border-box; }

  .font-serif { font-family: "Prompt", sans-serif; font-style: italic; font-weight: 500; }
  .font-mono { font-family: "JetBrains Mono", "SF Mono", monospace; font-feature-settings: "liga" 0; }

  /* Display numbers — use Prompt with heavier weight */
  .num-display {
    font-family: "Prompt", sans-serif;
    font-weight: 500;
    font-variant-numeric: lining-nums tabular-nums;
    letter-spacing: -0.02em;
  }

  /* Editorial text labels */
  .label-eyebrow {
    font-family: "Prompt", sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;  /* Soft premium: wider letter-spacing */
    text-transform: uppercase;
    color: var(--text-tertiary);
  }

  /* Soft premium card hover - no shadow at rest, soft lift on hover */
  .soft-card {
    transition: all 350ms var(--ease-soft);
  }
  .soft-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-soft);
  }

  /* Soft fade-in animation */
  .soft-fade-in {
    animation: softFadeIn 600ms var(--ease-soft) both;
  }
  @keyframes softFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Login shell — full screen with soft premium feel */
  .login-shell {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    position: relative;
    overflow: hidden;
  }
  @media (max-width: 640px) {
    .login-shell { padding: 24px 16px; }
  }

  /* Decorative ornament divider — for soft premium sections */
  .ornament-divider {
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--text-tertiary);
    font-style: italic;
    font-family: var(--font-serif, 'Cormorant Garamond', serif);
    font-size: 12px;
  }
  .ornament-divider::before,
  .ornament-divider::after {
    content: "";
    flex: 1;
    height: 0.5px;
    background: var(--border-default);
  }

  /* Soft button — premium feel */
  .btn-soft-premium {
    background: var(--bg-dark);
    color: var(--accent-bronze);
    padding: 14px 28px;
    font-size: 11px;
    letter-spacing: 0.18em;
    font-weight: 500;
    transition: all 300ms var(--ease-soft);
    cursor: pointer;
    border: none;
    text-transform: uppercase;
  }
  .btn-soft-premium:hover {
    background: var(--bg-dark-soft);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(42,39,36,0.12);
  }
  .btn-soft-premium:active {
    transform: translateY(0);
  }

  /* Filter pill — shared across all pages */
  .filter-pill {
    font-family: "Prompt", sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 7px 14px;
    background: var(--bg-surface);
    color: var(--text-secondary);
    border: 0.5px solid var(--border-default);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 6px;
    line-height: 1.3;
  }
  .filter-pill:hover {
    color: var(--text-primary);
    border-color: var(--border-strong);
  }
  .filter-pill.active {
    background: #1A1A17;
    color: #C4A878;
    border-color: #1A1A17;
    box-shadow: 0 2px 8px rgba(26,26,23,0.18);
    font-weight: 600;
  }
  .filter-pill .pill-count {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 99px;
    background: var(--bg-muted);
    color: var(--text-tertiary);
    font-weight: 500;
  }
  .filter-pill.active .pill-count {
    background: rgba(196,168,120,0.22);
    color: #C4A878;
  }

  /* ============ RESPONSIVE ============ */

  /* Mobile drawer for sidebar */
  .sidebar-drawer {
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Mobile menu button — hide on desktop */
  .mobile-menu-btn { display: none; }
  .sidebar-overlay { display: none; }

  /* === TABLET: 768px - 1024px === */
  @media (max-width: 1024px) {
    .sidebar-tablet {
      width: 220px !important;
    }
  }

  /* === MOBILE: under 768px === */
  @media (max-width: 768px) {
    /* Sidebar becomes drawer */
    .sidebar-drawer {
      position: fixed !important;
      top: 0;
      left: 0;
      height: 100vh;
      width: 280px !important;
      z-index: 100;
      transform: translateX(-100%);
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }
    .sidebar-drawer.open {
      transform: translateX(0);
    }

    /* Overlay when drawer open */
    .sidebar-overlay {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* Mobile menu button */
    .mobile-menu-btn {
      display: flex !important;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--bg-surface);
      border: 0.5px solid var(--border-default);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Reduce paddings */
    .responsive-page-pad { padding: 16px !important; }
    .responsive-page-pad-sm { padding: 12px !important; }

    /* Stack grids on mobile */
    .grid-cols-2-resp { grid-template-columns: 1fr !important; }
    .grid-cols-3-resp { grid-template-columns: 1fr !important; }
    .grid-cols-4-resp { grid-template-columns: 1fr 1fr !important; }

    /* Stat cards stack */
    .stat-grid-resp { grid-template-columns: 1fr 1fr !important; gap: 1px !important; }

    /* Tables — make horizontally scrollable */
    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll > div {
      min-width: 720px;
    }

    /* Hide certain columns on mobile */
    .hide-mobile { display: none !important; }

    /* Compact filters */
    .filter-pill {
      font-size: 10px !important;
      padding: 6px 10px !important;
    }

    /* Modal full-screen on mobile */
    .modal-mobile-full {
      max-width: 100% !important;
      max-height: 100vh !important;
      border-radius: 0 !important;
      margin: 0 !important;
    }

    /* TopBar adjustments */
    .topbar-mobile { padding: 12px 16px !important; }
    .topbar-title-mobile { font-size: 18px !important; }
    .topbar-search-mobile { display: none !important; }

    /* Reduce font sizes */
    .num-display-mobile { font-size: 26px !important; }
    .heading-serif-mobile { font-size: 18px !important; }

    /* Tab buttons wrap on mobile */
    .tab-pills-resp {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex-wrap: nowrap !important;
    }
    .tab-pills-resp::-webkit-scrollbar { display: none; }
    .tab-pills-resp button {
      flex-shrink: 0;
      font-size: 11px !important;
      padding: 6px 12px !important;
    }

    /* Hero stats responsive — ensure no overflow */
    .stat-grid-resp > div {
      min-width: 0 !important;
      overflow: hidden;
    }
    .num-display {
      font-size: 26px !important;
    }

    /* Enrollment cards — stack content */
    .enrollment-card-resp {
      padding: 12px !important;
    }
    .enrollment-card-resp .grid-cols-3 {
      grid-template-columns: 1fr 1fr !important;
      gap: 8px !important;
    }

    /* Modal forms — compact spacing */
    .modal-mobile-full .p-5 { padding: 16px !important; }
    .modal-mobile-full .p-6 { padding: 16px !important; }
    .modal-mobile-full .p-7 { padding: 16px !important; }
    .modal-mobile-full .px-7 { padding-left: 16px !important; padding-right: 16px !important; }

    /* Form rows — compact */
    .form-row-resp .grid-cols-2 {
      grid-template-columns: 1fr !important;
    }

    /* Action button bars — wrap */
    .action-bar-resp {
      flex-wrap: wrap;
      gap: 4px !important;
    }
    .action-bar-resp button {
      font-size: 10px !important;
      padding: 4px 8px !important;
    }

    /* Course/enrollment content area */
    .content-flex-resp {
      flex-direction: column !important;
      gap: 8px !important;
    }

    /* Booking page — stack form above list on mobile */
    .booking-layout-resp {
      flex-direction: column !important;
      height: auto !important;
    }
    .booking-form-resp {
      width: 100% !important;
      max-height: none !important;
      border-right: none !important;
      border-bottom: 0.5px solid var(--border-soft) !important;
    }
  }

  @media (max-width: 480px) {
    .grid-cols-4-resp { grid-template-columns: 1fr !important; }
    .stat-grid-resp { grid-template-columns: 1fr !important; }
    .num-display { font-size: 22px !important; }
    .topbar-title-mobile { font-size: 16px !important; }
    /* Even more compact filters on small phones */
    .filter-pill {
      font-size: 9px !important;
      padding: 5px 8px !important;
    }
  }

  /* === iPad / Tablet (768px - 1024px) === */
  @media (min-width: 768px) and (max-width: 1024px) {
    .sidebar-tablet { width: 200px !important; }
    .responsive-page-pad { padding: 24px !important; }
    .num-display { font-size: 28px !important; }
    /* Tablet 2-col stat layout for some pages */
    .stat-grid-resp { grid-template-columns: 1fr 1fr !important; }
  }

  /* Editorial headings */
  .heading-serif {
    font-family: "Prompt", sans-serif;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .animate-pulse { animation: pulse 2.8s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
  .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }

  input, select, textarea {
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    color: var(--text-primary);
  }
  input::placeholder, textarea::placeholder { color: var(--text-quaternary); }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent-sage) !important;
    outline: none;
    box-shadow: 0 0 0 3px rgba(47,93,62,0.12);
  }
  button {
    font-family: inherit;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  button:active { transform: scale(0.985); }

  /* Global sage-green hover for sidebar items, cards, pills */
  .hover-sage:hover {
    background: var(--accent-sage-hover) !important;
    color: var(--accent-sage) !important;
    border-color: var(--accent-sage) !important;
  }
  /* Subtle green border on hover for frames */
  .frame-hover {
    transition: border-color 0.2s, background 0.2s;
  }
  .frame-hover:hover {
    border-color: var(--accent-sage) !important;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(15,31,24,0.08); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(15,31,24,0.15); background-clip: padding-box; }

  /* Divider accents */
  .divider-ornament {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .divider-ornament::before, .divider-ornament::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border-default);
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
window.classescoExportPDF = function(courses, enrollments, allCats, allLvls, activeEnrollments) {
  var now = new Date().toLocaleDateString("th-TH", { day: "numeric", month: "long", year: "numeric" });

  function getCat(c) {
    return allCats.find(function(a) { return a.id === (c.categoryId || c.category); }) ||
           { name: c.category || "อื่นๆ", color: "#888", bg: "#f5f5f5", text: "#333" };
  }
  function getLvl(c) {
    var sl = allLvls.find(function(l) { return l.id === c.levelId; });
    return sl ? sl.name : (c.level || "—");
  }

  var grouped = {};
  courses.forEach(function(c) {
    var catId = c.categoryId || c.category || "other";
    if (!grouped[catId]) grouped[catId] = [];
    grouped[catId].push(c);
  });

  var catCount = Object.keys(grouped).length;
  var activeCount = courses.filter(function(c) { return c.active; }).length;

  var rows = Object.entries(grouped).map(function(entry) {
    var catId = entry[0], catCourses = entry[1];
    var cat = allCats.find(function(a) { return a.id === catId; }) || { name: catId, color: "#888" };
    var courseRows = catCourses.map(function(c) {
      var enr = enrollments.filter(function(e) { return e.courseId === c.id; });
      var active = enr.filter(function(e) { return e.status === "active"; }).length;
      var lvl = getLvl(c);
      var topics = (c.topics || []).filter(Boolean).join(", ") || "—";
      var priceLabel = c.pricingMode === "total-hours"
        ? "฿" + ((c.pricePerHour || 0)).toLocaleString() + "/ชม."
        : "฿" + ((c.price || 0)).toLocaleString() + "/ครั้ง";
      var statusBg = c.active ? "#e6f4d9" : "#f0ede6";
      var statusColor = c.active ? "#3a6b1a" : "#888";
      var statusLabel = c.active ? "เปิดรับ" : "ปิด";
      return '<tr>' +
        '<td>' + c.name + '</td>' +
        '<td>' + lvl + '</td>' +
        '<td style="white-space:nowrap">' + (c.duration || 60) + ' นาที</td>' +
        '<td style="white-space:nowrap">' + priceLabel + '</td>' +
        '<td>' + (c.location || "—") + '</td>' +
        '<td style="font-size:10px;color:#666;">' + topics + '</td>' +
        '<td style="text-align:center"><span style="padding:2px 8px;border-radius:3px;font-size:10px;font-weight:500;background:' + statusBg + ';color:' + statusColor + '">' + statusLabel + '</span></td>' +
        '<td style="text-align:center">' + active + '</td>' +
        '</tr>';
    }).join("");
    return '<div style="margin-bottom:32px;page-break-inside:avoid">' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid ' + cat.color + '">' +
        '<div style="width:10px;height:10px;border-radius:50%;background:' + cat.color + '"></div>' +
        '<span style="font-size:15px;font-weight:600;color:#1a1a17">' + cat.name + '</span>' +
        '<span style="font-size:11px;color:#888;margin-left:4px">' + catCourses.length + ' คอร์ส</span>' +
      '</div>' +
      '<table>' +
        '<thead><tr>' +
          '<th>ชื่อคอร์ส</th><th>ระดับ</th><th>ระยะเวลา</th>' +
          '<th>ราคา</th><th>สถานที่</th><th>หัวข้อที่สอน</th><th>สถานะ</th><th>กำลังเรียน</th>' +
        '</tr></thead>' +
        '<tbody>' + courseRows + '</tbody>' +
      '</table>' +
    '</div>';
  }).join("");

  var css = [
    '* { box-sizing:border-box; margin:0; padding:0; }',
    'body { font-family:"Prompt","Sarabun",sans-serif; color:#1a1a17; background:#fff; font-size:12px; }',
    '.page { padding:36px 44px; }',
    '.header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:28px; padding-bottom:16px; border-bottom:2px solid #1a1a17; }',
    '.brand-name { font-size:24px; font-weight:600; letter-spacing:-0.5px; }',
    '.brand-name em { color:#7FB28A; font-style:italic; font-weight:400; }',
    '.brand-sub { font-size:9px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:#888; margin-top:4px; }',
    '.doc-title { font-size:18px; font-weight:600; text-align:right; }',

// ============ IMAGE PROCESSING ============
// Resize image and convert to WebP for storage efficiency.
// Returns Promise<{ dataUrl, blob, sizeKB }>
// Used for student photos, slips, receipts.
//
// Smart compression: if result > targetKB, retry with lower quality (down to 0.5).
//
// Future: replace `dataUrl` save with Supabase Storage upload — keep `blob` for upload.
const processImage = (file, options = {}) => {
  const {
    maxWidth = 800,
    maxHeight = 800,
    quality = 0.75, // initial WebP quality
    targetKB = null, // if set, retry with lower quality until under target
    type = "image/webp",
  } = options;

  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        // Calculate new dimensions while preserving aspect ratio
        let w = img.width, h = img.height;
        if (w > maxWidth || h > maxHeight) {
          const ratio = Math.min(maxWidth / w, maxHeight / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }

        // Draw to canvas
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img, 0, 0, w, h);

        // Try compression with progressively lower quality if needed
        const tryCompress = (q) => {
          canvas.toBlob((blob) => {
            if (!blob) { reject(new Error("Failed to convert image")); return; }
            const sizeKB = Math.round(blob.size / 1024);

            // If targetKB set and we're over → retry with lower quality
            if (targetKB && sizeKB > targetKB && q > 0.5) {
              tryCompress(Math.max(0.5, q - 0.1));
              return;
            }

            // Convert blob to dataUrl for current localStorage backend
            const reader2 = new FileReader();
            reader2.onload = (ev) => resolve({
              dataUrl: ev.target.result,
              blob: blob,
              sizeKB,
              width: w,
              height: h,
              quality: q,
            });
            reader2.onerror = reject;
            reader2.readAsDataURL(blob);
          }, type, q);
        };

        tryCompress(quality);
      };
      img.onerror = () => reject(new Error("Failed to load image"));
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
};

// ============ DATA CONVERTERS (camelCase ↔ snake_case) ============
const toCamel = (s) => s.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
const toSnake = (s) => s.replace(/[A-Z]/g, (c) => "_" + c.toLowerCase());

const camelize = (obj) => {
  if (Array.isArray(obj)) return obj.map(camelize);
  if (obj === null || typeof obj !== "object" || obj instanceof Date) return obj;
  return Object.fromEntries(
    Object.entries(obj).map(([k, v]) => [toCamel(k), camelize(v)])
  );
};

const snakeize = (obj) => {
  if (Array.isArray(obj)) return obj.map(snakeize);
  if (obj === null || typeof obj !== "object" || obj instanceof Date) return obj;
  return Object.fromEntries(
    Object.entries(obj).map(([k, v]) => [toSnake(k), snakeize(v)])
  );
};

const load = (key, fallback) => {
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch { return fallback; }
};
const save = (key, data) => {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
};

const formatBaht = (n) => "฿" + Number(n).toLocaleString("th-TH");
const formatDate = (iso) => new Date(iso).toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "2-digit" });

// ============ MAIN ============
function App() {
  const [session, setSession] = useState(() => load(KEYS.AUTH, null));

  // On mount: try to restore Supabase session in background — but don't block UI
  useEffect(() => {
    if (!sb) return;
    let cancelled = false;
    (async () => {
      try {
        const { data: { session: supaSession } } = await sb.auth.getSession();
        if (cancelled) return;

        if (supaSession) {
          // Supabase session active — try to fetch profile
          try {
            const userCtx = await fetchUserContext();
            if (cancelled) return;
            if (userCtx?.profile) {
              const newSession = {
                role: userCtx.profile.role || "teacher",
                userId: supaSession.user.id,
                orgId: userCtx.profile.orgId,
                name: userCtx.profile.name,
                orgStatus: userCtx.orgStatus || null,
              };
              setSession(newSession);
              save(KEYS.AUTH, newSession);
            }
          } catch (err) {
            console.warn("Profile fetch failed (using local session):", err);
            // Don't break — keep current session
          }
        }
      } catch (err) {
        console.warn("Session restore failed:", err);
      }
    })();

    // Listen for sign out from another tab
    const { data: authListener } = sb.auth.onAuthStateChange((event) => {
      if (cancelled) return;
      if (event === "SIGNED_OUT") {
        setSession(null);
        save(KEYS.AUTH, null);
      }
    });

    return () => {
      cancelled = true;
      authListener?.subscription?.unsubscribe();
    };
  }, []);

  const login = (s) => { setSession(s); save(KEYS.AUTH, s); };
  const logout = async () => {
    if (sb) {
      try { await supaSignOut(); } catch (e) { console.warn(e); }
    }
    setSession(null);
    save(KEYS.AUTH, null);
  };

  if (!session) {
    return <LoginPage onLogin={login} />;
  }
  if (session.role === "student") {
    return <StudentPortal studentId={session.studentId} onLogout={logout} />;
  }
  return <TeacherApp onSwitchToStudent={logout} onLogout={logout} session={session} />;
}

function TeacherApp({ onSwitchToStudent, onLogout }) {
  const [tab, setTab] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [students, setStudents] = useState(() => load(KEYS.STUDENTS, SEED_STUDENTS));
  const [classes, setClasses] = useState(() => load(KEYS.CLASSES, SEED_CLASSES));
  const [payments, setPayments] = useState(() => load(KEYS.PAYMENTS, SEED_PAYMENTS));
  const [notes, setNotes] = useState(() => load(KEYS.NOTES, SEED_NOTES));
  const [courses, setCourses] = useState(() => load(KEYS.COURSES, SEED_COURSES));
  const [enrollments, setEnrollments] = useState(() => load(KEYS.ENROLLMENTS, SEED_ENROLLMENTS));
  const [settings, setSettings] = useState(() => load(KEYS.SETTINGS, DEFAULT_SETTINGS));
  const [bookingRequests, setBookingRequests] = useState(() => load(KEYS.BOOKING_REQUESTS, []));
  const [prefs, setPrefs] = useState(() => load(KEYS.PREFS, DEFAULT_PREFS));
  const [modal, setModal] = useState(null);

  useEffect(() => save(KEYS.STUDENTS, students), [students]);
  useEffect(() => save(KEYS.CLASSES, classes), [classes]);
  useEffect(() => save(KEYS.PAYMENTS, payments), [payments]);
  useEffect(() => save(KEYS.NOTES, notes), [notes]);
  useEffect(() => save(KEYS.COURSES, courses), [courses]);
  useEffect(() => save(KEYS.ENROLLMENTS, enrollments), [enrollments]);
  useEffect(() => save(KEYS.SETTINGS, settings), [settings]);
  useEffect(() => save(KEYS.BOOKING_REQUESTS, bookingRequests), [bookingRequests]);
  useEffect(() => {
    save(KEYS.PREFS, prefs);
    document.documentElement.setAttribute("data-theme", prefs.theme);
  }, [prefs]);

  const t = (key) => I18N[prefs.lang]?.[key] || I18N.th[key] || key;
  const teacherName = (settings?.teachers || DEFAULT_SETTINGS.teachers || [])[0]?.name || "ครูสมชาย";

  const ctx = { students, setStudents, classes, setClasses, payments, setPayments, notes, setNotes, courses, setCourses, enrollments, setEnrollments, settings, setSettings, bookingRequests, setBookingRequests, prefs, setPrefs, t, teacherName, setModal };

  const pendingReqCount = bookingRequests.filter(r => r.status === "pending").length;

  const navItems = [
    { id: "dashboard", label: t("dashboard"), icon: IconHome },

    { id: "requests", label: t("requests"), icon: IconSend, badge: pendingReqCount > 0 ? pendingReqCount : null, badgeAlert: true },
    { id: "courses", label: t("courses"), icon: IconLayers, badge: courses.filter(c => c.active).length },
    { id: "schedule", label: t("schedule"), icon: IconCal },
    { id: "students", label: t("students"), icon: IconUsers, badge: students.filter(s => s.active).length },
    { id: "payments", label: t("payments"), icon: IconWallet, badge: payments.filter(p => p.status !== "paid").length },
    { id: "notes", label: t("notes"), icon: IconBook },
    { id: "analytics", label: t("analytics"), icon: IconTrend },
  ];
  const settingNavItems = [
    { id: "settings", label: t("settings"), icon: IconSettings },
  ];

  return (
    <div className="flex h-screen overflow-hidden" style={{ background: "var(--bg-primary)" }}>
      {/* Mobile overlay */}

      <aside className={`sidebar-drawer sidebar-tablet w-[260px] flex flex-col flex-shrink-0 relative ${sidebarOpen ? "open" : ""}`} style={{ background: "#1A1A17", color: "var(--text-on-dark)" }}>
        <div className="px-7 pt-10 pb-8">
          <div className="mb-5">
            <div className="heading-serif text-[28px] leading-none" style={{ fontWeight: 500 }}>
              Classes<span style={{ fontStyle: "italic", fontWeight: 400, color: "#7FB28A" }}>co</span>
              <span style={{ color: "#C4A878", fontSize: 14, verticalAlign: "top" }}>.</span>
            </div>
            <div className="mt-3 label-eyebrow" style={{ color: "rgba(232,228,214,0.4)" }}>EST. 2026 · BANGKOK</div>
          </div>
          <div className="divider-ornament" style={{ opacity: 0.15 }}>
            <svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="1" fill="#C4A878"/></svg>
          </div>
        </div>

        <nav className="flex-1 overflow-y-auto">
          <div className="px-7 pb-2 label-eyebrow" style={{ color: "rgba(232,228,214,0.3)", fontSize: 9 }}>{t("menu")}</div>

          {navItems.map(item => {
            const IconC = item.icon;
            const active = tab === item.id;
            return (
              <button key={item.id} onClick={() => { setTab(item.id); setSidebarOpen(false); }}
                className="w-full flex items-center gap-3.5 px-7 py-3 relative group transition-colors"
                style={{
                  color: active ? "#E8E4D6" : "rgba(232,228,214,0.58)",
                  fontSize: 13,
                  fontWeight: active ? 500 : 400,
                  letterSpacing: "-0.005em",
                  background: active ? "rgba(127,178,138,0.08)" : "transparent",
                }}
                onMouseEnter={e => { if (!active) { e.currentTarget.style.background = "rgba(127,178,138,0.08)"; e.currentTarget.style.color = "#C8D9CB"; } }}
                onMouseLeave={e => { if (!active) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "rgba(232,228,214,0.58)"; } }}>
                {active && <div className="absolute left-0 top-0 bottom-0 w-[2px]" style={{ background: "#7FB28A" }} />}
                <IconC size={15} stroke={active ? 1.8 : 1.5} />
                <span>{item.label}</span>
                {item.badge > 0 && (
                  <span className="ml-auto text-[10px] font-mono"
                    style={{
                      color: item.badgeAlert
                        ? "#F4C4A0"
                        : (active ? "#C4A878" : "rgba(232,228,214,0.3)"),
                      fontWeight: item.badgeAlert ? 600 : 500,
                      background: item.badgeAlert ? "rgba(212,120,80,0.15)" : "transparent",
                      padding: item.badgeAlert ? "1px 6px" : "0",
                    }}>
                    {String(item.badge).padStart(2, "0")}

            );
          })}
          <div className="px-7 pt-8 pb-2 label-eyebrow" style={{ color: "rgba(232,228,214,0.3)", fontSize: 9 }}>{t("system")}</div>
          {settingNavItems.map(item => {
            const IconC = item.icon;
            const active = tab === item.id;
            return (
              <button key={item.id} onClick={() => { setTab(item.id); setSidebarOpen(false); }}
                className="w-full flex items-center gap-3.5 px-7 py-3 relative transition-colors"
                style={{
                  color: active ? "#E8E4D6" : "rgba(232,228,214,0.58)",
                  fontSize: 13,
                  fontWeight: active ? 500 : 400,
                  background: active ? "rgba(127,178,138,0.08)" : "transparent",
                }}
                onMouseEnter={e => { if (!active) { e.currentTarget.style.background = "rgba(127,178,138,0.08)"; e.currentTarget.style.color = "#C8D9CB"; } }}
                onMouseLeave={e => { if (!active) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "rgba(232,228,214,0.58)"; } }}>
                {active && <div className="absolute left-0 top-0 bottom-0 w-[2px]" style={{ background: "#7FB28A" }} />}
                <IconC size={15} stroke={active ? 1.8 : 1.5} />
                <span>{item.label}</span>
              </button>
            );
          })}
        </nav>

        <div className="p-5 pt-4">
          <button onClick={onSwitchToStudent}
            className="w-full text-left py-3 px-4 relative group transition-colors"
            style={{ background: "transparent", border: "0.5px solid rgba(232,228,214,0.1)" }}>
            <div className="flex items-center justify-between">
              <div>
                <div className="text-[11px] font-medium mb-0.5" style={{ color: "#C4A878" }}>{t("studentPortal")}</div>
                <div className="text-[10px]" style={{ color: "rgba(232,228,214,0.45)" }}>{t("studentPortalSub")}</div>
              </div>
              <span style={{ color: "#C4A878", fontSize: 14 }}>→</span>
            </div>
          </button>
          {/* Quick toggles: Theme + Language */}
          <div className="mt-4 flex gap-1.5">
            <button onClick={() => setPrefs(p => ({ ...p, theme: p.theme === "dark" ? "light" : "dark" }))}
              className="flex-1 py-2 text-[11px] flex items-center justify-center gap-1.5 transition-all hover:opacity-80"
              style={{
                background: "rgba(232,228,214,0.06)",
                color: "rgba(232,228,214,0.8)",
                border: "0.5px solid rgba(232,228,214,0.1)",
              }}
              title={prefs.theme === "dark" ? "Switch to light mode" : "Switch to dark mode"}>
              <span style={{ fontSize: 13 }}>{prefs.theme === "dark" ? "☀" : "☾"}</span>
              <span style={{ fontSize: 10, letterSpacing: "0.05em" }}>{prefs.theme === "dark" ? "LIGHT" : "DARK"}</span>
            </button>
            <button onClick={() => setPrefs(p => ({ ...p, lang: p.lang === "th" ? "en" : "th" }))}
              className="flex-1 py-2 text-[11px] flex items-center justify-center gap-1.5 transition-all hover:opacity-80"
              style={{
                background: "rgba(232,228,214,0.06)",
                color: "rgba(232,228,214,0.8)",
                border: "0.5px solid rgba(232,228,214,0.1)",
              }}
              title={prefs.lang === "th" ? "Switch to English" : "เปลี่ยนเป็นไทย"}>
              <span style={{ fontSize: 12 }}>{prefs.lang === "th" ? "🇹🇭" : "🇬🇧"}</span>
              <span style={{ fontSize: 10, letterSpacing: "0.05em", fontWeight: 600 }}>
                {prefs.lang === "th" ? "TH" : "EN"}

              style={{ background: "#C4A878", color: "#1A1A17", fontWeight: 500, letterSpacing: "-0.02em" }}>
              {teacherName.charAt(0)}{teacherName.charAt(1) || ""}
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-[12px] font-medium truncate" style={{ color: "var(--text-on-dark)" }}>{teacherName}</div>
              <div className="text-[10px] truncate flex items-center gap-1" style={{ color: "rgba(232,228,214,0.4)", letterSpacing: "0.05em" }}>

                {getPlan(settings).name.toUpperCase()} · ACTIVE
              </div>
            </div>
            <button onClick={onLogout} title="ออกจากระบบ"
              className="flex-shrink-0 p-1.5 rounded opacity-40 hover:opacity-100 transition-opacity"
              style={{ color: "rgba(232,228,214,0.8)" }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <main className="flex-1 flex flex-col overflow-hidden">
        <TopBar tab={tab} t={t} lang={prefs.lang} onMenuClick={() => setSidebarOpen(true)} onAdd={() => {
          if (tab === "students") setModal({ type: "student-new" });
          else if (tab === "courses") setModal({ type: "course-new" });
          else if (tab === "schedule" || tab === "dashboard") setModal({ type: "class-new" });
          else if (tab === "payments") setModal({ type: "payment-new" });
          else if (tab === "notes") setModal({ type: "note-new" });
        }} />

        <div className="flex-1 overflow-y-auto" style={{ background: "var(--bg-primary)" }}>
          {tab === "dashboard" && <Dashboard ctx={ctx} onOpen={(type, data) => setModal({ type, data })} onNavigate={setTab} />}

          {tab === "requests" && <RequestsPage ctx={ctx} onNavigate={setTab} />}
          {tab === "courses" && <CoursesPage ctx={ctx} onOpen={(type, data) => setModal({ type, data })} />}
          {tab === "schedule" && <SchedulePage ctx={ctx} onOpen={(type, data) => setModal({ type, data })} />}
          {tab === "students" && <StudentsPage ctx={ctx} onOpen={(type, data) => setModal({ type, data })} />}
          {tab === "payments" && <PaymentsPage ctx={ctx} onOpen={(type, data) => setModal({ type, data })} />}
          {tab === "notes" && <NotesPage ctx={ctx} />}
          {tab === "analytics" && <AnalyticsPage ctx={ctx} />}
          {tab === "settings" && <SettingsPage ctx={ctx} />}
        </div>
      </main>

      {modal && <ModalHost modal={modal} ctx={ctx} onClose={() => setModal(null)} setTab={setTab} />}
    </div>
  );

    requests: { th: "คำขอจอง", en: "Requests", num: "—" },

    payments: { th: "การชำระเงิน", en: "Payments", num: "06" },

          <div className="min-w-0">
            <div className="heading-serif text-[32px] leading-none topbar-title-mobile truncate" style={{ fontWeight: 500 }}>{isEn ? current.en : current.th}</div>
            <div className="mt-1.5 flex items-center gap-2.5 text-[11px] hide-mobile" style={{ color: "var(--text-tertiary)" }}>
              <span style={{ letterSpacing: "0.08em" }} className="uppercase">{isEn ? current.th : current.en}</span>
              <span style={{ color: "var(--text-quaternary)" }}>·</span>
              <span>{now.toLocaleDateString(dateLocale, { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</span>
            </div>
          </div>
        </div>
      </div>
      <div className="flex items-center gap-3 flex-shrink-0">
        <div className="topbar-search-mobile flex items-center gap-2.5 px-4 py-2.5 text-[12px] transition-all hover:border-[var(--border-default)]"
          style={{ background: "transparent", color: "var(--text-tertiary)", minWidth: "240px", border: "0.5px solid var(--border-soft)" }}>
          <IconSearch size={12} /> <span>{t("searchPlaceholder")}</span>

          <IconBell size={14} stroke={1.5} />
          <span className="absolute top-2 right-2 w-1.5 h-1.5 rounded-full" style={{ background: "var(--danger)" }} />

        <button onClick={onAdd}
          className="flex items-center gap-2 text-[12px] px-5 py-2.5 font-medium transition-all hover:opacity-90"
          style={{
            background: "#1A1A17", color: "#C4A878", letterSpacing: "0.02em",

}

// ============ DASHBOARD ============
function Dashboard({ ctx, onOpen, onNavigate }) {
  const { students, classes, payments, bookingRequests, settings, t, teacherName, enrollments, courses } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const getCat = (s) => allCats.find(c => c.id === (s?.categoryId || s?.category)) || CATEGORIES[s?.category || "other"] || CATEGORIES.other;
  const pendingRequests = useMemo(() => (bookingRequests || []).filter(r => r.status === "pending"), [bookingRequests]);
  const today = todayISO();
  const thisMonth = new Date().getMonth();
  const thisYear = new Date().getFullYear();

  const todayClasses = useMemo(
    () => classes.filter(c => c.date === today).sort((a, b) => a.startTime.localeCompare(b.startTime)),
    [classes, today]
  );
  const activeStudents = useMemo(() => students.filter(s => s.active).length, [students]);

  const monthRevenue = useMemo(() => payments
    .filter(p => p.status === "paid" && new Date(p.date).getMonth() === thisMonth && new Date(p.date).getFullYear() === thisYear)
    .reduce((sum, p) => sum + (p.totalAmount || p.amount), 0),
    [payments, thisMonth, thisYear]);

  const lastMonthRevenue = useMemo(() => payments
    .filter(p => {
      const d = new Date(p.date);
      const lm = (thisMonth - 1 + 12) % 12;
      return p.status === "paid" && d.getMonth() === lm;
    })
    .reduce((sum, p) => sum + (p.totalAmount || p.amount), 0),
    [payments, thisMonth]);

  const revenueChange = lastMonthRevenue > 0 ? Math.round(((monthRevenue - lastMonthRevenue) / lastMonthRevenue) * 100) : 0;

  const totalHours = useMemo(() => classes
    .filter(c => c.status === "completed" && new Date(c.date).getMonth() === thisMonth)
    .reduce((sum, c) => sum + c.duration / 60, 0),
    [classes, thisMonth]);

  const pendingAmount = useMemo(() => payments
    .filter(p => p.status !== "paid")
    .reduce((sum, p) => sum + Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)), 0),
    [payments]);

  const pendingList = useMemo(() => payments.filter(p => p.status !== "paid").slice(0, 4), [payments]);

  return (
    <div className="responsive-page-pad p-12 space-y-10 soft-fade-in">

      {/* Editorial intro — soft welcome, only shows once at top */}
      <div className="pb-2">
        <div className="text-[9px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.32em", fontWeight: 500 }}>
          I · LE SOMMAIRE — OVERVIEW
        </div>
        <div className="mt-2 italic" style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 24, fontWeight: 400, color: "var(--text-secondary)", lineHeight: 1.3 }}>
          "Good evening, {teacherName}."
        </div>
        <div className="mt-1 text-[12px] italic" style={{ color: "var(--text-tertiary)", fontFamily: "'Cormorant Garamond', serif" }}>
          {(() => {
            const d = new Date();
            const wd = d.toLocaleDateString("en-US", { weekday: "long" });
            const dt = d.toLocaleDateString("en-GB", { day: "numeric", month: "long" });
            return `${wd} · ${dt}`;
          })()}
        </div>
      </div>
      {/* Pending booking requests alert */}
      {pendingRequests.length > 0 && (
        <div className="flex items-center gap-5 px-7 py-5 relative overflow-hidden"
          style={{ background: "var(--warning-soft)", border: "0.5px solid rgba(164,125,72,0.35)", borderLeft: "3px solid var(--warning)" }}>
          <div className="flex items-center justify-center w-10 h-10 flex-shrink-0"
            style={{ background: "rgba(164,125,72,0.2)", color: "var(--warning)" }}>
            <IconSend size={18} />
          </div>
          <div className="flex-1">
            <div className="label-eyebrow mb-0.5" style={{ color: "var(--warning)" }}>Pending Requests</div>
            <div className="text-[14px] font-medium" style={{ color: "var(--text-primary)" }}>
              มีคำขอจองเรียนใหม่ <span className="num-display">{pendingRequests.length}</span> รายการ รอการอนุมัติ
            </div>
            <div className="text-[11px] mt-0.5" style={{ color: "var(--text-secondary)" }}>
              {pendingRequests.slice(0, 3).map(r => {
                const s = students.find(st => st.id === r.studentId);
                return s?.name;
              }).filter(Boolean).join(", ")}
              {pendingRequests.length > 3 && ` และอีก ${pendingRequests.length - 3} คน`}
            </div>
          </div>
          <button onClick={() => onNavigate("requests")}
            className="text-[12px] px-5 py-2.5 font-medium transition-all hover:opacity-90"
            style={{ background: "#1A1A17", color: "#C4A878", letterSpacing: "0.03em" }}>
            ดูคำขอ →
          </button>
        </div>
      )}

      <div className="grid grid-cols-4 stat-grid-resp gap-0" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", borderRadius: 4 }}>
        <StatCard label={t("monthRevenue")} value={formatBaht(monthRevenue)} trend={revenueChange >= 0 ? `+${revenueChange}%` : `${revenueChange}%`} up={revenueChange >= 0} />
        <StatCard label={t("activeStudents")} value={activeStudents} trend={`${students.length - activeStudents} ${t("noTrend")}`} up />
        <StatCard label={t("teachingHours")} value={`${totalHours.toFixed(1)}h`} trend={`${t("avgPerDay")} ${(totalHours / 30).toFixed(1)}h${t("perDay")}`} />
        <StatCard label={t("pendingAmount")} value={formatBaht(pendingAmount)} trend={`${payments.filter(p => p.status !== "paid").length} ${t("items")}`} up={false} />
      </div>

      <div className="grid gap-8 grid-cols-2-resp" style={{ gridTemplateColumns: "1.3fr 1fr" }}>

        <div className="p-8" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", borderRadius: 4  }}>
          <div className="flex justify-between items-baseline pb-4 mb-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
            <div>
              <div className="label-eyebrow mb-1">{t("today")}</div>
              <div className="heading-serif text-[20px]">{t("todaySchedule")}</div>
            </div>
            <button onClick={() => onNavigate("schedule")} className="text-[11px] transition-colors hover:opacity-70"
              style={{ color: "var(--text-secondary)", letterSpacing: "0.05em" }}>
              {t("viewAll")}
            </button>
          </div>
          {todayClasses.length === 0 ? (
            <div className="text-center py-12">
              <div className="heading-serif text-[18px] italic" style={{ color: "var(--text-tertiary)" }}>A moment of rest</div>
              <div className="text-[11px] mt-2" style={{ color: "var(--text-quaternary)" }}>{t("noClassToday")}</div>
            </div>
          ) : (
            <div>
              {todayClasses.map((c, idx) => {
                const s = students.find(st => st.id === c.studentId);
                const cat = getCat(s);
                const isLive = c.status === "in-progress";
                return (
                  <button key={c.id} onClick={() => onOpen("class-edit", c)}
                    className="w-full flex items-center gap-5 py-4 text-left transition-colors hover:bg-[var(--accent-sage-hover)]"
                    style={{ borderBottom: idx < todayClasses.length - 1 ? "0.5px solid var(--border-hairline)" : "none" }}>
                    <div className="flex flex-col min-w-[64px]">
                      <div className="num-display text-[22px] leading-none">{c.startTime}</div>
                      <div className="text-[10px] mt-1" style={{ color: "var(--text-tertiary)", letterSpacing: "0.05em" }}>{c.duration} {t("minutes")}</div>
                    </div>
                    <div className="w-px h-10" style={{ background: isLive ? "var(--success)" : "var(--border-default)" }} />
                    <div className="flex-1 min-w-0">
                      <div className="heading-serif text-[16px] truncate">{s?.name || "?"}</div>
                      <div className="text-[11px] mt-0.5 truncate" style={{ color: "var(--text-tertiary)" }}>{s?.subcategory} · {c.location}</div>
                    </div>
                    {isLive ? (
                      <span className="text-[10px] px-2.5 py-1 animate-pulse font-medium" style={{ background: "var(--success-soft)", color: "var(--success)", letterSpacing: "0.1em" }}>● {t("live")}</span>
                    ) : (
                      <span className="text-[10px] px-2.5 py-1 font-medium" style={{ background: cat.bg, color: cat.text, letterSpacing: "0.05em" }}>{cat.name || cat.label}</span>
                    )}
                  </button>
                );
              })}
            </div>
          )}
        </div>

        <div className="p-8" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", borderRadius: 4  }}>
          <div className="flex justify-between items-baseline pb-4 mb-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
            <div>
              <div className="label-eyebrow mb-1">{t("pending")}</div>
              <div className="heading-serif text-[20px]">{t("pendingPayments")}</div>
            </div>
            <button onClick={() => onNavigate("payments")} className="text-[11px] transition-colors hover:opacity-70"
              style={{ color: "var(--text-secondary)", letterSpacing: "0.05em" }}>
              {t("viewAll")}
            </button>
          </div>
          {pendingList.length === 0 ? (
            <div className="text-center py-8">
              <div className="heading-serif text-[16px] italic" style={{ color: "var(--text-tertiary)" }}>All settled</div>
              <div className="text-[11px] mt-1" style={{ color: "var(--text-quaternary)" }}>{t("noPending")}</div>
            </div>
          ) : (
            <div>
              {pendingList.map((p, idx) => {
                const s = students.find(st => st.id === p.studentId);
                const isOverdue = p.status === "overdue";
                return (
                  <div key={p.id} className="flex justify-between items-center py-3.5"
                    style={{ borderBottom: idx < pendingList.length - 1 ? "0.5px solid var(--border-hairline)" : "none" }}>
                    <div className="flex items-center gap-3 min-w-0">
                      <span className="w-1 h-8" style={{ background: isOverdue ? "var(--danger)" : "var(--warning)" }} />
                      <div className="min-w-0">
                        <div className="text-[12px] font-medium truncate">{s?.name}</div>
                        <div className="text-[10px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.05em" }}>
                          {isOverdue ? "OVERDUE" : "PENDING"}
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-3 flex-shrink-0">
                      <span className="num-display text-[15px]">{formatBaht(Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)))}</span>
                      <button onClick={() => onOpen("payment-qr", p)}
                        className="text-[10px] px-2.5 py-1 flex items-center gap-1 transition-colors hover:bg-[var(--accent-sage-hover)]"
                        style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
                        <IconQR size={10} /> QR
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div className="mt-6 pt-6" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
            <div className="label-eyebrow mb-4">Revenue · 6 months</div>
            <MiniRevenueChart payments={payments} />
          </div>
        </div>

      </div>

      {/* Full Revenue Chart */}
      <FullRevenueChart payments={payments} />

      {/* Teacher Summary — hours + revenue per teacher this month */}
      <TeacherSummary
        classes={classes}
        enrollments={enrollments || []}
        courses={courses || []}
        payments={payments}
        settings={settings}
        thisMonth={thisMonth}
        thisYear={thisYear}
      />

    </div>
  );
}


function StatCard({ label, value, trend, up, compact }) {
  return (
    <div className={compact ? "p-5 transition-all" : "p-8 transition-all hover:bg-[var(--bg-surface)]"}
      style={{ background: "transparent", borderLeft: "1.5px solid var(--accent-bronze-soft)" }}>
      <div className="label-eyebrow" style={{ marginBottom: compact ? 10 : 18 }}>{label}</div>
      <div className="num-display leading-none" style={{ color: "var(--text-primary)", fontSize: compact ? 22 : 36, fontFamily: "'Cormorant Garamond', serif", fontWeight: 500, letterSpacing: "-0.025em" }}>{value}</div>
      {trend && (
        <div className="flex items-center gap-1.5 italic" style={{
          color: up === undefined ? "var(--text-tertiary)" : up ? "var(--success)" : "var(--danger)",
          fontSize: compact ? 10 : 11,
          marginTop: compact ? 8 : 14,
          fontFamily: "'Cormorant Garamond', serif",
        }}>
          <span style={{ fontSize: compact ? 9 : 10, fontFamily: "Prompt, sans-serif", fontStyle: "normal" }}>{up === undefined ? "" : up ? "↗" : "↘"}</span>
          <span>{trend.replace(/^[↗↘]\s*/, "")}</span>
        </div>
      )}
    </div>
  );
}

function MiniRevenueChart({ payments }) {
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const total = payments
      .filter(p => { const pd = new Date(p.date); return p.status === "paid" && pd.getMonth() === d.getMonth() && pd.getFullYear() === d.getFullYear(); })
      .reduce((s, p) => s + (p.totalAmount || p.amount), 0);
    months.push({ label: d.toLocaleDateString("th-TH", { month: "short" }), value: total });
  }
  const max = Math.max(...months.map(m => m.value), 1000);
  return (
    <div className="flex items-end gap-3 h-20 pb-5 relative">
      {months.map((m, i) => {
        const isCurrent = i === months.length - 1;
        return (
          <div key={i} className="flex-1 relative flex flex-col justify-end items-center">
            <div className="w-full relative" style={{
              height: `${Math.max((m.value / max) * 100, 3)}%`,
              background: isCurrent ? "#1A1A17" : "#C4A878",
              opacity: isCurrent ? 1 : 0.5,
            }} />
            <span className="absolute -bottom-5 label-eyebrow" style={{ fontSize: 9, letterSpacing: "0.12em", color: isCurrent ? "var(--text-primary)" : "var(--text-tertiary)" }}>{m.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function FullRevenueChart({ payments }) {
  const [hover, setHover] = useState(null);
  const now = new Date();
  const currentYear = now.getFullYear();
  const months = [];
  for (let i = 0; i < 12; i++) {
    const d = new Date(currentYear, i, 1);
    const paid = payments
      .filter(p => { const pd = new Date(p.date); return p.status === "paid" && pd.getMonth() === i && pd.getFullYear() === currentYear; })
      .reduce((s, p) => s + (p.totalAmount || p.amount), 0);
    const pending = payments
      .filter(p => { const pd = new Date(p.date); return p.status !== "paid" && pd.getMonth() === i && pd.getFullYear() === currentYear; })
      .reduce((s, p) => s + Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)), 0);
    months.push({
      label: d.toLocaleDateString("th-TH", { month: "short" }),
      fullLabel: d.toLocaleDateString("th-TH", { month: "long", year: "numeric" }),
      year: currentYear,
      month: i,
      paid,
      pending,
      total: paid + pending,
    });
  }

  const maxVal = Math.max(...months.map(m => m.paid + m.pending), 1000);
  const totalPaid = months.reduce((s, m) => s + m.paid, 0);
  const monthsWithRevenue = months.filter(m => m.paid > 0).length || 1;
  const avgMonthly = Math.round(totalPaid / monthsWithRevenue);
  const bestMonth = months.reduce((best, m) => m.paid > best.paid ? m : best, months[0]);
  const isCurrent = (m) => m.month === now.getMonth() && m.year === now.getFullYear();

  return (
    <div className="p-6" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)" }}>

      {/* Header */}
      <div className="flex items-start justify-between mb-6 pb-5" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
        <div>
          <div className="label-eyebrow mb-1">Revenue overview</div>
          <div className="heading-serif text-[24px]">รายได้รายเดือน</div>
          <div className="text-[11px] mt-1.5" style={{ color: "var(--text-tertiary)" }}>
            ปี {currentYear + 543} (ม.ค. – ธ.ค.) · แสดงทั้งที่รับแล้วและค้างชำระ
          </div>
        </div>
        <div className="flex gap-6 text-right">
          <div>
            <div className="label-eyebrow mb-1">รวมทั้งปี</div>
            <div className="num-display text-[22px]">{formatBaht(totalPaid)}</div>
          </div>
          <div>
            <div className="label-eyebrow mb-1">เฉลี่ย/เดือน</div>
            <div className="num-display text-[22px]">{formatBaht(avgMonthly)}</div>
          </div>
          <div>
            <div className="label-eyebrow mb-1">เดือนสูงสุด</div>
            <div className="num-display text-[22px]">{formatBaht(bestMonth.paid)}</div>
            <div className="text-[10px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>{bestMonth.label}</div>
          </div>
        </div>
      </div>

      {/* Chart area */}
      <div className="relative" style={{ height: 220 }}>
        {/* Y-axis grid lines */}
        {[0, 25, 50, 75, 100].map(pct => (
          <div key={pct} className="absolute w-full flex items-center gap-3"
            style={{ bottom: `${pct * 1.6 + 32}px`, left: 0 }}>
            <span className="text-[9px] w-14 text-right flex-shrink-0 font-mono"
              style={{ color: "var(--text-quaternary)" }}>
              {pct === 0 ? "฿0" : formatBaht(Math.round(maxVal * pct / 100)).replace("฿", "฿")}
            </span>
            <div className="flex-1 h-px" style={{ background: pct === 0 ? "var(--border-default)" : "var(--border-hairline)" }} />
          </div>
        ))}

        {/* Bars */}
        <div className="absolute flex items-end gap-1" style={{ bottom: 32, left: 56, right: 0, height: 160 }}>
          {months.map((m, i) => {
            const paidH = Math.max((m.paid / maxVal) * 100, m.paid > 0 ? 2 : 0);
            const pendingH = Math.max((m.pending / maxVal) * 100, m.pending > 0 ? 1 : 0);
            const isHov = hover === i;
            const curr = isCurrent(m);
            return (
              <div key={i} className="flex-1 flex flex-col justify-end items-center relative group cursor-pointer"
                style={{ height: "100%" }}
                onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}>

                {/* Tooltip */}
                {isHov && (
                  <div className="absolute z-10 px-3 py-2 text-left pointer-events-none"
                    style={{ bottom: "calc(100% + 8px)", left: "50%", transform: "translateX(-50%)",
                      background: "#1A1A17", color: "#E8E4D6", minWidth: 140,
                      boxShadow: "var(--shadow-elevated)", whiteSpace: "nowrap" }}>
                    <div className="text-[11px] font-medium mb-1" style={{ color: "#C4A878" }}>{m.fullLabel}</div>
                    <div className="flex justify-between gap-4 text-[10px]">
                      <span style={{ color: "rgba(232,228,214,0.6)" }}>รับแล้ว</span>
                      <span className="num-display text-[12px]">{formatBaht(m.paid)}</span>
                    </div>
                    {m.pending > 0 && (
                      <div className="flex justify-between gap-4 text-[10px]">
                        <span style={{ color: "rgba(232,228,214,0.6)" }}>ค้างชำระ</span>
                        <span className="num-display text-[12px]" style={{ color: "var(--warning)" }}>{formatBaht(m.pending)}</span>
                      </div>
                    )}
                    <div className="flex justify-between gap-4 text-[10px] mt-1 pt-1" style={{ borderTop: "0.5px solid rgba(232,228,214,0.15)" }}>
                      <span style={{ color: "rgba(232,228,214,0.6)" }}>รวม</span>
                      <span className="num-display text-[12px]">{formatBaht(m.total)}</span>
                    </div>
                  </div>
                )}

                <div className="w-full flex flex-col justify-end" style={{ height: "100%" }}>
                  {/* Pending bar (top, lighter) */}
                  {m.pending > 0 && (
                    <div className="w-full transition-all" style={{
                      height: `${pendingH}%`,
                      background: "var(--warning-soft)",
                      borderTop: "1.5px solid var(--warning)",
                      opacity: isHov ? 1 : 0.7,
                    }} />
                  )}
                  {/* Paid bar */}
                  <div className="w-full transition-all" style={{
                    height: `${paidH}%`,
                    background: curr ? "#1A1A17" : isHov ? "#C4A878" : "#C4A878",
                    opacity: curr ? 1 : isHov ? 1 : 0.55,
                    minHeight: m.paid > 0 ? 2 : 0,
                  }} />
                </div>
              </div>
            );
          })}
        </div>

        {/* X-axis labels */}
        <div className="absolute flex gap-1" style={{ bottom: 8, left: 56, right: 0 }}>
          {months.map((m, i) => (
            <div key={i} className="flex-1 text-center">
              <span className="label-eyebrow" style={{
                fontSize: 9,
                color: isCurrent(m) ? "var(--text-primary)" : hover === i ? "var(--text-secondary)" : "var(--text-quaternary)",
                fontWeight: isCurrent(m) ? 600 : 400,
              }}>{m.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Legend */}
      <div className="flex items-center gap-6 mt-4 pt-4" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
        <div className="flex items-center gap-2">
          <div className="w-8 h-3" style={{ background: "#C4A878", opacity: 0.8 }} />
          <span className="text-[11px]" style={{ color: "var(--text-secondary)" }}>รับแล้ว</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-8 h-3" style={{ background: "var(--warning-soft)", borderTop: "1.5px solid var(--warning)" }} />
          <span className="text-[11px]" style={{ color: "var(--text-secondary)" }}>ค้างชำระ</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-8 h-3" style={{ background: "#1A1A17" }} />

// ============ TEACHER SUMMARY (Dashboard widget) ============
function TeacherSummary({ classes, enrollments, courses, payments, settings, thisMonth, thisYear }) {
  const teachers = (settings?.teachers || []).filter(t => t.active);

  // Helper: filter classes by teacher in this month
  // If no teacherId on class, attribute to first teacher (default behavior)
  const getTeacherClasses = (teacherId, status) => {
    return classes.filter(c => {
      if (c.status !== status) return false;
      const d = new Date(c.date);
      if (d.getMonth() !== thisMonth || d.getFullYear() !== thisYear) return false;
      // If class has teacherId, match it. If no teacherId, attribute to first teacher
      if (c.teacherId) return c.teacherId === teacherId;
      return teacherId === teachers[0]?.id;
    });
  };

  // Compute per-teacher metrics for current month
  const teacherStats = teachers.map(tc => {
    const monthClasses = getTeacherClasses(tc.id, "completed");
    const hoursThisMonth = monthClasses.reduce((s, c) => s + (c.duration || 0) / 60, 0);

    const scheduledClasses = getTeacherClasses(tc.id, "scheduled");
    const scheduledHours = scheduledClasses.reduce((s, c) => s + (c.duration || 0) / 60, 0);

    const studentIds = new Set(monthClasses.map(c => c.studentId));

    let revenueEarned = 0;
    let revenuePotential = 0;

    monthClasses.forEach(c => {
      if (!c.courseId || !c.studentId) return;
      const en = enrollments.find(e => e.courseId === c.courseId && e.studentId === c.studentId);
      if (!en || !en.totalSessions) return;
      const hourFraction = (c.duration || 0) / 60 / en.totalSessions;
      revenueEarned += (en.totalPrice || 0) * hourFraction;
    });

    scheduledClasses.forEach(c => {
      if (!c.courseId || !c.studentId) return;
      const en = enrollments.find(e => e.courseId === c.courseId && e.studentId === c.studentId);
      if (!en || !en.totalSessions) return;
      const hourFraction = (c.duration || 0) / 60 / en.totalSessions;
      revenuePotential += (en.totalPrice || 0) * hourFraction;
    });

    return {
      teacher: tc,
      hoursThisMonth,
      scheduledHours,
      classCount: monthClasses.length,
      studentCount: studentIds.size,
      revenueEarned,
      revenuePotential,
      totalPotential: revenueEarned + revenuePotential,
    };
  });

  teacherStats.sort((a, b) => b.hoursThisMonth - a.hoursThisMonth);

  const totalHours = teacherStats.reduce((s, t) => s + t.hoursThisMonth, 0);
  const totalRevenue = teacherStats.reduce((s, t) => s + t.revenueEarned, 0);
  const totalPotential = teacherStats.reduce((s, t) => s + t.totalPotential, 0);

  const monthName = new Date(thisYear, thisMonth, 1).toLocaleDateString("th-TH", { month: "long", year: "numeric" });

  return (
    <div className="bg-[var(--bg-surface)]" style={{ border: "0.5px solid var(--border-soft)" }}>
      <div className="px-7 pt-6 pb-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
        <div className="flex items-baseline justify-between flex-wrap gap-2">
          <div>
            <div className="label-eyebrow">สรุปการสอนรายครู</div>
            <div className="heading-serif italic mt-1" style={{ fontSize: 22, color: "var(--text-primary)" }}>
              {monthName}
            </div>
          </div>
          {teacherStats.length > 0 && totalHours > 0 && (
            <div className="text-right">
              <div className="text-[10px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.16em" }}>รวมทั้งหมด</div>
              <div className="num-display text-[18px] font-medium mt-0.5" style={{ color: "var(--text-primary)" }}>
                {totalHours.toFixed(1)} ชม. · {formatBaht(Math.round(totalRevenue))}
              </div>
              {totalPotential > totalRevenue && (
                <div className="text-[10px] italic mt-0.5" style={{ color: "var(--text-tertiary)" }}>
                  เพิ่มได้อีก {formatBaht(Math.round(totalPotential - totalRevenue))} ถ้าสอนตามตาราง
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {teachers.length === 0 ? (
        <div className="px-7 py-10 text-center">
          <div className="text-[13px] mb-1" style={{ color: "var(--text-secondary)" }}>ยังไม่มีครูในระบบ</div>
          <div className="text-[11px]" style={{ color: "var(--text-tertiary)" }}>
            ไปที่ <strong>ตั้งค่า → ครูผู้สอน</strong> เพื่อเพิ่มครูคนแรก
          </div>
        </div>
      ) : teacherStats.every(s => s.hoursThisMonth === 0 && s.scheduledHours === 0) ? (
        <div className="px-7 py-10 text-center">
          <div className="text-[12px]" style={{ color: "var(--text-tertiary)" }}>
            ยังไม่มีการสอนในเดือนนี้
          </div>
          <div className="text-[10px] mt-1" style={{ color: "var(--text-quaternary)" }}>
            เมื่อมีคลาสในตารางสอน จะแสดงสรุปต่อครูที่นี่
          </div>
        </div>
      ) : (
        <div>
          {teacherStats.map((s, idx) => {
            const tc = s.teacher;
            const initial = (tc.nickname || tc.name || "?").charAt(0);
            return (
              <div key={tc.id} className="px-7 py-4 transition-colors hover:bg-[var(--bg-muted)]"
                style={{ borderBottom: idx < teacherStats.length - 1 ? "0.5px solid var(--border-hairline)" : "none" }}>
                <div className="flex items-center gap-4 flex-wrap">
                  <div className="w-10 h-10 rounded-full flex items-center justify-center text-[13px] font-semibold flex-shrink-0"
                    style={{ background: tc.color || "#7FB28A", color: "#fff" }}>
                    {initial}
                  </div>

                  <div className="flex-1 min-w-0" style={{ minWidth: 200 }}>
                    <div className="text-[14px] font-medium" style={{ color: "var(--text-primary)" }}>
                      {tc.name}
                      {tc.nickname && <span className="italic font-normal text-[12px] ml-2" style={{ color: "var(--text-tertiary)" }}>"{tc.nickname}"</span>}
                    </div>
                    <div className="text-[11px] mt-0.5" style={{ color: "var(--text-secondary)" }}>
                      {s.classCount > 0 ? `${s.classCount} คลาส` : "ยังไม่ได้สอน"}
                      {s.studentCount > 0 && ` · ${s.studentCount} นักเรียน`}
                      {s.scheduledHours > 0 && (
                        <span style={{ color: "var(--info)", marginLeft: 8 }}>
                          + {s.scheduledHours.toFixed(1)} ชม. ในตาราง
                        </span>
                      )}
                    </div>
                  </div>

                  <div className="text-right" style={{ minWidth: 80 }}>
                    <div className="text-[10px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.1em" }}>ชั่วโมง</div>
                    <div className="num-display text-[18px] font-medium leading-tight mt-0.5" style={{ color: "var(--text-primary)" }}>
                      {s.hoursThisMonth.toFixed(1)}
                    </div>
                  </div>

                  <div className="text-right" style={{ minWidth: 110 }}>
                    <div className="text-[10px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.1em" }}>รายได้</div>
                    <div className="num-display text-[16px] font-medium leading-tight mt-0.5" style={{ color: s.revenueEarned > 0 ? "var(--success)" : "var(--text-tertiary)" }}>
                      {s.revenueEarned > 0 ? formatBaht(Math.round(s.revenueEarned)) : "—"}
                    </div>
                    {s.revenuePotential > 0 && (
                      <div className="text-[10px] italic mt-0.5" style={{ color: "var(--text-tertiary)" }}>
                        + {formatBaht(Math.round(s.revenuePotential))} ค้าง
                      </div>
                    )}
                  </div>
                </div>

                {s.hoursThisMonth > 0 && totalHours > 0 && (
                  <div className="mt-3 ml-14">
                    <div className="h-1 rounded-full overflow-hidden" style={{ background: "var(--bg-muted)" }}>
                      <div className="h-full rounded-full transition-all"
                        style={{
                          width: `${Math.min(100, (s.hoursThisMonth / totalHours) * 100)}%`,
                          background: tc.color || "#7FB28A",
                          opacity: 0.7,
                        }} />
                    </div>
                    <div className="text-[9px] italic mt-1" style={{ color: "var(--text-tertiary)" }}>
                      {Math.round((s.hoursThisMonth / totalHours) * 100)}% ของชั่วโมงสอนทั้งหมด
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      <div className="px-7 py-3" style={{ background: "var(--bg-muted)", borderTop: "0.5px solid var(--border-soft)" }}>
        <div className="text-[10px] italic" style={{ color: "var(--text-tertiary)" }}>
          💡 รายได้คำนวณตามชั่วโมงที่สอนในคอร์สแต่ละคลาส (pro-rated จากราคาคอร์ส)
        </div>
      </div>
    </div>
  );
}

function CoursesPage({ ctx, onOpen }) {

  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [mainTab, setMainTab] = useState("courses");

  const cats = useMemo(
    () => (settings?.categories || DEFAULT_SETTINGS.categories).filter(c => c.active),
    [settings]
  );

  const filtered = useMemo(() => courses.filter(c => {
    if (filter === "active" && !c.active) return false;
    if (filter === "inactive" && c.active) return false;
    if (filter !== "all" && filter !== "active" && filter !== "inactive") {
      if (c.categoryId !== filter && c.category !== filter) return false;
    }
    if (search && !c.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }), [courses, filter, search]);

  const toggleActive = (id) => setCourses(prev => prev.map(c => c.id === id ? { ...c, active: !c.active } : c));

  const activeEnrollments = useMemo(() => (enrollments || []).filter(e => e.status === "active").length, [enrollments]);
  const totalRevenue = useMemo(() => (enrollments || []).reduce((s, e) => s + (e.paidAmount || 0), 0), [enrollments]);
  const pendingRevenue = useMemo(() => (enrollments || []).reduce((s, e) => s + Math.max(0, (e.totalPrice || 0) - (e.paidAmount || 0)), 0), [enrollments]);

  const exportPDF = () => {
    const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
    const allLvls = settings?.levels || DEFAULT_SETTINGS.levels;

        <StatCard label="ค้างชำระ" value={formatBaht(pendingRevenue)} trend={`${(enrollments || []).filter(e => (e.paidAmount || 0) < (e.totalPrice || 0)).length} รายการ`} up={false} />

        <div className="label-eyebrow" style={{ fontSize: 11, textTransform: "none", letterSpacing: 0 }}>

                  <IconPlus size={16} style={{ color: "var(--text-tertiary)" }} />

                <div className="text-[12px] font-medium" style={{ color: "var(--text-secondary)" }}>เพิ่มคอร์สใหม่</div>
              </button>
            </div>
          )}
        </>
      )}

      {mainTab === "teaching" && (
        <EnrollmentsTab
          enrollments={enrollments || []}
          courses={courses || []}
          students={students}
          setEnrollments={ctx.setEnrollments}
          settings={ctx.settings}
          onOpen={onOpen}
          t={t}
        />
      )}
    </div>
  );
}
