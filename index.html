  return (
    <div className="flex h-screen overflow-hidden" style={{ background: "var(--bg-primary)" }}>
      {/* Mobile overlay */}
      <div className={`sidebar-overlay ${sidebarOpen ? "open" : ""}`} onClick={() => setSidebarOpen(false)} />

      <aside className={`sidebar-drawer sidebar-tablet w-[260px] flex flex-col flex-shrink-0 relative ${sidebarOpen ? "open" : ""}`} style={{ background: "#1A1A17", color: "var(--text-on-dark)" }}>
        <div className="px-7 pt-10 pb-8">
          <div className="mb-5">
            <div className="heading-serif text-[28px] leading-none" style={{ fontWeight: 500 }}>
              Classes<span style={{ fontStyle: "italic", fontWeight: 400, color: "#7FB28A" }}>co</span>
              <span style={{ color: "#C4A878", fontSize: 14, verticalAlign: "top" }}>.</span>
            </div>
            <div className="mt-3 label-eyebrow" style={{ color: "rgba(232,228,214,0.4)" }}>EST. 2026 · BANGKOK</div>
          </div>
          <div className="divider-ornament" style={{ opacity: 0.15 }}>
            <svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="1" fill="#C4A878"/></svg>
          </div>
        </div>

        <nav className="flex-1 overflow-y-auto">
          <div className="px-7 pb-2 label-eyebrow" style={{ color: "rgba(232,228,214,0.3)", fontSize: 9 }}>{t("menu")}</div>

          {navItems.map(item => {
            const IconC = item.icon;
            const active = tab === item.id;
            return (
              <button key={item.id} onClick={() => { setTab(item.id); setSidebarOpen(false); }}
                className="w-full flex items-center gap-3.5 px-7 py-3 relative group transition-colors"
                style={{
                  color: active ? "#E8E4D6" : "rgba(232,228,214,0.58)",
                  fontSize: 13,
                  fontWeight: active ? 500 : 400,
                  letterSpacing: "-0.005em",
                  background: active ? "rgba(127,178,138,0.08)" : "transparent",
                }}
                onMouseEnter={e => { if (!active) { e.currentTarget.style.background = "rgba(127,178,138,0.08)"; e.currentTarget.style.color = "#C8D9CB"; } }}
                onMouseLeave={e => { if (!active) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "rgba(232,228,214,0.58)"; } }}>
                {active && <div className="absolute left-0 top-0 bottom-0 w-[2px]" style={{ background: "#7FB28A" }} />}
                <IconC size={15} stroke={active ? 1.8 : 1.5} />
                <span>{item.label}</span>
                {item.badge > 0 && (
                  <span className="ml-auto text-[10px] font-mono"
                    style={{
                      color: item.badgeAlert
                        ? "#F4C4A0"
                        : (active ? "#C4A878" : "rgba(232,228,214,0.3)"),
                      fontWeight: item.badgeAlert ? 600 : 500,
                      background: item.badgeAlert ? "rgba(212,120,80,0.15)" : "transparent",
                      padding: item.badgeAlert ? "1px 6px" : "0",
                    }}>
                    {String(item.badge).padStart(2, "0")}
                  </span>
                )}
              </button>
            );
          })}
          <div className="px-7 pt-8 pb-2 label-eyebrow" style={{ color: "rgba(232,228,214,0.3)", fontSize: 9 }}>{t("system")}</div>
          {settingNavItems.map(item => {
            const IconC = item.icon;
            const active = tab === item.id;
            return (
              <button key={item.id} onClick={() => { setTab(item.id); setSidebarOpen(false); }}
                className="w-full flex items-center gap-3.5 px-7 py-3 relative transition-colors"
                style={{
                  color: active ? "#E8E4D6" : "rgba(232,228,214,0.58)",
                  fontSize: 13,
                  fontWeight: active ? 500 : 400,
                  background: active ? "rgba(127,178,138,0.08)" : "transparent",
                }}
                onMouseEnter={e => { if (!active) { e.currentTarget.style.background = "rgba(127,178,138,0.08)"; e.currentTarget.style.color = "#C8D9CB"; } }}
                onMouseLeave={e => { if (!active) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "rgba(232,228,214,0.58)"; } }}>
                {active && <div className="absolute left-0 top-0 bottom-0 w-[2px]" style={{ background: "#7FB28A" }} />}
                <IconC size={15} stroke={active ? 1.8 : 1.5} />
                <span>{item.label}</span>
              </button>
            );
          })}
        </nav>

        <div className="p-5 pt-4">
          <button onClick={onSwitchToStudent}
            className="w-full text-left py-3 px-4 relative group transition-colors"
            style={{ background: "transparent", border: "0.5px solid rgba(232,228,214,0.1)" }}>
            <div className="flex items-center justify-between">
              <div>
                <div className="text-[11px] font-medium mb-0.5" style={{ color: "#C4A878" }}>{t("studentPortal")}</div>
                <div className="text-[10px]" style={{ color: "rgba(232,228,214,0.45)" }}>{t("studentPortalSub")}</div>
              </div>
              <span style={{ color: "#C4A878", fontSize: 14 }}>→</span>
            </div>
          </button>
          {/* Quick toggles: Theme + Language */}
          <div className="mt-4 flex gap-1.5">
            <button onClick={() => setPrefs(p => ({ ...p, theme: p.theme === "dark" ? "light" : "dark" }))}
              className="flex-1 py-2 text-[11px] flex items-center justify-center gap-1.5 transition-all hover:opacity-80"
              style={{
                background: "rgba(232,228,214,0.06)",
                color: "rgba(232,228,214,0.8)",
                border: "0.5px solid rgba(232,228,214,0.1)",
              }}
              title={prefs.theme === "dark" ? "Switch to light mode" : "Switch to dark mode"}>
              <span style={{ fontSize: 13 }}>{prefs.theme === "dark" ? "☀" : "☾"}</span>
              <span style={{ fontSize: 10, letterSpacing: "0.05em" }}>{prefs.theme === "dark" ? "LIGHT" : "DARK"}</span>
            </button>
            <button onClick={() => setPrefs(p => ({ ...p, lang: p.lang === "th" ? "en" : "th" }))}
              className="flex-1 py-2 text-[11px] flex items-center justify-center gap-1.5 transition-all hover:opacity-80"
              style={{
                background: "rgba(232,228,214,0.06)",
                color: "rgba(232,228,214,0.8)",
                border: "0.5px solid rgba(232,228,214,0.1)",
              }}
              title={prefs.lang === "th" ? "Switch to English" : "เปลี่ยนเป็นไทย"}>
              <span style={{ fontSize: 12 }}>{prefs.lang === "th" ? "🇹🇭" : "🇬🇧"}</span>
              <span style={{ fontSize: 10, letterSpacing: "0.05em", fontWeight: 600 }}>
                {prefs.lang === "th" ? "TH" : "EN"}
              </span>
            </button>
          </div>

          <div className="mt-4 pt-4 flex items-center gap-3" style={{ borderTop: "0.5px solid rgba(232,228,214,0.08)" }}>
            <button onClick={() => setShowUpgradeModal(true)}
              className="flex items-center gap-3 flex-1 min-w-0 hover:opacity-90 transition-opacity text-left"
              title="คลิกเพื่อดูแพ็คเกจ / Upgrade">
              <div className="w-9 h-9 flex items-center justify-center text-[11px] flex-shrink-0 font-serif"
                style={{ background: "#C4A878", color: "#1A1A17", fontWeight: 500, letterSpacing: "-0.02em" }}>
                {teacherName.charAt(0)}{teacherName.charAt(1) || ""}
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-[12px] font-medium truncate" style={{ color: "var(--text-on-dark)" }}>{teacherName}</div>
                <div className="text-[10px] truncate flex items-center gap-1" style={{ color: "rgba(232,228,214,0.4)", letterSpacing: "0.05em" }}>
                  <span style={{ color: getPlan(settings).color }}>●</span>
                  {getPlan(settings).name.toUpperCase()} · UPGRADE →
                </div>
                {/* Usage indicator */}
                {(() => {
                  const plan = getPlan(settings);
                  const activeStudents = students.filter(s => s.active !== false).length;
                  if (plan.maxStudents === Infinity) return null;
                  const pct = (activeStudents / plan.maxStudents) * 100;
                  const isNearLimit = pct >= 80;
                  return (
                    <div className="text-[9px] mt-1" style={{ color: isNearLimit ? "#C4A878" : "rgba(232,228,214,0.35)" }}>
                      นักเรียน {activeStudents}/{plan.maxStudents} {isNearLimit ? "⚠" : ""}
                    </div>
                  );
                })()}
              </div>
            </button>
            <button onClick={onLogout} title="ออกจากระบบ"
              className="flex-shrink-0 p-1.5 rounded opacity-40 hover:opacity-100 transition-opacity"
              style={{ color: "rgba(232,228,214,0.8)" }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <main className="flex-1 flex flex-col overflow-hidden">
        <TopBar tab={tab} t={t} lang={prefs.lang} onMenuClick={() => setSidebarOpen(true)}
          syncStatus={syncStatus} onSyncClick={() => setShowSyncModal(true)}
          onAdd={() => {
          if (tab === "students") setModal({ type: "student-new" });
          else if (tab === "courses") setModal({ type: "course-new" });
          else if (tab === "schedule" || tab === "dashboard") setModal({ type: "class-new" });
          else if (tab === "payments") setModal({ type: "payment-new" });
          else if (tab === "notes") setModal({ type: "note-new" });
        }} />

        {/* TRIAL EXPIRY BANNER */}
        {session?.orgStatus && session.orgStatus.status === "trial" && session.orgStatus.trialDaysLeft <= 3 && (
          <div className="px-4 py-2.5 flex items-center justify-between gap-3 text-[12px]"
            style={{
              background: session.orgStatus.trialDaysLeft <= 1 ? "rgba(155,74,61,0.1)" : "rgba(196,168,120,0.12)",
              borderBottom: `0.5px solid ${session.orgStatus.trialDaysLeft <= 1 ? "var(--danger)" : "var(--accent-tan)"}`,
              color: session.orgStatus.trialDaysLeft <= 1 ? "var(--danger)" : "var(--text-primary)",
            }}>
            <div className="flex items-center gap-2">
              <span>⚡</span>
              <span>
                {session.orgStatus.trialDaysLeft === 0
                  ? "ทดลองใช้หมดวันนี้ — ชำระเพื่อใช้งานต่อ"
                  : session.orgStatus.trialDaysLeft === 1
                  ? "ทดลองใช้เหลือ 1 วันสุดท้าย"
                  : `ทดลองใช้เหลือ ${session.orgStatus.trialDaysLeft} วัน`}
              </span>
            </div>
            <button onClick={() => setShowUpgradeModal(true)}
              className="text-[11px] px-3 py-1.5 font-medium"
              style={{ background: "#1A1A17", color: "#C4A878", letterSpacing: "0.05em" }}>
              UPGRADE →
            </button>
          </div>
        )}

        {/* HARD LOCK — trial expired or subscription expired */}
        {session?.orgStatus && (session.orgStatus.status === "trial_expired" || session.orgStatus.status === "expired" || session.orgStatus.status === "locked") && (
          <div className="flex-1 flex items-center justify-center p-8" style={{ background: "var(--bg-primary)" }}>
            <div className="max-w-md w-full p-8 text-center" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)" }}>
              <div className="text-[48px] mb-4">🔒</div>
              <div className="heading-serif text-[22px] mb-2">
                {session.orgStatus.status === "trial_expired" ? "ทดลองใช้หมดอายุ" : "บัญชีถูกระงับ"}
              </div>
              <div className="text-[13px] mb-6" style={{ color: "var(--text-secondary)" }}>
                {session.orgStatus.status === "trial_expired"
                  ? "หมดอายุการทดลองใช้แล้ว — กรุณาเลือกแพ็คเกจเพื่อใช้งานต่อ"
                  : "การสมัครสมาชิกหมดอายุ — กรุณาต่ออายุเพื่อใช้งานต่อ"}
              </div>
              <button onClick={() => setShowUpgradeModal(true)}
                className="w-full text-[13px] py-3 font-medium"
                style={{ background: "#1A1A17", color: "#C4A878", letterSpacing: "0.08em" }}>
                เลือกแพ็คเกจ →
              </button>
              <button onClick={onLogout}
                className="w-full text-[11px] py-2 mt-2"
                style={{ color: "var(--text-tertiary)" }}>
                ออกจากระบบ
              </button>
            </div>
          </div>
        )}

        {/* MAIN APP CONTENT — only render if not locked */}
        {(!session?.orgStatus || (session.orgStatus.status !== "trial_expired" && session.orgStatus.status !== "expired" && session.orgStatus.status !== "locked")) && (
        <div className="flex-1 overflow-y-auto" style={{ background: "var(--bg-primary)" }}>
          {tab === "dashboard" && <Dashboard ctx={ctx} onOpen={(type, data) => setModal({ type, data })} onNavigate={setTab} />}
          {tab === "booking" && <BookingPage ctx={ctx} onNavigate={setTab} />}
          {tab === "requests" && <RequestsPage ctx={ctx} onNavigate={setTab} />}
          {tab === "courses" && <CoursesPage ctx={ctx} onOpen={(type, data) => setModal({ type, data })} />}
          {tab === "schedule" && <SchedulePage ctx={ctx} onOpen={(type, data) => setModal({ type, data })} />}
          {tab === "students" && <StudentsPage ctx={ctx} onOpen={(type, data) => setModal({ type, data })} />}
          {tab === "payments" && <PaymentsPage ctx={ctx} onOpen={(type, data) => setModal({ type, data })} />}
          {tab === "notes" && <NotesPage ctx={ctx} />}
          {tab === "analytics" && <AnalyticsPage ctx={ctx} />}
          {tab === "settings" && <SettingsPage ctx={ctx} />}
        </div>
        )}
      </main>

      {modal && <ModalHost modal={modal} ctx={ctx} onClose={() => setModal(null)} setTab={setTab} />}
      {showUpgradeModal && <UpgradePlanModal
        currentPlan={settings.plan}
        orgId={orgId}
        onClose={() => setShowUpgradeModal(false)}
        onSelectPlan={(planId) => {
          // After successful slip verify + activate_subscription RPC,
          // local state needs to update to reflect new plan
          setSettings(s => ({ ...s, plan: planId }));
          setShowUpgradeModal(false);
        }}
      />}
      {showSyncModal && <SyncStatusModal status={syncStatus} session={session} orgId={orgId}
        onClose={() => setShowSyncModal(false)}
        onForceSync={async () => {
          setSyncState({ state: "syncing", message: "Force sync triggered..." });
          if (!sb || !orgId) return;
          await Promise.all([
            supaSync("students", [], students, orgId),
            supaSync("classes", [], classes, orgId),
            supaSync("payments", [], payments, orgId),
            supaSync("lesson_notes", [], notes, orgId),
            supaSync("courses", [], courses, orgId),
            supaSync("enrollments", [], enrollments, orgId),
            supaSync("booking_requests", [], bookingRequests, orgId),
            supaSync("categories", [], settings.categories || [], orgId),
            supaSync("levels", [], settings.levels || [], orgId),
            supaSync("topics", [], settings.topics || [], orgId),
            supaSync("locations", [], settings.locations || [], orgId),
            supaSync("teachers", [], settings.teachers || [], orgId),
          ]);
          setSyncState({ state: "synced", lastSyncAt: new Date(), message: "✓ Force sync complete" });
        }} />}
    </div>
  );
}

function TopBar({ tab, onAdd, t, lang, onMenuClick, syncStatus, onSyncClick }) {
  const now = new Date();
  const labels = {
    dashboard: { th: "ภาพรวม", en: "Overview", num: "01" },
    booking: { th: "จองเรียน", en: "Booking", num: "02" },
    requests: { th: "คำขอจอง", en: "Requests", num: "—" },
    courses: { th: "คอร์สเรียน", en: "Courses", num: "03" },
    schedule: { th: "ตารางสอน", en: "Schedule", num: "04" },
    students: { th: "นักเรียน", en: "Students", num: "05" },
    payments: { th: "การชำระเงิน", en: "Payments", num: "06" },
    notes: { th: "บันทึกการสอน", en: "Lesson Notes", num: "07" },
    analytics: { th: "วิเคราะห์นักเรียน", en: "Student Analytics", num: "—" },
    settings: { th: "ตั้งค่าระบบ", en: "Settings", num: "—" },
  };
  const current = labels[tab] || labels.dashboard;
  const isEn = lang === "en";
  const dateLocale = isEn ? "en-US" : "th-TH";
  return (
    <div className="flex items-center justify-between px-10 py-7 topbar-mobile" style={{ background: "transparent", borderBottom: "0.5px solid var(--border-soft)" }}>
      <div className="flex items-center gap-3 min-w-0 flex-1">
        {/* Mobile hamburger */}
        <button onClick={onMenuClick} className="mobile-menu-btn" title="Menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div className="flex items-baseline gap-5 min-w-0">
          <span className="font-mono text-[11px] hide-mobile" style={{ color: "var(--text-quaternary)", letterSpacing: "0.05em" }}>{current.num}</span>
          <div className="min-w-0">
            <div className="heading-serif text-[32px] leading-none topbar-title-mobile truncate" style={{ fontWeight: 500 }}>{isEn ? current.en : current.th}</div>
            <div className="mt-1.5 flex items-center gap-2.5 text-[11px] hide-mobile" style={{ color: "var(--text-tertiary)" }}>
              <span style={{ letterSpacing: "0.08em" }} className="uppercase">{isEn ? current.th : current.en}</span>
              <span style={{ color: "var(--text-quaternary)" }}>·</span>
              <span>{now.toLocaleDateString(dateLocale, { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</span>
            </div>
          </div>
        </div>
      </div>
      <div className="flex items-center gap-3 flex-shrink-0">
        <div className="topbar-search-mobile flex items-center gap-2.5 px-4 py-2.5 text-[12px] transition-all hover:border-[var(--border-default)]"
          style={{ background: "transparent", color: "var(--text-tertiary)", minWidth: "240px", border: "0.5px solid var(--border-soft)" }}>
          <IconSearch size={12} /> <span>{t("searchPlaceholder")}</span>
          <span className="ml-auto font-mono text-[10px] px-1.5 py-0.5" style={{ background: "var(--bg-muted)", color: "var(--text-tertiary)" }}>⌘K</span>
        </div>
        <button onClick={onSyncClick}
          title={syncStatus?.lastError || "Click to view sync status"}
          className="flex items-center gap-1.5 px-3 py-2 text-[10px] hide-mobile transition-all"
          style={{
            border: "0.5px solid var(--border-soft)",
            color: syncStatus?.state === "error" ? "var(--danger)"
                 : syncStatus?.state === "syncing" ? "var(--warning)"
                 : syncStatus?.state === "synced" ? "var(--success)"
                 : "var(--text-tertiary)",
            letterSpacing: "0.05em",
          }}>
          <span style={{
            width: 6, height: 6, borderRadius: "50%",
            background: syncStatus?.state === "error" ? "var(--danger)"
                      : syncStatus?.state === "syncing" ? "var(--warning)"
                      : syncStatus?.state === "synced" ? "var(--success)"
                      : "var(--text-quaternary)",
            animation: syncStatus?.state === "syncing" ? "pulse 1s infinite" : "none",
          }} />
          {syncStatus?.state === "error" ? "ERROR"
           : syncStatus?.state === "syncing" ? "SYNCING"
           : syncStatus?.state === "synced" ? "SYNCED"
           : "OFFLINE"}
        </button>
        <button className="relative p-2.5 transition-colors hover:bg-[var(--accent-sage-hover)] hide-mobile" style={{ border: "0.5px solid var(--border-soft)" }}>
          <IconBell size={14} stroke={1.5} />
          <span className="absolute top-2 right-2 w-1.5 h-1.5 rounded-full" style={{ background: "var(--danger)" }} />
        </button>
        <button onClick={onAdd}
          className="flex items-center gap-2 text-[12px] px-5 py-2.5 font-medium transition-all hover:opacity-90"
          style={{
            background: "#1A1A17", color: "#C4A878", letterSpacing: "0.02em",
            display: ["dashboard", "requests", "analytics", "settings", "booking"].includes(tab) ? "none" : "flex",
          }}>
          <IconPlus size={12} stroke={2} /> <span>{t("addNew").replace("+ ", "")}</span>
        </button>
      </div>
    </div>
  );
}

// ============ DASHBOARD ============
function Dashboard({ ctx, onOpen, onNavigate }) {
  const { students, classes, payments, bookingRequests, settings, t, teacherName, enrollments, courses } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const getCat = (s) => allCats.find(c => c.id === (s?.categoryId || s?.category)) || CATEGORIES[s?.category || "other"] || CATEGORIES.other;
  const pendingRequests = useMemo(() => (bookingRequests || []).filter(r => r.status === "pending"), [bookingRequests]);
  const today = todayISO();
  const thisMonth = new Date().getMonth();
  const thisYear = new Date().getFullYear();

  const todayClasses = useMemo(
    () => classes.filter(c => c.date === today).sort((a, b) => a.startTime.localeCompare(b.startTime)),
    [classes, today]
  );
  const activeStudents = useMemo(() => students.filter(s => s.active).length, [students]);

  const monthRevenue = useMemo(() => payments
    .filter(p => p.status === "paid" && new Date(p.date).getMonth() === thisMonth && new Date(p.date).getFullYear() === thisYear)
    .reduce((sum, p) => sum + (p.totalAmount || p.amount), 0),
    [payments, thisMonth, thisYear]);

  const lastMonthRevenue = useMemo(() => payments
    .filter(p => {
      const d = new Date(p.date);
      const lm = (thisMonth - 1 + 12) % 12;
      return p.status === "paid" && d.getMonth() === lm;
    })
    .reduce((sum, p) => sum + (p.totalAmount || p.amount), 0),
    [payments, thisMonth]);

  const revenueChange = lastMonthRevenue > 0 ? Math.round(((monthRevenue - lastMonthRevenue) / lastMonthRevenue) * 100) : 0;

  const totalHours = useMemo(() => classes
    .filter(c => c.status === "completed" && new Date(c.date).getMonth() === thisMonth)
    .reduce((sum, c) => sum + c.duration / 60, 0),
    [classes, thisMonth]);

  const pendingAmount = useMemo(() => payments
    .filter(p => p.status !== "paid")
    .reduce((sum, p) => sum + Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)), 0),
    [payments]);

  const pendingList = useMemo(() => payments.filter(p => p.status !== "paid").slice(0, 4), [payments]);

  return (
    <div className="responsive-page-pad p-12 space-y-10 soft-fade-in dashboard-page">

      {/* Editorial intro — soft welcome, only shows once at top */}
      <div className="pb-2">
        <div className="text-[9px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.32em", fontWeight: 500 }}>
          I · LE SOMMAIRE — OVERVIEW
        </div>
        <div className="mt-2 italic dashboard-greeting" style={{ fontFamily: "'Prompt', sans-serif", fontSize: 24, fontWeight: 400, color: "var(--text-secondary)", lineHeight: 1.3 }}>
          "Good evening, {teacherName}."
        </div>
        <div className="mt-1 text-[12px] italic" style={{ color: "var(--text-tertiary)", fontFamily: "'Prompt', sans-serif" }}>
          {(() => {
            const d = new Date();
            const wd = d.toLocaleDateString("en-US", { weekday: "long" });
            const dt = d.toLocaleDateString("en-GB", { day: "numeric", month: "long" });
            return `${wd} · ${dt}`;
          })()}
        </div>
      </div>
      {/* Pending booking requests alert */}
      {pendingRequests.length > 0 && (
        <div className="flex items-center gap-3 sm:gap-5 px-4 sm:px-7 py-4 sm:py-5 relative overflow-hidden flex-wrap"
          style={{ background: "var(--warning-soft)", border: "0.5px solid rgba(164,125,72,0.35)", borderLeft: "3px solid var(--warning)" }}>
          <div className="flex items-center justify-center w-10 h-10 flex-shrink-0"
            style={{ background: "rgba(164,125,72,0.2)", color: "var(--warning)" }}>
            <IconSend size={18} />
          </div>
          <div className="flex-1 min-w-0" style={{ minWidth: 180 }}>
            <div className="label-eyebrow mb-0.5" style={{ color: "var(--warning)" }}>Pending Requests</div>
            <div className="text-[13px] sm:text-[14px] font-medium" style={{ color: "var(--text-primary)" }}>
              มีคำขอจองใหม่ <span className="num-display">{pendingRequests.length}</span> รายการ
            </div>
            <div className="text-[11px] mt-0.5 truncate" style={{ color: "var(--text-secondary)" }}>
              {pendingRequests.slice(0, 3).map(r => {
                const s = students.find(st => st.id === r.studentId);
                return s?.name;
              }).filter(Boolean).join(", ")}
              {pendingRequests.length > 3 && ` และอีก ${pendingRequests.length - 3} คน`}
            </div>
          </div>
          <button onClick={() => onNavigate("requests")}
            className="text-[11px] sm:text-[12px] px-4 sm:px-5 py-2 sm:py-2.5 font-medium transition-all hover:opacity-90 flex-shrink-0"
            style={{ background: "#1A1A17", color: "#C4A878", letterSpacing: "0.03em" }}>
            ดูคำขอ →
          </button>
        </div>
      )}

      <div className="grid grid-cols-4 stat-grid-resp gap-0" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", borderRadius: 4 }}>
        <StatCard label={t("monthRevenue")} value={formatBaht(monthRevenue)} trend={revenueChange >= 0 ? `+${revenueChange}%` : `${revenueChange}%`} up={revenueChange >= 0} />
        <StatCard label={t("activeStudents")} value={activeStudents} trend={`${students.length - activeStudents} ${t("noTrend")}`} up />
        <StatCard label={t("teachingHours")} value={`${totalHours.toFixed(1)}h`} trend={`${t("avgPerDay")} ${(totalHours / 30).toFixed(1)}h${t("perDay")}`} />
        <StatCard label={t("pendingAmount")} value={formatBaht(pendingAmount)} trend={`${payments.filter(p => p.status !== "paid").length} ${t("items")}`} up={false} />
      </div>

      <div className="grid gap-4 sm:gap-8 grid-cols-2-resp" style={{ gridTemplateColumns: "1.3fr 1fr" }}>

        <div className="p-5 sm:p-8" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", borderRadius: 4  }}>
          <div className="flex justify-between items-baseline pb-4 mb-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
            <div>
              <div className="label-eyebrow mb-1">{t("today")}</div>
              <div className="heading-serif text-[20px]">{t("todaySchedule")}</div>
            </div>
            <button onClick={() => onNavigate("schedule")} className="text-[11px] transition-colors hover:opacity-70"
              style={{ color: "var(--text-secondary)", letterSpacing: "0.05em" }}>
              {t("viewAll")}
            </button>
          </div>
          {todayClasses.length === 0 ? (
            <div className="text-center py-12">
              <div className="heading-serif text-[18px] italic" style={{ color: "var(--text-tertiary)" }}>A moment of rest</div>
              <div className="text-[11px] mt-2" style={{ color: "var(--text-quaternary)" }}>{t("noClassToday")}</div>
            </div>
          ) : (
            <div>
              {todayClasses.map((c, idx) => {
                const s = students.find(st => st.id === c.studentId);
                const cat = getCat(s);
                const isLive = c.status === "in-progress";
                return (
                  <button key={c.id} onClick={() => onOpen("class-edit", c)}
                    className="w-full flex items-center gap-5 py-4 text-left transition-colors hover:bg-[var(--accent-sage-hover)]"
                    style={{ borderBottom: idx < todayClasses.length - 1 ? "0.5px solid var(--border-hairline)" : "none" }}>
                    <div className="flex flex-col min-w-[64px]">
                      <div className="num-display text-[22px] leading-none">{c.startTime}</div>
                      <div className="text-[10px] mt-1" style={{ color: "var(--text-tertiary)", letterSpacing: "0.05em" }}>{c.duration} {t("minutes")}</div>
                    </div>
                    <div className="w-px h-10" style={{ background: isLive ? "var(--success)" : "var(--border-default)" }} />
                    <div className="flex-1 min-w-0">
                      <div className="heading-serif text-[16px] truncate">{s?.name || "?"}</div>
                      <div className="text-[11px] mt-0.5 truncate" style={{ color: "var(--text-tertiary)" }}>{s?.subcategory} · {c.location}</div>
                    </div>
                    {isLive ? (
                      <span className="text-[10px] px-2.5 py-1 animate-pulse font-medium" style={{ background: "var(--success-soft)", color: "var(--success)", letterSpacing: "0.1em" }}>● {t("live")}</span>
                    ) : (
                      <span className="text-[10px] px-2.5 py-1 font-medium" style={{ background: cat.bg, color: cat.text, letterSpacing: "0.05em" }}>{cat.name || cat.label}</span>
                    )}
                  </button>
                );
              })}
            </div>
          )}
        </div>

        <div className="p-5 sm:p-8" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", borderRadius: 4  }}>
          <div className="flex justify-between items-baseline pb-4 mb-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
            <div>
              <div className="label-eyebrow mb-1">{t("pending")}</div>
              <div className="heading-serif text-[20px]">{t("pendingPayments")}</div>
            </div>
            <button onClick={() => onNavigate("payments")} className="text-[11px] transition-colors hover:opacity-70"
              style={{ color: "var(--text-secondary)", letterSpacing: "0.05em" }}>
              {t("viewAll")}
            </button>
          </div>
          {pendingList.length === 0 ? (
            <div className="text-center py-8">
              <div className="heading-serif text-[16px] italic" style={{ color: "var(--text-tertiary)" }}>All settled</div>
              <div className="text-[11px] mt-1" style={{ color: "var(--text-quaternary)" }}>{t("noPending")}</div>
            </div>
          ) : (
            <div>
              {pendingList.map((p, idx) => {
                const s = students.find(st => st.id === p.studentId);
                const isOverdue = p.status === "overdue";
                return (
                  <div key={p.id} className="flex justify-between items-center py-3.5"
                    style={{ borderBottom: idx < pendingList.length - 1 ? "0.5px solid var(--border-hairline)" : "none" }}>
                    <div className="flex items-center gap-3 min-w-0">
                      <span className="w-1 h-8" style={{ background: isOverdue ? "var(--danger)" : "var(--warning)" }} />
                      <div className="min-w-0">
                        <div className="text-[12px] font-medium truncate">{s?.name}</div>
                        <div className="text-[10px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.05em" }}>
                          {isOverdue ? "OVERDUE" : "PENDING"}
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-3 flex-shrink-0">
                      <span className="num-display text-[15px]">{formatBaht(Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)))}</span>
                      <button onClick={() => onOpen("payment-qr", p)}
                        className="text-[10px] px-2.5 py-1 flex items-center gap-1 transition-colors hover:bg-[var(--accent-sage-hover)]"
                        style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
                        <IconQR size={10} /> QR
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div className="mt-6 pt-6" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
            <div className="label-eyebrow mb-4">Revenue · 6 months</div>
            <MiniRevenueChart payments={payments} />
          </div>
        </div>

      </div>

      {/* Full Revenue Chart */}
      <FullRevenueChart payments={payments} />

      {/* Teacher Summary — hours + revenue per teacher this month */}
      <TeacherSummary
        classes={classes}
        enrollments={enrollments || []}
        courses={courses || []}
        payments={payments}
        settings={settings}
        thisMonth={thisMonth}
        thisYear={thisYear}
      />

    </div>
  );
}


function StatCard({ label, value, trend, up, compact }) {
  return (
    <div className={compact ? "p-5 transition-all" : "p-8 transition-all hover:bg-[var(--bg-surface)]"}
      style={{ background: "transparent", borderLeft: "1.5px solid var(--accent-bronze-soft)" }}>
      <div className="label-eyebrow" style={{ marginBottom: compact ? 10 : 18 }}>{label}</div>
      <div className="num-display leading-none" style={{ color: "var(--text-primary)", fontSize: compact ? 22 : 36, fontFamily: "'Prompt', sans-serif", fontWeight: 500, letterSpacing: "-0.025em" }}>{value}</div>
      {trend && (
        <div className="flex items-center gap-1.5 italic" style={{
          color: up === undefined ? "var(--text-tertiary)" : up ? "var(--success)" : "var(--danger)",
          fontSize: compact ? 10 : 11,
          marginTop: compact ? 8 : 14,
          fontFamily: "'Prompt', sans-serif",
        }}>
          <span style={{ fontSize: compact ? 9 : 10, fontFamily: "Prompt, sans-serif", fontStyle: "normal" }}>{up === undefined ? "" : up ? "↗" : "↘"}</span>
          <span>{trend.replace(/^[↗↘]\s*/, "")}</span>
        </div>
      )}
    </div>
  );
}

function MiniRevenueChart({ payments }) {
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const total = payments
      .filter(p => { const pd = new Date(p.date); return p.status === "paid" && pd.getMonth() === d.getMonth() && pd.getFullYear() === d.getFullYear(); })
      .reduce((s, p) => s + (p.totalAmount || p.amount), 0);
    months.push({ label: d.toLocaleDateString("th-TH", { month: "short" }), value: total });
  }
  const max = Math.max(...months.map(m => m.value), 1000);
  return (
    <div className="flex items-end gap-3 h-20 pb-5 relative">
      {months.map((m, i) => {
        const isCurrent = i === months.length - 1;
        return (
          <div key={i} className="flex-1 relative flex flex-col justify-end items-center">
            <div className="w-full relative" style={{
              height: `${Math.max((m.value / max) * 100, 3)}%`,
              background: isCurrent ? "#1A1A17" : "#C4A878",
              opacity: isCurrent ? 1 : 0.5,
            }} />
            <span className="absolute -bottom-5 label-eyebrow" style={{ fontSize: 9, letterSpacing: "0.12em", color: isCurrent ? "var(--text-primary)" : "var(--text-tertiary)" }}>{m.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function FullRevenueChart({ payments }) {
  const [hover, setHover] = useState(null);
  const now = new Date();
  const currentYear = now.getFullYear();
  const months = [];
  for (let i = 0; i < 12; i++) {
    const d = new Date(currentYear, i, 1);
    const paid = payments
      .filter(p => { const pd = new Date(p.date); return p.status === "paid" && pd.getMonth() === i && pd.getFullYear() === currentYear; })
      .reduce((s, p) => s + (p.totalAmount || p.amount), 0);
    const pending = payments
      .filter(p => { const pd = new Date(p.date); return p.status !== "paid" && pd.getMonth() === i && pd.getFullYear() === currentYear; })
      .reduce((s, p) => s + Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)), 0);
    months.push({
      label: d.toLocaleDateString("th-TH", { month: "short" }),
      fullLabel: d.toLocaleDateString("th-TH", { month: "long", year: "numeric" }),
      year: currentYear,
      month: i,
      paid,
      pending,
      total: paid + pending,
    });
  }

  const maxVal = Math.max(...months.map(m => m.paid + m.pending), 1000);
  const totalPaid = months.reduce((s, m) => s + m.paid, 0);
  const monthsWithRevenue = months.filter(m => m.paid > 0).length || 1;
  const avgMonthly = Math.round(totalPaid / monthsWithRevenue);
  const bestMonth = months.reduce((best, m) => m.paid > best.paid ? m : best, months[0]);
  const isCurrent = (m) => m.month === now.getMonth() && m.year === now.getFullYear();

  return (
    <div className="p-6" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)" }}>

      {/* Header */}
      <div className="flex items-start justify-between mb-6 pb-5" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
        <div>
          <div className="label-eyebrow mb-1">Revenue overview</div>
          <div className="heading-serif text-[24px]">รายได้รายเดือน</div>
          <div className="text-[11px] mt-1.5" style={{ color: "var(--text-tertiary)" }}>
            ปี {currentYear + 543} (ม.ค. – ธ.ค.) · แสดงทั้งที่รับแล้วและค้างชำระ
          </div>
        </div>
        <div className="flex gap-6 text-right">
          <div>
            <div className="label-eyebrow mb-1">รวมทั้งปี</div>
            <div className="num-display text-[22px]">{formatBaht(totalPaid)}</div>
          </div>
          <div>
            <div className="label-eyebrow mb-1">เฉลี่ย/เดือน</div>
            <div className="num-display text-[22px]">{formatBaht(avgMonthly)}</div>
          </div>
          <div>
            <div className="label-eyebrow mb-1">เดือนสูงสุด</div>
            <div className="num-display text-[22px]">{formatBaht(bestMonth.paid)}</div>
            <div className="text-[10px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>{bestMonth.label}</div>
          </div>
        </div>
      </div>

      {/* Chart area */}
      <div className="relative" style={{ height: 220 }}>
        {/* Y-axis grid lines */}
        {[0, 25, 50, 75, 100].map(pct => (
          <div key={pct} className="absolute w-full flex items-center gap-3"
            style={{ bottom: `${pct * 1.6 + 32}px`, left: 0 }}>
            <span className="text-[9px] w-14 text-right flex-shrink-0 font-mono"
              style={{ color: "var(--text-quaternary)" }}>
              {pct === 0 ? "฿0" : formatBaht(Math.round(maxVal * pct / 100)).replace("฿", "฿")}
            </span>
            <div className="flex-1 h-px" style={{ background: pct === 0 ? "var(--border-default)" : "var(--border-hairline)" }} />
          </div>
        ))}

        {/* Bars */}
        <div className="absolute flex items-end gap-1" style={{ bottom: 32, left: 56, right: 0, height: 160 }}>
          {months.map((m, i) => {
            const paidH = Math.max((m.paid / maxVal) * 100, m.paid > 0 ? 2 : 0);
            const pendingH = Math.max((m.pending / maxVal) * 100, m.pending > 0 ? 1 : 0);
            const isHov = hover === i;
            const curr = isCurrent(m);
            return (
              <div key={i} className="flex-1 flex flex-col justify-end items-center relative group cursor-pointer"
                style={{ height: "100%" }}
                onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}>

                {/* Tooltip */}
                {isHov && (
                  <div className="absolute z-10 px-3 py-2 text-left pointer-events-none"
                    style={{ bottom: "calc(100% + 8px)", left: "50%", transform: "translateX(-50%)",
                      background: "#1A1A17", color: "#E8E4D6", minWidth: 140,
                      boxShadow: "var(--shadow-elevated)", whiteSpace: "nowrap" }}>
                    <div className="text-[11px] font-medium mb-1" style={{ color: "#C4A878" }}>{m.fullLabel}</div>
                    <div className="flex justify-between gap-4 text-[10px]">
                      <span style={{ color: "rgba(232,228,214,0.6)" }}>รับแล้ว</span>
                      <span className="num-display text-[12px]">{formatBaht(m.paid)}</span>
                    </div>
                    {m.pending > 0 && (
                      <div className="flex justify-between gap-4 text-[10px]">
                        <span style={{ color: "rgba(232,228,214,0.6)" }}>ค้างชำระ</span>
                        <span className="num-display text-[12px]" style={{ color: "var(--warning)" }}>{formatBaht(m.pending)}</span>
                      </div>
                    )}
                    <div className="flex justify-between gap-4 text-[10px] mt-1 pt-1" style={{ borderTop: "0.5px solid rgba(232,228,214,0.15)" }}>
                      <span style={{ color: "rgba(232,228,214,0.6)" }}>รวม</span>
                      <span className="num-display text-[12px]">{formatBaht(m.total)}</span>
                    </div>
                  </div>
                )}

                <div className="w-full flex flex-col justify-end" style={{ height: "100%" }}>
                  {/* Pending bar (top, lighter) */}
                  {m.pending > 0 && (
                    <div className="w-full transition-all" style={{
                      height: `${pendingH}%`,
                      background: "var(--warning-soft)",
                      borderTop: "1.5px solid var(--warning)",
                      opacity: isHov ? 1 : 0.7,
                    }} />
                  )}
                  {/* Paid bar */}
                  <div className="w-full transition-all" style={{
                    height: `${paidH}%`,
                    background: curr ? "#1A1A17" : isHov ? "#C4A878" : "#C4A878",
                    opacity: curr ? 1 : isHov ? 1 : 0.55,
                    minHeight: m.paid > 0 ? 2 : 0,
                  }} />
                </div>
              </div>
            );
          })}
        </div>

        {/* X-axis labels */}
        <div className="absolute flex gap-1" style={{ bottom: 8, left: 56, right: 0 }}>
          {months.map((m, i) => (
            <div key={i} className="flex-1 text-center">
              <span className="label-eyebrow" style={{
                fontSize: 9,
                color: isCurrent(m) ? "var(--text-primary)" : hover === i ? "var(--text-secondary)" : "var(--text-quaternary)",
                fontWeight: isCurrent(m) ? 600 : 400,
              }}>{m.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Legend */}
      <div className="flex items-center gap-6 mt-4 pt-4" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
        <div className="flex items-center gap-2">
          <div className="w-8 h-3" style={{ background: "#C4A878", opacity: 0.8 }} />
          <span className="text-[11px]" style={{ color: "var(--text-secondary)" }}>รับแล้ว</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-8 h-3" style={{ background: "var(--warning-soft)", borderTop: "1.5px solid var(--warning)" }} />
          <span className="text-[11px]" style={{ color: "var(--text-secondary)" }}>ค้างชำระ</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-8 h-3" style={{ background: "#1A1A17" }} />
          <span className="text-[11px]" style={{ color: "var(--text-secondary)" }}>เดือนปัจจุบัน</span>
        </div>
      </div>

    </div>
  );
}


// ============ TEACHER SUMMARY (Dashboard widget) ============
function TeacherSummary({ classes, enrollments, courses, payments, settings, thisMonth, thisYear }) {
  const teachers = (settings?.teachers || []).filter(t => t.active);

  // Helper: filter classes by teacher in this month
  // If no teacherId on class, attribute to first teacher (default behavior)
  const getTeacherClasses = (teacherId, status) => {
    return classes.filter(c => {
      if (c.status !== status) return false;
      const d = new Date(c.date);
      if (d.getMonth() !== thisMonth || d.getFullYear() !== thisYear) return false;
      // If class has teacherId, match it. If no teacherId, attribute to first teacher
      if (c.teacherId) return c.teacherId === teacherId;
      return teacherId === teachers[0]?.id;
    });
  };

  // Compute per-teacher metrics for current month
  const teacherStats = teachers.map(tc => {
    const monthClasses = getTeacherClasses(tc.id, "completed");
    const hoursThisMonth = monthClasses.reduce((s, c) => s + (c.duration || 0) / 60, 0);

    const scheduledClasses = getTeacherClasses(tc.id, "scheduled");
    const scheduledHours = scheduledClasses.reduce((s, c) => s + (c.duration || 0) / 60, 0);

    const studentIds = new Set(monthClasses.map(c => c.studentId));

    let revenueEarned = 0;
    let revenuePotential = 0;

    monthClasses.forEach(c => {
      if (!c.courseId || !c.studentId) return;
      const en = enrollments.find(e => e.courseId === c.courseId && e.studentId === c.studentId);
      if (!en || !en.totalSessions) return;
      const hourFraction = (c.duration || 0) / 60 / en.totalSessions;
      revenueEarned += (en.totalPrice || 0) * hourFraction;
    });

    scheduledClasses.forEach(c => {
      if (!c.courseId || !c.studentId) return;
      const en = enrollments.find(e => e.courseId === c.courseId && e.studentId === c.studentId);
      if (!en || !en.totalSessions) return;
      const hourFraction = (c.duration || 0) / 60 / en.totalSessions;
      revenuePotential += (en.totalPrice || 0) * hourFraction;
    });

    return {
      teacher: tc,
      hoursThisMonth,
      scheduledHours,
      classCount: monthClasses.length,
      studentCount: studentIds.size,
      revenueEarned,
      revenuePotential,
      totalPotential: revenueEarned + revenuePotential,
    };
  });

  teacherStats.sort((a, b) => b.hoursThisMonth - a.hoursThisMonth);

  const totalHours = teacherStats.reduce((s, t) => s + t.hoursThisMonth, 0);
  const totalRevenue = teacherStats.reduce((s, t) => s + t.revenueEarned, 0);
  const totalPotential = teacherStats.reduce((s, t) => s + t.totalPotential, 0);

  const monthName = new Date(thisYear, thisMonth, 1).toLocaleDateString("th-TH", { month: "long", year: "numeric" });

  return (
    <div className="bg-[var(--bg-surface)]" style={{ border: "0.5px solid var(--border-soft)" }}>
      <div className="px-7 pt-6 pb-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
        <div className="flex items-baseline justify-between flex-wrap gap-2">
          <div>
            <div className="label-eyebrow">สรุปการสอนรายครู</div>
            <div className="heading-serif italic mt-1" style={{ fontSize: 22, color: "var(--text-primary)" }}>
              {monthName}
            </div>
          </div>
          {teacherStats.length > 0 && totalHours > 0 && (
            <div className="text-right">
              <div className="text-[10px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.16em" }}>รวมทั้งหมด</div>
              <div className="num-display text-[18px] font-medium mt-0.5" style={{ color: "var(--text-primary)" }}>
                {totalHours.toFixed(1)} ชม. · {formatBaht(Math.round(totalRevenue))}
              </div>
              {totalPotential > totalRevenue && (
                <div className="text-[10px] italic mt-0.5" style={{ color: "var(--text-tertiary)" }}>
                  เพิ่มได้อีก {formatBaht(Math.round(totalPotential - totalRevenue))} ถ้าสอนตามตาราง
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {teachers.length === 0 ? (
        <div className="px-7 py-10 text-center">
          <div className="text-[13px] mb-1" style={{ color: "var(--text-secondary)" }}>ยังไม่มีครูในระบบ</div>
          <div className="text-[11px]" style={{ color: "var(--text-tertiary)" }}>
            ไปที่ <strong>ตั้งค่า → ครูผู้สอน</strong> เพื่อเพิ่มครูคนแรก
          </div>
        </div>
      ) : teacherStats.every(s => s.hoursThisMonth === 0 && s.scheduledHours === 0) ? (
        <div className="px-7 py-10 text-center">
          <div className="text-[12px]" style={{ color: "var(--text-tertiary)" }}>
            ยังไม่มีการสอนในเดือนนี้
          </div>
          <div className="text-[10px] mt-1" style={{ color: "var(--text-quaternary)" }}>
            เมื่อมีคลาสในตารางสอน จะแสดงสรุปต่อครูที่นี่
          </div>
        </div>
      ) : (
        <div>
          {teacherStats.map((s, idx) => {
            const tc = s.teacher;
            const initial = (tc.nickname || tc.name || "?").charAt(0);
            return (
              <div key={tc.id} className="px-7 py-4 transition-colors hover:bg-[var(--bg-muted)]"
                style={{ borderBottom: idx < teacherStats.length - 1 ? "0.5px solid var(--border-hairline)" : "none" }}>
                <div className="flex items-center gap-4 flex-wrap">
                  <div className="w-10 h-10 rounded-full flex items-center justify-center text-[13px] font-semibold flex-shrink-0"
                    style={{ background: tc.color || "#7FB28A", color: "#fff" }}>
                    {initial}
                  </div>

                  <div className="flex-1 min-w-0" style={{ minWidth: 200 }}>
                    <div className="text-[14px] font-medium" style={{ color: "var(--text-primary)" }}>
                      {tc.name}
                      {tc.nickname && <span className="italic font-normal text-[12px] ml-2" style={{ color: "var(--text-tertiary)" }}>"{tc.nickname}"</span>}
                    </div>
                    <div className="text-[11px] mt-0.5" style={{ color: "var(--text-secondary)" }}>
                      {s.classCount > 0 ? `${s.classCount} คลาส` : "ยังไม่ได้สอน"}
                      {s.studentCount > 0 && ` · ${s.studentCount} นักเรียน`}
                      {s.scheduledHours > 0 && (
                        <span style={{ color: "var(--info)", marginLeft: 8 }}>
                          + {s.scheduledHours.toFixed(1)} ชม. ในตาราง
                        </span>
                      )}
                    </div>
                  </div>

                  <div className="text-right" style={{ minWidth: 80 }}>
                    <div className="text-[10px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.1em" }}>ชั่วโมง</div>
                    <div className="num-display text-[18px] font-medium leading-tight mt-0.5" style={{ color: "var(--text-primary)" }}>
                      {s.hoursThisMonth.toFixed(1)}
                    </div>
                  </div>

                  <div className="text-right" style={{ minWidth: 110 }}>
                    <div className="text-[10px]" style={{ color: "var(--text-tertiary)", letterSpacing: "0.1em" }}>รายได้</div>
                    <div className="num-display text-[16px] font-medium leading-tight mt-0.5" style={{ color: s.revenueEarned > 0 ? "var(--success)" : "var(--text-tertiary)" }}>
                      {s.revenueEarned > 0 ? formatBaht(Math.round(s.revenueEarned)) : "—"}
                    </div>
                    {s.revenuePotential > 0 && (
                      <div className="text-[10px] italic mt-0.5" style={{ color: "var(--text-tertiary)" }}>
                        + {formatBaht(Math.round(s.revenuePotential))} ค้าง
                      </div>
                    )}
                  </div>
                </div>

                {s.hoursThisMonth > 0 && totalHours > 0 && (
                  <div className="mt-3 ml-14">
                    <div className="h-1 rounded-full overflow-hidden" style={{ background: "var(--bg-muted)" }}>
                      <div className="h-full rounded-full transition-all"
                        style={{
                          width: `${Math.min(100, (s.hoursThisMonth / totalHours) * 100)}%`,
                          background: tc.color || "#7FB28A",
                          opacity: 0.7,
                        }} />
                    </div>
                    <div className="text-[9px] italic mt-1" style={{ color: "var(--text-tertiary)" }}>
                      {Math.round((s.hoursThisMonth / totalHours) * 100)}% ของชั่วโมงสอนทั้งหมด
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      <div className="px-7 py-3" style={{ background: "var(--bg-muted)", borderTop: "0.5px solid var(--border-soft)" }}>
        <div className="text-[10px] italic" style={{ color: "var(--text-tertiary)" }}>
          💡 รายได้คำนวณตามชั่วโมงที่สอนในคอร์สแต่ละคลาส (pro-rated จากราคาคอร์ส)
        </div>
      </div>
    </div>
  );
}

    if (filter === "active" && !c.active) return false;
    if (filter === "inactive" && c.active) return false;
    if (filter !== "all" && filter !== "active" && filter !== "inactive") {
      if (c.categoryId !== filter && c.category !== filter) return false;

              </button>
            </div>
          )}
        </>
      )}

      {mainTab === "teaching" && (
        <EnrollmentsTab

          courses={courses || []}

        />
      )}
    </div>

function EnrollmentsTab({ enrollments, courses, students, setEnrollments, settings, onOpen, t }) {
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const [statusFilter, setStatusFilter] = useState("active"); // default: ยังสอนไม่เสร็จ
  const [search, setSearch] = useState("");

  // Filter by status + search + group merge — all wrapped in useMemo
  const filtered = useMemo(() => {
    const statusFiltered = enrollments.filter(e => statusFilter === "all" || e.status === statusFilter);

    const searchFiltered = !search.trim() ? statusFiltered : statusFiltered.filter(e => {
      const q = search.toLowerCase();
      const orderMatch = (e.orderId || "").toLowerCase().includes(q);
      const courseName = courses.find(c => c.id === e.courseId)?.name || "";
      const courseMatch = courseName.toLowerCase().includes(q);
      const stName = e.studentType === "existing"
        ? (students.find(s => s.id === e.studentId)?.name || "")
        : (e.newStudentName || "");
      const stMatch = stName.toLowerCase().includes(q);
      return orderMatch || courseMatch || stMatch;
    });

    // Merge group enrollments — same groupId → 1 record
    const seen = new Set();
    const result = [];
    searchFiltered.forEach(en => {
      if (en.groupId) {
        if (seen.has(en.groupId)) return;
        seen.add(en.groupId);
        const groupMembers = searchFiltered.filter(e => e.groupId === en.groupId);
        const totalPrice = groupMembers.reduce((s, m) => s + (m.totalPrice || 0), 0);
        const paidAmount = groupMembers.reduce((s, m) => s + (m.paidAmount || 0), 0);
        result.push({
          ...en,
          _isGroup: true,
          _members: groupMembers,
          _memberCount: groupMembers.length,
          totalPrice,
          paidAmount,
        });
      } else {
        result.push({ ...en, _isGroup: false });
      }
    });

    return result.sort((a, b) => b.date.localeCompare(a.date));
  }, [enrollments, statusFilter, search, courses, students]);

  const markComplete = (id) => setEnrollments(prev => prev.map(e => e.id === id ? { ...e, status: "completed" } : e));
  const markGroupComplete = (groupId) => setEnrollments(prev => prev.map(e => e.groupId === groupId ? { ...e, status: "completed" } : e));

  return (
    <div className="space-y-3">
      <input type="text" value={search} onChange={e => setSearch(e.target.value)}
        placeholder={(t ? t("courseNo") : "Course no.") + " (e.g., COURSE000142)..."}
        className="text-[12px] px-3 py-2 rounded-md w-full max-w-md"
        style={{ border: "0.5px solid var(--border-default)", background: "var(--bg-surface)" }} />

      <div className="flex gap-2 items-center flex-wrap">
        {[
          { id: "active", label: t ? t("inProgress") : "In progress" },
          { id: "completed", label: t ? t("finished") : "Finished" },
          { id: "cancelled", label: t ? t("cancelled") : "Cancelled" },
          { id: "all", label: t ? t("allItems") : "All" },
        ].map(f => (
          <button key={f.id} onClick={() => setStatusFilter(f.id)} className="text-[11px] px-3 py-1.5 rounded-md"
            style={{ background: statusFilter === f.id ? "#1A1A17" : "#fff", color: statusFilter === f.id ? "#C4A878" : "var(--text-primary)", border: "0.5px solid var(--border-default)" }}>
            {f.label}
          </button>
        ))}
        <div className="ml-auto text-[11px]" style={{ color: "var(--text-secondary)" }}>{filtered.length} {t ? t("record") : "items"}</div>
      </div>

      {filtered.length === 0 ? (
        <div className="bg-[var(--bg-surface)] rounded-2xl p-10 text-center" style={{ border: "0.5px solid var(--border-default)" }}>
          <div className="text-[12px]" style={{ color: "var(--text-tertiary)" }}>
            {statusFilter === "active" ? "ไม่มีคอร์สที่กำลังสอนอยู่" : "ยังไม่มีการลงทะเบียน · กด \"ขายคอร์สนี้\" ในหน้าคอร์สเพื่อเพิ่ม"}
          </div>
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map(en => {
            const course = courses.find(c => c.id === en.courseId);
            const cat = allCats.find(c => c.id === (course?.categoryId || course?.category)) || CATEGORIES[course?.category] || CATEGORIES.other;
            const remaining = (en.totalPrice || 0) - (en.paidAmount || 0);
            const progress = en.totalSessions > 0 ? Math.round((en.completedSessions / en.totalSessions) * 100) : 0;

            const statusStyle = {
              active: { bg: "var(--success-soft)", fg: "#4A6B3F", label: "กำลังเรียน" },
              completed: { bg: "var(--info-soft)", fg: "#6B7F9B", label: "เสร็จแล้ว" },
              cancelled: { bg: "var(--danger-soft)", fg: "#6B3028", label: "ยกเลิก" },
            }[en.status] || { bg: "var(--bg-muted)", fg: "var(--text-secondary)", label: en.status };

            // Display name — group vs individual
            let displayName, avatarChar;
            if (en._isGroup) {
              displayName = course?.name || "คอร์สกลุ่ม";
              avatarChar = "👥";
            } else {
              const student = en.studentType === "existing" ? students.find(s => s.id === en.studentId) : null;
              displayName = en.studentType === "new" ? (en.newStudentName || "นักเรียนใหม่") : (student?.name || "ไม่พบ");
              avatarChar = displayName.charAt(0);
            }

            return (
              <div key={en.id} className="bg-[var(--bg-surface)] rounded-2xl p-4 enrollment-card-resp" style={{ border: "0.5px solid var(--border-default)" }}>
                <div className="flex items-start gap-3">
                  <div className="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style={{ background: cat.bg }}>
                    <span className="text-[13px] font-medium" style={{ color: cat.text }}>{avatarChar}</span>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between gap-2 mb-0.5">
                      <div className="text-[13px] font-medium flex items-center gap-1.5 flex-wrap">
                        {displayName}
                        {en._isGroup && (
                          <span className="text-[9px] px-1.5 py-0.5 rounded font-medium" style={{ background: "rgba(196,168,120,0.15)", color: "#8B6F47" }}>
                            👥 กลุ่ม · {en._memberCount} คน
                          </span>
                        )}
                        {en.studentType === "new" && !en._isGroup && (
                          <span className="text-[9px] px-1.5 py-0.5 rounded font-medium" style={{ background: "#ECE8F4", color: "#4A3F78" }}>ใหม่</span>
                        )}
                      </div>
                      <span className="text-[9px] px-2 py-0.5 rounded-full font-medium flex-shrink-0"
                        style={{ background: statusStyle.bg, color: statusStyle.fg }}>{statusStyle.label}</span>
                    </div>
                    {en.orderId && (
                      <div className="mb-2">
                        <span className="text-[10px] px-2 py-0.5 rounded inline-flex items-center gap-1 font-mono"
                          style={{ background: "var(--bg-muted)", color: "var(--accent-bronze)", letterSpacing: "0.02em" }}>
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
                          </svg>
                          {en.orderId}
                        </span>
                      </div>
                    )}
                    <div className="text-[11px] mb-3" style={{ color: "var(--text-secondary)" }}>
                      {en._isGroup ? `ลงทะเบียน ${formatDate(en.date)}` : `${course?.name || "คอร์สไม่พบ"} · ลงทะเบียน ${formatDate(en.date)}`}
                    </div>

                    {/* Group members chips */}
                    {en._isGroup && (
                      <div className="flex flex-wrap gap-1 mb-3 pb-3" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
                        {en._members.map(m => {
                          const st = m.studentType === "existing" ? students.find(s => s.id === m.studentId) : null;
                          const nm = m.studentType === "new" ? (m.newStudentName || "ใหม่") : (st?.name || "—");
                          const memProg = m.totalSessions > 0 ? Math.round((m.completedSessions / m.totalSessions) * 100) : 0;
                          return (
                            <span key={m.id} className="text-[10px] px-2 py-0.5 rounded inline-flex items-center gap-1"
                              style={{ background: "var(--bg-muted)", color: "var(--text-secondary)" }}>
                              {nm} <span style={{ color: memProg === 100 ? "#6B7F9B" : "var(--text-tertiary)" }}>({m.completedSessions}/{m.totalSessions})</span>
                            </span>
                          );
                        })}
                      </div>
                    )}

                    <div className="grid grid-cols-3 gap-3 mb-3">
                      <div>
                        <div className="text-[9px] mb-1" style={{ color: "var(--text-secondary)" }}>ความคืบหน้า</div>
                        <div className="text-[11px] font-medium mb-1">{en.completedSessions}/{en.totalSessions} ชั่วโมง</div>
                        <div className="h-1.5 rounded-full overflow-hidden" style={{ background: "var(--bg-muted)" }}>
                          <div className="h-full rounded-full transition-all" style={{ width: `${progress}%`, background: progress === 100 ? "#6B7F9B" : "#8B9F7E" }} />
                        </div>
                      </div>
                      <div>
                        <div className="text-[9px] mb-1" style={{ color: "var(--text-secondary)" }}>ชำระแล้ว{en._isGroup ? " (รวม)" : ""}</div>
                        <div className="text-[11px] font-medium" style={{ color: "#4A6B3F" }}>{formatBaht(en.paidAmount || 0)}</div>
                        <div className="text-[9px]" style={{ color: "var(--text-secondary)" }}>จาก {formatBaht(en.totalPrice || 0)}</div>
                      </div>
                      <div>
                        <div className="text-[9px] mb-1" style={{ color: "var(--text-secondary)" }}>ค้างชำระ</div>
                        <div className="text-[11px] font-medium" style={{ color: remaining > 0 ? "#8B4538" : "#4A6B3F" }}>
                          {remaining > 0 ? formatBaht(remaining) : "ครบแล้ว ✓"}
                        </div>
                      </div>
                    </div>

                    {en.note && !en._isGroup && (
                      <div className="text-[10px] px-2 py-1.5 rounded mb-2" style={{ background: "var(--warning-soft)", color: "#704F28" }}>📝 {en.note}</div>
                    )}

                    <div className="flex gap-1.5 flex-wrap">
                      {en.status === "active" && en.completedSessions >= en.totalSessions && (
                        <button onClick={() => en._isGroup ? markGroupComplete(en.groupId) : markComplete(en.id)}
                          className="text-[10px] px-2.5 py-1 rounded font-medium"
                          style={{ background: "#ECE8F4", color: "#4A3F78" }}>
                          ✓ จบคอร์ส
                        </button>
                      )}
                      {en.studentType === "new" && en.newStudentPhone && !en._isGroup && (
                        <span className="text-[10px] px-2.5 py-1 rounded" style={{ background: "var(--bg-muted)", color: "var(--text-secondary)" }}>
                          📞 {en.newStudentPhone}
                        </span>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============ COURSE FORM ============
function CourseForm({ ctx, onClose, existing }) {
  const { setCourses, settings, t } = ctx;
  const cats = (settings?.categories || DEFAULT_SETTINGS.categories).filter(c => c.active);
  const levelsByCategory = settings?.levelsByCategory || DEFAULT_SETTINGS.levelsByCategory;
  const globalLvls = (settings?.levels || DEFAULT_SETTINGS.levels).filter(l => l.active);
  const activeLocs = (settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active);
  const defaultLocation = activeLocs[0]?.name || "บ้านนักเรียน";

  const [form, setForm] = useState(existing || {
    name: "", categoryId: cats[0]?.id || "", description: "", levelId: "",
    courseType: "individual", // individual | group
    paymentMode: "per-student", // per-student | group-total (group only)
    pricingMode: "per-session",
    duration: 60, price: 500, totalHours: 10, pricePerHour: 500,
    location: defaultLocation, maxStudents: 1, active: true, topics: [""],
  });

  const currentCat = cats.find(c => c.id === form.categoryId) || cats[0];
  const catLvls = levelsByCategory[form.categoryId] || [];
  const availableLvls = catLvls.length > 0 ? catLvls : globalLvls;
  const currentLvl = availableLvls.find(l => l.id === form.levelId) || availableLvls[0];

  const setTopic = (i, val) => { const t = [...form.topics]; t[i] = val; setForm({ ...form, topics: t }); };
  const addTopic = () => setForm({ ...form, topics: [...form.topics, ""] });
  const removeTopic = (i) => {
    const t = form.topics.filter((_, idx) => idx !== i);
    setForm({ ...form, topics: t.length ? t : [""] });
  };

  const submit = () => {
    if (!form.name.trim()) return alert("กรุณากรอกชื่อคอร์ส");
    if (!form.description.trim()) return alert("กรุณากรอกคำอธิบาย");
    const saved = {
      ...form,
      id: existing?.id || newId(),
      price: form.pricingMode === "total-hours" ? Number(form.pricePerHour) || 0 : Number(form.price) || 0,
      totalHours: form.pricingMode === "total-hours" ? Number(form.totalHours) || 0 : null,
      pricePerHour: form.pricingMode === "total-hours" ? Number(form.pricePerHour) || 0 : null,
      duration: Number(form.duration) || 60,
      maxStudents: Number(form.maxStudents) || 1,
      enrolled: existing?.enrolled || 0,
      topics: form.topics.map(t => t.trim()).filter(Boolean),
    };
    setCourses(prev => existing ? prev.map(c => c.id === existing.id ? saved : c) : [...prev, saved]);
    onClose();
  };

  const remove = () => {
    if (!confirm(`ลบคอร์ส "${existing.name}"?`)) return;
    setCourses(prev => prev.filter(c => c.id !== existing.id));
    onClose();
  };

  const previewBg = currentCat?.bg || "var(--bg-muted)";
  const previewColor = currentCat?.color || "#888";
  const previewText = currentCat?.text || "#333";

  return (
    <>
      <ModalHeader title={existing ? "แก้ไขคอร์ส" : "สร้างคอร์สใหม่"} onClose={onClose} />
      <div className="overflow-y-auto flex-1">
        <div className="p-6 space-y-5">

          <div className="p-3 rounded-lg flex items-center gap-3" style={{ background: previewBg }}>
            <div className="w-10 h-10 rounded-lg flex items-center justify-center" style={{ background: "rgba(232,228,214,0.7)" }}>
              <IconLayers size={18} style={{ color: previewColor }} />
            </div>
            <div>
              <div className="text-[12px] font-medium" style={{ color: previewText }}>{form.name || "ชื่อคอร์ส"}</div>
              <div className="text-[10px]" style={{ color: previewText, opacity: 0.8 }}>
                {currentCat?.name || "-"} · {currentLvl?.name || "-"} · {form.duration} นาที/ครั้ง
                {form.pricingMode === "total-hours"
                  ? ` · ${form.totalHours} ชม. · ${formatBaht(Number(form.pricePerHour || 0) * Number(form.totalHours || 0))}`
                  : ` · ${formatBaht(form.price || 0)}/ครั้ง`}
              </div>
            </div>
          </div>

          <FormRow label="ชื่อคอร์ส *">
            <input className={inputCls} style={inputSty} value={form.name}
              onChange={e => setForm({ ...form, name: e.target.value })}
              placeholder="เช่น กอล์ฟ Beginner Package" />
          </FormRow>

          <div className="grid grid-cols-2 gap-3">
            <FormRow label={t("category")}>
              <select className={inputCls} style={inputSty} value={form.categoryId}
                onChange={e => setForm({ ...form, categoryId: e.target.value, levelId: "" })}>
                {cats.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </FormRow>
            <FormRow label={t("level")}>
              {(() => {
                const catLvlsActive = (levelsByCategory[form.categoryId] || []).filter(l => l.active);
                if (catLvlsActive.length === 0) {
                  return (
                    <div className="text-[11px] px-3 py-2.5"
                      style={{ background: "var(--info-soft)", color: "var(--info)", borderLeft: "2px solid var(--info)" }}>
                      ℹ ยังไม่มีระดับสำหรับหมวด "{currentCat?.name}" — เพิ่มได้ที่ Settings → ระดับ

                return (
                  <select className={inputCls} style={inputSty} value={form.levelId} onChange={e => setForm({ ...form, levelId: e.target.value })}>

                { id: "individual", label: "เดี่ยว", desc: "1 คน หรือ 1:1", icon: "👤" },

                <button key={opt.id} onClick={() => setForm({ ...form, courseType: opt.id, maxStudents: opt.id === "group" ? 5 : 1 })}

                  <div className="text-[16px] mb-0.5">{opt.icon}</div>
                  <div className="text-[12px] font-medium" style={{ color: form.courseType === opt.id ? "#8B6F47" : "var(--text-primary)" }}>{opt.label}</div>
                  <div className="text-[10px]" style={{ color: form.courseType === opt.id ? "#A48A6E" : "var(--text-tertiary)" }}>{opt.desc}</div>
                </button>
              ))}
            </div>

            {/* Group-specific fields */}
            {form.courseType === "group" && (
              <div className="p-3 mb-4 fade-in" style={{ background: "rgba(196,168,120,0.06)", border: "0.5px solid rgba(196,168,120,0.3)", borderRadius: 8 }}>
                <div className="grid grid-cols-2 gap-3 mb-3">
                  <FormRow label="จำนวนคนสูงสุด">
                    <input type="number" min="2" max="50" className={inputCls} style={inputSty} value={form.maxStudents}
                      onChange={e => setForm({ ...form, maxStudents: Math.max(2, Number(e.target.value) || 2) })} />
                  </FormRow>
                  <FormRow label="วิธีชำระเงิน">
                    <select className={inputCls} style={inputSty} value={form.paymentMode}
                      onChange={e => setForm({ ...form, paymentMode: e.target.value })}>
                      <option value="per-student">แยกรายคน (แต่ละคนจ่ายเอง)</option>
                      <option value="group-total">ยอดรวมกลุ่ม (จ่ายร่วมกัน)</option>
                    </select>
                  </FormRow>
                </div>
                <div className="text-[10px]" style={{ color: "#8B6F47", fontStyle: "italic" }}>
                  💡 {form.paymentMode === "per-student"
                    ? "แต่ละคนมียอดและประวัติชำระแยก — เหมาะกับกลุ่มเพื่อน/พี่น้อง"
                    : "1 ใบเสร็จร่วมกันทั้งกลุ่ม — เหมาะกับกลุ่มที่มีคนรับผิดชอบหลัก"}
                </div>
              </div>

          </div>

          <div>
            <label className="text-[11px] font-medium block mb-2" style={{ color: "var(--text-primary)" }}>
              รูปแบบราคา {form.courseType === "group" && form.paymentMode === "per-student" && <span style={{ color: "#8B6F47", fontWeight: 400 }}>· (ราคา/คน)</span>}
            </label>
            <div className="grid grid-cols-2 gap-2 mb-3">
              {[
                { id: "per-session", label: "รายครั้ง", desc: "จ่ายทีละครั้ง" },
                { id: "total-hours", label: "แพ็กเกจชั่วโมง", desc: "ซื้อชั่วโมงรวม" },
              ].map(opt => (
                <button key={opt.id} onClick={() => setForm({ ...form, pricingMode: opt.id })}

                  <div className="text-[11px] font-medium" style={{ color: form.pricingMode === opt.id ? "#4A6B3F" : "inherit" }}>{opt.label}</div>
                  <div className="text-[10px]" style={{ color: form.pricingMode === opt.id ? "#6B8F5C" : "var(--text-secondary)" }}>{opt.desc}</div>

                  <input type="number" className={inputCls} style={inputSty} value={form.price}
                    onChange={e => setForm({ ...form, price: e.target.value })} />
                </FormRow>
                <FormRow label="เวลา/ครั้ง (นาที)">

                <div className="grid grid-cols-3 grid-cols-3-resp gap-3">

                    <input type="number" className={inputCls} style={inputSty} value={form.totalHours}
                      onChange={e => setForm({ ...form, totalHours: e.target.value })}
                      placeholder="10" />
                  </FormRow>
                  <FormRow label="ราคา/ชั่วโมง (฿)">
                    <input type="number" className={inputCls} style={inputSty} value={form.pricePerHour}
                      onChange={e => setForm({ ...form, pricePerHour: e.target.value })} />
                  </FormRow>
                  <FormRow label="เวลา/ครั้ง (นาที)">
                    <select className={inputCls} style={inputSty} value={form.duration} onChange={e => setForm({ ...form, duration: Number(e.target.value) })}>
                      {[30, 45, 60, 90, 120].map(v => <option key={v} value={v}>{v} {t("minutes")}</option>)}
                    </select>
