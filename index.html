            <div onClick={e => e.stopPropagation()}
              className="w-full max-w-lg overflow-hidden"
              style={{ background: "var(--bg-surface)", boxShadow: "var(--shadow-elevated)", border: "0.5px solid var(--border-soft)", maxHeight: "85vh", display: "flex", flexDirection: "column" }}>

              {/* Header */}
              <div className="px-6 py-5 flex-shrink-0" style={{ background: "var(--danger-soft)", borderBottom: "2px solid var(--danger)" }}>
                <div className="flex items-start gap-4">
                  <div className="w-11 h-11 flex items-center justify-center flex-shrink-0 text-[20px] font-medium"
                    style={{ background: "rgba(155,74,61,0.15)", color: "var(--danger)" }}>
                    ⚠
                  </div>
                  <div className="flex-1">
                    <div className="label-eyebrow mb-0.5" style={{ color: "var(--danger)" }}>Schedule Conflict</div>
                    <div className="heading-serif text-[20px]" style={{ color: "var(--text-primary)" }}>พบการชนเวลา</div>
                    <div className="text-[12px] mt-0.5" style={{ color: "var(--text-secondary)" }}>
                      คำขอของ {reqStudent?.name} ทับซ้อนกับ {conflicts.length} รายการ
                    </div>
                  </div>
                  <button onClick={() => setConflictModal(null)} className="flex-shrink-0" style={{ color: "var(--text-tertiary)" }}>
                    <IconX size={16} />
                  </button>
                </div>
              </div>

              <div className="overflow-y-auto flex-1 px-6 py-5 space-y-4">

                {/* Request being approved */}
                <div>
                  <div className="label-eyebrow mb-2">คำขอที่กำลังอนุมัติ</div>
                  <div className="p-3" style={{ background: "var(--bg-muted)", borderLeft: "3px solid var(--warning)" }}>
                    <div className="flex justify-between items-baseline mb-1">
                      <div className="text-[13px] font-medium">{reqStudent?.name}</div>
                      <div className="num-display text-[14px]">{req.requestedTime} – {endTime(req.requestedTime, req.duration)}</div>
                    </div>
                    <div className="text-[11px]" style={{ color: "var(--text-secondary)" }}>
                      {formatThaiDate(req.requestedDate)} · {req.duration} นาที · {req.location}
                    </div>
                  </div>
                </div>

                {/* Conflicts */}
                <div>
                  <div className="label-eyebrow mb-2" style={{ color: "var(--danger)" }}>ชนเวลากับ</div>
                  <div className="space-y-2">
                    {conflicts.map((cf, i) => {
                      const cfData = cf.data;
                      const cfStudent = students.find(s => s.id === cfData.studentId);
                      const cfStart = cf.type === "class" ? cfData.startTime : cfData.requestedTime;
                      const cfDur = cfData.duration;
                      const cfEnd = endTime(cfStart, cfDur);
                      return (
                        <div key={i} className="p-3" style={{ background: "var(--bg-muted)", borderLeft: "3px solid var(--danger)" }}>
                          <div className="flex items-center gap-2 mb-1">
                            <span className="text-[9px] px-2 py-0.5 font-medium"
                              style={{ background: cf.type === "class" ? "var(--info-soft)" : "var(--warning-soft)", color: cf.type === "class" ? "var(--info)" : "var(--warning)" }}>
                              {cf.type === "class" ? "คลาสที่จองแล้ว" : "คำขอรอดำเนินการ"}
                            </span>
                            <div className="text-[13px] font-medium">{cfStudent?.name}</div>
                            <div className="num-display text-[13px] ml-auto">{cfStart} – {cfEnd}</div>
                          </div>
                          <div className="text-[11px]" style={{ color: "var(--text-secondary)" }}>
                            {cfDur} นาที · {cfData.location}
                            {cfData.note && <span> · {cfData.note}</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="text-[11px] px-3 py-2.5" style={{ background: "var(--warning-soft)", color: "var(--warning)", borderLeft: "2px solid var(--warning)" }}>
                  💡 แนะนำให้ปฏิเสธคำขอนี้แล้วให้นักเรียนจองใหม่ หรือถ้ายืนยันจะอนุมัติซ้อน ต้องจัดการเวลาเอง
                </div>
              </div>

              {/* Footer */}
              <div className="flex gap-2 px-6 pb-5 pt-3 flex-shrink-0" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
                <button onClick={() => setConflictModal(null)}
                  className="text-[13px] py-3 px-5 font-medium"
                  style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
                  ยกเลิก
                </button>
                <button onClick={() => {
                  setRejectingId(req.id);
                  setRejectReason("เวลานี้ชนกับคลาสอื่น กรุณาจองเวลาอื่น");
                  setConflictModal(null);
                }}
                  className="flex-1 text-[13px] py-3 font-medium transition-all hover:opacity-90"
                  style={{ background: "var(--danger)", color: "#fff" }}>
                  ปฏิเสธคำขอนี้
                </button>
                <button onClick={() => {
                  doApprove(req);
                  setConflictModal(null);
                }}
                  className="text-[13px] py-3 px-4 font-medium"
                  style={{ border: "0.5px solid var(--warning)", color: "var(--warning)" }}>
                  อนุมัติซ้อน
                </button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ============ BOOKING PAGE ============
function BookingPage({ ctx, onNavigate }) {
  const { students, courses, classes, setClasses, enrollments, settings, notes, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const activeLocs = (settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active);
  const defaultLocation = activeLocs[0]?.name || "บ้านนักเรียน";

  const [selectedStudentId, setSelectedStudentId] = useState("");
  const [selectedCourseId, setSelectedCourseId] = useState("");
  const [date, setDate] = useState(todayISO());
  const [startTime, setStartTime] = useState("09:00");
  const [expandedNotes, setExpandedNotes] = useState(null); // booking id
  const [studentSearch, setStudentSearch] = useState("");
  const [studentDropdownOpen, setStudentDropdownOpen] = useState(false);
  const [duration, setDuration] = useState(60);
  const [location, setLocation] = useState(defaultLocation);
  const [note, setNote] = useState("");
  const [saved, setSaved] = useState(false);
  const [savedId, setSavedId] = useState(null);
  const [savedHrs, setSavedHrs] = useState(0);
  const [noteModal, setNoteModal] = useState(null); // booking object
  const [reminderModal, setReminderModal] = useState(null); // booking object
  const [searchText, setSearchText] = useState("");
  const [filterStudentId, setFilterStudentId] = useState("all");
  const [filterStatus, setFilterStatus] = useState("pending");
  const [filterTeacherId, setFilterTeacherId] = useState("all");

  // Teacher state for booking form
  const teachers = (settings?.teachers || []).filter(tc => tc.active);
  const hasMultiTeacher = teachers.length > 1;
  const [teacherId, setTeacherId] = useState(teachers[0]?.id || "");

  // Group booking — choose by groupId/Order instead of single student
  const [bookingMode, setBookingMode] = useState("individual"); // 'individual' | 'group'
  const [selectedGroupId, setSelectedGroupId] = useState("");

  // Find active group enrollments (groupId set)
  const groupOrders = (() => {
    const groups = {};
    (enrollments || []).filter(en => en.groupId && en.status === "active").forEach(en => {
      if (!groups[en.groupId]) {
        const course = courses.find(c => c.id === en.courseId);
        groups[en.groupId] = {
          groupId: en.groupId,
          courseId: en.courseId,
          courseName: course?.name || "—",
          courseDuration: course?.duration || 60,
          courseLocation: course?.location || defaultLocation,
          enrollments: [],
        };
      }
      groups[en.groupId].enrollments.push(en);
    });
    return Object.values(groups);
  })();

  const selectedGroup = groupOrders.find(g => g.groupId === selectedGroupId);

  useEffect(() => {
    if (selectedGroup) {
      setSelectedCourseId(selectedGroup.courseId);
      setDuration(selectedGroup.courseDuration);
      setLocation(selectedGroup.courseLocation);
    }
  }, [selectedGroupId]);

  const selectedStudent = students.find(s => s.id === selectedStudentId);
  const selectedCourse = courses.find(c => c.id === selectedCourseId);
  const studentEnrollments = (enrollments || []).filter(e => e.studentId === selectedStudentId && e.status === "active");

  const formatThaiDate = (iso) => {
    if (iso === todayISO()) return "วันนี้";
    if (iso === addDays(todayISO(), 1)) return "พรุ่งนี้";
    const [y, m, d] = iso.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString("th-TH", { day: "numeric", month: "long", year: "numeric" });
  };

  const allBookings = classes
    .filter(c => c.status === "scheduled" || c.status === "completed")
    .sort((a, b) => (a.date + a.startTime).localeCompare(b.date + b.startTime));

  // Merge group bookings — same groupClassId → 1 record (with members list)
  const mergedBookings = (() => {
    const seen = new Set();
    const result = [];
    allBookings.forEach(bk => {
      if (bk.groupClassId) {
        if (seen.has(bk.groupClassId)) return;
        seen.add(bk.groupClassId);
        const groupMembers = allBookings.filter(b => b.groupClassId === bk.groupClassId);
        result.push({
          ...bk,
          _isGroup: true,
          _members: groupMembers,
          _memberCount: groupMembers.length,
        });
      } else {
        result.push({ ...bk, _isGroup: false });
      }
    });
    return result;
  })();

  const pendingCount = mergedBookings.filter(b => b.status !== "completed").length;
  const completedCount = mergedBookings.filter(b => b.status === "completed").length;

  const filteredBookings = mergedBookings.filter(bk => {
    const s = students.find(st => st.id === bk.studentId);
    if (filterStatus === "pending" && bk.status === "completed") return false;
    if (filterStatus === "completed" && bk.status !== "completed") return false;
    if (filterStudentId !== "all") {
      // For group: match if any member is the filtered student
      if (bk._isGroup) {
        if (!bk._members.some(m => m.studentId === filterStudentId)) return false;
      } else {
        if (bk.studentId !== filterStudentId) return false;
      }
    }
    if (filterTeacherId !== "all") {
      if (filterTeacherId === "unassigned" && bk.teacherId) return false;
      if (filterTeacherId !== "unassigned" && bk.teacherId !== filterTeacherId) return false;
    }
    if (searchText) {
      const q = searchText.toLowerCase();
      const nameMatch = bk._isGroup
        ? bk._members.some(m => students.find(st => st.id === m.studentId)?.name?.toLowerCase().includes(q))
        : s?.name?.toLowerCase().includes(q);
      const courseMatch = bk.courseId ? courses.find(c => c.id === bk.courseId)?.name?.toLowerCase().includes(q) : false;
      const locMatch = bk.location?.toLowerCase().includes(q);
      if (!nameMatch && !courseMatch && !locMatch) return false;
    }
    return true;
  });

  useEffect(() => {
    if (selectedCourse) {
      setDuration(selectedCourse.duration || 60);
      setLocation(selectedCourse.location || "บ้าน");
    } else if (selectedStudent) {
      setLocation(selectedStudent.address || "บ้าน");
    }
  }, [selectedCourseId, selectedStudentId]);

  // Conflict detection - find overlapping scheduled classes on same date
  const conflictInfo = (() => {
    if (!date || !startTime) return null;
    const toMs = (d, t) => {
      const [y, mo, dd] = d.split("-").map(Number);
      const [h, mi] = t.split(":").map(Number);
      return new Date(y, mo - 1, dd, h, mi).getTime();
    };
    const start = toMs(date, startTime);
    const end = start + Number(duration) * 60000;

    const conflicts = classes
      .filter(c => c.status === "scheduled" && c.date === date)
      .filter(c => {
        const cs = toMs(c.date, c.startTime);
        const ce = cs + (c.duration || 60) * 60000;
        return start < ce && cs < end;
      });

    return conflicts.length > 0 ? conflicts : null;
  })();

  const handleSave = () => {
    // ============ GROUP BOOKING ============
    if (bookingMode === "group") {
      if (!selectedGroup || !date || !startTime) {
        alert("กรุณาเลือก Order กลุ่ม + วัน + เวลา");
        return;
      }
      if (conflictInfo) {
        alert("⚠ ช่วงเวลานี้ชนกับคลาสที่จองไว้แล้ว กรุณาเลือกเวลาอื่น");
        return;
      }

      const hrs = Number(duration) / 60;
      const newClasses = selectedGroup.enrollments.map((en, idx) => ({
        id: `c${Date.now()}_${idx}`,
        studentId: en.studentId,
        courseId: selectedGroup.courseId,
        teacherId: teacherId || undefined,
        groupClassId: `gc${Date.now()}`, // shared identifier — จองครั้งเดียว ทุกคนใช้ id เดียวกัน
        date, startTime, duration: Number(duration),
        location, status: "scheduled", price: 0, note,
      }));
      setClasses(prev => [...prev, ...newClasses]);

      // ตัดชั่วโมงจาก enrollment ทุกคนในกลุ่ม
      const enrollmentIds = new Set(selectedGroup.enrollments.map(en => en.id));
      ctx.setEnrollments(prev => prev.map(en => {
        if (enrollmentIds.has(en.id) && en.status === "active") {
          const newCompleted = Math.min(en.totalSessions, (en.completedSessions || 0) + hrs);
          const nowDone = newCompleted >= en.totalSessions;
          return { ...en, completedSessions: newCompleted, status: nowDone ? "completed" : "active" };
        }
        return en;
      }));

      setSavedId(newClasses[0].id);
      setSavedHrs(hrs);
      setSaved(true);
      setTimeout(() => setSaved(false), 4000);
      setSelectedGroupId("");
      setNote("");
      return;
    }

    // ============ INDIVIDUAL BOOKING ============
    if (!selectedStudentId || !date || !startTime) return;
    if (conflictInfo) {
      alert("⚠ ช่วงเวลานี้ชนกับคลาสที่จองไว้แล้ว กรุณาเลือกเวลาอื่น");
      return;
    }
    const id = `c${Date.now()}`;
    const hrs = Number(duration) / 60;

    setClasses(prev => [...prev, {
      id, studentId: selectedStudentId,
      courseId: selectedCourseId || undefined,
      teacherId: teacherId || undefined,
      date, startTime, duration: Number(duration),
      location, status: "scheduled", price: 0, note,
    }]);

    // ตัดชั่วโมงจาก enrollment ทันที
    if (selectedCourseId) {
      ctx.setEnrollments(prev => prev.map(en => {
        if (en.studentId === selectedStudentId && en.courseId === selectedCourseId && en.status === "active") {
          const newCompleted = Math.min(en.totalSessions, (en.completedSessions || 0) + hrs);
          const nowDone = newCompleted >= en.totalSessions;
          return { ...en, completedSessions: newCompleted, status: nowDone ? "completed" : "active" };
        }
        return en;
      }));
    }

    setSavedId(id);
    setSavedHrs(hrs);
    setSaved(true);
    setTimeout(() => setSaved(false), 4000);
    setSelectedCourseId("");
    setNote("");
  };

  const cancelBooking = (id) => {
    const bk = classes.find(c => c.id === id);
    if (!bk) return;
    const isGroupBk = !!bk.groupClassId;
    const groupCount = isGroupBk ? classes.filter(c => c.groupClassId === bk.groupClassId).length : 1;
    const msg = isGroupBk
      ? `ยกเลิกการจองกลุ่มนี้? (จะยกเลิก ${groupCount} คน + คืนชั่วโมงให้ทุกคน)`
      : "ยกเลิกการจองนี้?";
    if (!confirm(msg)) return;

    const hrs = (bk.duration || 60) / 60;

    if (isGroupBk) {
      // Find all classes in the group + restore hours for each enrollment
      const groupClasses = classes.filter(c => c.groupClassId === bk.groupClassId);
      const studentIdsInGroup = new Set(groupClasses.map(c => c.studentId));
      ctx.setEnrollments(prev => prev.map(en => {
        if (studentIdsInGroup.has(en.studentId) && en.courseId === bk.courseId) {
          const restored = Math.max(0, (en.completedSessions || 0) - hrs);
          return { ...en, completedSessions: restored, status: "active" };
        }
        return en;
      }));
      setClasses(prev => prev.filter(c => c.groupClassId !== bk.groupClassId));
      if (groupClasses.some(c => c.id === savedId)) setSavedId(null);
    } else {
      // Individual
      if (bk.courseId) {
        ctx.setEnrollments(prev => prev.map(en => {
          if (en.studentId === bk.studentId && en.courseId === bk.courseId) {
            const restored = Math.max(0, (en.completedSessions || 0) - hrs);
            return { ...en, completedSessions: restored, status: "active" };
          }
          return en;
        }));
      }
      setClasses(prev => prev.filter(c => c.id !== id));
      if (savedId === id) setSavedId(null);
    }
  };

  const catOfStudent = allCats.find(c => c.id === (selectedStudent?.categoryId || selectedStudent?.category))
    || CATEGORIES[selectedStudent?.category] || CATEGORIES.other;

  return (
    <div className="flex h-full overflow-hidden booking-layout-resp">

      {/* ─── Left: Form ─── */}
      <div className="flex flex-col overflow-y-auto booking-form-resp" style={{ width: 390, flexShrink: 0, borderRight: "0.5px solid var(--border-soft)", background: "var(--bg-surface)" }}>
        <div className="px-7 pt-7 pb-5" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
          <div className="label-eyebrow mb-1">{t("newBooking")}</div>
          <div className="heading-serif text-[22px]">{t("newBookingTitle")}</div>
        </div>

        <div className="flex-1 px-7 py-5 space-y-4">

          {/* Booking mode toggle — only show if any group orders exist */}
          {groupOrders.length > 0 && (
            <div>
              <div className="label-eyebrow mb-2">{t("bookingMode")}</div>
              <div className="grid grid-cols-2 gap-2">
                {[
                  { id: "individual", label: t("individual"), desc: "1 " + t("student"), icon: "👤" },
                  { id: "group", label: t("group"), desc: `${groupOrders.length} order`, icon: "👥" },
                ].map(m => (
                  <button key={m.id} onClick={() => setBookingMode(m.id)}
                    className="p-2.5 rounded-md text-left transition-all"
                    style={{
                      background: bookingMode === m.id ? "#1A1A17" : "var(--bg-muted)",
                      color: bookingMode === m.id ? "#C4A878" : "var(--text-secondary)",
                      border: "0.5px solid " + (bookingMode === m.id ? "#1A1A17" : "var(--border-default)"),
                    }}>
                    <div className="flex items-center gap-2">
                      <span className="text-[14px]">{m.icon}</span>
                      <div>
                        <div className="text-[12px] font-medium">{m.label}</div>
                        <div className="text-[10px]" style={{ opacity: 0.7 }}>{m.desc}</div>
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* GROUP ORDER PICKER */}
          {bookingMode === "group" && (
            <div>
              <div className="label-eyebrow mb-2">เลือก Order กลุ่ม</div>
              <div className="space-y-2 max-h-72 overflow-y-auto">
                {groupOrders.map(g => {
                  const remaining = g.enrollments[0] ? g.enrollments[0].totalSessions - (g.enrollments[0].completedSessions || 0) : 0;
                  const isSelected = selectedGroupId === g.groupId;
                  return (
                    <button key={g.groupId} onClick={() => setSelectedGroupId(g.groupId)}
                      className="w-full text-left p-3 transition-all"
                      style={{
                        background: isSelected ? "rgba(196,168,120,0.08)" : "var(--bg-surface)",
                        border: isSelected ? "2px solid #C4A878" : "0.5px solid var(--border-default)",
                        borderRadius: 8,
                      }}>
                      <div className="flex items-start justify-between gap-2 mb-2">
                        <div className="min-w-0 flex-1">
                          <div className="text-[12px] font-medium truncate">{g.courseName}</div>
                          <div className="text-[10px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>
                            👥 {g.enrollments.length} คน · เหลือ {remaining} ชม.
                          </div>
                        </div>
                        {isSelected && <span className="text-[10px] px-2 py-0.5" style={{ background: "#C4A878", color: "#fff", borderRadius: 4 }}>เลือกแล้ว</span>}
                      </div>
                      <div className="flex flex-wrap gap-1">
                        {g.enrollments.slice(0, 5).map(en => {
                          const st = students.find(s => s.id === en.studentId);
                          if (!st) return null;
                          const completed = en.completedSessions || 0;
                          const total = en.totalSessions || 0;
                          return (
                            <span key={en.id} className="text-[10px] px-1.5 py-0.5 rounded"
                              style={{ background: "var(--bg-muted)", color: "var(--text-secondary)" }}>
                              {st.nickname || st.name} <span style={{ color: "var(--text-tertiary)" }}>({completed}/{total})</span>
                            </span>
                          );
                        })}
                        {g.enrollments.length > 5 && (
                          <span className="text-[10px] px-1.5 py-0.5" style={{ color: "var(--text-tertiary)" }}>+{g.enrollments.length - 5} คน</span>
                        )}
                      </div>
                    </button>
                  );
                })}
              </div>
              {selectedGroup && (
                <div className="mt-2 p-2.5 text-[10px]"
                  style={{ background: "var(--accent-sage-hover)", color: "#3F5D45", borderLeft: "2px solid var(--success)", borderRadius: 4 }}>
                  💡 จองครั้งเดียว → ตัดชั่วโมงให้ <strong>{selectedGroup.enrollments.length} คน</strong> พร้อมกัน
                </div>
              )}
            </div>
          )}

          {/* Student picker — only show in individual mode */}
          {bookingMode === "individual" && (
          <div>
            <div className="label-eyebrow mb-2">{t("student")}</div>
            {/* Combobox: search + dropdown in one */}
            {(() => {
              const open = studentDropdownOpen;
              const setOpen = setStudentDropdownOpen;
              const activeStudents = students.filter(s => s.active);
              const filtered = studentSearch
                ? activeStudents.filter(s => s.name.toLowerCase().includes(studentSearch.toLowerCase()))
                : activeStudents;
              const sel = activeStudents.find(s => s.id === selectedStudentId);
              const selCat = sel ? (allCats.find(c => c.id === (sel.categoryId || sel.category)) || CATEGORIES[sel.category] || CATEGORIES.other) : null;
              return (
                <div className="relative">
                  <div className="flex items-center px-3 py-2.5 gap-2 cursor-text"
                    style={{ border: open ? `1.5px solid var(--accent-bronze)` : "0.5px solid var(--border-default)", background: "var(--bg-surface)", boxShadow: open ? "0 0 0 3px rgba(139,111,71,0.08)" : "none" }}
                    onClick={() => setOpen(true)}>
                    {sel && !open ? (
                      <>
                        <div className="w-6 h-6 flex items-center justify-center text-[10px] font-medium flex-shrink-0"
                          style={{ background: selCat.bg, color: selCat.text }}>{sel.name.charAt(0)}</div>
                        <span className="flex-1 text-[13px] font-medium truncate">{sel.name}</span>
                        <span className="text-[10px] flex-shrink-0" style={{ color: "var(--text-tertiary)" }}>{selCat.name || selCat.label}</span>
                        <button onClick={e => { e.stopPropagation(); setOpen(true); setStudentSearch(""); }}
                          style={{ color: "var(--text-tertiary)", lineHeight: 1 }}>
                          <IconSearch size={12} />
                        </button>
                      </>
                    ) : (
                      <>
                        <IconSearch size={12} style={{ color: "var(--text-tertiary)", flexShrink: 0 }} />
                        <input autoFocus type="text" value={studentSearch}
                          onChange={e => setStudentSearch(e.target.value)}
                          placeholder="พิมพ์ชื่อนักเรียน..."
                          className="flex-1 text-[13px] bg-transparent"
                          style={{ outline: "none", border: "none", color: "var(--text-primary)" }}
                          onBlur={() => setTimeout(() => setOpen(false), 150)} />
                      </>
                    )}
                  </div>
                  {open && (
                    <div className="absolute z-20 w-full mt-1 overflow-hidden"
                      style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", boxShadow: "var(--shadow-elevated)", maxHeight: 220, overflowY: "auto" }}>
                      {filtered.length === 0 ? (
                        <div className="px-4 py-3 text-[12px]" style={{ color: "var(--text-tertiary)" }}>ไม่พบนักเรียน</div>
                      ) : filtered.map(s => {
                        const sCat = allCats.find(c => c.id === (s.categoryId || s.category)) || CATEGORIES[s.category] || CATEGORIES.other;
                        const isSelected = selectedStudentId === s.id;
                        return (
                          <button key={s.id}
                            className="w-full flex items-center gap-3 px-3 py-2.5 text-left transition-colors"
                            style={{ background: isSelected ? sCat.bg : "transparent", borderLeft: isSelected ? `3px solid ${sCat.color}` : "3px solid transparent" }}
                            onMouseDown={() => { setSelectedStudentId(s.id); setSelectedCourseId(""); setStudentSearch(""); setOpen(false); }}>
                            <div className="w-7 h-7 flex items-center justify-center text-[11px] font-medium flex-shrink-0"
                              style={{ background: sCat.bg, color: sCat.text }}>{s.name.charAt(0)}</div>
                            <div className="flex-1 min-w-0">
                              <div className="text-[12px] font-medium">{s.name}</div>
                              <div className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>{sCat.name || sCat.label} · {s.level}</div>
                            </div>
                            {isSelected && <IconCheck size={12} style={{ color: sCat.color }} />}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
          )}

          {/* คอร์ส — lookup จากคอร์สที่นักเรียนลงทะเบียนไว้ — only for individual */}
          {bookingMode === "individual" && (
          <div>
            <div className="label-eyebrow mb-2">คอร์สที่ลงทะเบียน</div>
            {studentEnrollments.length === 0 ? (
              <div className="px-4 py-3 text-[12px]" style={{ background: "var(--bg-muted)", color: "var(--text-tertiary)", borderLeft: "3px solid var(--border-default)" }}>
                นักเรียนคนนี้ยังไม่ได้ลงทะเบียนคอร์สใด
                <div className="text-[10px] mt-0.5" style={{ color: "var(--text-quaternary)" }}>ไปที่ คอร์สเรียน → ขายคอร์สนี้ เพื่อลงทะเบียน</div>
              </div>
            ) : (
              <div className="space-y-1.5">
                <button onClick={() => setSelectedCourseId("")}
                  className="w-full flex items-center gap-3 px-3 py-2.5 text-left transition-all"
                  style={{
                    background: !selectedCourseId ? "var(--bg-muted)" : "transparent",
                    border: !selectedCourseId ? "0.5px solid var(--border-default)" : "0.5px solid transparent",
                  }}>
                  <div className="w-7 h-7 flex items-center justify-center flex-shrink-0" style={{ background: "var(--bg-muted)" }}>
                    <span className="text-[14px]" style={{ color: "var(--text-tertiary)" }}>—</span>
                  </div>
                  <div className="text-[12px]" style={{ color: "var(--text-tertiary)" }}>ไม่ระบุคอร์ส</div>
                  {!selectedCourseId && <IconCheck size={12} style={{ color: "var(--text-tertiary)", marginLeft: "auto" }} />}
                </button>

                {studentEnrollments.map(en => {
                  const c = courses.find(cc => cc.id === en.courseId);
                  if (!c) return null;
                  const cCat = allCats.find(cat => cat.id === (c.categoryId || c.category)) || CATEGORIES[c.category] || CATEGORIES.other;
                  const progress = en.totalSessions > 0 ? Math.round((en.completedSessions / en.totalSessions) * 100) : 0;
                  const remaining = (en.totalPrice || 0) - (en.paidAmount || 0);
                  const isSelected = selectedCourseId === c.id;
                  return (
                    <button key={en.id} onClick={() => setSelectedCourseId(c.id)}
                      className="w-full flex items-start gap-3 px-3 py-3 text-left transition-all"
                      style={{
                        background: isSelected ? cCat.bg : "var(--bg-surface)",
                        border: isSelected ? `1.5px solid ${cCat.color}` : "0.5px solid var(--border-soft)",
                        borderLeft: `3px solid ${cCat.color}`,
                      }}>
                      <div className="w-7 h-7 flex items-center justify-center text-[10px] font-medium flex-shrink-0 mt-0.5"
                        style={{ background: isSelected ? "rgba(255,255,255,0.7)" : cCat.bg, color: cCat.text }}>
                        <IconLayers size={12} style={{ color: cCat.color }} />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="text-[12px] font-medium truncate">{c.name}</div>
                        <div className="flex items-center gap-2 mt-1.5">
                          <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ background: "rgba(0,0,0,0.08)" }}>
                            <div className="h-full rounded-full" style={{ width: `${progress}%`, background: progress >= 100 ? "var(--danger)" : cCat.color }} />
                          </div>
                        </div>
                        <div className="flex justify-between mt-1">
                          <span className="text-[10px]" style={{ color: isSelected ? cCat.text : "var(--text-tertiary)" }}>
                            ใช้ไป {en.completedSessions}/{en.totalSessions} ชม.
                          </span>
                          <span className="text-[10px] font-medium" style={{ color: progress >= 100 ? "var(--danger)" : "var(--success)" }}>
                            {progress >= 100 ? "หมดแล้ว" : `เหลือ ${Math.round((en.totalSessions - en.completedSessions) * 10) / 10} ชม.`}
                          </span>
                        </div>
                        {remaining > 0 && (
                          <div className="text-[10px] mt-0.5" style={{ color: "var(--warning)" }}>ค้างชำระ {formatBaht(remaining)}</div>
                        )}
                      </div>
                      {isSelected && <IconCheck size={12} style={{ color: cCat.color, marginTop: 2, flexShrink: 0 }} />}
                    </button>
                  );
                })}
              </div>
            )}
          </div>
          )}

          <FormRow label={t("date")}>
            <input type="date" className={inputCls} style={inputSty} value={date} onChange={e => setDate(e.target.value)} />
            {date && (
              <div className="text-[11px] mt-1.5 font-medium" style={{ color: "var(--accent-bronze)" }}>
                {(() => {
                  const [y, m, d] = date.split("-").map(Number);
                  return new Date(y, m - 1, d).toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
                })()}
              </div>
            )}
          </FormRow>

          <div className="grid grid-cols-2 gap-3">
            <FormRow label={t("startTime")}>
              <input type="time" className={inputCls} style={inputSty} value={startTime} onChange={e => setStartTime(e.target.value)} />
            </FormRow>
            <FormRow label={t("duration")}>
              <select className={inputCls} style={inputSty} value={duration} onChange={e => setDuration(Number(e.target.value))}>
                {[30, 45, 60, 90, 120].map(v => <option key={v} value={v}>{v} {t("minutes")}</option>)}
              </select>
            </FormRow>
          </div>

          <FormRow label={t("location")}>
            <select className={inputCls} style={inputSty} value={location} onChange={e => setLocation(e.target.value)}>
              {(settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active).map(l => (
                <option key={l.id} value={l.name}>{l.icon} {l.name}</option>
              ))}
            </select>
          </FormRow>

          {hasMultiTeacher && (
            <FormRow label="ครูผู้สอน">
              <select className={inputCls} style={inputSty} value={teacherId} onChange={e => setTeacherId(e.target.value)}>
                <option value="">— ไม่ระบุ —</option>
                {teachers.map(tc => (
                  <option key={tc.id} value={tc.id}>{tc.nickname || tc.name}</option>
                ))}
              </select>
            </FormRow>
          )}

          <FormRow label={t("note")}>
            <input className={inputCls} style={inputSty} value={note} onChange={e => setNote(e.target.value)} placeholder="เช่น เน้นเรื่อง backswing" />
          </FormRow>
        </div>

        <div className="px-7 pb-7 pt-4" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
          {saved && (
            <div className="flex items-start gap-2 text-[12px] mb-3 px-3 py-2.5"
              style={{ background: "var(--success-soft)", color: "var(--success)" }}>
              <IconCheckCircle size={14} className="mt-0.5 flex-shrink-0" />
              <div className="flex-1">
                <div className="font-medium">จองเรียนสำเร็จ!</div>
                {savedHrs > 0 && selectedCourse && (
                  <div className="text-[11px] mt-0.5" style={{ color: "var(--success)" }}>
                    ตัด {savedHrs % 1 === 0 ? savedHrs : savedHrs.toFixed(1)} ชม. จากคอร์ส "{selectedCourse?.name || ""}" แล้ว
                  </div>
                )}
              </div>
              <button onClick={() => onNavigate("schedule")}
                className="text-[11px] font-medium px-3 py-1.5 flex-shrink-0 transition-all hover:opacity-90"
                style={{ background: "var(--success)", color: "#fff" }}>
                ดูตารางสอน →
              </button>
            </div>
          )}

          {/* Conflict warning */}
          {conflictInfo && !saved && (
            <div className="mb-3 px-3 py-2.5"
              style={{ background: "var(--danger-soft)", border: "0.5px solid var(--danger)", borderLeft: "3px solid var(--danger)" }}>
              <div className="flex items-start gap-2">
                <span style={{ color: "var(--danger)", fontSize: 14, flexShrink: 0, lineHeight: 1 }}>⚠</span>
                <div className="flex-1">
                  <div className="text-[12px] font-medium mb-1.5" style={{ color: "var(--danger)" }}>
                    ช่วงเวลานี้ชนกับคลาสที่จองไว้แล้ว ({conflictInfo.length})
                  </div>
                  <div className="space-y-1">
                    {conflictInfo.map(c => {
                      const s = students.find(st => st.id === c.studentId);
                      const [h, m] = c.startTime.split(":").map(Number);
                      const em = h * 60 + m + (c.duration || 60);
                      const endT = `${String(Math.floor(em/60)).padStart(2,"0")}:${String(em%60).padStart(2,"0")}`;
                      return (
                        <div key={c.id} className="text-[11px]" style={{ color: "var(--text-secondary)" }}>
                          • <span className="font-medium">{s?.name || "ไม่พบ"}</span> · {c.startTime}–{endT} · {c.location}
                        </div>
                      );
                    })}
                  </div>
                  <div className="text-[10px] mt-1.5" style={{ color: "var(--text-tertiary)" }}>
                    กรุณาเลือกเวลาอื่นเพื่อจองเรียน
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="flex gap-2">
            <button onClick={handleSave}
              disabled={(bookingMode === "group" ? !selectedGroupId : !selectedStudentId) || !date || !startTime || !!conflictInfo}
              className="flex-1 flex items-center justify-center gap-2 text-[13px] py-3 font-medium transition-all"
              style={{
                background: conflictInfo ? "var(--danger-soft)" : ((bookingMode === "group" ? selectedGroupId : selectedStudentId) ? "#1A1A17" : "var(--bg-muted)"),
                color: conflictInfo ? "var(--danger)" : ((bookingMode === "group" ? selectedGroupId : selectedStudentId) ? "#C4A878" : "var(--text-tertiary)"),
                cursor: conflictInfo ? "not-allowed" : "pointer",
              }}>
              <IconCalPlus size={14} /> {conflictInfo ? t("conflictError") : (bookingMode === "group" && selectedGroup ? `บันทึก (${selectedGroup.enrollments.length} คน)` : t("saveBooking"))}
            </button>
            <button onClick={() => onNavigate("schedule")}
              className="text-[12px] px-3 py-3 flex items-center gap-1 transition-colors hover:bg-[var(--accent-sage-hover)]"
              style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}
              title={t("viewSchedule")}>
              <IconCal size={14} />
            </button>
          </div>
        </div>
      </div>

      {/* ─── Right: List ─── */}
      <div className="flex-1 flex flex-col overflow-hidden" style={{ background: "var(--bg-primary)" }}>
        <div className="px-8 pt-7 pb-5" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
          <div className="flex items-baseline justify-between mb-4">
            <div>
              <div className="label-eyebrow mb-1">{t("bookingList")}</div>
              <div className="heading-serif text-[22px]">{t("bookingListTitle")}</div>
            </div>
            <div className="text-[12px]" style={{ color: "var(--text-tertiary)" }}>{filteredBookings.length} {t("record")}</div>
          </div>

          {/* Status filter pills */}
          <div className="flex gap-2 mb-3">
            {[
              { id: "pending", label: t("filterPending"), count: pendingCount },
              { id: "completed", label: t("filterDone"), count: completedCount },
              { id: "all", label: t("filterAll"), count: pendingCount + completedCount },
            ].map(f => (
              <button key={f.id} onClick={() => setFilterStatus(f.id)}
                className={`filter-pill ${filterStatus === f.id ? "active" : ""}`}>
                {f.label}
                <span className="pill-count">{f.count}</span>
              </button>
            ))}
          </div>

          {/* Search + student filter */}
          <div className="flex gap-2">
            <div className="flex-1 flex items-center gap-2 px-3 py-2.5"
              style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)" }}>
              <IconSearch size={12} style={{ color: "var(--text-tertiary)", flexShrink: 0 }} />
              <input type="text" value={searchText} onChange={e => setSearchText(e.target.value)}
                placeholder={t("searchBookings")}
                className="flex-1 text-[12px] bg-transparent"
                style={{ outline: "none", border: "none", color: "var(--text-primary)" }} />
            </div>
            <select value={filterStudentId} onChange={e => setFilterStudentId(e.target.value)}
              className="text-[12px] px-3 py-2"
              style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", color: "var(--text-primary)", minWidth: 150 }}>
              <option value="all">{t("allStudentsFilter")}</option>
              {students.filter(s => s.active).map(s => (
                <option key={s.id} value={s.id}>{s.name}</option>
              ))}
            </select>

            {hasMultiTeacher && (
              <select value={filterTeacherId} onChange={e => setFilterTeacherId(e.target.value)}
                className="text-[12px] px-3 py-2"
                style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", color: "var(--text-primary)", minWidth: 140 }}>
                <option value="all">{t("allTeachers")}</option>
                {teachers.map(tc => (
                  <option key={tc.id} value={tc.id}>{tc.nickname || tc.name}</option>
                ))}
                <option value="unassigned">{t("noTeacher") || "No teacher"}</option>
              </select>
            )}
          </div>
        </div>

        <div className="flex-1 overflow-y-auto px-8 py-5">
          {filteredBookings.length === 0 ? (
            <div className="flex flex-col items-center justify-center h-64 gap-3">
              <div style={{ color: "var(--text-quaternary)" }}><IconCalPlus size={40} stroke={1} /></div>
              <div className="heading-serif text-[18px] italic" style={{ color: "var(--text-tertiary)" }}>ไม่พบรายการ</div>
            </div>
          ) : (
            <div className="space-y-2">
              {filteredBookings.map(bk => {
                const s = students.find(st => st.id === bk.studentId);
                const c = bk.courseId ? courses.find(cc => cc.id === bk.courseId) : null;
                const sCat = s ? (allCats.find(cat => cat.id === (s.categoryId || s.category)) || CATEGORIES[s.category] || CATEGORIES.other) : CATEGORIES.other;
                const isNew = bk.id === savedId;
                const isToday = bk.date === todayISO();
                const isDone = bk.status === "completed";
                return (
                  <div key={bk.id} className="flex items-start gap-4 px-5 py-4 transition-all"
                    style={{
                      background: isDone ? "transparent" : isNew ? sCat.bg : "var(--bg-surface)",
                      border: isNew ? `1.5px solid ${sCat.color}` : "0.5px solid var(--border-soft)",
                      borderLeft: `3px solid ${isDone ? "var(--border-default)" : sCat.color}`,
                      opacity: isDone ? 0.6 : 1,
                    }}>
                    <div className="flex flex-col min-w-[90px] flex-shrink-0">
                      {(() => {
                        const [h, m] = bk.startTime.split(":").map(Number);
                        const endMin = h * 60 + m + (bk.duration || 60);
                        const endTime = `${String(Math.floor(endMin / 60)).padStart(2, "0")}:${String(endMin % 60).padStart(2, "0")}`;
                        return (
                          <>
                            <div className="num-display text-[20px] leading-none" style={{ color: isDone ? "var(--text-tertiary)" : "var(--text-primary)" }}>
                              {bk.startTime}
                            </div>
                            <div className="flex items-center gap-1 mt-1">
                              <div className="w-3 h-px" style={{ background: isDone ? "var(--text-quaternary)" : sCat.color, opacity: 0.5 }} />
                              <div className="num-display text-[14px]" style={{ color: isDone ? "var(--text-quaternary)" : "var(--text-tertiary)" }}>
                                {endTime}
                              </div>
                            </div>
                          </>
                        );
                      })()}
                      <div className="text-[10px] mt-1.5 leading-snug"
                        style={{ color: isToday && !isDone ? "var(--success)" : "var(--text-tertiary)", fontWeight: isToday && !isDone ? 500 : 400 }}>
                        {formatThaiDate(bk.date)}
                      </div>
                    </div>

                    <div className="w-px self-stretch" style={{ background: isDone ? "var(--border-default)" : sCat.color, opacity: 0.25 }} />

                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1 flex-wrap">
                        <div className="w-7 h-7 flex items-center justify-center text-[11px] font-medium flex-shrink-0"
                          style={{ background: sCat.bg, color: sCat.text }}>
                          {bk._isGroup ? "👥" : (s?.name?.charAt(0) || "?")}
                        </div>
                        <div className="text-[13px] font-medium truncate">
                          {bk._isGroup ? (c?.name || "คอร์สกลุ่ม") : (s?.name || "ไม่พบ")}
                        </div>
                        {bk._isGroup && (
                          <span className="text-[9px] px-1.5 py-0.5 font-medium flex-shrink-0"
                            style={{ background: "rgba(196,168,120,0.15)", color: "#8B6F47" }}>
                            👥 กลุ่ม · {bk._memberCount} คน
                          </span>
                        )}
                        {isNew && <span className="text-[9px] px-2 py-0.5 font-medium flex-shrink-0" style={{ background: sCat.color, color: "#fff" }}>ใหม่</span>}
                        <span className="text-[9px] px-2 py-0.5 font-medium flex-shrink-0 ml-auto"
                          style={{
                            background: isDone ? "var(--success-soft)" : "var(--warning-soft)",
                            color: isDone ? "var(--success)" : "var(--warning)",
                          }}>
                          {isDone ? "✓ " + t("taughtStatus") : "○ " + t("notTaughtStatus")}
                        </span>
                      </div>

                      {/* Group members chips */}
                      {bk._isGroup && (
                        <div className="flex flex-wrap gap-1 mb-1.5">
                          {bk._members.map(m => {
                            const mst = students.find(st => st.id === m.studentId);
                            if (!mst) return null;
                            return (
                              <span key={m.id} className="text-[10px] px-1.5 py-0.5 rounded inline-flex items-center"
                                style={{ background: "var(--bg-muted)", color: "var(--text-secondary)" }}>
                                {mst.nickname || mst.name}
                              </span>
                            );
                          })}
                        </div>
                      )}

                      <div className="text-[11px] flex flex-wrap gap-x-1.5 items-center" style={{ color: "var(--text-secondary)" }}>
                        {c && !bk._isGroup && <span>{c.name}</span>}
                        {c && !bk._isGroup && <span style={{ color: "var(--text-quaternary)" }}>·</span>}
                        <span>{bk.duration} {t("minutes")}</span>
                        <span style={{ color: "var(--text-quaternary)" }}>·</span>
                        <span>{bk.location}</span>
                        {bk.teacherId && (() => {
                          const tc = teachers.find(t => t.id === bk.teacherId);
                          if (!tc) return null;
                          return (
                            <>
                              <span style={{ color: "var(--text-quaternary)" }}>·</span>
                              <span className="inline-flex items-center gap-1">
                                <span className="w-2 h-2 rounded-full" style={{ background: tc.color || "#C4A878" }} />
                                {tc.nickname || tc.name}
                              </span>
                            </>
                          );
                        })()}
                      </div>
                      {bk.note && <div className="text-[10px] mt-1" style={{ color: "var(--text-tertiary)" }}>📝 {bk.note}</div>}

                      {/* Toggle notes */}
                      {(() => {
                        const bkNotes = (notes || []).filter(n => n.studentId === bk.studentId).sort((a, b) => b.date.localeCompare(a.date));
                        const isExpanded = expandedNotes === bk.id;
                        if (bkNotes.length === 0) return null;
                        return (
                          <div className="mt-2">
                            <button onClick={() => setExpandedNotes(isExpanded ? null : bk.id)}
                              className="flex items-center gap-1.5 text-[10px] font-medium"
                              style={{ color: sCat.color }}>
                              <IconBook size={10} />
                              {t("recordLessonNote")} {bkNotes.length} {t("bookingItems")}
                              <span style={{ fontSize: 9 }}>{isExpanded ? "▲" : "▼"}</span>
                            </button>
                            {isExpanded && (
                              <div className="mt-2 space-y-2">
                                {bkNotes.slice(0, 3).map(n => {
                                  const [ny, nm, nd] = n.date.split("-").map(Number);
                                  const noteDate = new Date(ny, nm - 1, nd).toLocaleDateString("th-TH", { day: "numeric", month: "short" });
                                  return (
                                    <div key={n.id} className="px-3 py-2"
                                      style={{ background: "var(--bg-muted)", borderLeft: "2px solid " + sCat.color }}>
                                      <div className="flex justify-between items-baseline mb-1">
                                        <div className="text-[11px] font-medium truncate pr-2">{n.title}</div>
                                        <div className="text-[10px] flex-shrink-0" style={{ color: "var(--text-tertiary)" }}>{noteDate}</div>
                                      </div>
                                      {n.content && (
                                        <div className="text-[10px] leading-relaxed" style={{ color: "var(--text-secondary)" }}>
                                          {n.content}
                                        </div>
                                      )}
                                    </div>
                                  );
                                })}
                                {bkNotes.length > 3 && (
                                  <div className="text-[10px] text-center" style={{ color: "var(--text-tertiary)" }}>
                                    และอีก {bkNotes.length - 3} รายการ
                                  </div>
                                )}
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </div>

                    <div className="flex flex-col gap-1.5 flex-shrink-0">
                      {!isDone && (
                        <button onClick={() => setReminderModal(bk)}
                          className="text-[10px] px-2.5 py-1.5 flex items-center gap-1 transition-colors font-medium"
                          style={{ background: "var(--info-soft)", color: "var(--info)", border: "0.5px solid rgba(90,107,130,0.3)" }}>
                          <IconSend size={11} /> {t("notify")}
                        </button>
                      )}
                      {!isDone && (
                        <button onClick={() => setNoteModal(bk)}
                          className="text-[10px] px-2.5 py-1.5 flex items-center gap-1 transition-colors font-medium"
                          style={{ background: "#1A1A17", color: "#C4A878" }}>
                          <IconBook size={11} /> {t("recordLessonNote")}
                        </button>
                      )}
                      {!isDone && (
                        <button onClick={() => cancelBooking(bk.id)}
                          className="text-[10px] px-2.5 py-1.5 text-center transition-colors"
                          style={{ border: "0.5px solid var(--border-default)", color: "var(--text-tertiary)" }}>
                          {t("cancelBookingShort")}
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Quick Note Modal */}
      {noteModal && (
        <QuickNoteModal
          booking={noteModal}
          ctx={ctx}
          onClose={() => setNoteModal(null)}
        />
      )}

      {reminderModal && (
        <ReminderModal
          booking={reminderModal}
          ctx={ctx}
          onClose={() => setReminderModal(null)}
        />
      )}
    </div>
  );
}

// ============ REMINDER MODAL ============
function ReminderModal({ booking, ctx, onClose }) {
  const { students, courses, enrollments, settings, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;

  const student = students.find(s => s.id === booking.studentId);
  const course = booking.courseId ? courses.find(c => c.id === booking.courseId) : null;
  const en = course ? (enrollments || []).find(e => e.studentId === booking.studentId && e.courseId === course.id && e.status === "active") : null;
  const remaining = en ? Math.round((en.totalSessions - en.completedSessions) * 10) / 10 : null;

  const [h, m] = booking.startTime.split(":").map(Number);
  const endMin = h * 60 + m + (booking.duration || 60);
  const endTime = `${String(Math.floor(endMin / 60)).padStart(2,"0")}:${String(endMin % 60).padStart(2,"0")}`;

  const [y, mo, d] = booking.date.split("-").map(Number);
  const thaiDate = new Date(y, mo - 1, d).toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  const thaiDateShort = new Date(y, mo - 1, d).toLocaleDateString("th-TH", { day: "numeric", month: "long" });

  const sCat = student ? (allCats.find(c => c.id === (student.categoryId || student.category)) || CATEGORIES[student.category] || CATEGORIES.other) : CATEGORIES.other;

  const [style, setStyle] = useState("formal");
  const [copied, setCopied] = useState(false);

  const templates = {
    formal: [
      `เรียน ${student?.name || "นักเรียน"} 🙏`,
      ``,
      `ขอแจ้งเตือนว่ามีคลาส${course ? course.name : "เรียน"}ในวัน${thaiDate}`,
      `เวลา ${booking.startTime} – ${endTime} น. (${booking.duration} นาที)`,
      `📍 สถานที่: ${booking.location}`,
      remaining !== null ? `⏱ ชั่วโมงคงเหลือ: ${remaining} ชม.` : "",
      ``,
      `กรุณาเตรียมตัวให้พร้อมนะคะ/ครับ 🎵`,
      `— ครูสมชาย`,
    ].filter(l => l !== null && l !== undefined).join("\n"),

    casual: [
      `สวัสดีครับ ${student?.name?.split(" ")[0] || "น้อง"} 😊`,
      ``,
      `เตือนไว้ก่อนนะ — ${thaiDateShort} นี้มีคลาสเรียน${course ? course.name : ""}`,
      `⏰ ${booking.startTime} – ${endTime} น.`,
      `📍 ${booking.location}`,
      remaining !== null ? `ชั่วโมงเหลืออีก ${remaining} ชม. นะ` : "",
      ``,
      `เจอกันนะครับ! 👋`,
    ].filter(l => l !== null && l !== undefined).join("\n"),

    short: [
      `📅 แจ้งเตือนคลาส`,
      `${student?.name?.split(" ")[0] || "น้อง"} — ${thaiDateShort}`,
      `⏰ ${booking.startTime} – ${endTime} น.`,
      `📍 ${booking.location}`,
      remaining !== null ? `⏱ เหลือ ${remaining} ชม.` : "",
    ].filter(Boolean).join("\n"),

    parent: [
      `เรียนคุณผู้ปกครองของ ${student?.name || "นักเรียน"} 🙏`,
      ``,
      `ขอแจ้งเตือนว่า${student?.name?.split(" ")[0] || "น้อง"}มีคลาส${course ? course.name : "เรียน"}`,
      `📅 ${thaiDate}`,
      `⏰ เวลา ${booking.startTime} – ${endTime} น.`,
      `📍 สถานที่: ${booking.location}`,
      remaining !== null ? `⏱ ชั่วโมงคงเหลือในแพ็กเกจ: ${remaining} ชม.` : "",
      ``,
      `หากต้องการเลื่อนนัด กรุณาแจ้งล่วงหน้าอย่างน้อย 24 ชั่วโมงนะคะ/ครับ`,
      `ขอบคุณครับ — ครูสมชาย`,
    ].filter(l => l !== null && l !== undefined).join("\n"),
  };

  const text = templates[style];

  const copyText = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    });
  };

  const styleOpts = [
    { id: "formal", label: t ? t("formal") : "Formal" },
    { id: "casual", label: t ? t("casual") : "Casual" },
    { id: "short", label: t ? t("short") || "Short" : "Short" },
    { id: "parent", label: t ? t("parent") : "Parent" },
  ];

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in"
      style={{ background: "rgba(15,31,24,0.55)", backdropFilter: "blur(4px)" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="w-full max-w-md"
        style={{ background: "var(--bg-surface)", boxShadow: "var(--shadow-elevated)", border: "0.5px solid var(--border-soft)" }}>

        {/* Header */}
        <div className="px-6 py-5 flex items-start justify-between" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
          <div>
            <div className="label-eyebrow mb-1">Reminder</div>
            <div className="heading-serif text-[20px]">{t ? t("notify") : "Notify"}</div>
            <div className="flex items-center gap-2 mt-1.5">
              <div className="w-6 h-6 flex items-center justify-center text-[10px] font-medium flex-shrink-0"
                style={{ background: sCat.bg, color: sCat.text }}>{student?.name?.charAt(0)}</div>
              <span className="text-[12px]" style={{ color: "var(--text-secondary)" }}>{student?.name}</span>
              <span className="text-[11px]" style={{ color: "var(--text-tertiary)" }}>· {thaiDateShort} · {booking.startTime}</span>
            </div>
          </div>
          <button onClick={onClose} className="p-1.5" style={{ color: "var(--text-tertiary)" }}><IconX size={15} /></button>
        </div>

        <div className="px-6 py-5 space-y-4">

          {/* Style selector */}
          <div>
            <div className="label-eyebrow mb-2">{t ? t("bookingFormat") : "Format"}</div>
            <div className="flex gap-2 flex-wrap">
              {styleOpts.map(opt => (
                <button key={opt.id} onClick={() => setStyle(opt.id)}
                  className="text-[11px] px-3 py-1.5 font-medium transition-all"
                  style={{
                    background: style === opt.id ? "#1A1A17" : "var(--bg-muted)",
                    color: style === opt.id ? "#C4A878" : "var(--text-secondary)",
                    border: style === opt.id ? "none" : "0.5px solid var(--border-default)",
                  }}>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          {/* Preview */}
          <div>
            <div className="label-eyebrow mb-2">{t ? t("sampleText") : "Sample"}</div>
            <div className="px-4 py-4 text-[12px] leading-relaxed whitespace-pre-wrap select-all"
              style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)", color: "var(--text-primary)", fontFamily: "inherit", minHeight: 120 }}>
              {text}
            </div>
            <div className="text-[10px] mt-1" style={{ color: "var(--text-quaternary)" }}>{t ? t("clickToCopy") : "Click to select"}</div>
          </div>

          {/* Line/Contact info */}
          {(student?.lineId || student?.phone) && (
            <div className="flex gap-3">
              {student.phone && (
                <div className="flex-1 px-3 py-2.5" style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)" }}>
                  <div className="label-eyebrow mb-0.5" style={{ fontSize: 9 }}>เบอร์โทร</div>
                  <div className="text-[12px] font-medium">{student.phone}</div>
                </div>
              )}
              {student.lineId && (
                <div className="flex-1 px-3 py-2.5" style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)" }}>
                  <div className="label-eyebrow mb-0.5" style={{ fontSize: 9 }}>Line ID</div>
                  <div className="text-[12px] font-medium">{student.lineId}</div>
                </div>
              )}
            </div>
          )}

        </div>

        {/* Footer */}
        <div className="flex gap-2 px-6 pb-6">
          <button onClick={onClose}
            className="text-[13px] py-3 px-5 font-medium transition-colors"
            style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
            ปิด
          </button>
          <button onClick={copyText}
            className="flex-1 text-[13px] py-3 font-medium flex items-center justify-center gap-2 transition-all hover:opacity-90"
            style={{ background: copied ? "var(--success)" : "#1A1A17", color: copied ? "#fff" : "#C4A878" }}>
            {copied ? (
              <><IconCheck size={14} /> คัดลอกแล้ว!</>
            ) : (
              <><IconSend size={14} /> คัดลอกข้อความ</>
            )}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============ QUICK NOTE MODAL ============
function QuickNoteModal({ booking, ctx, onClose }) {
  const { students, setNotes, setClasses, classes, courses, enrollments, settings } = ctx;
  const student = students.find(s => s.id === booking.studentId);
  const [title, setTitle] = useState("");
  const [content, setContent] = useState("");
  const [markDone, setMarkDone] = useState(true);
  const [selectedTopics, setSelectedTopics] = useState([]);
  const [customTopic, setCustomTopic] = useState("");

  // Resolve master topics from course > enrollment > student category
  let course = booking.courseId ? courses.find(c => c.id === booking.courseId) : null;

  // Fallback: if booking has no courseId, look up from student's active enrollment
  if (!course && student) {
    const activeEn = (enrollments || []).find(e => e.studentId === student.id && e.status === "active");
    if (activeEn) course = courses.find(c => c.id === activeEn.courseId);
  }

  const categoryId = course?.categoryId || course?.category || student?.categoryId || student?.category;
  const topicsBank = settings?.topics || DEFAULT_SETTINGS.topics;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const currentCatName = allCats.find(c => c.id === categoryId)?.name || CATEGORIES[categoryId]?.label || categoryId || "ไม่ระบุหมวด";
  const masterTopics = topicsBank[categoryId] || [];

  const toggleTopic = (t) => {
    setSelectedTopics(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
  };

  const addCustom = () => {
    const t = customTopic.trim();
    if (t && !selectedTopics.includes(t)) {
      setSelectedTopics([...selectedTopics, t]);
      setCustomTopic("");
    }
  };

  const submit = () => {
    if (!title.trim()) return alert("กรุณาใส่หัวข้อ");
    const isGroupBk = !!booking.groupClassId;

    if (isGroupBk) {
      // Group booking: create 1 note per student in the group
      const groupClasses = classes.filter(c => c.groupClassId === booking.groupClassId);
      const newNotes = groupClasses.map((gc, idx) => ({
        id: `n${Date.now()}_${idx}`,
        studentId: gc.studentId,
        classId: gc.id,
        date: gc.date,
        title,
        content,
        topics: selectedTopics,
        duration: gc.duration,
      }));
      setNotes(prev => [...newNotes, ...prev]);
      if (markDone) {
        setClasses(prev => prev.map(c => c.groupClassId === booking.groupClassId ? { ...c, status: "completed" } : c));
      }
    } else {
      setNotes(prev => [{
        id: `n${Date.now()}`,
        studentId: booking.studentId,
        classId: booking.id,
        date: booking.date,
        title,
        content,
        topics: selectedTopics,
        duration: booking.duration,
      }, ...prev]);
      if (markDone) {
        setClasses(prev => prev.map(c => c.id === booking.id ? { ...c, status: "completed" } : c));
      }
    }
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in"
      style={{ background: "rgba(15,31,24,0.5)", backdropFilter: "blur(4px)" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="w-full max-w-lg overflow-hidden"
        style={{ background: "var(--bg-surface)", boxShadow: "var(--shadow-elevated)", border: "0.5px solid var(--border-soft)", maxHeight: "92vh", display: "flex", flexDirection: "column" }}>

        <div className="px-6 py-5 flex items-start justify-between flex-shrink-0" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
          <div className="min-w-0 flex-1">
            <div className="label-eyebrow mb-1">บันทึกการสอน{booking.groupClassId ? " · กลุ่ม" : ""}</div>
            {booking.groupClassId ? (() => {
              const groupClasses = classes.filter(c => c.groupClassId === booking.groupClassId);
              const course = booking.courseId ? courses.find(c => c.id === booking.courseId) : null;
              return (
                <>
                  <div className="heading-serif text-[20px]">{course?.name || "คอร์สกลุ่ม"}</div>
                  <div className="flex flex-wrap gap-1 mt-1.5 mb-1">
                    {groupClasses.map(gc => {
                      const st = students.find(s => s.id === gc.studentId);
                      return st ? (
                        <span key={gc.id} className="text-[10px] px-2 py-0.5 rounded"
                          style={{ background: "var(--bg-muted)", color: "var(--text-secondary)" }}>
                          {st.nickname || st.name}
                        </span>
                      ) : null;
                    })}
                  </div>
                  <div className="text-[10px]" style={{ color: "#8B6F47", fontStyle: "italic" }}>
                    💡 บันทึกเดียว — เซฟให้ทั้ง {groupClasses.length} คน
                  </div>
                </>
              );
            })() : (
              <div className="heading-serif text-[20px]">{student?.name}</div>
            )}
            <div className="text-[11px] mt-0.5" style={{ color: "var(--text-secondary)" }}>
              {booking.startTime} · {booking.duration} นาที · {booking.location}
              {booking.date && (
                <span className="ml-2" style={{ color: "var(--text-tertiary)" }}>
                  {(() => { const [y, m, d] = booking.date.split("-").map(Number); return new Date(y, m-1, d).toLocaleDateString("th-TH", { day: "numeric", month: "long" }); })()}
                </span>
              )}
            </div>
          </div>
          <button onClick={onClose} className="p-1.5" style={{ color: "var(--text-tertiary)" }}><IconX size={15} /></button>
        </div>

        <div className="overflow-y-auto flex-1 px-6 py-5 space-y-4">
          <FormRow label="หัวข้อการสอน *">
            <input autoFocus className={inputCls} style={inputSty}
              value={title} onChange={e => setTitle(e.target.value)}
              placeholder="เช่น ฝึกเพลงมะลิซ้อน, ซ้อม backswing" />
          </FormRow>

          {/* Topics multi-select */}
          <div>
            <div className="flex items-baseline justify-between mb-2">
              <div className="label-eyebrow">หัวข้อที่สอน (เลือกได้หลายอัน)</div>
              {selectedTopics.length > 0 && (
                <div className="text-[10px]" style={{ color: "var(--accent-bronze)" }}>
                  เลือก {selectedTopics.length} หัวข้อ
                </div>
              )}
            </div>

            {/* Selected chips */}
            {selectedTopics.length > 0 && (
              <div className="flex flex-wrap gap-1.5 mb-2.5 p-2.5"
                style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)" }}>
                {selectedTopics.map((t, i) => (
                  <span key={i} className="text-[11px] px-2.5 py-1 flex items-center gap-1.5 font-medium"
                    style={{ background: "#1A1A17", color: "#C4A878" }}>
                    {t}
                    <button onClick={() => toggleTopic(t)} style={{ opacity: 0.7, fontSize: 11 }}>✕</button>
                  </span>
                ))}
              </div>
            )}

            {/* Master topic chips */}
            {masterTopics.length > 0 ? (
              <div className="mb-2.5">
                <div className="text-[10px] mb-1.5 flex items-center gap-1.5" style={{ color: "var(--text-tertiary)" }}>
                  💡 หัวข้อที่สอนในหมวด <span className="font-medium" style={{ color: "var(--text-secondary)" }}>{currentCatName}</span>
                </div>
                <div className="flex flex-wrap gap-1.5 p-2.5"
                  style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)", maxHeight: 140, overflowY: "auto" }}>
                  {masterTopics.filter(t => !selectedTopics.includes(t)).map((t, i) => (
                    <button key={i} onClick={() => toggleTopic(t)}
                      className="text-[11px] px-2.5 py-1 transition-all hover:opacity-80"
                      style={{ background: "var(--bg-surface)", color: "var(--text-primary)", border: "0.5px solid var(--border-default)" }}>
                      + {t}
                    </button>
                  ))}
                  {masterTopics.filter(t => !selectedTopics.includes(t)).length === 0 && (
                    <div className="text-[11px] italic" style={{ color: "var(--text-tertiary)" }}>
                      เลือกครบแล้ว — ใช้ input ด้านล่างเพิ่มหัวข้อเอง
                    </div>
                  )}
                </div>
              </div>
            ) : (
              <div className="px-3 py-2.5 mb-2.5 text-[11px]"
                style={{ background: "var(--info-soft)", color: "var(--info)", borderLeft: "2px solid var(--info)" }}>
                ℹ ยังไม่มีหัวข้อใน master สำหรับหมวด "{currentCatName}" — เพิ่มได้ที่ Settings → หัวข้อที่สอน หรือพิมพ์เพิ่มเองด้านล่าง
              </div>
            )}

            {/* Custom topic input */}
            <div className="flex gap-2">
              <input type="text" value={customTopic}
                onChange={e => setCustomTopic(e.target.value)}
                onKeyDown={e => e.key === "Enter" && (e.preventDefault(), addCustom())}
                placeholder="เพิ่มหัวข้อเอง (กด Enter)"
                className="flex-1 text-[12px] px-3 py-2"
                style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", outline: "none" }} />
              <button onClick={addCustom}
                disabled={!customTopic.trim()}
                className="text-[11px] px-3 py-2 font-medium"
                style={{
                  background: customTopic.trim() ? "var(--accent-bronze)" : "var(--bg-muted)",
                  color: customTopic.trim() ? "#fff" : "var(--text-tertiary)",
                }}>
                + เพิ่ม
              </button>
            </div>
            {masterTopics.length === 0 && (
              <div className="text-[10px] mt-1.5" style={{ color: "var(--text-tertiary)" }}>
                💡 ตั้งค่า master หัวข้อที่สอนได้ใน Settings → หัวข้อที่สอน
              </div>
            )}
          </div>

// ============ BOOKING MODAL ============
function BookingModal({ ctx, onClose, onNavigate }) {
  const { students, courses, classes, setClasses, enrollments, settings } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const allLvls = settings?.levels || DEFAULT_SETTINGS.levels;
  const activeLocs = (settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active);
  const defaultLocation = activeLocs[0]?.name || "บ้านนักเรียน";

  const [step, setStep] = useState(1); // 1=นักเรียน, 2=คอร์ส/รายละเอียด, 3=สำเร็จ
  const [selectedStudentId, setSelectedStudentId] = useState(students[0]?.id || "");
  const [selectedCourseId, setSelectedCourseId] = useState("");
  const [date, setDate] = useState(todayISO());
  const [startTime, setStartTime] = useState("09:00");
  const [duration, setDuration] = useState(60);
  const [location, setLocation] = useState(defaultLocation);
  const [note, setNote] = useState("");

  const selectedStudent = students.find(s => s.id === selectedStudentId);
  const selectedCourse = courses.find(c => c.id === selectedCourseId);

  // Active enrollments of selected student
  const studentEnrollments = (enrollments || []).filter(e => e.studentId === selectedStudentId && e.status === "active");

  // When student changes, pre-fill course from their active enrollment
  useEffect(() => {
    if (studentEnrollments.length > 0 && !selectedCourseId) {
      setSelectedCourseId(studentEnrollments[0].courseId);
    }
  }, [selectedStudentId]);

  // When course changes, pre-fill duration and location
  useEffect(() => {
    if (selectedCourse) {
      setDuration(selectedCourse.duration || 60);
      setLocation(selectedCourse.location || "บ้าน");
    } else if (selectedStudent) {
      setLocation(selectedStudent.address || "บ้าน");
      setDuration(Math.round((selectedStudent.rate / (selectedStudent.rate / 60)) * 60 / 60) || 60);
    }
  }, [selectedCourseId, selectedStudentId]);

  const price = selectedCourse
    ? (selectedCourse.pricingMode === "total-hours" ? (selectedCourse.pricePerHour || 0) * (duration / 60) : selectedCourse.price || 0)
    : Math.round((selectedStudent?.rate || 500) * (duration / 60));

  const confirm = () => {
    const newClass = {
      id: `c${Date.now()}`,
      studentId: selectedStudentId,
      courseId: selectedCourseId || undefined,
      date,
      startTime,
      duration: Number(duration),
      location,
      status: "scheduled",
      price: Math.round(price),
      note,
    };
    setClasses(prev => [...prev, newClass]);
    setStep(3);
  };

  const catOfStudent = allCats.find(c => c.id === (selectedStudent?.categoryId || selectedStudent?.category))
    || CATEGORIES[selectedStudent?.category] || CATEGORIES.other;

  if (step === 3) {
    return (
      <>
        <ModalHeader title="จองเรียนสำเร็จ" onClose={onClose} />
        <div className="p-8 flex flex-col items-center gap-5 text-center">
          <div className="w-16 h-16 flex items-center justify-center" style={{ background: "var(--success-soft)" }}>
            <IconCheckCircle size={32} style={{ color: "var(--success)" }} />
          </div>
          <div>
            <div className="heading-serif text-[22px] mb-1">จองเรียนแล้ว!</div>
            <div className="text-[13px]" style={{ color: "var(--text-secondary)" }}>{selectedStudent?.name}</div>
            {selectedCourse && <div className="text-[12px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>{selectedCourse.name}</div>}
            <div className="text-[12px] mt-2 font-medium">{formatDate(date)} · {startTime} · {duration} นาที</div>
          </div>
          <div className="grid grid-cols-2 gap-3 w-full">
            <div className="p-3 text-left" style={{ background: "var(--bg-muted)" }}>
              <div className="label-eyebrow mb-1" style={{ fontSize: 9 }}>สถานที่</div>
              <div className="text-[13px] font-medium">{location}</div>
            </div>
            <div className="p-3 text-left" style={{ background: "var(--bg-muted)" }}>
              <div className="label-eyebrow mb-1" style={{ fontSize: 9 }}>ราคา</div>
              <div className="num-display text-[18px]">{formatBaht(Math.round(price))}</div>
            </div>
          </div>
          <div className="flex gap-3 w-full">
            <button onClick={onClose}
              className="flex-1 text-[13px] py-3 font-medium transition-colors"
              style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
              ปิด
            </button>
            <button onClick={() => onNavigate("schedule")}
              className="flex-1 text-[13px] py-3 font-medium transition-all hover:opacity-90 flex items-center justify-center gap-2"
              style={{ background: "#1A1A17", color: "#C4A878" }}>
              <IconCal size={14} /> ดูตารางสอน
            </button>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <ModalHeader title="จองเรียน" onClose={onClose} />

      {/* Steps indicator */}
      <div className="px-6 py-3 flex items-center gap-2" style={{ background: "var(--bg-muted)", borderBottom: "0.5px solid var(--border-soft)" }}>
        {["เลือกนักเรียน", "รายละเอียด"].map((s, i) => (
          <div key={i} className="flex items-center gap-2">
            <div className="flex items-center gap-1.5">
              <div className="w-5 h-5 flex items-center justify-center text-[10px] font-medium"
                style={{ background: step > i + 1 ? "var(--success)" : step === i + 1 ? "#1A1A17" : "var(--bg-subtle)", color: step >= i + 1 ? "#fff" : "var(--text-tertiary)" }}>
                {step > i + 1 ? "✓" : i + 1}
              </div>
              <span className="text-[11px]" style={{ color: step === i + 1 ? "var(--text-primary)" : "var(--text-tertiary)", fontWeight: step === i + 1 ? 500 : 400 }}>{s}</span>
            </div>
            {i < 1 && <div className="w-8 h-px mx-1" style={{ background: step > 1 ? "var(--success)" : "var(--border-default)" }} />}
          </div>
        ))}
      </div>

      <div className="flex-1 overflow-y-auto p-6 space-y-4">

        {step === 1 && (
          <>
