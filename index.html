<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ClassesCo — ระบบครูสอนพิเศษ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    /* Luxury editorial palette — Aesop / Frette / Le Labo inspired (Soft Premium) */
    --bg-primary: #F5F1E8;          /* warmer paper */
    --bg-surface: #FAF7F0;          /* elevated surface, warmer */
    --bg-muted: #ECE7DB;            /* warm beige, slightly warmer */
    --bg-subtle: #E0DBCE;           /* deeper warm */
    --bg-dark: #1A1A17;             /* near-black warm */
    --bg-dark-soft: #262622;

    --text-primary: #2A2724;        /* softened from pure near-black */
    --text-secondary: #5C5A52;      /* warm gray */
    --text-tertiary: #8F8C81;       /* light warm */
    --text-quaternary: #B8B6AB;     /* very subtle */
    --text-on-dark: #E8E4D6;
    --text-muted-on-dark: rgba(232,228,214,0.52);

    --border-hairline: rgba(42,39,36,0.04);
    --border-soft: rgba(42,39,36,0.07);
    --border-default: rgba(42,39,36,0.10);
    --border-strong: rgba(42,39,36,0.16);

    /* Refined accents — bronze and muted sage green */
    --accent-bronze: #8B6F47;       /* deep bronze gold */
    --accent-bronze-soft: #D4C3A3;
    --accent-bronze-ivory: #EBE4D2;
    --accent-sage: #5A7A5C;         /* muted sage (was deep forest #2F5D3E) */
    --accent-sage-deep: #3F5D45;    /* deeper sage for active states */
    --accent-sage-soft: #DBE3DC;
    --accent-sage-hover: #EBF1EC;   /* even lighter green for hover */
    --accent-ink: #2D4234;          /* softened forest ink */

    /* Semantic — deeply muted, green-shifted */
    --success: #5A7A5C;
    --success-soft: #DCE5DB;
    --warning: #A47D48;
    --warning-soft: #EDE1CE;
    --danger: #9B4A3D;
    --danger-soft: #EAD3CD;
    --info: #6B7A8F;
    --info-soft: #DCE0E7;

    /* Refined shadows - barely visible but present */
    --shadow-hairline: 0 1px 0 rgba(42,39,36,0.03);
    --shadow-soft: 0 1px 2px rgba(42,39,36,0.02), 0 2px 6px rgba(42,39,36,0.03);
    --shadow-card: 0 1px 3px rgba(42,39,36,0.03), 0 12px 32px rgba(42,39,36,0.04);
    --shadow-elevated: 0 4px 12px rgba(42,39,36,0.05), 0 32px 64px rgba(42,39,36,0.06);

    /* Soft transition curve */
    --ease-soft: cubic-bezier(0.32, 0.72, 0, 1);
  }

  [data-theme="dark"] {
    --bg-primary: #141412;
    --bg-surface: #1E1E1B;
    --bg-muted: #26251F;
    --bg-subtle: #2F2E27;
    --bg-dark: #0A0A09;
    --bg-dark-soft: #1A1A17;

    --text-primary: #F0EDE4;
    --text-secondary: #B5B3A8;
    --text-tertiary: #8A887E;
    --text-quaternary: #57554E;
    --text-on-dark: #F0EDE4;
    --text-muted-on-dark: rgba(240,237,228,0.52);

    --border-hairline: rgba(240,237,228,0.05);
    --border-soft: rgba(240,237,228,0.08);
    --border-default: rgba(240,237,228,0.14);
    --border-strong: rgba(240,237,228,0.22);

    --accent-bronze: #C4A878;
    --accent-bronze-soft: #5C4A2D;
    --accent-bronze-ivory: #2D2416;
    --accent-sage: #7FB28A;
    --accent-sage-soft: #2E4032;
    --accent-sage-hover: rgba(127,178,138,0.12);
    --accent-ink: #F0EDE4;

    --success: #8FAE7F;
    --success-soft: rgba(95,122,82,0.18);
    --warning: #D4A06F;
    --warning-soft: rgba(164,125,72,0.18);
    --danger: #D17869;
    --danger-soft: rgba(155,74,61,0.18);
    --info: #8699B3;
    --info-soft: rgba(90,107,130,0.18);

    --shadow-hairline: 0 1px 0 rgba(0,0,0,0.3);
    --shadow-soft: 0 1px 2px rgba(0,0,0,0.2), 0 1px 3px rgba(0,0,0,0.25);
    --shadow-card: 0 2px 4px rgba(0,0,0,0.25), 0 8px 24px rgba(0,0,0,0.3);
    --shadow-elevated: 0 8px 20px rgba(0,0,0,0.4), 0 24px 48px rgba(0,0,0,0.45);
  }

  body, html {
    margin: 0;
    padding: 0;
    font-family: "Prompt", system-ui, -apple-system, sans-serif;
    font-weight: 400;
    background: var(--bg-primary);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
    font-size: 14px;
  }
  * { box-sizing: border-box; }

  .font-serif { font-family: "Prompt", sans-serif; font-style: italic; font-weight: 500; }
  .font-mono { font-family: "JetBrains Mono", "SF Mono", monospace; font-feature-settings: "liga" 0; }

  /* Display numbers — use Prompt with heavier weight */
  .num-display {
    font-family: "Prompt", sans-serif;
    font-weight: 500;
    font-variant-numeric: lining-nums tabular-nums;
    letter-spacing: -0.02em;
  }

  /* Editorial text labels */
  .label-eyebrow {
    font-family: "Prompt", sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;  /* Soft premium: wider letter-spacing */
    text-transform: uppercase;
    color: var(--text-tertiary);
  }

  /* Soft premium card hover - no shadow at rest, soft lift on hover */
  .soft-card {
    transition: all 350ms var(--ease-soft);
  }
  .soft-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-soft);
  }

  /* Soft fade-in animation */
  .soft-fade-in {
    animation: softFadeIn 600ms var(--ease-soft) both;
  }
  @keyframes softFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Login shell — full screen with soft premium feel */
  .login-shell {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    position: relative;
    overflow: hidden;
  }
  @media (max-width: 640px) {
    .login-shell { padding: 24px 16px; }
  }

  /* iOS Safari auto-zooms inputs with font-size < 16px on focus.
     Use very high specificity to beat Tailwind arbitrary classes.
     Apply to ALL screen widths to prevent zoom on iPad too. */
  html body input,
  html body select,
  html body textarea {
    font-size: 16px !important;
  }
  /* Restore intentionally small text inside specific inline-styled inputs
     for desktop only — but on touch devices keep 16px to prevent zoom */
  @media (hover: hover) and (pointer: fine) {
    /* Desktop only — allow inline font-size styles */
    html body input[style*="font-size"],
    html body select[style*="font-size"],
    html body textarea[style*="font-size"] {
      font-size: inherit !important;
    }
  }

  /* Decorative ornament divider — for soft premium sections */
  .ornament-divider {
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--text-tertiary);
    font-style: italic;
    font-family: var(--font-serif, 'Prompt', sans-serif);
    font-size: 12px;
  }
  .ornament-divider::before,
  .ornament-divider::after {
    content: "";
    flex: 1;
    height: 0.5px;
    background: var(--border-default);
  }

  /* Soft button — premium feel */
  .btn-soft-premium {
    background: var(--bg-dark);
    color: var(--accent-bronze);
    padding: 14px 28px;
    font-size: 11px;
    letter-spacing: 0.18em;
    font-weight: 500;
    transition: all 300ms var(--ease-soft);
    cursor: pointer;
    border: none;
    text-transform: uppercase;
  }
  .btn-soft-premium:hover {
    background: var(--bg-dark-soft);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(42,39,36,0.12);
  }
  .btn-soft-premium:active {
    transform: translateY(0);
  }

  /* Filter pill — shared across all pages */
  .filter-pill {
    font-family: "Prompt", sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 7px 14px;
    background: var(--bg-surface);
    color: var(--text-secondary);
    border: 0.5px solid var(--border-default);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 6px;
    line-height: 1.3;
  }
  .filter-pill:hover {
    color: var(--text-primary);
    border-color: var(--border-strong);
  }
  .filter-pill.active {
    background: #1A1A17;
    color: #C4A878;
    border-color: #1A1A17;
    box-shadow: 0 2px 8px rgba(26,26,23,0.18);
    font-weight: 600;
  }
  .filter-pill .pill-count {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 99px;
    background: var(--bg-muted);
    color: var(--text-tertiary);
    font-weight: 500;
  }
  .filter-pill.active .pill-count {
    background: rgba(196,168,120,0.22);
    color: #C4A878;
  }

  /* ============ RESPONSIVE ============ */

  /* Mobile drawer for sidebar */
  .sidebar-drawer {
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Mobile menu button — hide on desktop */
  .mobile-menu-btn { display: none; }
  .sidebar-overlay { display: none; }

  /* === TABLET: 768px - 1024px === */
  @media (max-width: 1024px) {
    .sidebar-tablet {
      width: 220px !important;
    }
  }

  /* === MOBILE: under 768px === */
  /* Mobile-only visibility utility */
  .show-mobile-block { display: none; }

  @media (max-width: 768px) {
    /* Sidebar becomes drawer */
    .sidebar-drawer {
      position: fixed !important;
      top: 0;
      left: 0;
      height: 100vh;
      width: 280px !important;
      z-index: 100;
      transform: translateX(-100%);
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }
    .sidebar-drawer.open {
      transform: translateX(0);
    }

    /* Overlay when drawer open */
    .sidebar-overlay {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* Mobile menu button */
    .mobile-menu-btn {
      display: flex !important;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--bg-surface);
      border: 0.5px solid var(--border-default);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Reduce paddings */
    .responsive-page-pad { padding: 16px !important; }
    .responsive-page-pad-sm { padding: 12px !important; }

    /* Dashboard mobile — tighter vertical spacing */
    .dashboard-page { padding: 16px !important; }
    .dashboard-page > * + * { margin-top: 18px !important; }
    .dashboard-greeting { font-size: 18px !important; }

    /* Stack grids on mobile */
    .grid-cols-2-resp { grid-template-columns: 1fr !important; }
    .grid-cols-3-resp { grid-template-columns: 1fr !important; }
    .grid-cols-4-resp { grid-template-columns: 1fr 1fr !important; }
    /* Students grid — 2 col on mobile */
    .students-grid-resp { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
    .student-card-resp img,
    .student-card-resp > div > div > div:first-child { width: 56px !important; height: 56px !important; }
    .student-card-resp .grid-cols-3 {
      grid-template-columns: 1fr 1fr 1fr !important;
      gap: 4px !important;
    }
    .student-card-resp .grid-cols-3 > div {
      padding-left: 0 !important;
      border-left: none !important;
    }

    /* Stat cards — 2 columns on tablet, 1 column on phone */
    .stat-grid-resp { grid-template-columns: 1fr 1fr !important; gap: 1px !important; }

    /* Courses & generic 2-col grids — stack on mobile */
    .grid-cols-2 { grid-template-columns: 1fr !important; }

    /* Tables — make horizontally scrollable */
    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll > div {
      min-width: 720px;
    }
    /* Payments page — instead of horizontal scroll, hide some columns */
    .payments-table > div { min-width: 0 !important; }

    /* Hide certain columns on mobile */
    .hide-mobile { display: none !important; }
    .hide-mobile-block { display: none !important; }
    .show-mobile-block { display: block !important; }

    /* Compact filters */
    .filter-pill {
      font-size: 10px !important;
      padding: 6px 10px !important;
    }

    /* Modal full-screen on mobile */
    .modal-mobile-full {
      max-width: 100% !important;
      max-height: 100vh !important;
      border-radius: 0 !important;
      margin: 0 !important;
    }

    /* TopBar adjustments */
    .topbar-mobile { padding: 12px 16px !important; }
    .topbar-title-mobile { font-size: 18px !important; }
    .topbar-search-mobile { display: none !important; }

    /* Reduce font sizes */
    .num-display-mobile { font-size: 26px !important; }
    .heading-serif-mobile { font-size: 18px !important; }

    /* Tab buttons wrap on mobile */
    .tab-pills-resp {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex-wrap: nowrap !important;
    }
    .tab-pills-resp::-webkit-scrollbar { display: none; }
    .tab-pills-resp button {
      flex-shrink: 0;
      font-size: 11px !important;
      padding: 6px 12px !important;
    }

    /* Hero stats responsive — ensure no overflow */
    .stat-grid-resp > div {
      min-width: 0 !important;
      overflow: hidden;
      padding: 18px 20px !important;
      border-left: none !important;
      border-bottom: 0.5px solid var(--border-soft) !important;
      text-align: center;
    }
    .stat-grid-resp > div:last-child {
      border-bottom: none !important;
    }
    .stat-grid-resp > div .label-eyebrow {
      margin-bottom: 8px !important;
      text-align: center;
    }
    .stat-grid-resp > div .num-display {
      text-align: center;
    }
    .stat-grid-resp > div > div:last-child {
      justify-content: center !important;
    }
    .num-display {
      font-size: 26px !important;
    }

    /* Enrollment cards — stack content */
    .enrollment-card-resp {
      padding: 12px !important;
    }
    .enrollment-card-resp .grid-cols-3 {
      grid-template-columns: 1fr 1fr !important;
      gap: 8px !important;
    }

    /* Modal forms — compact spacing */
    .modal-mobile-full .p-5 { padding: 16px !important; }
    .modal-mobile-full .p-6 { padding: 16px !important; }
    .modal-mobile-full .p-7 { padding: 16px !important; }
    .modal-mobile-full .px-7 { padding-left: 16px !important; padding-right: 16px !important; }

    /* StudentForm — stack 2-col layout on mobile */
    .student-form-grid-resp {
      grid-template-columns: 1fr !important;
    }
    .student-form-left-resp {
      max-height: 60vh !important;
    }

    /* Form rows — compact */
    .form-row-resp .grid-cols-2 {
      grid-template-columns: 1fr !important;
    }

    /* Action button bars — wrap */
    .action-bar-resp {
      flex-wrap: wrap;
      gap: 4px !important;
    }
    .action-bar-resp button {
      font-size: 10px !important;
      padding: 4px 8px !important;
    }

    /* Course/enrollment content area */
    .content-flex-resp {
      flex-direction: column !important;
      gap: 8px !important;
    }

    /* Booking page — stack form above list on mobile */
    .booking-layout-resp {
      flex-direction: column !important;
      height: auto !important;
    }
    .booking-form-resp {
      width: 100% !important;
      max-height: none !important;
      border-right: none !important;
      border-bottom: 0.5px solid var(--border-soft) !important;
    }
    .booking-form-resp .px-7 { padding-left: 16px !important; padding-right: 16px !important; }
    .booking-form-resp .pt-7 { padding-top: 16px !important; }
    .booking-form-resp .pb-5 { padding-bottom: 14px !important; }
    .booking-form-resp .py-5 { padding-top: 14px !important; padding-bottom: 14px !important; }

    /* Heading sizes — generous reduction on mobile */
    .heading-serif.text-\[26px\] { font-size: 18px !important; }
    .heading-serif.text-\[24px\] { font-size: 18px !important; }
    .heading-serif.text-\[22px\] { font-size: 17px !important; }
    .heading-serif.text-\[20px\] { font-size: 16px !important; }
    .heading-serif.text-\[18px\] { font-size: 15px !important; }

    /* Page section spacing */
    .space-y-10 > * + * { margin-top: 20px !important; }
    .space-y-8 > * + * { margin-top: 16px !important; }
    .space-y-6 > * + * { margin-top: 14px !important; }
    .space-y-5 > * + * { margin-top: 14px !important; }

    /* Padding on inner content */
    .p-12 { padding: 16px !important; }
    .p-10 { padding: 16px !important; }
    .p-8 { padding: 14px !important; }
    .px-7 { padding-left: 14px !important; padding-right: 14px !important; }
    .py-7 { padding-top: 14px !important; padding-bottom: 14px !important; }

    /* All modal cancel/save bars at bottom — reduce padding */
    .px-6 { padding-left: 16px !important; padding-right: 16px !important; }
  }

  @media (max-width: 600px) {
    .grid-cols-4-resp { grid-template-columns: 1fr !important; }
    .stat-grid-resp { grid-template-columns: 1fr !important; }
    .students-grid-resp { grid-template-columns: 1fr !important; }
    .num-display { font-size: 22px !important; }
    .topbar-title-mobile { font-size: 16px !important; }
    /* Even more compact filters on small phones */
    .filter-pill {
      font-size: 9px !important;
      padding: 5px 8px !important;
    }
  }

  /* === iPad / Tablet (768px - 1024px) === */
  @media (min-width: 768px) and (max-width: 1024px) {
    .sidebar-tablet { width: 200px !important; }
    .responsive-page-pad { padding: 24px !important; }
    .num-display { font-size: 28px !important; }
    /* Tablet 2-col stat layout for some pages */
    .stat-grid-resp { grid-template-columns: 1fr 1fr !important; }
  }

  /* Editorial headings */
  .heading-serif {
    font-family: "Prompt", sans-serif;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .animate-pulse { animation: pulse 2.8s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
  .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }

  input, select, textarea {
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    color: var(--text-primary);
  }
  input::placeholder, textarea::placeholder { color: var(--text-quaternary); }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent-sage) !important;
    outline: none;
    box-shadow: 0 0 0 3px rgba(47,93,62,0.12);
  }
  button {
    font-family: inherit;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  button:active { transform: scale(0.985); }

  /* Global sage-green hover for sidebar items, cards, pills */
  .hover-sage:hover {
    background: var(--accent-sage-hover) !important;
    color: var(--accent-sage) !important;
    border-color: var(--accent-sage) !important;
  }
  /* Subtle green border on hover for frames */
  .frame-hover {
    transition: border-color 0.2s, background 0.2s;
  }
  .frame-hover:hover {
    border-color: var(--accent-sage) !important;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(15,31,24,0.08); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(15,31,24,0.15); background-clip: padding-box; }

  /* Divider accents */
  .divider-ornament {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .divider-ornament::before, .divider-ornament::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border-default);
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
window.classescoExportPDF = function(courses, enrollments, allCats, allLvls, activeEnrollments) {
  var now = new Date().toLocaleDateString("th-TH", { day: "numeric", month: "long", year: "numeric" });

  function getCat(c) {
    return allCats.find(function(a) { return a.id === (c.categoryId || c.category); }) ||
           { name: c.category || "อื่นๆ", color: "#888", bg: "#f5f5f5", text: "#333" };
  }
  function getLvl(c) {

// ============ IMAGE PROCESSING ============
// Resize image and convert to WebP for storage efficiency.
// Returns Promise<{ dataUrl, blob, sizeKB }>
// Used for student photos, slips, receipts.
//
// Smart compression: if result > targetKB, retry with lower quality (down to 0.5).
//
// Future: replace `dataUrl` save with Supabase Storage upload — keep `blob` for upload.
const processImage = (file, options = {}) => {
  const {
    maxWidth = 800,
    maxHeight = 800,
    quality = 0.75, // initial WebP quality
    targetKB = null, // if set, retry with lower quality until under target
    type = "image/webp",
  } = options;

  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        // Calculate new dimensions while preserving aspect ratio
        let w = img.width, h = img.height;
        if (w > maxWidth || h > maxHeight) {
          const ratio = Math.min(maxWidth / w, maxHeight / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }

        // Draw to canvas
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img, 0, 0, w, h);

        // Try compression with progressively lower quality if needed
        const tryCompress = (q) => {
          canvas.toBlob((blob) => {
            if (!blob) { reject(new Error("Failed to convert image")); return; }
            const sizeKB = Math.round(blob.size / 1024);

            // If targetKB set and we're over → retry with lower quality
            if (targetKB && sizeKB > targetKB && q > 0.5) {
              tryCompress(Math.max(0.5, q - 0.1));
              return;
            }

            // Convert blob to dataUrl for current localStorage backend
            const reader2 = new FileReader();
            reader2.onload = (ev) => resolve({
              dataUrl: ev.target.result,
              blob: blob,
              sizeKB,
              width: w,
              height: h,
              quality: q,
            });
            reader2.onerror = reject;
            reader2.readAsDataURL(blob);
          }, type, q);
        };

        tryCompress(quality);
      };
      img.onerror = () => reject(new Error("Failed to load image"));
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
};

// ============ DATA CONVERTERS (camelCase ↔ snake_case) ============
const toCamel = (s) => s.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
const toSnake = (s) => s.replace(/[A-Z]/g, (c) => "_" + c.toLowerCase());

const camelize = (obj) => {
  if (Array.isArray(obj)) return obj.map(camelize);
  if (obj === null || typeof obj !== "object" || obj instanceof Date) return obj;
  return Object.fromEntries(
    Object.entries(obj).map(([k, v]) => [toCamel(k), camelize(v)])
  );
};

const snakeize = (obj) => {
  if (Array.isArray(obj)) return obj.map(snakeize);
  if (obj === null || typeof obj !== "object" || obj instanceof Date) return obj;
  return Object.fromEntries(
    Object.entries(obj).map(([k, v]) => [toSnake(k), snakeize(v)])
  );
};

    let query = sb.from(tableName).select("*").eq("org_id", orgId);
    if (SOFT_DELETE_TABLES.has(tableName)) {
      query = query.is("deleted_at", null);
    }
    query = query.order("created_at", { ascending: false });
    const { data, error } = await query;
    if (error) {
      console.error(`[supaFetchAll] ${tableName}:`, error);
      return null;
    }
    if (!data) return [];
    // Camelize + reverse field mapping
    return data.map(row => {
      const camel = camelize(row);
      // Map schema fields back to frontend names
      if (tableName === "students" && camel.photoUrl) camel.photo = camel.photoUrl;
      if (tableName === "payments" && camel.slipUrl) camel.slipUrl = camel.slipUrl;
      return camel;
    });
  } catch (err) {
    console.error(`[supaFetchAll] ${tableName}:`, err);
    return null;
  }
};

// Upsert array of rows to a table
const supaUpsertAll = async (tableName, rows, orgId) => {
  if (!sb || !orgId || !rows || rows.length === 0) return;
  try {
    const snakeRows = rows.map(r => ({ ...snakeize(r), org_id: orgId }));
    const { error } = await sb.from(tableName).upsert(snakeRows, { onConflict: "id" });
    if (error) console.error(`[supaUpsertAll] ${tableName}:`, error);
  } catch (err) {
    console.error(`[supaUpsertAll] ${tableName}:`, err);
  }
};

// Compute diff between two arrays (by id) — returns inserts/updates/deletes
const computeArrayDiff = (oldArr, newArr) => {
  const oldMap = new Map((oldArr || []).map(x => [x.id, x]));
  const newMap = new Map((newArr || []).map(x => [x.id, x]));
  const upserts = [];
  const deletes = [];
  // upserts = items in new that differ from old (or are new)
  for (const [id, item] of newMap) {
    const oldItem = oldMap.get(id);
    if (!oldItem || JSON.stringify(oldItem) !== JSON.stringify(item)) {
      upserts.push(item);
    }
  }
  // deletes = items in old but not in new
  for (const id of oldMap.keys()) {
    if (!newMap.has(id)) deletes.push(id);
  }
  return { upserts, deletes };
};

// Global sync status (consumed by TopBar)
let _syncListeners = [];
const _syncState = { state: "offline", lastError: null, lastSyncAt: null, log: [] };
const onSyncStatusChange = (cb) => { _syncListeners.push(cb); return () => { _syncListeners = _syncListeners.filter(x => x !== cb); }; };
const setSyncState = (patch) => {
  Object.assign(_syncState, patch);
  if (patch.message) {
    _syncState.log.unshift({ time: new Date(), text: patch.message });
    if (_syncState.log.length > 30) _syncState.log = _syncState.log.slice(0, 30);
  }
  _syncListeners.forEach(cb => cb({ ..._syncState }));
};

// Sync changes to Supabase (called when state changes)
const supaSync = async (tableName, oldArr, newArr, orgId) => {
  if (!sb || !orgId) return;
  const { upserts, deletes } = computeArrayDiff(oldArr, newArr);
  console.log(`[supaSync] ${tableName}: ${upserts.length} upserts, ${deletes.length} deletes`,
    { oldLen: oldArr?.length, newLen: newArr?.length });
  if (upserts.length === 0 && deletes.length === 0) return;

  setSyncState({ state: "syncing", message: `Syncing ${tableName}...` });

  try {
    if (upserts.length > 0) {
      // Skip rows with non-UUID ids (legacy seed data with ids like "s1", "cr1")
      const validUpserts = upserts.filter(r => r.id && isUUID(r.id));
      const skipped = upserts.length - validUpserts.length;
      if (validUpserts.length === 0) {
        console.warn(`[supaSync] ${tableName}: all ${upserts.length} rows have non-UUID ids — skipped`,
          upserts.map(r => r.id));
        setSyncState({ state: "synced", message: `⚠ Skipped ${upserts.length} legacy rows in ${tableName}` });
        return;
      }
      if (skipped > 0) {
        console.warn(`[supaSync] ${tableName}: skipped ${skipped} non-UUID rows`);
      }
      const snakeRows = validUpserts.map(r => {
        const snaked = { ...snakeize(r), org_id: orgId };
        return filterForSchema(snaked, tableName);
      });
      console.log(`[supaSync] ${tableName} payload:`, JSON.stringify(snakeRows, null, 2));
      const { data, error } = await sb.from(tableName).upsert(snakeRows, { onConflict: "id" }).select();
      if (error) {
        console.error(`[supaSync] ${tableName} upsert FAILED:`, JSON.stringify(error, null, 2));
        setSyncState({ state: "error", lastError: `${tableName}: ${error.message} | ${error.details || ''} | ${error.hint || ''}`, message: `❌ ${tableName}: ${error.message}` });
        return;
      }
      console.log(`[supaSync] ${tableName} upsert OK:`, data);
      setSyncState({ state: "synced", lastSyncAt: new Date(), message: `✓ ${tableName}: ${validUpserts.length} rows saved` });
    }
    if (deletes.length > 0) {
      const validDeletes = deletes.filter(id => isUUID(id));
      if (validDeletes.length === 0) {
        console.log(`[supaSync] ${tableName}: ${deletes.length} legacy deletes ignored`);
        return;
      }
      console.log(`[supaSync] ${tableName} deleting:`, validDeletes);
      let error;
      if (SOFT_DELETE_TABLES.has(tableName)) {
        // Soft delete (set deleted_at)
        const res = await sb.from(tableName)
          .update({ deleted_at: new Date().toISOString() })
          .in("id", validDeletes);
        error = res.error;
      } else {
        // Hard delete (no deleted_at column)
        const res = await sb.from(tableName).delete().in("id", validDeletes);
        error = res.error;
      }
      if (error) {
        console.error(`[supaSync] ${tableName} delete FAILED:`, error);
        setSyncState({ state: "error", lastError: `delete ${tableName}: ${error.message}`, message: `❌ delete ${tableName}: ${error.message}` });
        return;
      }
      setSyncState({ state: "synced", lastSyncAt: new Date(), message: `✓ deleted ${validDeletes.length} from ${tableName}` });
    }
  } catch (err) {
    console.error(`[supaSync] ${tableName} EXCEPTION:`, err);
    setSyncState({ state: "error", lastError: err.message, message: `❌ ${tableName}: ${err.message}` });
  }
};

// UUID v4 generator
const newId = () => {
  if (window.crypto?.randomUUID) return window.crypto.randomUUID();
  // Fallback
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
};

// Check if ID is a valid UUID
const isUUID = (id) => /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(id);

// Filter row to only allowed fields for a table
const filterForSchema = (row, tableName) => {
  const allowed = SCHEMA_FIELDS[tableName];
  if (!allowed) return row;
  // Map legacy field names to schema names BEFORE filter
  if (tableName === "students") {
    if (row.photo && !row.photo_url) row.photo_url = row.photo;
    if (row.photo_path === undefined) row.photo_path = null;
  }
  if (tableName === "payments") {
    if (row.slip_url === undefined && row.slipUrl) row.slip_url = row.slipUrl;
  }
  // Date/numeric fields that don't accept empty strings
  const DATE_FIELDS = ["start_date", "enrolled_date", "payment_date", "class_date", "note_date", "requested_date", "responded_at", "trial_ends_at", "subscription_starts_at", "subscription_ends_at", "locked_at"];
  const NUMERIC_FIELDS = ["age", "default_rate", "rate", "price", "duration", "total_hours", "price_per_hour", "max_students", "max_teachers", "max_students_count", "total_sessions", "completed_sessions", "total_price", "paid_amount", "amount", "total_amount", "duration_minutes", "sort_order"];
  // FK fields that must be valid UUID or null
  const UUID_FIELDS = ["category_id", "level_id", "default_location_id", "course_id", "student_id", "enrollment_id", "teacher_id", "group_class_id", "user_id", "parent_payment_id", "class_id", "group_id", "approved_class_id", "responded_by", "group_note_id"];
  const out = {};
  for (const key of allowed) {
    let v = row[key];
    if (v === undefined) continue;
    if (v === "") {
      if (DATE_FIELDS.includes(key) || NUMERIC_FIELDS.includes(key) || UUID_FIELDS.includes(key)) {
        v = null;
      }
    }
    // FK UUID fields — null if not valid UUID
    if (UUID_FIELDS.includes(key) && v !== null && !isUUID(v)) {
      console.warn(`[filterForSchema] ${tableName}.${key}: dropping non-UUID value:`, v);
      v = null;
    }
    out[key] = v;
  }
  return out;
};

// ============ EASYSLIP API ============
// Verify Thai bank transfer slip via EasySlip API v2
// Docs: https://document.easyslip.com/en/v2/
// Plan-gated: studio = 0, studio-plus = 50, academy = 200, academy-plus = ∞
const EASYSLIP_API_KEY = "00a03403-b4d3-4bea-8b81-67ee82fdd3cc";

const verifySlipWithEasySlip = async (blob, apiKey) => {
  const key = apiKey || EASYSLIP_API_KEY;
  if (!key) {
    return { success: false, error: "ไม่มี EasySlip API Key" };
  }
  try {
    const formData = new FormData();
    formData.append("file", blob, "slip.jpg");
    const res = await fetch("https://api.easyslip.com/v2/verify/bank/image", {
      method: "POST",
      headers: { "Authorization": `Bearer ${key}` },
      body: formData,

    const data = await res.json();
    if (!data.success) {
      return { success: false, error: data?.error?.message || "ตรวจสอบสลิปไม่สำเร็จ" };
    }
    return { success: true, data: data.data };
  } catch (err) {
    return { success: false, error: `เครือข่ายผิดพลาด: ${err.message}` };
  }
};

// ============ STORAGE ABSTRACTION ============
// Image upload — Supabase Storage (with localStorage fallback)
// Returns: { url, path } — path is for delete later
//
// Usage:
//   const { url, path } = await uploadImage(blob, 'photos', orgId, `student_${id}.webp`)
//   await deleteImage('photos', path)
const uploadImage = async (blob, bucket, orgId, filename) => {
  // Use Supabase Storage if available
  if (sb && orgId) {
    try {
      const path = `${orgId}/${filename}`;
      const { error: uploadError } = await sb.storage
        .from(bucket)
        .upload(path, blob, {
          contentType: blob.type || "image/webp",
          upsert: true,
        });
      if (uploadError) {
        console.error(`[uploadImage] ${bucket} upload failed:`, uploadError);
        throw uploadError;
      }
      // Private bucket → use signed URL (1 year)
      const { data: signedData, error: signError } = await sb.storage
        .from(bucket)
        .createSignedUrl(path, 60 * 60 * 24 * 365);
      if (signError) throw signError;
      return { url: signedData.signedUrl, path };
    } catch (err) {
      console.warn("[uploadImage] Supabase failed, falling back to base64:", err);
      // Fall through to base64 fallback
    }
  }

  // Fallback: base64 dataURL (localStorage)
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => resolve({ url: ev.target.result, path: null });
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
};

// Delete image from Storage
const deleteImage = async (bucket, path) => {
  if (!sb || !path) return;
  try {
    const { error } = await sb.storage.from(bucket).remove([path]);
    if (error) console.error(`[deleteImage] ${bucket}:`, error);
  } catch (err) {
    console.error("[deleteImage]", err);
  }
};

// Refresh signed URL if expired (call before display if URL > 1 year old)
const refreshSignedUrl = async (bucket, path) => {
  if (!sb || !path) return null;
  try {
    const { data } = await sb.storage.from(bucket).createSignedUrl(path, 60 * 60 * 24 * 365);
    return data?.signedUrl || null;
  } catch (err) {
    return null;
  }
};

// Single source of truth: orgStatus.plan (from DB) > settings.plan (cache)
// Pass session to read DB-authoritative plan
const getPlan = (settingsOrSession) => {
  // Accept either: settings, session, or { plan } directly
  const planId = settingsOrSession?.orgStatus?.plan  // session.orgStatus.plan (preferred)
              || settingsOrSession?.plan              // settings.plan or {plan}
              || "studio";
  return PLANS[planId] || PLANS["studio"];
};

// ============ PLAN ENFORCEMENT ============
// Check if action is allowed under current plan
const canAddStudent = (settings, currentCount) => {
  const max = getPlan(settings).maxStudents;
  return max === Infinity || currentCount < max;
};
const canAddTeacher = (settings, currentCount) => {
  const max = getPlan(settings).maxTeachers;
  return max === Infinity || currentCount < max;
};
const studentsRemaining = (settings, currentCount) => {
  const max = getPlan(settings).maxStudents;
  return max === Infinity ? Infinity : Math.max(0, max - currentCount);
};
const teachersRemaining = (settings, currentCount) => {
  const max = getPlan(settings).maxTeachers;
  return max === Infinity ? Infinity : Math.max(0, max - currentCount);
};
const hasFeature = (settings, feature) => {
  const plan = getPlan(settings);
  if (feature === "studentPortal") return plan.studentPortal;
  return false;
};

const load = (key, fallback) => {
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch { return fallback; }
};
const save = (key, data) => {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
};

const formatBaht = (n) => "฿" + Number(n).toLocaleString("th-TH");
const formatDate = (iso) => new Date(iso).toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "2-digit" });

// ============ MAIN ============
function App() {
  const [session, setSession] = useState(() => load(KEYS.AUTH, null));

  // On mount: try to restore Supabase session in background — but don't block UI
  useEffect(() => {
    if (!sb) return;
    let cancelled = false;
    (async () => {
      try {
        const { data: { session: supaSession } } = await sb.auth.getSession();
        if (cancelled) return;

        if (supaSession) {
          // Supabase session active — try to fetch profile
          try {
            const userCtx = await fetchUserContext();
            if (cancelled) return;
            if (userCtx?.profile) {
              const newSession = {
                role: userCtx.profile.role || "teacher",
                userId: supaSession.user.id,
                orgId: userCtx.profile.orgId,
                name: userCtx.profile.name,
                orgStatus: userCtx.orgStatus || null,
              };
              setSession(newSession);
              save(KEYS.AUTH, newSession);
            }
          } catch (err) {
            console.warn("Profile fetch failed (using local session):", err);
            // Don't break — keep current session
          }
        }
      } catch (err) {
        console.warn("Session restore failed:", err);
      }
    })();

    // Listen for sign out from another tab
    const { data: authListener } = sb.auth.onAuthStateChange((event) => {
      if (cancelled) return;
      if (event === "SIGNED_OUT") {
        setSession(null);
        save(KEYS.AUTH, null);
      }
    });

    return () => {
      cancelled = true;
      authListener?.subscription?.unsubscribe();
    };
  }, []);

  const login = (s) => { setSession(s); save(KEYS.AUTH, s); };
  const logout = async () => {
    if (sb) {
      try { await supaSignOut(); } catch (e) { console.warn(e); }
    }
    setSession(null);
    save(KEYS.AUTH, null);
  };

  if (!session) {
    return <LoginPage onLogin={login} />;
  }
  if (session.role === "student") {
    return <StudentPortal studentId={session.studentId} onLogout={logout} />;
  }
  return <TeacherApp onSwitchToStudent={logout} onLogout={logout} session={session} />;
}

// ============ LOGIN PAGE ============
function LoginPage({ onLogin }) {
  const [tab, setTab] = useState("teacher"); // teacher | student | register
  const [errMsg, setErrMsg] = useState("");

  // Teacher login state — load remembered email
  const [tEmail, setTEmail] = useState(() => {
    try { return localStorage.getItem("cc:rememberedEmail") || ""; } catch { return ""; }
  });
  const [tPass, setTPass] = useState("");
  const [rememberMe, setRememberMe] = useState(() => {
    try { return localStorage.getItem("cc:rememberedEmail") ? true : false; } catch { return false; }
  });

  // Student login state
  const [sUser, setSUser] = useState("");
  const [sPass, setSPass] = useState("");

  // Register state
  const [reg, setReg] = useState({ name: "", school: "", email: "", phone: "", pass: "", passConfirm: "" });
  const [regDone, setRegDone] = useState(false);

  const settings = load(KEYS.SETTINGS, DEFAULT_SETTINGS);
  const teacherCred = settings?.teacherAuth; // { email, password, name, school, phone }
  const students = load(KEYS.STUDENTS, SEED_STUDENTS);

  const handleTeacherLogin = async () => {
    if (!tEmail || !tPass) return setErrMsg("กรุณากรอกอีเมลและรหัสผ่าน");

    // Admin backdoor — for development only (remove in production)
    if (tEmail.toLowerCase() === "admin" && tPass === "1234") {
      onLogin({ role: "teacher" });
      return;
    }

    // Supabase auth (preferred path)
    if (sb) {
      try {
        setErrMsg("กำลังเข้าสู่ระบบ...");
        console.log("[login] attempting Supabase login:", tEmail);
        const result = await supaSignIn({ email: tEmail, password: tPass });
        console.log("[login] Supabase login OK, user_id:", result.user.id);
        // Fetch user context (org status, profile)
        const ctx = await fetchUserContext();
        console.log("[login] fetchUserContext result:", ctx);
        if (!ctx?.profile) {
          setErrMsg("Login OK แต่ไม่พบ profile — ดู console (F12)");
          console.error("[login] Profile missing! Check Supabase RLS policies.");
          return;
        }
        // Save or clear remembered email
        try {
          if (rememberMe) localStorage.setItem("cc:rememberedEmail", tEmail);
          else localStorage.removeItem("cc:rememberedEmail");
        } catch {}
        onLogin({
          role: ctx.profile.role || "teacher",
          userId: result.user.id,
          email: result.user.email,
          orgId: ctx.profile.orgId,
          name: ctx.profile.name,
          orgStatus: ctx.orgStatus,
        });
        setErrMsg("");
        return;
      } catch (err) {
        console.error("[login] error:", err);
        setErrMsg("Error: " + (err.message || "ไม่ทราบ"));
        setTimeout(() => setErrMsg(""), 5000);
        return;
      }
    }

    // Fallback: localStorage (legacy mode)
    if (!teacherCred) {
      setErrMsg("ยังไม่มีบัญชีในระบบ — กรุณาสมัครสมาชิกก่อน หรือใช้ admin/1234");
      return;
    }
    if (teacherCred.email.toLowerCase() === tEmail.toLowerCase() && teacherCred.password === tPass) {
      onLogin({ role: "teacher" });
    } else {
      setErrMsg("อีเมลหรือรหัสผ่านไม่ถูกต้อง");
      setTimeout(() => setErrMsg(""), 3000);
    }
  };

  const handleStudentLogin = () => {
    if (!sUser || !sPass) return setErrMsg("กรุณากรอกชื่อผู้ใช้และรหัสผ่าน");
    const found = students.find(s => s.active && (s.username || "").toLowerCase() === sUser.toLowerCase() && s.password === sPass);
    if (found) {
      onLogin({ role: "student", studentId: found.id });
    } else {
      setErrMsg("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง — ติดต่อคุณครูเพื่อขอรหัส");
      setTimeout(() => setErrMsg(""), 3500);
    }
  };

  const handleRegister = async () => {
    if (!reg.name) return setErrMsg("กรุณากรอกชื่อ");
    if (!reg.email.includes("@")) return setErrMsg("กรุณากรอกอีเมลให้ถูกต้อง");
    if (reg.pass.length < 6) return setErrMsg("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร");
    if (reg.pass !== reg.passConfirm) return setErrMsg("รหัสผ่านไม่ตรงกัน");

    // Supabase signup (preferred path)
    if (sb) {

function UpgradePlanModal({ currentPlan, orgId, onClose, onSelectPlan }) {
  const planList = Object.values(PLANS);
  const [showQR, setShowQR] = useState(null); // plan being purchased
  const [uploading, setUploading] = useState(false);
  const [uploadResult, setUploadResult] = useState(null); // { success, message, slipAmt? }

  // Handle slip upload — verify + auto-activate if matches
  const handleUploadSlip = async (e) => {
    const file = e.target.files[0];
    if (!file || !showQR) return;
    setUploading(true);
    setUploadResult(null);
    try {
      // Compress
      const result = await processImage(file, { maxWidth: 1000, maxHeight: 1400, quality: 0.75, targetKB: 50 });
      
      // Upload to Storage
      let slipUrl = result.dataUrl;
      if (sb && orgId) {
        try {
          const filename = `payment_${showQR.id}_${newId()}.webp`;
          const { url } = await uploadImage(result.blob, "slips", orgId, filename);
          slipUrl = url;
        } catch (e) { /* continue with base64 */ }
      }

      // Verify with EasySlip
      const verify = await verifySlipWithEasySlip(result.blob);
      
      // Create subscription_history record (regardless of verify result)
      let subscriptionId = null;
      if (sb && orgId) {
        try {
          const { data, error } = await sb.from("subscription_history").insert({
            org_id: orgId,
            from_plan: currentPlan,
            to_plan: showQR.id,
            amount: showQR.price,
            slip_url: slipUrl,
            slip_verified: verify.success,
            slip_amount: verify.data?.amount?.amount || null,
            status: "pending",
          }).select().single();
          if (!error && data) subscriptionId = data.id;
        } catch (e) {
          console.warn("[upgrade] failed to log subscription:", e);
        }
      }

      if (!verify.success) {
        setUploadResult({
          success: false,
          message: `❌ ตรวจสอบสลิปไม่สำเร็จ: ${verify.error}\n\nทีมงานจะตรวจสอบด้วยตัวเอง — จะเปิดใช้งานภายใน 24 ชม.`,
        });
        return;
      }

      // Verify amount matches
      const slipAmt = verify.data?.amount?.amount || 0;
      if (Math.abs(slipAmt - showQR.price) > 0.01) {
        setUploadResult({
          success: false,
          message: `⚠ ยอดในสลิปไม่ตรง\nสลิปแสดง: ฿${slipAmt}\nคาดหวัง: ฿${showQR.price}\n\nกรุณาติดต่อทีมงานเพื่อตรวจสอบ`,
          slipAmt,
        });
        return;
      }

      // ✅ Verified! Activate subscription
      const activation = await activateSubscription(orgId, showQR.id, subscriptionId, 30);
      if (!activation.success) {
        setUploadResult({
          success: false,
          message: `❌ เปิดใช้งานล้มเหลว: ${activation.error}\n\nกรุณาติดต่อทีมงาน — สลิปได้รับการตรวจสอบแล้ว`,
        });
        return;
      }

      setUploadResult({
        success: true,
        message: `🎉 เปิดใช้งาน ${showQR.name} เรียบร้อย!\nมีผลทันทีจนถึง ${new Date(Date.now() + 30 * 86400000).toLocaleDateString("th-TH")}`,
      });
      // Notify parent (will refresh state)
      setTimeout(() => onSelectPlan(showQR.id), 2000);
    } catch (err) {
      setUploadResult({ success: false, message: `❌ เกิดข้อผิดพลาด: ${err.message}` });
    } finally {
      setUploading(false);
    }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in"
      style={{ background: "rgba(15,31,24,0.6)", backdropFilter: "blur(6px)" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="w-full slide-up overflow-y-auto"
        style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", maxWidth: 980, maxHeight: "90vh" }}>
        <div className="p-6 sm:p-8 border-b" style={{ borderColor: "var(--border-soft)" }}>
          <div className="flex items-start justify-between">
            <div>
              <div className="label-eyebrow mb-1">PRICING</div>
              <div className="heading-serif text-[24px]">เลือกแพ็คเกจที่เหมาะกับคุณ</div>
              <div className="text-[12px] mt-1" style={{ color: "var(--text-tertiary)" }}>
                ปัจจุบันใช้ <span style={{ color: PLANS[currentPlan]?.color }}>●</span> {PLANS[currentPlan]?.name || "—"}
              </div>
            </div>
            <button onClick={onClose} style={{ color: "var(--text-tertiary)" }}>✕</button>
          </div>
        </div>

        {!showQR ? (
        <>
        <div className="p-6 sm:p-8 grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))" }}>
          {planList.map(plan => {
            const isCurrent = plan.id === currentPlan;
            return (
              <div key={plan.id}
                className="relative p-5 transition-all"
                style={{
                  background: isCurrent ? "var(--bg-muted)" : "transparent",

                }}>
                {plan.recommended && (

                    style={{ background: "#1A1A17", color: "#C4A878", letterSpacing: "0.08em" }}>
                    POPULAR

    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in"

        className="w-full max-w-md slide-up"

        <div className="p-6 border-b" style={{ borderColor: "var(--border-soft)" }}>

                width: 8, height: 8, borderRadius: "50%",
                background: !sb ? "var(--text-quaternary)"

                <div>User ID: <span className="font-mono text-[10px]">{session.userId?.slice(0,8) || "—"}...</span></div>
                <div>Org ID: <span className="font-mono text-[10px]">{orgId?.slice(0,8) || "—"}...</span></div>
              </div>
            </div>
          )}

          {/* Last sync */}
          <div>
            <div className="label-eyebrow mb-2">LAST SYNC</div>
            <div className="text-[12px]" style={{ color: "var(--text-secondary)" }}>
              {status.lastSyncAt ? fmt(status.lastSyncAt) : "ยังไม่ sync"}
            </div>
            {status.lastError && (
              <div className="text-[11px] mt-2 p-2" style={{ background: "rgba(155,74,61,0.1)", color: "var(--danger)", border: "0.5px solid var(--danger)" }}>
                {status.lastError}
              </div>
            )}
          </div>

          {/* Sync log */}
          {status.log && status.log.length > 0 && (
            <div>
              <div className="label-eyebrow mb-2">RECENT LOG (last 30)</div>
              <div className="text-[10px] font-mono space-y-0.5 max-h-40 overflow-y-auto p-2"
                style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)", color: "var(--text-secondary)" }}>
                {status.log.map((entry, i) => (
                  <div key={i} className="flex gap-2">
                    <span style={{ color: "var(--text-quaternary)" }}>{fmt(entry.time)}</span>
                    <span>{entry.text}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Force sync */}
          {sb && orgId && (
            <button onClick={onForceSync}
              className="w-full py-3 text-[12px] font-medium transition-all hover:opacity-90"
              style={{ background: "#1A1A17", color: "#C4A878", letterSpacing: "0.05em" }}>
              FORCE SYNC ALL DATA →
            </button>
          )}

          <div className="text-[10px] text-center" style={{ color: "var(--text-quaternary)" }}>
            Open browser console (F12) for detailed logs
          </div>
        </div>
      </div>
    </div>
  );
}

function TeacherApp({ onSwitchToStudent, onLogout, session }) {
  const [tab, setTab] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // Init from localStorage cache (instant render)
  const [students, setStudents] = useState(() => load(KEYS.STUDENTS, SEED_STUDENTS));
  const [classes, setClasses] = useState(() => load(KEYS.CLASSES, SEED_CLASSES));
  const [payments, setPayments] = useState(() => load(KEYS.PAYMENTS, SEED_PAYMENTS));
  const [notes, setNotes] = useState(() => load(KEYS.NOTES, SEED_NOTES));
  const [courses, setCourses] = useState(() => load(KEYS.COURSES, SEED_COURSES));
  const [enrollments, setEnrollments] = useState(() => load(KEYS.ENROLLMENTS, SEED_ENROLLMENTS));
  const [settings, setSettings] = useState(() => load(KEYS.SETTINGS, DEFAULT_SETTINGS));
  const [bookingRequests, setBookingRequests] = useState(() => load(KEYS.BOOKING_REQUESTS, []));
  const [prefs, setPrefs] = useState(() => load(KEYS.PREFS, DEFAULT_PREFS));
  const [modal, setModal] = useState(null);
  const [supaLoading, setSupaLoading] = useState(false);
  const [syncStatus, setSyncStatus] = useState({ state: sb ? "synced" : "offline", lastError: null, log: [] });
  const [showSyncModal, setShowSyncModal] = useState(false);
  const [showUpgradeModal, setShowUpgradeModal] = useState(false);

  // Subscribe to global sync state changes
  useEffect(() => {
    if (!sb) return;
    const unsubscribe = onSyncStatusChange(setSyncStatus);
    return unsubscribe;
  }, []);

  const orgId = session?.orgId;
  const prevDataRef = useRef({});

  // === SUPABASE FETCH on mount ===
  useEffect(() => {
    if (!sb || !orgId) {
      console.log("[TeacherApp] No Supabase or orgId — using localStorage only");
      return;
    }
    let cancelled = false;
    setSupaLoading(true);
    console.log("[TeacherApp] Fetching data from Supabase for org:", orgId);
    setSyncState({ state: "syncing", message: "Loading from Supabase..." });

    (async () => {
      try {
        // Fetch all transaction tables in parallel
        const [
          studentsData,
          classesData,
          paymentsData,
          notesData,
          coursesData,
          enrollmentsData,
          requestsData,
        ] = await Promise.all([
          supaFetchAll("students", orgId),
          supaFetchAll("classes", orgId),
          supaFetchAll("payments", orgId),
          supaFetchAll("lesson_notes", orgId),
          supaFetchAll("courses", orgId),
          supaFetchAll("enrollments", orgId),
          supaFetchAll("booking_requests", orgId),
        ]);

        if (cancelled) return;

        // Replace local state with Supabase data
        const _students = studentsData !== null ? studentsData : students;
        const _classes = classesData !== null ? classesData : classes;
        const _payments = paymentsData !== null ? paymentsData : payments;
        const _notes = notesData !== null ? notesData : notes;
        const _courses = coursesData !== null ? coursesData : courses;
        const _enrollments = enrollmentsData !== null ? enrollmentsData : enrollments;
        const _requests = requestsData !== null ? requestsData : bookingRequests;

        if (studentsData !== null) { setStudents(_students); save(KEYS.STUDENTS, _students); }
        if (classesData !== null) { setClasses(_classes); save(KEYS.CLASSES, _classes); }
        if (paymentsData !== null) { setPayments(_payments); save(KEYS.PAYMENTS, _payments); }
        if (notesData !== null) { setNotes(_notes); save(KEYS.NOTES, _notes); }
        if (coursesData !== null) { setCourses(_courses); save(KEYS.COURSES, _courses); }
        if (enrollmentsData !== null) { setEnrollments(_enrollments); save(KEYS.ENROLLMENTS, _enrollments); }
        if (requestsData !== null) { setBookingRequests(_requests); save(KEYS.BOOKING_REQUESTS, _requests); }

        // Fetch master data (categories, levels, topics, locations, teachers) → settings
        const [cats, lvls, tps, locs, tchs] = await Promise.all([
          supaFetchAll("categories", orgId),
          supaFetchAll("levels", orgId),
          supaFetchAll("topics", orgId),
          supaFetchAll("locations", orgId),
          supaFetchAll("teachers", orgId),
        ]);

        if (cancelled) return;

        const _cats = cats || settings.categories;
        const _lvls = lvls || settings.levels;
        const _tps = tps || settings.topics;
        const _locs = locs || settings.locations;
        const _tchs = tchs || settings.teachers;

        // Reconstruct nested structures from flat tables
        // levelsByCategory: { catId: [{id,name,desc,active}, ...] }
        const _lvlsByCat = {};
        for (const lvl of _lvls) {
          const catKey = lvl.categoryId || "_global";
          if (!_lvlsByCat[catKey]) _lvlsByCat[catKey] = [];
          _lvlsByCat[catKey].push({
            id: lvl.id,
            name: lvl.name,
            desc: lvl.desc || "",
            active: lvl.active !== false,
            sortOrder: lvl.sortOrder || 0,
          });
        }
        // Sort by sortOrder within each category
        for (const k in _lvlsByCat) {
          _lvlsByCat[k].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
        }

        // topics: { catId: ["topic1", "topic2", ...] } — flat strings per category
        const _topicsByCat = {};
        for (const tp of _tps) {
          const catKey = tp.categoryId;
          if (!catKey) continue;
          if (!_topicsByCat[catKey]) _topicsByCat[catKey] = [];
          _topicsByCat[catKey].push(tp.name);
        }

        const newSettings = {
          ...settings,
          // Plan is server-authoritative — always overwrite from session.orgStatus
          plan: session?.orgStatus?.plan || settings.plan || "studio",
          categories: _cats,
          levels: _lvls,
          levelsByCategory: Object.keys(_lvlsByCat).length > 0 ? _lvlsByCat : settings.levelsByCategory,
          topics: Object.keys(_topicsByCat).length > 0 ? _topicsByCat : settings.topics,
          locations: _locs,
          teachers: _tchs,
        };
        setSettings(newSettings);
        save(KEYS.SETTINGS, newSettings);

        // Pre-populate prevDataRef with FETCHED data so sync compares correctly
        prevDataRef.current = {
          students: _students,
          classes: _classes,
          payments: _payments,
          notes: _notes,
          courses: _courses,
          enrollments: _enrollments,
          bookingRequests: _requests,
          cats: _cats, lvls: _lvls, tps: _tps, locs: _locs, tchs: _tchs,
          lvlsByCat: newSettings.levelsByCategory, topicsByCat: newSettings.topics,
          initialized: true,
        };

        console.log("[TeacherApp] Supabase data loaded successfully");
        setSyncState({ state: "synced", lastSyncAt: new Date(), message: "✓ Loaded from Supabase" });
      } catch (err) {
        console.error("[TeacherApp] Supabase fetch failed:", err);
        setSyncState({ state: "error", lastError: err.message, message: `❌ Load failed: ${err.message}` });
      } finally {
        if (!cancelled) setSupaLoading(false);
      }
    })();

    return () => { cancelled = true; };
  }, [orgId]);

  // === REAL-TIME SUBSCRIPTIONS — multi-device sync ===
  useEffect(() => {
    if (!sb || !orgId) return;

    // Helper: handle realtime payload for a table → update local state + prevRef
    // Updating prevRef prevents the sync effect from re-uploading what we just received
    const handleRealtime = (key, setter, payload) => {
      const { eventType, new: newRow, old: oldRow } = payload;
      if (eventType === "INSERT" && newRow) {
        const camel = camelize(newRow);
        setter(prev => {
          if (prev.some(x => x.id === camel.id)) return prev;
          const next = [camel, ...prev];
          if (prevDataRef.current.initialized) prevDataRef.current[key] = next;
          return next;
        });
      } else if (eventType === "UPDATE" && newRow) {
        const camel = camelize(newRow);
        if (camel.deletedAt) {
          setter(prev => {
            const next = prev.filter(x => x.id !== camel.id);
            if (prevDataRef.current.initialized) prevDataRef.current[key] = next;
            return next;
          });
        } else {
          setter(prev => {
            const next = prev.map(x => x.id === camel.id ? camel : x);
            if (prevDataRef.current.initialized) prevDataRef.current[key] = next;
            return next;
          });
        }
      } else if (eventType === "DELETE" && oldRow) {
        setter(prev => {
          const next = prev.filter(x => x.id !== oldRow.id);
          if (prevDataRef.current.initialized) prevDataRef.current[key] = next;
          return next;
        });
      }
    };

    const channel = sb
      .channel(`org-${orgId}`)
      .on("postgres_changes",
        { event: "*", schema: "public", table: "students", filter: `org_id=eq.${orgId}` },
        (p) => handleRealtime("students", setStudents, p))
      .on("postgres_changes",
        { event: "*", schema: "public", table: "classes", filter: `org_id=eq.${orgId}` },
        (p) => handleRealtime("classes", setClasses, p))
      .on("postgres_changes",
        { event: "*", schema: "public", table: "payments", filter: `org_id=eq.${orgId}` },
        (p) => handleRealtime("payments", setPayments, p))
      .on("postgres_changes",
        { event: "*", schema: "public", table: "lesson_notes", filter: `org_id=eq.${orgId}` },
        (p) => handleRealtime("notes", setNotes, p))
      .on("postgres_changes",
        { event: "*", schema: "public", table: "courses", filter: `org_id=eq.${orgId}` },
        (p) => handleRealtime("courses", setCourses, p))
      .on("postgres_changes",
        { event: "*", schema: "public", table: "enrollments", filter: `org_id=eq.${orgId}` },
        (p) => handleRealtime("enrollments", setEnrollments, p))
      .on("postgres_changes",
        { event: "*", schema: "public", table: "booking_requests", filter: `org_id=eq.${orgId}` },
        (p) => handleRealtime("bookingRequests", setBookingRequests, p))
      .subscribe((status) => {
        if (status === "SUBSCRIBED") console.log("[realtime] connected");
      });

    return () => { sb.removeChannel(channel); };
  }, [orgId]);

  // === Save to localStorage (cache) — same as before ===
  useEffect(() => save(KEYS.STUDENTS, students), [students]);
  useEffect(() => save(KEYS.CLASSES, classes), [classes]);
  useEffect(() => save(KEYS.PAYMENTS, payments), [payments]);
  useEffect(() => save(KEYS.NOTES, notes), [notes]);
  useEffect(() => save(KEYS.COURSES, courses), [courses]);
  useEffect(() => save(KEYS.ENROLLMENTS, enrollments), [enrollments]);
  useEffect(() => save(KEYS.SETTINGS, settings), [settings]);
  useEffect(() => save(KEYS.BOOKING_REQUESTS, bookingRequests), [bookingRequests]);
  useEffect(() => {
    save(KEYS.PREFS, prefs);
    document.documentElement.setAttribute("data-theme", prefs.theme);
  }, [prefs]);

  // === Sync changes to Supabase (only after fetch completed) ===
  useEffect(() => {
    // Skip if Supabase not ready or still loading initial data
    if (!sb || !orgId || supaLoading) return;
    // Skip if prevDataRef not initialized yet (fetch hasn't completed)
    if (!prevDataRef.current.initialized) return;

    // Sync each table that changed (compare reference)
    const prev = prevDataRef.current;
    if (prev.students !== students) supaSync("students", prev.students, students, orgId);
    if (prev.classes !== classes) supaSync("classes", prev.classes, classes, orgId);
    if (prev.payments !== payments) supaSync("payments", prev.payments, payments, orgId);
    if (prev.notes !== notes) supaSync("lesson_notes", prev.notes, notes, orgId);
    if (prev.courses !== courses) supaSync("courses", prev.courses, courses, orgId);
    if (prev.enrollments !== enrollments) supaSync("enrollments", prev.enrollments, enrollments, orgId);
    if (prev.bookingRequests !== bookingRequests) supaSync("booking_requests", prev.bookingRequests, bookingRequests, orgId);

    // Master data — sync if changed
    if (prev.cats !== settings.categories) supaSync("categories", prev.cats, settings.categories, orgId);
    if (prev.lvls !== settings.levels) supaSync("levels", prev.lvls, settings.levels, orgId);
    if (prev.locs !== settings.locations) supaSync("locations", prev.locs, settings.locations, orgId);
    if (prev.tchs !== settings.teachers) supaSync("teachers", prev.tchs, settings.teachers, orgId);

    // levelsByCategory — flatten to flat rows with category_id
    if (prev.lvlsByCat !== settings.levelsByCategory && settings.levelsByCategory) {
      const flatLevels = [];
      for (const catId in settings.levelsByCategory) {
        if (catId === "_global") continue;
        for (const lvl of settings.levelsByCategory[catId]) {
          flatLevels.push({
            id: lvl.id, name: lvl.name, categoryId: catId,
            sortOrder: lvl.sortOrder || 0, active: lvl.active !== false,
          });
        }
      }
      // Flatten prev as well
      const flatPrev = [];
      if (prev.lvlsByCat) {
        for (const catId in prev.lvlsByCat) {
          if (catId === "_global") continue;
          for (const lvl of prev.lvlsByCat[catId]) {
            flatPrev.push({
              id: lvl.id, name: lvl.name, categoryId: catId,
              sortOrder: lvl.sortOrder || 0, active: lvl.active !== false,
            });
          }
        }
      }
      supaSync("levels", flatPrev, flatLevels, orgId);
    }

    // topics — convert object {catId: [name1, name2]} → flat rows
    if (prev.topicsByCat !== settings.topics && settings.topics) {
      const flatTopics = [];
      for (const catId in settings.topics) {
        const topicList = settings.topics[catId];
        if (!Array.isArray(topicList)) continue;
        for (const t of topicList) {
          // string → object with stable id from category+name
          const name = typeof t === "string" ? t : t.name;
          const id = typeof t === "string" ? null : t.id;
          flatTopics.push({
            id: id && isUUID(id) ? id : newId(),
            name, categoryId: catId, active: true,
          });
        }
      }
      const flatPrev = [];
      if (prev.topicsByCat) {
        for (const catId in prev.topicsByCat) {
          const topicList = prev.topicsByCat[catId];
          if (!Array.isArray(topicList)) continue;
          for (const t of topicList) {
            const name = typeof t === "string" ? t : t.name;
            const id = typeof t === "string" ? null : t.id;
            flatPrev.push({
              id: id || `${catId}_${name}`,
              name, categoryId: catId, active: true,
            });
          }
        }
      }
      // Skip if no UUID-able rows (legacy seed only)
      if (flatTopics.some(t => isUUID(t.id))) {
        supaSync("topics", flatPrev, flatTopics, orgId);
      }
    }

    prevDataRef.current = {
      students, classes, payments, notes, courses, enrollments, bookingRequests,
      cats: settings.categories, lvls: settings.levels, tps: settings.topics,
      locs: settings.locations, tchs: settings.teachers,
      lvlsByCat: settings.levelsByCategory, topicsByCat: settings.topics,
      initialized: true,
    };
  }, [students, classes, payments, notes, courses, enrollments, bookingRequests, settings, orgId, supaLoading]);

  const t = (key) => I18N[prefs.lang]?.[key] || I18N.th[key] || key;
  const teacherName = session?.name || (settings?.teachers || DEFAULT_SETTINGS.teachers || [])[0]?.name || "ครู";

  const ctx = { students, setStudents, classes, setClasses, payments, setPayments, notes, setNotes, courses, setCourses, enrollments, setEnrollments, settings, setSettings, bookingRequests, setBookingRequests, prefs, setPrefs, t, teacherName, setModal, session, orgId };

  const pendingReqCount = bookingRequests.filter(r => r.status === "pending").length;

  const navItems = [
    { id: "dashboard", label: t("dashboard"), icon: IconHome },
    { id: "booking", label: t("booking"), icon: IconCalPlus },
    { id: "requests", label: t("requests"), icon: IconSend, badge: pendingReqCount > 0 ? pendingReqCount : null, badgeAlert: true },
    { id: "courses", label: t("courses"), icon: IconLayers, badge: courses.filter(c => c.active).length },
    { id: "schedule", label: t("schedule"), icon: IconCal },
    { id: "students", label: t("students"), icon: IconUsers, badge: students.filter(s => s.active).length },
    { id: "payments", label: t("payments"), icon: IconWallet, badge: payments.filter(p => p.status !== "paid").length },
    { id: "notes", label: t("notes"), icon: IconBook },
    { id: "analytics", label: t("analytics"), icon: IconTrend },

  const settingNavItems = [
    { id: "settings", label: t("settings"), icon: IconSettings },
