          payment={receiveModal}
          student={students.find(s => s.id === receiveModal.studentId)}
          onClose={() => setReceiveModal(null)}
          onConfirm={(paidAmt, isDeposit, slipUrl) => {
            const total = receiveModal.totalAmount || receiveModal.amount;
            const alreadyPaid = receiveModal.paidAmount || 0;
            const newTotalPaid = alreadyPaid + paidAmt;
            const newStatus = newTotalPaid >= total ? "paid" : newTotalPaid > 0 ? "partial" : "pending";
            const realParentId = receiveModal._realParentId || receiveModal.id;

            setPayments(prev => {
              // อัปเดต parent record — paidAmount รวม + status
              const updated = prev.map(p => p.id === realParentId ? {
                ...p,
                paidAmount: newTotalPaid,
                totalAmount: total,
                status: newStatus,
              } : p);
              // เพิ่ม _txRecord ใหม่สำหรับการรับเงินครั้งนี้
              if (paidAmt > 0) {
                updated.push({
                  id: newId(),
                  studentId: receiveModal.studentId,
                  amount: paidAmt,
                  totalAmount: total,
                  paidAmount: paidAmt,
                  date: todayISO(),
                  status: "paid",
                  note: receiveModal._groupNote || receiveModal.note || "",
                  slipUrl: slipUrl || "",
                  _txRecord: true,
                  _parentId: realParentId,
                });
              }
              return updated;
            });
            setReceiveModal(null);
          }}
        />
      )}
    </div>
  );
}

// ============ RECEIVE PAYMENT MODAL ============
function ReceivePaymentModal({ payment, student, onClose, onConfirm }) {
  const total = payment.totalAmount || payment.amount;
  const alreadyPaid = payment.paidAmount || 0;
  const remaining = Math.max(0, total - alreadyPaid);

  const [mode, setMode] = useState("full"); // 'full' | 'deposit' | 'custom'
  const [customAmt, setCustomAmt] = useState(remaining);
  const [slipPreview, setSlipPreview] = useState(null);
  const [slipUrl, setSlipUrl] = useState("");

  const depositAmt = Math.round(remaining * 0.5);
  const paidAmt = mode === "full" ? remaining : mode === "deposit" ? depositAmt : Number(customAmt) || 0;

  const handleSlip = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const result = await processImage(file, { maxWidth: 1000, maxHeight: 1400, quality: 0.75, targetKB: 50 });
      // Show preview immediately
      setSlipPreview(result.dataUrl);
      setSlipUrl(result.dataUrl);
      // Upload to Storage in background
      const orgId = payment.orgId || payment.org_id;
      if (sb && orgId) {
        try {
          const filename = `slip_${newId()}.webp`;
          const { url } = await uploadImage(result.blob, "slips", orgId, filename);
          setSlipUrl(url);
        } catch (err) {
          console.warn("[slip] Storage upload failed, using base64:", err);
        }
      }
    } catch (err) {
      console.error("Slip processing failed:", err);
      alert("ไม่สามารถประมวลผลรูปได้ — ลองรูปอื่น");
    }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-3 sm:p-4 fade-in"
      style={{ background: "rgba(15,31,24,0.5)", backdropFilter: "blur(4px)" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="w-full max-w-md flex flex-col"
        style={{ background: "var(--bg-surface)", boxShadow: "var(--shadow-elevated)", border: "0.5px solid var(--border-soft)", maxHeight: "92vh" }}>

        <div className="flex justify-between items-center px-6 py-5 flex-shrink-0" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
          <div>
            <div className="label-eyebrow mb-1">รับชำระเงิน</div>
            <div className="heading-serif text-[20px]">{student?.name}</div>
          </div>
          <button onClick={onClose} className="p-1.5" style={{ color: "var(--text-tertiary)" }}><IconX size={15} /></button>
        </div>

        <div className="px-6 py-5 space-y-5 overflow-y-auto flex-1">

          {/* Summary */}
          <div className="grid grid-cols-3 grid-cols-3-resp gap-3">
            {[
              { label: "ยอดเต็ม", val: formatBaht(total), color: "var(--text-primary)" },
              { label: "จ่ายแล้ว", val: formatBaht(alreadyPaid), color: "var(--success)" },
              { label: "ยอดคงเหลือ", val: formatBaht(remaining), color: "var(--danger)" },
            ].map((item, i) => (
              <div key={i} className="p-3 text-center" style={{ background: "var(--bg-muted)" }}>
                <div className="label-eyebrow mb-1" style={{ fontSize: 9 }}>{item.label}</div>
                <div className="num-display text-[16px]" style={{ color: item.color }}>{item.val}</div>
              </div>
            ))}
          </div>

          {/* Mode selector */}
          <div>
            <div className="label-eyebrow mb-2.5">รูปแบบการรับเงิน</div>
            <div className="space-y-2">
              {[
                { id: "full", icon: "💳", label: "รับเต็มจำนวน", desc: formatBaht(remaining) },
                { id: "deposit", icon: "🤝", label: "รับมัดจำ 50%", desc: formatBaht(depositAmt) },
                { id: "custom", icon: "✏️", label: "กำหนดเอง", desc: "ระบุจำนวน" },
              ].map(opt => (
                <button key={opt.id} onClick={() => setMode(opt.id)}
                  className="w-full flex items-center gap-3 px-4 py-3 text-left transition-all"
                  style={{
                    border: mode === opt.id ? "2px solid var(--accent-bronze)" : "0.5px solid var(--border-soft)",
                    background: mode === opt.id ? "var(--accent-bronze-ivory)" : "var(--bg-surface)",
                  }}>
                  <span style={{ fontSize: 18 }}>{opt.icon}</span>
                  <div className="flex-1">
                    <div className="text-[12px] font-medium">{opt.label}</div>
                    <div className="text-[11px]" style={{ color: "var(--text-tertiary)" }}>{opt.desc}</div>
                  </div>
                  {mode === opt.id && <IconCheck size={14} style={{ color: "var(--accent-bronze)", flexShrink: 0 }} />}
                </button>
              ))}

          {/* Custom amount */}
          {mode === "custom" && (

            <div className="label-eyebrow mb-2">แนบสลิป (ถ้ามี)</div>

                  className="w-full object-contain max-h-48"

                <IconSend size={18} stroke={1.5} />
                <span className="text-[11px]">คลิกเพื่อเลือกรูปสลิป</span>
                <input type="file" accept="image/*" className="hidden" onChange={handleSlip} />
              </label>
            )}
          </div>

          {/* Amount preview */}
          <div className="flex items-center justify-between px-4 py-3" style={{ background: "#1A1A17" }}>
            <span className="text-[12px]" style={{ color: "rgba(232,228,214,0.6)" }}>รับเงินวันนี้</span>
            <span className="num-display text-[22px]" style={{ color: "#C4A878" }}>{formatBaht(Math.min(paidAmt, remaining))}</span>
          </div>
        </div>

        <div className="flex gap-2 px-6 py-4 flex-shrink-0" style={{ borderTop: "0.5px solid var(--border-soft)", background: "var(--bg-surface)" }}>
          <button onClick={onClose}
            className="flex-1 text-[13px] py-3 font-medium"
            style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
            ยกเลิก
          </button>
          <button onClick={() => onConfirm(Math.min(paidAmt, remaining), mode === "deposit", slipUrl)}
            disabled={paidAmt <= 0}
            className="flex-1 text-[13px] py-3 font-medium transition-all hover:opacity-90"
            style={{ background: paidAmt > 0 ? "#1A1A17" : "var(--bg-muted)", color: paidAmt > 0 ? "#C4A878" : "var(--text-tertiary)" }}>
            ยืนยันรับเงิน {formatBaht(Math.min(paidAmt, remaining))}
          </button>
        </div>
      </div>
    </div>
  );
}

    }));

  const removeLocation = (id) => {

      const to = idx + dir;

      [arr[idx], arr[to]] = [arr[to], arr[idx]];
      return { ...s, locations: arr };

    const usage = countCategoryUsage(id);
    if (usage.total > 0) {
      alert(`ไม่สามารถลบได้\n\nหมวด "${cat?.name || id}" มีการใช้งาน:\n• นักเรียน: ${usage.students} คน\n• คอร์ส: ${usage.courses} คอร์ส\n\nแนะนำ: ปิดการใช้งาน (toggle off) แทนการลบ`);
      return;
    }
    if (!confirm(`ลบหมวดหมู่ "${cat?.name || id}"?`)) return;
    setSettings(s => ({ ...s, categories: s.categories.filter(c => c.id !== id) }));
  };
  const addLvl = () => {
    const newLvl = { id: newId(), name: "ระดับใหม่", desc: "", active: true };
    setSettings(s => ({ ...s, levels: [...s.levels, newLvl] }));
  };
  const removeLvl = (id) => {
    const lvl = lvls.find(l => l.id === id);
    const usage = countLevelUsage(id);
    if (usage.total > 0) {
      alert(`ไม่สามารถลบได้\n\nระดับ "${lvl?.name || id}" มีการใช้งาน:\n• นักเรียน: ${usage.students} คน\n• คอร์ส: ${usage.courses} คอร์ส\n\nแนะนำ: ปิดการใช้งาน (toggle off) แทนการลบ`);
      return;
    }
    if (!confirm(`ลบระดับ "${lvl?.name || id}"?`)) return;
    setSettings(s => ({ ...s, levels: s.levels.filter(l => l.id !== id) }));
  };

  // Category-level CRUD
  const addCatLevel = (catId) => {
    setSettings(s => {
      const lbc = s.levelsByCategory || {};
      const arr = lbc[catId] || [];
      return { ...s, levelsByCategory: { ...lbc, [catId]: [...arr, { id: newId(), name: "ระดับใหม่", desc: "", active: true }] } };
    });
  };
  const updateCatLevel = (catId, idx, field, val) => {
    setSettings(s => {
      const lbc = s.levelsByCategory || {};
      const arr = [...(lbc[catId] || [])];
      arr[idx] = { ...arr[idx], [field]: val };
      return { ...s, levelsByCategory: { ...lbc, [catId]: arr } };
    });
  };
  const removeCatLevel = (catId, idx) => {
    const catLvl = (levelsByCategory[catId] || [])[idx];
    if (catLvl) {
      const usage = countLevelUsage(catLvl.id);
      if (usage.total > 0) {
        alert(`ไม่สามารถลบได้\n\nระดับ "${catLvl.name}" มีการใช้งาน:\n• นักเรียน: ${usage.students} คน\n• คอร์ส: ${usage.courses} คอร์ส\n\nแนะนำ: ปิดการใช้งาน (toggle off) แทนการลบ`);
        return;
      }
    }
    setSettings(s => {
      const lbc = s.levelsByCategory || {};
      return { ...s, levelsByCategory: { ...lbc, [catId]: (lbc[catId] || []).filter((_, i) => i !== idx) } };
    });
  };
  const moveCatLevel = (catId, idx, dir) => {
    setSettings(s => {
      const lbc = s.levelsByCategory || {};
      const arr = [...(lbc[catId] || [])];
      const to = idx + dir;
      if (to < 0 || to >= arr.length) return s;
      [arr[idx], arr[to]] = [arr[to], arr[idx]];
      return { ...s, levelsByCategory: { ...lbc, [catId]: arr } };
    });
  };

  // Topic management
  const addTopic = (catId) => {
    setSettings(s => {
      const t = s.topics || {};
      return { ...s, topics: { ...t, [catId]: [...(t[catId] || []), ""] } };
    });
  };
  const updateTopic = (catId, idx, val) => {
    setSettings(s => {
      const t = s.topics || {};
      const arr = [...(t[catId] || [])];
      arr[idx] = val;
      return { ...s, topics: { ...t, [catId]: arr } };
    });
  };
  // ===== Master usage checkers — prevent deleting master data that has references =====
  const { courses, classes, notes } = ctx;

  const countCategoryUsage = (catId) => {
    const studentCount = (students || []).filter(s => (s.categoryId || s.category) === catId).length;
    const courseCount = (courses || []).filter(c => (c.categoryId || c.category) === catId).length;
    return { students: studentCount, courses: courseCount, total: studentCount + courseCount };
  };

  const countLevelUsage = (levelId) => {
    // global levels
    const studentCount = (students || []).filter(s => s.levelId === levelId).length;
    const courseCount = (courses || []).filter(c => c.levelId === levelId).length;
    return { students: studentCount, courses: courseCount, total: studentCount + courseCount };
  };

  const countTopicUsage = (catId, topicName) => {
    // topics reference in notes (strings stored in note.topics array)
    const noteCount = (notes || []).filter(n => (n.topics || []).includes(topicName)).length;
    // topics in courses (stored in course.topics array)
    const courseCount = (courses || []).filter(c => (c.topics || []).includes(topicName)).length;
    return { notes: noteCount, courses: courseCount, total: noteCount + courseCount };
  };

  const countLocationUsage = (locName) => {
    const classCount = (classes || []).filter(c => c.location === locName).length;
    const courseCount = (courses || []).filter(c => c.location === locName).length;
    return { classes: classCount, courses: courseCount, total: classCount + courseCount };
  };

  const removeTopic = (catId, idx) => {
    const topicName = (topics[catId] || [])[idx];
    if (topicName) {
      const usage = countTopicUsage(catId, topicName);
      if (usage.total > 0) {
        alert(`ไม่สามารถลบได้\n\nหัวข้อ "${topicName}" มีการใช้งาน:\n• บันทึกการสอน: ${usage.notes} รายการ\n• คอร์ส: ${usage.courses} คอร์ส\n\nแนะนำ: ปิดการใช้งาน (toggle off) แทนการลบ`);
        return;
      }
    }
    if (!confirm(`ลบหัวข้อ "${topicName}"?`)) return;
    setSettings(s => {
      const t = s.topics || {};
      const arr = (t[catId] || []).filter((_, i) => i !== idx);
      return { ...s, topics: { ...t, [catId]: arr } };
    });
  };

  const resetDefaults = () => {
    if (!confirm("รีเซ็ตกลับค่าเริ่มต้น?\n\n(จะคงไว้: บัญชีคุณครู, ชื่อ, และข้อมูล Login)")) return;
    setSettings(s => ({
      ...DEFAULT_SETTINGS,
      teacherAuth: s?.teacherAuth, // คง credentials ไว้
      teachers: s?.teachers || DEFAULT_SETTINGS.teachers,
    }));
  };

  const clearTransactions = () => {
    if (!confirm("⚠ ลบข้อมูล Transaction ทั้งหมด?\n\nจะลบ:\n• นักเรียน\n• คอร์ส\n• ลงทะเบียน\n• คลาส/ตารางสอน\n• การชำระเงิน\n• บันทึกการสอน\n• คำขอจองเรียน\n\nจะคงไว้:\n✓ หมวดหมู่, ระดับ, หัวข้อ, สถานที่\n\nยืนยันการลบ?")) return;
    if (!confirm("ยืนยันอีกครั้ง — ลบข้อมูลทั้งหมดที่ไม่ใช่ Master?")) return;
    ctx.setStudents([]);
    ctx.setCourses([]);
    ctx.setEnrollments([]);
    ctx.setClasses([]);
    ctx.setPayments([]);
    ctx.setNotes([]);
    if (ctx.setBookingRequests) ctx.setBookingRequests([]);
    alert("ลบ Transaction เรียบร้อย — คงไว้เฉพาะ Master data");
  };

  const COLOR_PRESETS = [
    { color: "#8B84C4", bg: "#ECE8F4", text: "#4A3F78" },
    { color: "#8B9F7E", bg: "var(--success-soft)", text: "#4A6B3F" },
    { color: "#6B9B80", bg: "#E4F0E8", text: "#2F5849" },
    { color: "#6B7F9B", bg: "var(--info-soft)", text: "#4E5F78" },
    { color: "#B87558", bg: "#F5E8E0", text: "#6B3B28" },
    { color: "#A37F4A", bg: "var(--warning-soft)", text: "#704F28" },
    { color: "#B07388", bg: "#F5E5EA", text: "#5B2B3A" },
    { color: "#B65A4A", bg: "var(--danger-soft)", text: "#6B3028" },
    { color: "var(--text-tertiary)", bg: "var(--bg-muted)", text: "var(--text-primary)" },
  ];

  return (
    <div className="responsive-page-pad p-8 space-y-5">
      <div className="flex gap-0 overflow-hidden tab-pills-resp" style={{ border: "0.5px solid var(--border-default)", maxWidth: "100%", width: "fit-content" }}>
        {[
          { id: "categories", label: t("category") },
          { id: "levels", label: t("level") },
          { id: "topics", label: t("topics") || "หัวข้อที่สอน" },
          { id: "locations", label: t("locations") || "สถานที่สอน" },
          { id: "teachers", label: t("teacher") },
          { id: "student-creds", label: t("createUsername") || "สร้าง Username" },
          { id: "preferences", label: t("preferences") },
        ].map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)}
            className="text-[12px] px-5 py-2 font-medium"
            style={{ background: activeTab === tab.id ? "#1A1A17" : "transparent", color: activeTab === tab.id ? "#C4A878" : "var(--text-secondary)" }}>
            {tab.label}
          </button>
        ))}
      </div>

      {activeTab === "categories" && (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <div className="text-[11px]" style={{ color: "var(--text-secondary)" }}>
              หมวดหมู่จะแสดงในฟอร์มสร้างคอร์สและข้อมูลนักเรียน
            </div>
            <button onClick={addCat} className="text-[11px] px-3 py-1.5 rounded-md font-medium flex items-center gap-1"
              style={{ background: "#1A1A17", color: "#C4A878" }}>
              <IconPlus size={11} /> เพิ่มหมวดหมู่
            </button>
          </div>

          <div className="space-y-2">
            {cats.map(cat => (
              <div key={cat.id} className="bg-[var(--bg-surface)] rounded-2xl p-4" style={{ border: "0.5px solid var(--border-default)" }}>
                <div className="flex items-center gap-3 mb-3">
                  <div className="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0"
                    style={{ background: cat.bg, border: `2px solid ${cat.color}` }}>
                    <span className="text-[11px] font-medium" style={{ color: cat.text }}>{cat.name.charAt(0)}</span>
                  </div>
                  <div className="flex-1 min-w-0">
                    <input
                      className="w-full text-[13px] font-medium bg-transparent"
                      style={{ outline: "none", borderBottom: "0.5px solid var(--border-default)", paddingBottom: 2 }}
                      value={cat.name}
                      onChange={e => updateCat(cat.id, "name", e.target.value)}
                      placeholder="ชื่อหมวดหมู่" />
                  </div>
                  <div className="flex items-center gap-2 flex-shrink-0">
                    <button onClick={() => updateCat(cat.id, "active", !cat.active)}
                      className="text-[9px] px-2 py-0.5 rounded-full font-medium"
                      style={{ background: cat.active ? "var(--success-soft)" : "var(--bg-muted)", color: cat.active ? "#4A6B3F" : "var(--text-secondary)" }}>
                      {cat.active ? "เปิดใช้" : "ปิด"}
                    </button>
                    <button onClick={() => removeCat(cat.id)} className="p-1 rounded" style={{ opacity: 0.4 }}>
                      <IconTrash size={13} />
                    </button>
                  </div>
                </div>

                <div className="mb-3">
                  <div className="text-[10px] font-medium mb-1.5" style={{ color: "var(--text-secondary)" }}>สีประจำหมวดหมู่</div>
                  <div className="flex gap-2 flex-wrap items-center">
                    {COLOR_PRESETS.map((p, i) => (
                      <button key={i} onClick={() => setSettings(s => ({
                        ...s, categories: s.categories.map(c => c.id === cat.id ? { ...c, color: p.color, bg: p.bg, text: p.text } : c)
                      }))}
                        className="w-7 h-7 rounded-full flex items-center justify-center"
                        style={{
                          background: p.bg,
                          border: cat.color === p.color ? `2.5px solid ${p.color}` : "0.5px solid var(--border-default)",
                        }}>
                        <div className="w-3.5 h-3.5 rounded-full" style={{ background: p.color }} />
                      </button>
                    ))}
                    <div className="flex items-center gap-1 ml-1">
                      <span className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>กำหนดเอง:</span>
                      <input type="color" value={cat.color}
                        onChange={e => updateCat(cat.id, "color", e.target.value)}
                        style={{ width: 28, height: 28, border: "0.5px solid var(--border-default)", borderRadius: 6, padding: 1, cursor: "pointer" }} />
                    </div>
                  </div>
                </div>

                <div className="p-2 rounded-md flex items-center gap-2" style={{ background: cat.bg }}>
                  <span className="text-[10px] px-2 py-0.5 rounded font-medium"
                    style={{ background: "rgba(232,228,214,0.7)", color: cat.text, border: `0.5px solid ${cat.color}` }}>
                    {cat.name}
                  </span>
                  <span className="text-[10px]" style={{ color: cat.text, opacity: 0.7 }}>— ตัวอย่าง badge ในระบบ</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {activeTab === "levels" && (
        <div className="grid gap-5" style={{ gridTemplateColumns: "220px 1fr" }}>

          {/* Left: category selector */}
          <div className="space-y-1">
            <div className="label-eyebrow mb-3">เลือกหมวดหมู่</div>
            {activeCats.map(cat => {
              const cLvls = levelsByCategory[cat.id] || [];
              return (
                <button key={cat.id} onClick={() => setSelectedCatId(cat.id)}
                  className="w-full flex items-center gap-3 px-3 py-3 text-left transition-colors"
                  style={{
                    background: resolvedCatId === cat.id ? cat.bg : "transparent",
                    borderLeft: resolvedCatId === cat.id ? `3px solid ${cat.color}` : "3px solid transparent",
                  }}>
                  <div className="w-7 h-7 flex items-center justify-center text-[11px] font-medium flex-shrink-0"
                    style={{ background: cat.bg, color: cat.text, border: `0.5px solid ${cat.color}` }}>
                    {cat.name.charAt(0)}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-[12px] font-medium truncate">{cat.name}</div>
                    <div className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>
                      {cLvls.filter(l => l.active).length} ระดับ
                    </div>
                  </div>
                  {resolvedCatId === cat.id && (
                    <div className="w-1.5 h-1.5 rounded-full" style={{ background: cat.color }} />
                  )}
                </button>
              );
            })}
          </div>

          {/* Right: levels editor */}
          {resolvedCatId && (() => {
            const cat = cats.find(c => c.id === resolvedCatId);
            const levels = levelsByCategory[resolvedCatId] || [];
            return (
              <div className="p-5" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)" }}>
                <div className="flex items-center justify-between mb-5 pb-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
                  <div>
                    <div className="label-eyebrow mb-1">ระดับ</div>
                    <div className="text-[16px] font-medium">{cat?.name}</div>
                    <div className="text-[11px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>
                      {levels.filter(l => l.active).length} ระดับที่ใช้งาน · เรียงจากต่ำไปสูง
                    </div>
                  </div>
                  <button onClick={() => addCatLevel(resolvedCatId)}
                    className="flex items-center gap-1.5 text-[11px] px-3 py-2 font-medium"
                    style={{ background: "#1A1A17", color: "#C4A878" }}>
                    <IconPlus size={11} /> เพิ่มระดับ
                  </button>
                </div>

                {levels.length === 0 ? (
                  <div className="text-center py-10">
                    <div className="heading-serif text-[16px] italic mb-1" style={{ color: "var(--text-tertiary)" }}>ยังไม่มีระดับ</div>
                    <div className="text-[11px]" style={{ color: "var(--text-quaternary)" }}>กด "+ เพิ่มระดับ" เพื่อเริ่มต้น</div>
                  </div>
                ) : (
                  <div className="space-y-1">
                    {levels.map((lv, idx) => (
                      <div key={lv.id} className="flex items-center gap-3 py-2.5 px-1" style={{ borderBottom: "0.5px solid var(--border-hairline)" }}>
                        <span className="num-display text-[13px] w-6 text-right flex-shrink-0" style={{ color: "var(--text-quaternary)" }}>{idx + 1}</span>
                        <div className="w-5 h-5 flex items-center justify-center flex-shrink-0" style={{ background: cat?.bg }}>
                          <div style={{ width: 6, height: 6, borderRadius: "50%", background: cat?.color }} />
                        </div>
                        <input
                          className="text-[13px] font-medium bg-transparent flex-1"
                          style={{ outline: "none", borderBottom: "0.5px solid var(--border-default)", paddingBottom: 2, color: "var(--text-primary)", minWidth: 80 }}
                          value={lv.name}
                          onChange={e => updateCatLevel(resolvedCatId, idx, "name", e.target.value)}
                          placeholder="ชื่อระดับ" />
                        <input
                          className="text-[11px] bg-transparent"
                          style={{ outline: "none", borderBottom: "0.5px solid var(--border-default)", paddingBottom: 2, color: "var(--text-secondary)", minWidth: 120, flex: 1.5 }}
                          value={lv.desc}
                          onChange={e => updateCatLevel(resolvedCatId, idx, "desc", e.target.value)}
                          placeholder="คำอธิบาย" />
                        <div className="flex items-center gap-1 flex-shrink-0">
                          <button onClick={() => updateCatLevel(resolvedCatId, idx, "active", !lv.active)}
                            className="text-[9px] px-2 py-0.5 font-medium"
                            style={{ background: lv.active ? "var(--success-soft)" : "var(--bg-muted)", color: lv.active ? "var(--success)" : "var(--text-tertiary)" }}>
                            {lv.active ? "เปิด" : "ปิด"}
                          </button>
                          <button onClick={() => moveCatLevel(resolvedCatId, idx, -1)} style={{ opacity: idx === 0 ? 0.2 : 0.6, fontSize: 10, padding: "2px 3px" }}>▲</button>
                          <button onClick={() => moveCatLevel(resolvedCatId, idx, 1)} style={{ opacity: idx === levels.length - 1 ? 0.2 : 0.6, fontSize: 10, padding: "2px 3px" }}>▼</button>
                          <button onClick={() => removeCatLevel(resolvedCatId, idx)} style={{ opacity: 0.4, padding: 4 }}>
                            <IconTrash size={12} />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Preview */}
                {levels.filter(l => l.active).length > 0 && (
                  <div className="mt-5 pt-5" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
                    <div className="label-eyebrow mb-2.5">ตัวอย่าง Dropdown ในฟอร์มสร้างคอร์ส</div>
                    <select className="text-[12px] px-3 py-2 bg-white w-full max-w-xs"
                      style={{ border: "0.5px solid var(--border-strong)" }}>
                      {levels.filter(l => l.active).map(l => (
                        <option key={l.id} value={l.id}>{l.name}{l.desc ? ` — ${l.desc}` : ""}</option>
                      ))}
                    </select>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      )}

      {activeTab === "topics" && (
        <div className="grid gap-5" style={{ gridTemplateColumns: "220px 1fr" }}>

          {/* Left: category selector */}
          <div className="space-y-1">
            <div className="label-eyebrow mb-3">เลือกหมวดหมู่</div>
            {activeCats.map(cat => (
              <button key={cat.id} onClick={() => setSelectedCatId(cat.id)}
                className="w-full flex items-center gap-3 px-3 py-3 text-left transition-colors"
                style={{
                  background: resolvedCatId === cat.id ? cat.bg : "transparent",
                  borderLeft: resolvedCatId === cat.id ? `3px solid ${cat.color}` : "3px solid transparent",
                }}>
                <div className="w-7 h-7 rounded flex items-center justify-center text-[11px] font-medium flex-shrink-0"
                  style={{ background: cat.bg, color: cat.text, border: `0.5px solid ${cat.color}` }}>
                  {cat.name.charAt(0)}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-[12px] font-medium truncate">{cat.name}</div>
                  <div className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>
                    {(topics[cat.id] || []).filter(Boolean).length} หัวข้อ
                  </div>
                </div>
                {resolvedCatId === cat.id && (
                  <div className="w-1.5 h-1.5 rounded-full" style={{ background: cat.color }} />
                )}
              </button>
            ))}
          </div>

          {/* Right: topics editor */}
          {resolvedCatId && (() => {
            const cat = cats.find(c => c.id === resolvedCatId);
            const topicList = topics[resolvedCatId] || [];
            return (
              <div className="p-5" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)" }}>
                <div className="flex items-center justify-between mb-5 pb-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
                  <div>
                    <div className="label-eyebrow mb-1">หัวข้อที่สอน</div>
                    <div className="text-[16px] font-medium">{cat?.name}</div>
                    <div className="text-[11px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>
                      {topicList.filter(Boolean).length} หัวข้อ · นักเรียนจะเห็นเมื่อดูรายละเอียดคอร์ส
                    </div>
                  </div>
                  <button onClick={() => addTopic(resolvedCatId)}
                    className="flex items-center gap-1.5 text-[11px] px-3 py-2 font-medium"
                    style={{ background: "#1A1A17", color: "#C4A878" }}>
                    <IconPlus size={11} /> เพิ่มหัวข้อ
                  </button>
                </div>

                {topicList.length === 0 ? (
                  <div className="text-center py-12">
                    <div className="heading-serif text-[16px] italic mb-1" style={{ color: "var(--text-tertiary)" }}>ยังไม่มีหัวข้อ</div>
                    <div className="text-[11px]" style={{ color: "var(--text-quaternary)" }}>กด "เพิ่มหัวข้อ" เพื่อเริ่มต้น</div>

function AnalyticsPage({ ctx }) {
  const { students, notes, classes, courses, enrollments, payments, settings, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;

  const [selectedStudentId, setSelectedStudentId] = useState(students.filter(s => s.active)[0]?.id || "");
  const [studentDropdownOpen, setStudentDropdownOpen] = useState(false);
  const [studentSearch, setStudentSearch] = useState("");
  const [aiInsight, setAiInsight] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState(null);
  const [photoPreviewOpen, setPhotoPreviewOpen] = useState(false);

  const student = students.find(s => s.id === selectedStudentId);
  const sCat = student ? (allCats.find(c => c.id === (student.categoryId || student.category)) || CATEGORIES[student.category] || CATEGORIES.other) : CATEGORIES.other;

  // Aggregate data
  const studentNotes = notes.filter(n => n.studentId === selectedStudentId).sort((a, b) => b.date.localeCompare(a.date));
  const studentClasses = classes.filter(c => c.studentId === selectedStudentId);
  const completedClasses = studentClasses.filter(c => c.status === "completed");
  const studentEnrollments = (enrollments || []).filter(e => e.studentId === selectedStudentId);
  const studentPayments = payments.filter(p => p.studentId === selectedStudentId);

  // Total hours taught
  const totalMinutes = completedClasses.reduce((sum, c) => sum + (c.duration || 0), 0);
  const totalHours = totalMinutes / 60;

  // Topic analysis
  const topicMap = {}; // { topic: { count, totalMinutes, lastDate, comments: [] } }
  studentNotes.forEach(n => {
    const topics = n.topics || [];
    const dur = n.duration || 60;
    topics.forEach(t => {
      if (!topicMap[t]) topicMap[t] = { count: 0, totalMinutes: 0, lastDate: null, comments: [] };
      topicMap[t].count++;
      topicMap[t].totalMinutes += dur;
      if (!topicMap[t].lastDate || n.date > topicMap[t].lastDate) topicMap[t].lastDate = n.date;
      if (n.content) topicMap[t].comments.push({ date: n.date, content: n.content });
    });
  });

  const topicStats = Object.entries(topicMap)
    .map(([topic, data]) => ({ topic, ...data, hours: data.totalMinutes / 60 }))
    .sort((a, b) => b.totalMinutes - a.totalMinutes);

  const topTopic = topicStats[0];
  const firstClass = studentClasses.sort((a, b) => a.date.localeCompare(b.date))[0];
  const lastClass = completedClasses.sort((a, b) => b.date.localeCompare(a.date))[0];

  const activeStudents = students.filter(s => s.active);
  const filteredStudents = studentSearch
    ? activeStudents.filter(s => s.name.toLowerCase().includes(studentSearch.toLowerCase()))
    : activeStudents;

  const generateAIInsight = async () => {
    if (!student) return;
    setAiLoading(true);
    setAiError(null);
    setAiInsight(null);

    const topicSummary = topicStats.slice(0, 10).map(t =>
      `- ${t.topic}: สอนไป ${t.hours.toFixed(1)} ชม. (${t.count} ครั้ง) — บันทึกล่าสุด ${t.lastDate}`
    ).join("\n");

    const recentComments = studentNotes.slice(0, 8).map(n =>
      `${n.date} [${n.title}]${n.content ? ": " + n.content : ""}`
    ).join("\n");

    const prompt = `คุณเป็นโค้ชผู้เชี่ยวชาญ กำลังวิเคราะห์นักเรียนชื่อ "${student.name}" ระดับ ${student.level || "-"} ในหมวด ${sCat.name || "-"}

ข้อมูลการเรียน:
- เรียนมาแล้ว ${completedClasses.length} คลาส รวม ${totalHours.toFixed(1)} ชั่วโมง
- เริ่มเรียน ${firstClass?.date || "-"} · คลาสล่าสุด ${lastClass?.date || "-"}

หัวข้อที่เรียน (เรียงตามชั่วโมงที่ใช้):
${topicSummary || "(ยังไม่มีข้อมูลหัวข้อ)"}

บันทึกของครูล่าสุด:
${recentComments || "(ยังไม่มีบันทึก)"}

กรุณาวิเคราะห์ ตอบเป็นภาษาไทย แบบกระชับ เน้นใจความ ในรูปแบบ JSON:
{
  "strengths": ["จุดแข็ง 1", "จุดแข็ง 2", ...],
  "improvements": ["จุดที่ควรพัฒนา 1", "จุดที่ควรพัฒนา 2", ...],
  "recommendations": ["คำแนะนำ 1 สำหรับคลาสต่อไป", "คำแนะนำ 2", ...],
  "summary": "สรุปภาพรวม 2-3 ประโยค"
}

ตอบเฉพาะ JSON เท่านั้น ไม่ต้องมี markdown code block`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({

function StudentForm({ ctx, onClose, existing }) {

  const [form, setForm] = useState(existing || {
    name: "", nickname: "", age: "",
    categoryId: cats[0]?.id || "music",
    category: cats[0]?.id || "music",
    subcategory: "",
    levelId: "",
    level: "",
    parent: "", phone: "", lineId: "",
    address: activeLocs[0]?.name || "",
    rate: 500, active: true, startDate: todayISO(), photo: "",
  });
  const [photoUploading, setPhotoUploading] = useState(false);

  const currentCat = cats.find(c => c.id === (form.categoryId || form.category)) || cats[0];
  const catLvlsActive = (levelsByCategory[currentCat?.id] || []).filter(l => l.active);

  const handlePhoto = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      alert("รูปใหญ่เกินไป (จำกัด 10MB)");
      return;
    }
    setPhotoUploading(true);
    try {
      // Square crop friendly: 400x400 for student avatar
      const result = await processImage(file, { maxWidth: 400, maxHeight: 400, quality: 0.75, targetKB: 20 });
      // Show preview immediately
      setForm(f => ({ ...f, photo: result.dataUrl }));
      // Upload to Storage in background (if Supabase available)
      if (sb && ctx.orgId) {
        const studentId = existing?.id || form.id || newId();
        const filename = `student_${studentId}.webp`;
        try {
          const { url, path } = await uploadImage(result.blob, "photos", ctx.orgId, filename);
          setForm(f => ({ ...f, id: studentId, photo: url, photoPath: path }));
        } catch (err) {
          console.warn("[photo] Storage upload failed, using base64:", err);
          // Keep base64 as fallback
        }
      }
    } catch (err) {
      console.error("Photo processing failed:", err);
      alert("ไม่สามารถประมวลผลรูปได้ — ลองรูปอื่น");
    } finally {
      setPhotoUploading(false);
    }
  };

  const submit = () => {
    if (!form.name) return alert("กรุณากรอกชื่อ");
    if (photoUploading) return alert("กรุณารอรูปอัพโหลดเสร็จก่อน");
    // === PLAN ENFORCEMENT — block if exceeds max ===
    if (!existing) {
      // Adding new student — check limit
      const activeCount = (ctx.students || []).filter(s => s.active !== false).length;
      if (!canAddStudent(ctx.settings, activeCount)) {
        const plan = getPlan(ctx.settings);
        alert(`⚠ ครบจำนวนนักเรียนแล้ว\n\nแพ็คเกจ ${plan.name} รองรับสูงสุด ${formatLimit(plan.maxStudents)} คน\nคุณมีแล้ว ${activeCount} คน\n\nUpgrade แพ็คเกจเพื่อเพิ่มนักเรียนเพิ่มเติม`);
        return;
      }
    }
    const n = {
      ...form,
      id: existing?.id || form.id || newId(),
      age: Number(form.age) || 0,
      rate: Number(form.rate) || 0,
    };
    ctx.setStudents(prev => existing ? prev.map(s => s.id === existing.id ? n : s) : [...prev, n]);

          </FormRow>
          <FormRow label={t("nickname")}>
            <input className={inputCls} style={inputSty} value={form.nickname || ""} onChange={e => setForm({ ...form, nickname: e.target.value })} placeholder="ฝน" />
          </FormRow>
          <FormRow label={t("age")}><input className={inputCls} style={inputSty} type="number" value={form.age} onChange={e => setForm({ ...form, age: e.target.value })} /></FormRow>

          <FormRow label="Line ID"><input className={inputCls} style={inputSty} value={form.lineId} onChange={e => setForm({ ...form, lineId: e.target.value })} /></FormRow>
        </div>
        <FormRow label="สถานที่เรียน">
          <select className={inputCls} style={inputSty} value={form.address} onChange={e => setForm({ ...form, address: e.target.value })}>
            <option value="">— เลือกสถานที่ —</option>
            {(ctx.settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active).map(l => (
              <option key={l.id} value={l.name}>{l.icon} {l.name}</option>

        {/* Student Login Credentials */}

            🔑 ข้อมูลเข้าระบบนักเรียน
            <span className="text-[9px] font-normal" style={{ color: "rgba(63,93,69,0.7)" }}>(สำหรับให้นักเรียน Login เข้า Portal)</span>
          </div>
          <div className="grid grid-cols-2 gap-3">

        {/* RIGHT: Photo column */}

              <div className="w-full flex flex-col items-center justify-center gap-2 transition-colors hover:bg-[var(--bg-surface)]"
                style={{ aspectRatio: "1", border: "0.5px dashed var(--border-strong)", background: "var(--bg-surface)", color: "var(--text-tertiary)" }}>

function StudentDetail({ student, ctx, onClose }) {
  const { classes, payments, notes, enrollments, courses, settings } = ctx;
  const [showPayments, setShowPayments] = useState(false);

  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const settingCat = allCats.find(c => c.id === (student.categoryId || student.category));
  const cat = settingCat || CATEGORIES[student.category] || CATEGORIES.other;

  const studentClasses = classes.filter(c => c.studentId === student.id).sort((a, b) => b.date.localeCompare(a.date));
  const studentPayments = payments.filter(p => p.studentId === student.id).sort((a, b) => b.date.localeCompare(a.date));
  const studentNotes = notes.filter(n => n.studentId === student.id).sort((a, b) => b.date.localeCompare(a.date));
  const studentEnrollments = (enrollments || []).filter(e => e.studentId === student.id).sort((a, b) => b.date.localeCompare(a.date));

  const completed = studentClasses.filter(c => c.status === "completed").length;
  const pending = studentPayments.filter(p => p.status !== "paid").reduce((sum, p) => sum + Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)), 0);
  const totalPaid = studentPayments.filter(p => p.status === "paid").reduce((sum, p) => sum + (p.totalAmount || p.amount), 0);
  const activeEnrollments = studentEnrollments.filter(e => e.status === "active");
  const paidCount = studentPayments.filter(p => p.status === "paid").length;
  const pendingCount = studentPayments.filter(p => p.status !== "paid").length;

  const remove = () => {
    if (!confirm(`ลบข้อมูล ${student.name}?`)) return;
    ctx.setStudents(prev => prev.filter(s => s.id !== student.id));
    ctx.setClasses(prev => prev.filter(c => c.studentId !== student.id));
    ctx.setPayments(prev => prev.filter(p => p.studentId !== student.id));
    ctx.setNotes(prev => prev.filter(n => n.studentId !== student.id));
    onClose();
  };

  return (
    <>
      <div className="px-6 py-5 flex items-center gap-4" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
        {student.photo ? (
          <img src={student.photo} alt={student.name} className="w-14 h-14 object-cover flex-shrink-0"
            style={{ border: `1px solid ${cat.color}` }} />
        ) : (
          <div className="w-12 h-12 flex items-center justify-center text-[16px] font-medium flex-shrink-0"
            style={{ background: cat.bg, color: cat.text }}>
            {student.name.charAt(0)}
          </div>
        )}
        <div className="flex-1 min-w-0">

// ============ REQUESTS PAGE (teacher view) ============
function RequestsPage({ ctx, onNavigate }) {
  const { students, courses, enrollments, bookingRequests, setBookingRequests, classes, setClasses, setEnrollments, settings, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;

  const [filter, setFilter] = useState("pending");
  const [rejectingId, setRejectingId] = useState(null);
  const [rejectReason, setRejectReason] = useState("");
  const [conflictModal, setConflictModal] = useState(null); // { req, conflicts: [...] }
  const [toast, setToast] = useState(null); // { msg, type, req? }

  const sorted = [...bookingRequests].sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
  const pendingList = sorted.filter(r => r.status === "pending");
  const approvedList = sorted.filter(r => r.status === "approved");
  const rejectedList = sorted.filter(r => r.status === "rejected");

  const filtered = filter === "pending" ? pendingList
    : filter === "approved" ? approvedList
    : filter === "rejected" ? rejectedList
    : sorted;

  const formatThaiDate = (iso) => {
    if (iso === todayISO()) return "วันนี้";
    if (iso === addDays(todayISO(), 1)) return "พรุ่งนี้";
    const [y, m, d] = iso.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString("th-TH", { weekday: "short", day: "numeric", month: "long" });
  };

  const endTime = (start, dur) => {
    const [h, m] = start.split(":").map(Number);
    const em = h * 60 + m + dur;
    return `${String(Math.floor(em/60)).padStart(2,"0")}:${String(em%60).padStart(2,"0")}`;
  };

  // Convert time + date to absolute minutes for comparison
  const toMinutes = (dateStr, timeStr) => {
    const [y, mo, d] = dateStr.split("-").map(Number);
    const [h, mi] = timeStr.split(":").map(Number);
    return new Date(y, mo - 1, d, h, mi).getTime();
  };

  // Check overlap between two time ranges [start, end) in ms
  const overlaps = (s1, e1, s2, e2) => s1 < e2 && s2 < e1;

  // Find conflicts for a request: existing classes + other pending requests
  const findConflicts = (req) => {
    const reqStart = toMinutes(req.requestedDate, req.requestedTime);
    const reqEnd = reqStart + req.duration * 60000;

    const classConflicts = classes
      .filter(c => c.status === "scheduled" && c.date === req.requestedDate)
      .filter(c => {
        const cs = toMinutes(c.date, c.startTime);
        const ce = cs + (c.duration || 60) * 60000;
        return overlaps(reqStart, reqEnd, cs, ce);
      })
      .map(c => ({ type: "class", data: c }));

    const requestConflicts = pendingList
      .filter(r => r.id !== req.id && r.requestedDate === req.requestedDate)
      .filter(r => {
        const rs = toMinutes(r.requestedDate, r.requestedTime);
        const re = rs + r.duration * 60000;
        return overlaps(reqStart, reqEnd, rs, re);
      })
      .map(r => ({ type: "request", data: r }));

    return [...classConflicts, ...requestConflicts];
  };

  const doApprove = (req) => {
    const newClassId = newId();
    setClasses(prev => [...prev, {
      id: newClassId,
      studentId: req.studentId,
      courseId: req.courseId || null,
      date: req.requestedDate,
      startTime: req.requestedTime,
      duration: req.duration,
      location: req.location,
      status: "scheduled",
      price: 0,
      note: req.note || "",
    }]);
    if (req.courseId) {
      setEnrollments(prev => prev.map(en => {
        if (en.studentId === req.studentId && en.courseId === req.courseId && en.status === "active") {
          const newCompleted = en.completedSessions + (req.duration / 60);
          return { ...en, completedSessions: newCompleted };
        }
        return en;
      }));
    }
    setBookingRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "approved", approvedClassId: newClassId, respondedAt: new Date().toISOString() } : r));
    // Show success toast
    const s = students.find(st => st.id === req.studentId);
    setToast({
      msg: `อนุมัติคำขอของ ${s?.name || "นักเรียน"} เรียบร้อย`,
      detail: `เพิ่มคลาสในตารางสอน ${formatThaiDate(req.requestedDate)} เวลา ${req.requestedTime} แล้ว`,
      type: "success",
    });
    setTimeout(() => setToast(null), 5000);
  };

  const tryApprove = (req) => {
    const conflicts = findConflicts(req);
    if (conflicts.length > 0) {
      setConflictModal({ req, conflicts });
    } else {
      doApprove(req);
    }
  };

  const reject = (req, reason) => {
    setBookingRequests(prev => prev.map(r => r.id === req.id ? { ...r, status: "rejected", rejectedReason: reason || "", respondedAt: new Date().toISOString() } : r));
    setRejectingId(null);
    setRejectReason("");
  };

  return (
    <div className="responsive-page-pad p-8 space-y-5">

      {/* Header */}
      <div className="flex items-start justify-between pb-4 gap-3 flex-wrap" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
        <div>
          <div className="label-eyebrow mb-1">Booking Requests</div>
          <div className="heading-serif text-[20px] sm:text-[26px]">คำขอจองเรียน</div>
          <div className="text-[11px] sm:text-[12px] mt-1" style={{ color: "var(--text-secondary)" }}>
            คำขอจากนักเรียนที่รอการอนุมัติ
          </div>
        </div>
        {pendingList.length > 0 && (
          <div className="flex items-center gap-2 px-3 sm:px-4 py-2 flex-shrink-0"
            style={{ background: "var(--warning-soft)", color: "var(--warning)", border: "0.5px solid rgba(164,125,72,0.3)" }}>
            <div className="w-2 h-2 rounded-full" style={{ background: "var(--warning)" }} />
            <span className="text-[11px] sm:text-[12px] font-medium">{pendingList.length} รอดำเนินการ</span>
          </div>
        )}
      </div>

      {/* Filter pills */}
      <div className="flex gap-2 flex-wrap">
        {[
          { id: "pending", label: "รอดำเนินการ", count: pendingList.length },
          { id: "approved", label: "อนุมัติแล้ว", count: approvedList.length },
          { id: "rejected", label: "ปฏิเสธ", count: rejectedList.length },
          { id: "all", label: "ทั้งหมด", count: sorted.length },
        ].map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)}
            className={`filter-pill ${filter === f.id ? "active" : ""}`}>
            {f.label}
            <span className="pill-count">{f.count}</span>
          </button>
        ))}
      </div>

      {/* Request list */}
      {filtered.length === 0 ? (
        <div className="flex flex-col items-center justify-center py-20 gap-3"
          style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)" }}>
          <div style={{ color: "var(--text-quaternary)" }}><IconSend size={40} stroke={1} /></div>
          <div className="heading-serif text-[18px] italic" style={{ color: "var(--text-tertiary)" }}>
            {filter === "pending" ? "ไม่มีคำขอที่รอดำเนินการ" : "ไม่มีคำขอ"}
          </div>
          <div className="text-[11px]" style={{ color: "var(--text-quaternary)" }}>
            นักเรียนส่งคำขอผ่าน Student Portal
          </div>
        </div>
      ) : (
        <div className="space-y-3">
          {filtered.map(req => {
            const s = students.find(st => st.id === req.studentId);
            const c = req.courseId ? courses.find(cc => cc.id === req.courseId) : null;
            const en = req.courseId ? (enrollments || []).find(e => e.studentId === req.studentId && e.courseId === req.courseId && e.status === "active") : null;
            const remainingHrs = en ? Math.round((en.totalSessions - en.completedSessions) * 10) / 10 : null;
            const sCat = s ? (allCats.find(cc => cc.id === (s.categoryId || s.category)) || CATEGORIES[s.category] || CATEGORIES.other) : CATEGORIES.other;
            const isPending = req.status === "pending";
            const isApproved = req.status === "approved";
            const isRejected = req.status === "rejected";
            const isRejecting = rejectingId === req.id;

            return (
              <div key={req.id} className="p-5"
                style={{
                  background: "var(--bg-surface)",
                  border: isPending ? `1.5px solid ${sCat.color}` : "0.5px solid var(--border-soft)",
                  borderLeft: `3px solid ${sCat.color}`,
                  opacity: isRejected ? 0.65 : 1,
                }}>

                <div className="flex gap-4">
                  {/* Left: avatar + date/time */}
                  <div className="flex-shrink-0" style={{ minWidth: 110 }}>
                    <div className="flex items-center gap-2 mb-3">
                      <div className="w-9 h-9 flex items-center justify-center text-[13px] font-medium flex-shrink-0"
                        style={{ background: sCat.bg, color: sCat.text }}>
                        {s?.name?.charAt(0) || "?"}
                      </div>
                    </div>
                    <div className="num-display text-[22px] leading-none">{req.requestedTime}</div>
                    <div className="num-display text-[13px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>
                      — {endTime(req.requestedTime, req.duration)}
                    </div>
                    <div className="text-[11px] mt-1.5" style={{ color: "var(--text-secondary)" }}>
                      {formatThaiDate(req.requestedDate)}
                    </div>
                  </div>

                            <div className="text-[13px] font-medium">{cfStudent?.name}</div>

                            {cfDur} นาที · {cfData.location}
                            {cfData.note && <span> · {cfData.note}</span>}

                  </div>

                <div className="text-[11px] px-3 py-2.5" style={{ background: "var(--warning-soft)", color: "var(--warning)", borderLeft: "2px solid var(--warning)" }}>
                  💡 แนะนำให้ปฏิเสธคำขอนี้แล้วให้นักเรียนจองใหม่ หรือถ้ายืนยันจะอนุมัติซ้อน ต้องจัดการเวลาเอง
                </div>

              {/* Footer */}
              <div className="flex gap-2 px-6 pb-5 pt-3 flex-shrink-0" style={{ borderTop: "0.5px solid var(--border-soft)" }}>

                </button>

                  setRejectingId(req.id);

                  setConflictModal(null);

}

// ============ BOOKING PAGE ============
function BookingPage({ ctx, onNavigate }) {
  const { students, courses, classes, setClasses, enrollments, settings, notes, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const activeLocs = (settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active);
  const defaultLocation = activeLocs[0]?.name || "บ้านนักเรียน";

  const [selectedStudentId, setSelectedStudentId] = useState("");
  const [selectedCourseId, setSelectedCourseId] = useState("");
  const [date, setDate] = useState(todayISO());
  const [startTime, setStartTime] = useState("09:00");
  const [expandedNotes, setExpandedNotes] = useState(null); // booking id
  const [studentSearch, setStudentSearch] = useState("");
  const [studentDropdownOpen, setStudentDropdownOpen] = useState(false);
  const [duration, setDuration] = useState(60);
  const [location, setLocation] = useState(defaultLocation);
  const [note, setNote] = useState("");
  const [saved, setSaved] = useState(false);
  const [savedId, setSavedId] = useState(null);
  const [savedHrs, setSavedHrs] = useState(0);
  const [noteModal, setNoteModal] = useState(null); // booking object
  const [reminderModal, setReminderModal] = useState(null); // booking object
  const [searchText, setSearchText] = useState("");
  const [filterStudentId, setFilterStudentId] = useState("all");
  const [filterStatus, setFilterStatus] = useState("pending");
  const [filterTeacherId, setFilterTeacherId] = useState("all");

  // Teacher state for booking form
  const teachers = (settings?.teachers || []).filter(tc => tc.active);
  const hasMultiTeacher = teachers.length > 1;
  const [teacherId, setTeacherId] = useState(teachers[0]?.id || "");

  // Group booking — choose by groupId/Order instead of single student
  const [bookingMode, setBookingMode] = useState("individual"); // 'individual' | 'group'
  const [selectedGroupId, setSelectedGroupId] = useState("");

  // Find active group enrollments (groupId set)
  const groupOrders = (() => {
    const groups = {};
    (enrollments || []).filter(en => en.groupId && en.status === "active").forEach(en => {
      if (!groups[en.groupId]) {
        const course = courses.find(c => c.id === en.courseId);
        groups[en.groupId] = {
          groupId: en.groupId,
          courseId: en.courseId,
          courseName: course?.name || "—",
          courseDuration: course?.duration || 60,
          courseLocation: course?.location || defaultLocation,
          enrollments: [],
        };
      }
      groups[en.groupId].enrollments.push(en);
    });
    return Object.values(groups);
  })();

  const selectedGroup = groupOrders.find(g => g.groupId === selectedGroupId);

  useEffect(() => {
    if (selectedGroup) {
      setSelectedCourseId(selectedGroup.courseId);
      setDuration(selectedGroup.courseDuration);
      setLocation(selectedGroup.courseLocation);
    }
  }, [selectedGroupId]);

  const selectedStudent = students.find(s => s.id === selectedStudentId);
  const selectedCourse = courses.find(c => c.id === selectedCourseId);
  const studentEnrollments = (enrollments || []).filter(e => e.studentId === selectedStudentId && e.status === "active");

  const formatThaiDate = (iso) => {
    if (iso === todayISO()) return "วันนี้";
    if (iso === addDays(todayISO(), 1)) return "พรุ่งนี้";
    const [y, m, d] = iso.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString("th-TH", { day: "numeric", month: "long", year: "numeric" });
  };

  const allBookings = classes
    .filter(c => c.status === "scheduled" || c.status === "completed")
    .sort((a, b) => (a.date + a.startTime).localeCompare(b.date + b.startTime));

  // Merge group bookings — same groupClassId → 1 record (with members list)
  const mergedBookings = (() => {
    const seen = new Set();
    const result = [];
    allBookings.forEach(bk => {
      if (bk.groupClassId) {
        if (seen.has(bk.groupClassId)) return;
        seen.add(bk.groupClassId);
        const groupMembers = allBookings.filter(b => b.groupClassId === bk.groupClassId);
        result.push({
          ...bk,
          _isGroup: true,
          _members: groupMembers,
          _memberCount: groupMembers.length,
        });
      } else {
        result.push({ ...bk, _isGroup: false });
      }
    });
    return result;
  })();

  const pendingCount = mergedBookings.filter(b => b.status !== "completed").length;
  const completedCount = mergedBookings.filter(b => b.status === "completed").length;

  const filteredBookings = mergedBookings.filter(bk => {
    const s = students.find(st => st.id === bk.studentId);
    if (filterStatus === "pending" && bk.status === "completed") return false;
    if (filterStatus === "completed" && bk.status !== "completed") return false;
    if (filterStudentId !== "all") {
      // For group: match if any member is the filtered student
      if (bk._isGroup) {
        if (!bk._members.some(m => m.studentId === filterStudentId)) return false;
      } else {
        if (bk.studentId !== filterStudentId) return false;
      }
    }
    if (filterTeacherId !== "all") {
      if (filterTeacherId === "unassigned" && bk.teacherId) return false;
      if (filterTeacherId !== "unassigned" && bk.teacherId !== filterTeacherId) return false;
    }
    if (searchText) {
      const q = searchText.toLowerCase();
      const nameMatch = bk._isGroup
        ? bk._members.some(m => students.find(st => st.id === m.studentId)?.name?.toLowerCase().includes(q))
        : s?.name?.toLowerCase().includes(q);
      const courseMatch = bk.courseId ? courses.find(c => c.id === bk.courseId)?.name?.toLowerCase().includes(q) : false;
      const locMatch = bk.location?.toLowerCase().includes(q);
      if (!nameMatch && !courseMatch && !locMatch) return false;
    }
    return true;
  });

  useEffect(() => {
    if (selectedCourse) {
      setDuration(selectedCourse.duration || 60);
      setLocation(selectedCourse.location || "บ้าน");
    } else if (selectedStudent) {
      setLocation(selectedStudent.address || "บ้าน");
    }
  }, [selectedCourseId, selectedStudentId]);

  // Conflict detection - find overlapping scheduled classes on same date
  const conflictInfo = (() => {
    if (!date || !startTime) return null;
    const toMs = (d, t) => {
      const [y, mo, dd] = d.split("-").map(Number);
      const [h, mi] = t.split(":").map(Number);
      return new Date(y, mo - 1, dd, h, mi).getTime();
    };
    const start = toMs(date, startTime);
    const end = start + Number(duration) * 60000;

    const conflicts = classes
      .filter(c => c.status === "scheduled" && c.date === date)
      .filter(c => {
        const cs = toMs(c.date, c.startTime);
        const ce = cs + (c.duration || 60) * 60000;
        return start < ce && cs < end;
      });

    return conflicts.length > 0 ? conflicts : null;
  })();

  const handleSave = () => {
    // ============ GROUP BOOKING ============
    if (bookingMode === "group") {
      if (!selectedGroup || !date || !startTime) {
        alert("กรุณาเลือก Order กลุ่ม + วัน + เวลา");
        return;
      }
      if (conflictInfo) {
        alert("⚠ ช่วงเวลานี้ชนกับคลาสที่จองไว้แล้ว กรุณาเลือกเวลาอื่น");
        return;
      }

      const hrs = Number(duration) / 60;
      const newClasses = selectedGroup.enrollments.map((en, idx) => ({
        id: newId(),
        studentId: en.studentId,
        courseId: selectedGroup.courseId,
        teacherId: teacherId || undefined,
        groupClassId: newId(), // shared identifier — จองครั้งเดียว ทุกคนใช้ id เดียวกัน
        date, startTime, duration: Number(duration),
        location, status: "scheduled", price: 0, note,
      }));
      setClasses(prev => [...prev, ...newClasses]);

      // ตัดชั่วโมงจาก enrollment ทุกคนในกลุ่ม
      const enrollmentIds = new Set(selectedGroup.enrollments.map(en => en.id));
      ctx.setEnrollments(prev => prev.map(en => {
        if (enrollmentIds.has(en.id) && en.status === "active") {
          const newCompleted = Math.min(en.totalSessions, (en.completedSessions || 0) + hrs);
          const nowDone = newCompleted >= en.totalSessions;
          return { ...en, completedSessions: newCompleted, status: nowDone ? "completed" : "active" };
        }
        return en;
      }));

      setSavedId(newClasses[0].id);
      setSavedHrs(hrs);
      setSaved(true);
      setTimeout(() => setSaved(false), 4000);
      setSelectedGroupId("");
      setNote("");
      return;
    }

    // ============ INDIVIDUAL BOOKING ============
    if (!selectedStudentId || !date || !startTime) return;
    if (conflictInfo) {
      alert("⚠ ช่วงเวลานี้ชนกับคลาสที่จองไว้แล้ว กรุณาเลือกเวลาอื่น");
      return;
    }
    const id = newId();
    const hrs = Number(duration) / 60;

    setClasses(prev => [...prev, {
      id, studentId: selectedStudentId,
      courseId: selectedCourseId || undefined,
      teacherId: teacherId || undefined,
      date, startTime, duration: Number(duration),
      location, status: "scheduled", price: 0, note,
    }]);

    // ตัดชั่วโมงจาก enrollment ทันที
    if (selectedCourseId) {
      ctx.setEnrollments(prev => prev.map(en => {
        if (en.studentId === selectedStudentId && en.courseId === selectedCourseId && en.status === "active") {
          const newCompleted = Math.min(en.totalSessions, (en.completedSessions || 0) + hrs);
          const nowDone = newCompleted >= en.totalSessions;
          return { ...en, completedSessions: newCompleted, status: nowDone ? "completed" : "active" };
        }
        return en;
      }));
    }

    setSavedId(id);
    setSavedHrs(hrs);
    setSaved(true);
    setTimeout(() => setSaved(false), 4000);
    setSelectedCourseId("");
    setNote("");
  };

  const cancelBooking = (id) => {
    const bk = classes.find(c => c.id === id);
    if (!bk) return;
    const isGroupBk = !!bk.groupClassId;
    const groupCount = isGroupBk ? classes.filter(c => c.groupClassId === bk.groupClassId).length : 1;
    const msg = isGroupBk
      ? `ยกเลิกการจองกลุ่มนี้? (จะยกเลิก ${groupCount} คน + คืนชั่วโมงให้ทุกคน)`
      : "ยกเลิกการจองนี้?";
    if (!confirm(msg)) return;

    const hrs = (bk.duration || 60) / 60;

    if (isGroupBk) {
      // Find all classes in the group + restore hours for each enrollment
      const groupClasses = classes.filter(c => c.groupClassId === bk.groupClassId);
      const studentIdsInGroup = new Set(groupClasses.map(c => c.studentId));
      ctx.setEnrollments(prev => prev.map(en => {
        if (studentIdsInGroup.has(en.studentId) && en.courseId === bk.courseId) {
          const restored = Math.max(0, (en.completedSessions || 0) - hrs);
          return { ...en, completedSessions: restored, status: "active" };
        }
        return en;
      }));
      setClasses(prev => prev.filter(c => c.groupClassId !== bk.groupClassId));
      if (groupClasses.some(c => c.id === savedId)) setSavedId(null);
    } else {
      // Individual
      if (bk.courseId) {

                  <option key={tc.id} value={tc.id}>{tc.nickname || tc.name}</option>

                const c = bk.courseId ? courses.find(cc => cc.id === bk.courseId) : null;
                const sCat = s ? (allCats.find(cat => cat.id === (s.categoryId || s.category)) || CATEGORIES[s.category] || CATEGORIES.other) : CATEGORIES.other;
                const isNew = bk.id === savedId;
                const isToday = bk.date === todayISO();
                const isDone = bk.status === "completed";
                return (
                  <div key={bk.id} className="flex items-start gap-4 px-5 py-4 transition-all"
                    style={{
                      background: isDone ? "transparent" : isNew ? sCat.bg : "var(--bg-surface)",
                      border: isNew ? `1.5px solid ${sCat.color}` : "0.5px solid var(--border-soft)",
                      borderLeft: `3px solid ${isDone ? "var(--border-default)" : sCat.color}`,
                      opacity: isDone ? 0.6 : 1,
                    }}>
                    <div className="flex flex-col min-w-[90px] flex-shrink-0">
                      {(() => {
                        const [h, m] = bk.startTime.split(":").map(Number);
                        const endMin = h * 60 + m + (bk.duration || 60);
                        const endTime = `${String(Math.floor(endMin / 60)).padStart(2, "0")}:${String(endMin % 60).padStart(2, "0")}`;
                        return (
                          <>
                            <div className="num-display text-[20px] leading-none" style={{ color: isDone ? "var(--text-tertiary)" : "var(--text-primary)" }}>
                              {bk.startTime}
                            </div>
                            <div className="flex items-center gap-1 mt-1">
                              <div className="w-3 h-px" style={{ background: isDone ? "var(--text-quaternary)" : sCat.color, opacity: 0.5 }} />
                              <div className="num-display text-[14px]" style={{ color: isDone ? "var(--text-quaternary)" : "var(--text-tertiary)" }}>
                                {endTime}
                              </div>
                            </div>

                      <div className="text-[10px] mt-1.5 leading-snug"

                    <div className="w-px self-stretch" style={{ background: isDone ? "var(--border-default)" : sCat.color, opacity: 0.25 }} />

                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1 flex-wrap">

                          style={{ background: sCat.bg, color: sCat.text }}>
                          {bk._isGroup ? "👥" : (s?.name?.charAt(0) || "?")}
                        </div>
                        <div className="text-[13px] font-medium truncate">
                          {bk._isGroup ? (c?.name || "คอร์สกลุ่ม") : (s?.name || "ไม่พบ")}

                        {bk._isGroup && (
                          <span className="text-[9px] px-1.5 py-0.5 font-medium flex-shrink-0"

                            👥 กลุ่ม · {bk._memberCount} คน

                        )}
                        {isNew && <span className="text-[9px] px-2 py-0.5 font-medium flex-shrink-0" style={{ background: sCat.color, color: "#fff" }}>ใหม่</span>}
                        <span className="text-[9px] px-2 py-0.5 font-medium flex-shrink-0 ml-auto"
                          style={{
                            background: isDone ? "var(--success-soft)" : "var(--warning-soft)",
                            color: isDone ? "var(--success)" : "var(--warning)",

                          {isDone ? "✓ " + t("taughtStatus") : "○ " + t("notTaughtStatus")}

                      {/* Group members chips */}
                      {bk._isGroup && (
                        <div className="flex flex-wrap gap-1 mb-1.5">

                            return (

                                {mst.nickname || mst.name}

                        <span>{bk.duration} {t("minutes")}</span>
                        <span style={{ color: "var(--text-quaternary)" }}>·</span>
                        <span>{bk.location}</span>
                        {bk.teacherId && (() => {
                          const tc = teachers.find(t => t.id === bk.teacherId);

                              <span style={{ color: "var(--text-quaternary)" }}>·</span>

                            </button>

                              <div className="mt-2 space-y-2">
                                {bkNotes.slice(0, 3).map(n => {
                                  const [ny, nm, nd] = n.date.split("-").map(Number);
                                  const noteDate = new Date(ny, nm - 1, nd).toLocaleDateString("th-TH", { day: "numeric", month: "short" });

                    <div className="flex flex-col gap-1.5 flex-shrink-0">
                      {!isDone && (
                        <button onClick={() => setReminderModal(bk)}
                          className="text-[10px] px-2.5 py-1.5 flex items-center gap-1 transition-colors font-medium"
                          style={{ background: "var(--info-soft)", color: "var(--info)", border: "0.5px solid rgba(90,107,130,0.3)" }}>
                          <IconSend size={11} /> {t("notify")}
                        </button>
                      )}
                      {!isDone && (
                        <button onClick={() => setNoteModal(bk)}
                          className="text-[10px] px-2.5 py-1.5 flex items-center gap-1 transition-colors font-medium"

        </div>
      </div>

      {/* Quick Note Modal */}
      {noteModal && (
        <QuickNoteModal
          booking={noteModal}
          ctx={ctx}

      )}

      {reminderModal && (
        <ReminderModal
          booking={reminderModal}
          ctx={ctx}
          onClose={() => setReminderModal(null)}
