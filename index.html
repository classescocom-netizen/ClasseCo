// Searchable combobox for picking students
function StudentCombobox({ students, value, searchText, onChange }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState(searchText || "");
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  useEffect(() => { setQuery(searchText || ""); }, [searchText]);

  const filtered = students.filter(s => {
    if (!query) return true;
    const q = query.toLowerCase();
    return s.name.toLowerCase().includes(q) || (s.nickname || "").toLowerCase().includes(q) || (s.phone || "").includes(q);
  });

  return (
    <div className="relative" ref={ref}>
      <input type="text" value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); if (!e.target.value) onChange("", ""); }}
        onFocus={() => setOpen(true)}
        placeholder="พิมพ์ค้นหา หรือเลือกจากรายการ..."
        className="w-full px-3 py-2.5 text-[13px]"
        style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-default)", color: "var(--text-primary)", outline: "none", borderRadius: 6 }} />
      {open && (
        <div className="absolute z-20 left-0 right-0 mt-1 max-h-52 overflow-y-auto"
          style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", borderRadius: 6, boxShadow: "0 8px 24px rgba(0,0,0,0.12)" }}>
          {filtered.length === 0 ? (
            <div className="px-3 py-3 text-[11px] text-center" style={{ color: "var(--text-tertiary)" }}>
              ไม่พบนักเรียน — ลองพิมพ์ใหม่ หรือเลือก "นักเรียนใหม่"
            </div>
          ) : (
            filtered.slice(0, 20).map(s => (
              <button key={s.id} onClick={() => {
                const text = `${s.name}${s.nickname ? ` (${s.nickname})` : ""}`;
                onChange(s.id, text);
                setQuery(text);
                setOpen(false);
              }}
                className="w-full text-left px-3 py-2 transition-colors hover:bg-[var(--bg-muted)]"
                style={{ borderBottom: "0.5px solid var(--border-hairline)", background: value === s.id ? "var(--accent-sage-hover)" : "transparent" }}>
                <div className="text-[12px] font-medium">{s.name}{s.nickname && <span className="italic ml-1" style={{ color: "var(--text-tertiary)" }}>({s.nickname})</span>}</div>
                {s.phone && <div className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>📞 {s.phone}</div>}
              </button>
            ))
          )}
        </div>
      )}
    </div>
  );
}

function SellCourseModal({ ctx, onClose, course, onNavigate }) {
  const { students, setStudents, enrollments, setEnrollments, setPayments, settings, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const cat = allCats.find(c => c.id === (course.categoryId || course.category)) || CATEGORIES[course.category] || CATEGORIES.other;
  const isGroup = course.courseType === "group";
  const isGroupTotal = isGroup && course.paymentMode === "group-total";

  // Individual mode states (also used as 1st student in group)
  const [studentType, setStudentType] = useState("existing"); // 'existing' | 'new'
  const [selectedStudentId, setSelectedStudentId] = useState(students[0]?.id || "");
  const [newStudent, setNewStudent] = useState({ name: "", nickname: "", phone: "", lineId: "", age: "", parent: "" });

  // Group mode — list of students (each can be existing or new, including empty placeholder slots)
  // groupStudents[]: { type: 'existing'|'new'|'empty', studentId?, name?, nickname?, phone? }
  const [groupStudents, setGroupStudents] = useState([{ type: "empty" }]);

  const [sessions, setSessions] = useState(10);
  const [totalPrice, setTotalPrice] = useState(course.price * 8);
  const [paidAmount, setPaidAmount] = useState(course.price * 8);
  const [paymentType, setPaymentType] = useState("full"); // 'full' | 'deposit' | 'none'
  const [slipFile, setSlipFile] = useState(null);
  const [slipUrl, setSlipUrl] = useState("");
  const [note, setNote] = useState("");
  const [step, setStep] = useState(1); // 1=นักเรียน 2=แพ็กเกจ 3=ชำระ 4=สำเร็จ

  // Existing students enrolled in this course (for counter)
  const existingEnrollments = (enrollments || []).filter(en => en.courseId === course.id && en.status !== "cancelled");
  const existingCount = existingEnrollments.length;

  // Computed: filled students count in group mode (new ones being added now)
  const filledStudents = isGroup ? groupStudents.filter(s => s.type !== "empty" && (
    (s.type === "existing" && s.studentId) || (s.type === "new" && s.name && s.phone)
  )).length : 1;

  // Total = already enrolled + currently being added
  const totalEnrolledInGroup = isGroup ? existingCount + filledStudents : 1;

  useEffect(() => {
    // For group with per-student pricing: total = price/student × sessions × students
    // For group with group-total pricing: total = price × sessions (fixed, regardless of students)
    // For individual: total = price × sessions
    let computedTotal;
    if (isGroup && course.paymentMode === "per-student") {
      computedTotal = course.price * sessions * Math.max(filledStudents, 1);
    } else {
      computedTotal = course.price * sessions;
    }
    setTotalPrice(computedTotal);
    if (paymentType === "full") setPaidAmount(computedTotal);
    else if (paymentType === "deposit") setPaidAmount(Math.round(computedTotal * 0.5));
    else setPaidAmount(0);
  }, [sessions, paymentType, course.price, course.paymentMode, isGroup, filledStudents]);

  const studentName = isGroup
    ? (filledStudents === 0 ? "ยังไม่เพิ่มนักเรียน" : `กลุ่ม ${filledStudents} คน`)
    : (studentType === "existing"
      ? students.find(s => s.id === selectedStudentId)?.name || ""
      : newStudent.name);

  // For group: ผ่าน step 1 ได้แม้ยังไม่กรอกครบ (flexible)
  const canNext1 = isGroup
    ? true // flexible — สร้างคอร์สก่อนได้ เติมนักเรียนทีหลัง
    : (studentType === "existing" ? !!selectedStudentId : !!newStudent.name && !!newStudent.phone);
  const canNext2 = sessions > 0 && totalPrice > 0;

  const handleSlip = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const result = await processImage(file, { maxWidth: 1000, maxHeight: 1400, quality: 0.75, targetKB: 50 });
      // Show preview immediately
      setSlipFile(result.dataUrl);
      setSlipUrl(result.dataUrl);
      // Upload to Storage in background (if Supabase available)
      if (sb && ctx.orgId) {
        try {
          const filename = `slip_${newId()}.webp`;
          const { url, path } = await uploadImage(result.blob, "slips", ctx.orgId, filename);
          setSlipUrl(url);
          // Stash path in window so submit can pick it up (or store in state)
          window.__lastSlipPath = path;
        } catch (err) {
          console.warn("[slip] Storage upload failed, using base64:", err);
        }
      }
    } catch (err) {
      console.error("Slip processing failed:", err);
      alert("ไม่สามารถประมวลผลรูปได้ — ลองรูปอื่น");
    }
  };

  const handleSubmit = async () => {
    // ============ GROUP MODE ============
    if (isGroup) {
      const orderId = await nextOrderId(ctx.orgId);
      const groupId = newId(); // shared group identifier
      const newStudentsList = [];
      const enrollmentsList = [];
      const paymentsList = [];

      // Process each student in group
      groupStudents.forEach((gs, idx) => {
        if (gs.type === "empty") return;

        let stId;
        if (gs.type === "new") {
          if (!gs.name) return;
          stId = newId();
          newStudentsList.push({
            id: stId, name: gs.name, nickname: gs.nickname || "", age: 0,
            categoryId: course.categoryId || course.category,
            category: course.category || course.categoryId,
            subcategory: course.name,
            level: course.level, levelId: course.levelId,
            parent: "", phone: gs.phone || "", lineId: "",
            address: course.location || "", rate: course.price || 0,
            active: true, startDate: todayISO(),
          });
        } else {
          stId = gs.studentId;
          if (!stId) return;
        }

        // Per-student enrollment
        const perStudentPrice = course.paymentMode === "per-student"
          ? course.price * sessions
          : Math.round(totalPrice / Math.max(filledStudents, 1));
        const perStudentPaid = course.paymentMode === "per-student"
          ? (paymentType === "full" ? perStudentPrice : paymentType === "deposit" ? Math.round(perStudentPrice * 0.5) : 0)
          : 0; // group-total: paid only goes to first student record

        enrollmentsList.push({
          id: newId(),
          courseId: course.id,
          studentId: stId,
          groupId, // link enrollments together
          orderId, // shared order id for the whole group
          studentType: gs.type,
          newStudentName: gs.type === "new" ? gs.name : "",
          newStudentPhone: gs.type === "new" ? gs.phone || "" : "",
          date: todayISO(),
          totalSessions: sessions,
          completedSessions: 0,
          totalPrice: perStudentPrice,
          paidAmount: perStudentPaid,
          status: "active",
          note,
        });

        // Payment record per student
        if (course.paymentMode === "per-student") {
          paymentsList.push({
            id: newId(),
            orderId: `${orderId}-${idx + 1}`, // sub-order per student
            studentId: stId,
            amount: perStudentPaid,
            totalAmount: perStudentPrice,
            paidAmount: perStudentPaid,
            date: todayISO(),
            status: perStudentPaid >= perStudentPrice ? "paid" : perStudentPaid > 0 ? "partial" : "pending",
            note: `${course.name} · ${sessions} ชม. (กลุ่ม)`,
            slipUrl: slipUrl || "",
            groupId,
          });
        }
      });

      // For group-total: 1 payment record covering whole group, attached to first student
      if (course.paymentMode === "group-total" && enrollmentsList.length > 0) {
        const firstStId = enrollmentsList[0].studentId;
        paymentsList.push({
          id: newId(),
          orderId,
          studentId: firstStId,
          amount: paidAmount,
          totalAmount: totalPrice,
          paidAmount,
          date: todayISO(),
          status: paidAmount >= totalPrice ? "paid" : paidAmount > 0 ? "partial" : "pending",
          note: `${course.name} · ${sessions} ชม. · กลุ่ม ${enrollmentsList.length} คน`,
          slipUrl: slipUrl || "",
          groupId,
          isGroupPayment: true,
        });
      }

      if (newStudentsList.length > 0) setStudents(prev => [...prev, ...newStudentsList]);
      if (enrollmentsList.length > 0) setEnrollments(prev => [...prev, ...enrollmentsList]);
      if (paymentsList.length > 0) setPayments(prev => [...prev, ...paymentsList]);

      setStep(4);
      return;
    }

    // ============ INDIVIDUAL MODE (unchanged) ============
    let finalStudentId = selectedStudentId;

    if (studentType === "new" && newStudent.name) {
      // PLAN ENFORCEMENT — block if exceeds max
      const activeCount = (students || []).filter(s => s.active !== false).length;
      if (!canAddStudent(ctx.settings, activeCount)) {
        const plan = getPlan(ctx.settings);
        alert(`⚠ ครบจำนวนนักเรียนแล้ว (${activeCount}/${formatLimit(plan.maxStudents)})\n\nกรุณา Upgrade แพ็คเกจ หรือเลือกใช้นักเรียนเดิม`);
        return;
      }
      const newStId = newId();
      const newSt = {
        id: newStId, name: newStudent.name, nickname: newStudent.nickname || "", age: Number(newStudent.age) || 0,
        categoryId: course.categoryId || course.category,
        category: course.category || course.categoryId,
        subcategory: course.name,
        level: course.level, levelId: course.levelId,
        parent: newStudent.parent,
        phone: newStudent.phone, lineId: newStudent.lineId,
        address: course.location || "", rate: course.price || 0,
        active: true, startDate: todayISO(),
      };
      setStudents(prev => [...prev, newSt]);
      finalStudentId = newStId;
    }

    const orderId = await nextOrderId(ctx.orgId);
    const enrollment = {
      id: newId(),
      courseId: course.id,
      studentId: finalStudentId,
      orderId,
      studentType,
      newStudentName: studentType === "new" ? newStudent.name : "",
      newStudentPhone: studentType === "new" ? newStudent.phone : "",
      date: todayISO(),
      totalSessions: sessions,
      completedSessions: 0,
      totalPrice,
      paidAmount,
      status: "active",
      note,
    };
    setEnrollments(prev => [...prev, enrollment]);

    const remaining = totalPrice - paidAmount;
    setPayments(prev => [...prev, {
      id: newId(),
      orderId,
      studentId: finalStudentId,
      amount: paidAmount,
      totalAmount: totalPrice,
      paidAmount,
      date: todayISO(),
      status: remaining <= 0 ? "paid" : paidAmount > 0 ? "partial" : "pending",
      note: `${course.name} · ${sessions} ชั่วโมง`,
      slipUrl: slipUrl || "",
    }]);

    setStep(4);
  };

  if (step === 4) {
    return (
      <>
        <ModalHeader title={isGroup ? "บันทึกคอร์สกลุ่มสำเร็จ" : "ขายคอร์สสำเร็จ"} onClose={onClose} />
        <div className="p-8 flex flex-col items-center gap-4 text-center">
          <div className="w-16 h-16 rounded-full flex items-center justify-center" style={{ background: "var(--success-soft)" }}>
            <IconCheckCircle size={32} style={{ color: "#8B9F7E" }} />
          </div>
          <div>
            <div className="text-[16px] font-medium mb-1">{isGroup ? "บันทึกสำเร็จ!" : "ลงทะเบียนสำเร็จ!"}</div>
            <div className="text-[13px]" style={{ color: "var(--text-secondary)" }}>{studentName}</div>
            <div className="text-[12px] mt-0.5" style={{ color: "var(--text-secondary)" }}>{course.name} · {sessions} ชั่วโมง</div>
          </div>

          {isGroup ? (
            <>
              <div className="rounded-lg p-4 w-full" style={{ background: "rgba(196,168,120,0.08)", border: "0.5px solid rgba(196,168,120,0.3)" }}>
                <div className="text-[11px] mb-2" style={{ color: "#8B6F47", fontWeight: 500 }}>📋 ขั้นตอนต่อไป</div>
                <div className="text-[12px] text-left leading-relaxed" style={{ color: "#704F28" }}>
                  คอร์สถูกบันทึกแล้ว — ไปจัดการการชำระเงินที่หน้า <strong>"ชำระเงิน"</strong> เพื่อ:
                </div>
                <ul className="text-[11px] text-left mt-2 ml-4 space-y-0.5" style={{ color: "#8B6F47", listStyle: "disc" }}>
                  <li>รับเงินจากนักเรียนแต่ละคน {course.paymentMode === "per-student" ? "(แยกรายคน)" : "(ยอดรวมกลุ่ม)"}</li>
                  <li>แนบสลิปการโอน</li>
                  <li>พิมพ์ใบเสร็จ</li>
                </ul>
              </div>
              <div className="rounded-lg p-3 w-full text-center" style={{ background: "var(--bg-muted)" }}>
                <div className="text-[10px] mb-0.5" style={{ color: "var(--text-secondary)" }}>ยอดรวมที่ต้องเก็บ</div>
                <div className="text-[18px] font-medium">{formatBaht(totalPrice)}</div>
              </div>
            </>
          ) : (
            <>
              <div className="grid grid-cols-2 gap-3 w-full">
                <div className="rounded-lg p-3 text-center" style={{ background: "var(--success-soft)" }}>
                  <div className="text-[10px] mb-0.5" style={{ color: "#4A6B3F" }}>รับเงินแล้ว</div>
                  <div className="text-[16px] font-medium" style={{ color: "#4A6B3F" }}>{formatBaht(paidAmount)}</div>
                </div>
                <div className="rounded-lg p-3 text-center" style={{ background: totalPrice - paidAmount > 0 ? "var(--warning-soft)" : "var(--success-soft)" }}>
                  <div className="text-[10px] mb-0.5" style={{ color: totalPrice - paidAmount > 0 ? "#704F28" : "#4A6B3F" }}>ค้างชำระ</div>
                  <div className="text-[16px] font-medium" style={{ color: totalPrice - paidAmount > 0 ? "#704F28" : "#4A6B3F" }}>{formatBaht(totalPrice - paidAmount)}</div>
                </div>
              </div>
              {studentType === "new" && (
                <div className="text-[11px] px-4 py-2 rounded-lg w-full" style={{ background: "#ECE8F4", color: "#4A3F78" }}>
                  ✓ เพิ่มนักเรียนใหม่ "{newStudent.name}" เข้าระบบแล้ว
                </div>
              )}
            </>
          )}

          <div className="flex gap-2 w-full">
            <button onClick={onClose} className="flex-1 text-[12px] py-2.5 rounded-md font-medium"
              style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
              เสร็จสิ้น
            </button>
            <button onClick={() => onNavigate ? onNavigate("payments") : onClose()}
              className="flex-1 text-[12px] py-2.5 rounded-md font-medium flex items-center justify-center gap-1.5"
              style={{ background: "#1A1A17", color: "#C4A878" }}>
              <IconWallet size={12} /> ไปหน้าชำระเงิน →
            </button>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <ModalHeader title={`ขายคอร์ส — ${course.name}`} onClose={onClose} />

      <div className="px-5 py-3" style={{ borderBottom: "0.5px solid var(--border-default)", background: cat.bg }}>
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: "rgba(232,228,214,0.7)" }}>
            <IconLayers size={14} style={{ color: cat.color }} />
          </div>
          <div>
            <div className="text-[12px] font-medium" style={{ color: cat.text }}>{course.name}</div>
            <div className="text-[10px]" style={{ color: cat.text, opacity: 0.8 }}>{cat.name || cat.label} · {course.level} · {course.duration} นาที/ครั้ง</div>
          </div>
        </div>
        <div className="flex gap-1 mt-3">
          {["นักเรียน", "แพ็กเกจ", "ชำระเงิน"].map((s, i) => (
            <div key={i} className="flex items-center gap-1">
              <div className="flex items-center gap-1.5">
                <div className="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-medium"
                  style={{ background: step > i + 1 ? "#8B9F7E" : step === i + 1 ? "#1A1A17" : "var(--border-strong)", color: step >= i + 1 ? "#fff" : "var(--text-tertiary)" }}>
                  {step > i + 1 ? "✓" : i + 1}
                </div>
                <span className="text-[10px] font-medium" style={{ color: step === i + 1 ? cat.text : "var(--text-tertiary)" }}>{s}</span>
              </div>
              {i < 2 && <div className="flex-1 h-px mx-1" style={{ background: "var(--border-strong)", minWidth: 20 }} />}
            </div>
          ))}
        </div>
      </div>

      <div className="flex-1 overflow-y-auto p-5">

        {step === 1 && !isGroup && (
          <div className="space-y-4">
            <div className="text-[13px] font-medium mb-3">เลือกประเภทนักเรียน</div>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => setStudentType("existing")}
                className="p-4 rounded-2xl text-left"
                style={{ border: studentType === "existing" ? "2px solid #8B9F7E" : "0.5px solid var(--border-default)", background: studentType === "existing" ? "var(--success-soft)" : "#fff" }}>
                <div className="text-[22px] mb-1">👤</div>
                <div className="text-[13px] font-medium" style={{ color: studentType === "existing" ? "#4A6B3F" : "inherit" }}>นักเรียนเก่า</div>
                <div className="text-[10px] mt-0.5" style={{ color: studentType === "existing" ? "#6B8F5C" : "var(--text-secondary)" }}>มีในระบบแล้ว เลือกได้เลย</div>
              </button>
              <button onClick={() => setStudentType("new")}
                className="p-4 rounded-2xl text-left"
                style={{ border: studentType === "new" ? "2px solid #8B84C4" : "0.5px solid var(--border-default)", background: studentType === "new" ? "#ECE8F4" : "#fff" }}>
                <div className="text-[22px] mb-1">✨</div>
                <div className="text-[13px] font-medium" style={{ color: studentType === "new" ? "#4A3F78" : "inherit" }}>นักเรียนใหม่</div>
                <div className="text-[10px] mt-0.5" style={{ color: studentType === "new" ? "#6258A5" : "var(--text-secondary)" }}>กรอกข้อมูลเพิ่มเข้าระบบ</div>
              </button>
            </div>

            {studentType === "existing" && (
              <div className="space-y-3">
                <FormRow label="เลือกนักเรียน">
                  <select className={inputCls} style={inputSty} value={selectedStudentId} onChange={e => setSelectedStudentId(e.target.value)}>
                    {students.filter(s => s.active).map(s => (
                      <option key={s.id} value={s.id}>{s.name} — {s.subcategory}</option>
                    ))}
                  </select>
                </FormRow>
                {selectedStudentId && (() => {
                  const s = students.find(st => st.id === selectedStudentId);
                  if (!s) return null;
                  const sCat = allCats.find(c => c.id === (s.categoryId || s.category)) || CATEGORIES[s.category] || CATEGORIES.other;
                  return (
                    <div className="flex items-center gap-3 p-3 rounded-lg" style={{ background: "var(--bg-muted)" }}>
                      <div className="w-10 h-10 rounded-full flex items-center justify-center text-[13px] font-medium"
                        style={{ background: sCat.bg, color: sCat.text }}>
                        {s.name.charAt(0)}
                      </div>
                      <div>
                        <div className="text-[12px] font-medium">{s.name}</div>
                        <div className="text-[10px]" style={{ color: "var(--text-secondary)" }}>{s.subcategory} · {s.level} · {s.phone}</div>
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}

            {studentType === "new" && (
              <div className="space-y-3">
                <div className="text-[11px] px-3 py-2 rounded-lg" style={{ background: "#ECE8F4", color: "#4A3F78" }}>
                  ✨ ข้อมูลนักเรียนใหม่จะถูกเพิ่มเข้าระบบอัตโนมัติเมื่อยืนยัน
                </div>
                <FormRow label="ชื่อ-นามสกุล *">
                  <input className={inputCls} style={inputSty} value={newStudent.name}
                    onChange={e => setNewStudent({ ...newStudent, name: e.target.value })} placeholder="น้องใหม่ ดนตรีดี" />
                </FormRow>
                <FormRow label={t("nickname")}>
                  <input className={inputCls} style={inputSty} value={newStudent.nickname}
                    onChange={e => setNewStudent({ ...newStudent, nickname: e.target.value })} placeholder="น้องใหม่" />
                </FormRow>
                <div className="grid grid-cols-2 gap-3">
                  <FormRow label="เบอร์โทร *">
                    <input className={inputCls} style={inputSty} value={newStudent.phone}
                      onChange={e => setNewStudent({ ...newStudent, phone: e.target.value })} placeholder="081-234-5678" />
                  </FormRow>
                  <FormRow label="Line ID">
                    <input className={inputCls} style={inputSty} value={newStudent.lineId}
                      onChange={e => setNewStudent({ ...newStudent, lineId: e.target.value })} placeholder="@line_id" />
                  </FormRow>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <FormRow label={t("age")}>
                    <input type="number" className={inputCls} style={inputSty} value={newStudent.age}
                      onChange={e => setNewStudent({ ...newStudent, age: e.target.value })} placeholder="25" />
                  </FormRow>
                  <FormRow label={t("parent")}>
                    <input className={inputCls} style={inputSty} value={newStudent.parent}
                      onChange={e => setNewStudent({ ...newStudent, parent: e.target.value })} placeholder="(ถ้ามี)" />
                  </FormRow>
                </div>
              </div>
            )}
          </div>
        )}

        {step === 1 && isGroup && (
          <div className="space-y-4">
            <div className="flex items-baseline justify-between mb-2">
              <div>
                <div className="text-[13px] font-medium">เพิ่มนักเรียนเข้ากลุ่ม</div>
                <div className="text-[10px]" style={{ color: "var(--text-secondary)" }}>
                  สูงสุด {course.maxStudents} คน · ตอนนี้ <strong style={{ color: totalEnrolledInGroup > course.maxStudents ? "var(--danger)" : "var(--text-primary)" }}>{totalEnrolledInGroup}/{course.maxStudents}</strong> คน
                  {existingCount > 0 && <span style={{ color: "var(--text-tertiary)" }}> · มีอยู่แล้ว {existingCount} คน</span>}
                </div>
              </div>
              <div className="text-[10px] italic" style={{ color: "#8B6F47" }}>
                ✨ เพิ่มได้ตอนนี้ หรือเพิ่มทีหลัง
              </div>
            </div>

            {existingCount > 0 && (
              <div className="p-2.5" style={{ background: "var(--success-soft)", borderLeft: "2px solid var(--success)", borderRadius: 4 }}>
                <div className="text-[10px] font-medium mb-1" style={{ color: "var(--success)" }}>นักเรียนที่อยู่ในคอร์สแล้ว ({existingCount} คน)</div>
                <div className="flex flex-wrap gap-1.5">
                  {existingEnrollments.map(en => {
                    const st = students.find(s => s.id === en.studentId);
                    if (!st) return null;
                    return (
                      <span key={en.id} className="text-[10px] px-2 py-0.5 rounded" style={{ background: "rgba(63,107,74,0.12)", color: "var(--success)" }}>
                        {st.name}{st.nickname ? ` (${st.nickname})` : ""}
                      </span>
                    );
                  })}
                </div>
              </div>
            )}

            <div className="space-y-2">
              {groupStudents.map((gs, idx) => (
                <div key={idx} className="p-3" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", borderRadius: 8 }}>
                  <div className="flex items-center justify-between mb-2">
                    <div className="text-[11px] font-medium" style={{ color: "var(--text-secondary)" }}>คนที่ {idx + 1}</div>
                    {groupStudents.length > 1 && (
                      <button onClick={() => setGroupStudents(prev => prev.filter((_, i) => i !== idx))}
                        className="text-[10px]" style={{ color: "var(--danger)" }}>✕ ลบ</button>
                    )}
                  </div>

                  <div className="flex gap-1.5 mb-2">
                    {[
                      { id: "empty", label: "ยังไม่กรอก" },
                      { id: "existing", label: "นักเรียนเก่า" },
                      { id: "new", label: "นักเรียนใหม่" },
                    ].map(opt => (
                      <button key={opt.id} onClick={() => setGroupStudents(prev => prev.map((s, i) => i === idx ? { type: opt.id, studentId: students[0]?.id || "", name: "", phone: "", nickname: "" } : s))}
                        className="text-[10px] px-2 py-1 rounded transition-all"
                        style={{
                          background: gs.type === opt.id ? "#1A1A17" : "var(--bg-muted)",
                          color: gs.type === opt.id ? "#C4A878" : "var(--text-secondary)",
                          fontWeight: gs.type === opt.id ? 500 : 400,
                        }}>
                        {opt.label}
                      </button>
                    ))}
                  </div>

                  {gs.type === "existing" && (() => {
                    const alreadyEnrolledIds = new Set(existingEnrollments.map(en => en.studentId));
                    const otherSlotIds = new Set(groupStudents.filter((g, gi) => gi !== idx).map(g => g.studentId).filter(Boolean));
                    const availableStudents = students.filter(s => s.active && !alreadyEnrolledIds.has(s.id) && !otherSlotIds.has(s.id));
                    const selectedSt = availableStudents.find(s => s.id === gs.studentId);
                    return (
                      <StudentCombobox
                        students={availableStudents}
                        value={gs.studentId || ""}
                        searchText={gs.searchText || (selectedSt ? `${selectedSt.name}${selectedSt.nickname ? ` (${selectedSt.nickname})` : ""}` : "")}
                        onChange={(stId, searchText) => setGroupStudents(prev => prev.map((s, i) => i === idx ? { ...s, studentId: stId, searchText } : s))}
                      />
                    );
                  })()}

                  {gs.type === "new" && (
                    <div className="grid grid-cols-3 gap-2">
                      <input className={inputCls} style={inputSty} placeholder="ชื่อ-นามสกุล" value={gs.name || ""}
                        onChange={e => setGroupStudents(prev => prev.map((s, i) => i === idx ? { ...s, name: e.target.value } : s))} />
                      <input className={inputCls} style={inputSty} placeholder="ชื่อเล่น" value={gs.nickname || ""}
                        onChange={e => setGroupStudents(prev => prev.map((s, i) => i === idx ? { ...s, nickname: e.target.value } : s))} />
                      <input className={inputCls} style={inputSty} placeholder="เบอร์โทร" value={gs.phone || ""}
                        onChange={e => setGroupStudents(prev => prev.map((s, i) => i === idx ? { ...s, phone: e.target.value } : s))} />
                    </div>
                  )}
                </div>
              ))}
            </div>

            {totalEnrolledInGroup < course.maxStudents && (
              <button onClick={() => setGroupStudents(prev => [...prev, { type: "empty" }])}
                className="w-full py-2.5 text-[12px] font-medium transition-all hover:bg-[var(--bg-muted)]"
                style={{ border: "1px dashed var(--border-strong)", color: "var(--text-secondary)", borderRadius: 8 }}>
                + เพิ่มนักเรียนอีกคน ({totalEnrolledInGroup}/{course.maxStudents})
              </button>
            )}

            <div className="text-[10px] px-3 py-2.5" style={{ background: "rgba(196,168,120,0.08)", borderLeft: "2px solid #C4A878", color: "#8B6F47", lineHeight: 1.5 }}>
              💡 <strong>คอร์สกลุ่มแบบ flexible:</strong> ถ้ายังไม่มีนักเรียนพร้อม กดผ่านขั้นตอนนี้ไปก่อนได้ — เพิ่มนักเรียนทีหลังในหน้าคอร์สเรียน
            </div>
          </div>
        )}

        {step === 2 && (
          <div className="space-y-4">
            <div className="text-[13px] font-medium mb-1">กำหนดแพ็กเกจ</div>
            <div className="text-[11px] mb-4" style={{ color: "var(--text-secondary)" }}>
              สำหรับ {studentName}
            </div>

            <div>
              <label className="text-[11px] font-medium block mb-2" style={{ color: "var(--text-primary)" }}>จำนวนชั่วโมง</label>
              <div className="grid grid-cols-4 gap-2 mb-2">
                {[1, 5, 10, 15, 20, 25, 30, 50].map(n => (
                  <button key={n} onClick={() => setSessions(n)}
                    className="py-2 rounded-md text-[12px] font-medium"
                    style={{ background: sessions === n ? "#1A1A17" : "var(--bg-muted)", color: sessions === n ? "#C4A878" : "var(--text-primary)", border: sessions === n ? "none" : "0.5px solid var(--border-default)" }}>
                    {n} ชม.
                  </button>
                ))}
              </div>
              <div className="flex items-center gap-2">
                <span className="text-[11px]" style={{ color: "var(--text-secondary)" }}>หรือกรอกเอง:</span>
                <input type="number" min="1" className={inputCls} style={{ ...inputSty, width: 80 }} value={sessions}
                  onChange={e => setSessions(Math.max(1, Number(e.target.value) || 1))} />
                <span className="text-[11px]" style={{ color: "var(--text-secondary)" }}>ชั่วโมง</span>
                <span className="text-[10px] ml-auto" style={{ color: "var(--text-tertiary)" }}>
                  ≈ {Math.ceil((sessions * 60) / (course.duration || 60))} ครั้ง (ครั้งละ {course.duration || 60} นาที)
                </span>
              </div>
            </div>

            <FormRow label="ราคารวมทั้งหมด (฿)">
              <div className="flex items-center gap-2">
                <input type="number" className={inputCls} style={inputSty} value={totalPrice}
                  onChange={e => setTotalPrice(Number(e.target.value) || 0)} />
                <button onClick={() => setTotalPrice(course.price * sessions)}
                  className="text-[10px] px-2.5 py-1.5 rounded-md flex-shrink-0"
                  style={{ background: "var(--bg-muted)", color: "var(--text-secondary)", border: "0.5px solid var(--border-default)" }}>
                  รีเซ็ต
                </button>
              </div>
              <div className="text-[10px] mt-1" style={{ color: "var(--text-tertiary)" }}>
                ราคาปกติ {formatBaht(course.price)}/ชม. × {sessions} ชม. = {formatBaht(course.price * sessions)}
                {totalPrice < course.price * sessions && (
                  <span className="ml-1" style={{ color: "#4A6B3F" }}>
                    (ลด {formatBaht(course.price * sessions - totalPrice)})
                  </span>
                )}
              </div>
            </FormRow>

            <FormRow label={t("note")}>
              <input className={inputCls} style={inputSty} value={note}
                onChange={e => setNote(e.target.value)} placeholder="เช่น นักเรียนเก่าได้รับส่วนลดพิเศษ" />
            </FormRow>

            <div className="p-3 rounded-2xl" style={{ background: "var(--bg-muted)" }}>
              <div className="flex justify-between text-[11px] mb-1">
                <span style={{ color: "var(--text-secondary)" }}>ราคา/ชั่วโมงโดยเฉลี่ย</span>
                <span className="font-medium">{sessions > 0 ? formatBaht(Math.round(totalPrice / sessions)) : "-"}</span>
              </div>
              <div className="flex justify-between text-[13px] font-medium">
                <span>ราคารวม</span>
                <span style={{ color: "#1A1A17" }}>{formatBaht(totalPrice)}</span>
              </div>
            </div>
          </div>
        )}

        {step === 3 && (
          <div className="space-y-4">
            <div className="text-[13px] font-medium mb-1">การชำระเงิน</div>
            <div className="text-[11px] mb-3" style={{ color: "var(--text-secondary)" }}>
              {studentName} · {course.name} · {sessions} ชั่วโมง · {formatBaht(totalPrice)}
            </div>

            <div className="space-y-2">
              {[
                { id: "full", label: "ชำระเต็มจำนวน", desc: formatBaht(totalPrice), icon: "💳" },
                { id: "deposit", label: "มัดจำ 50%", desc: formatBaht(Math.round(totalPrice * 0.5)), icon: "🤝" },
                { id: "none", label: "ยังไม่ชำระ / ค้างจ่าย", desc: "บันทึกไว้ก่อน", icon: "📋" },
              ].map(opt => (
                <button key={opt.id} onClick={() => setPaymentType(opt.id)}
                  className="w-full flex items-center gap-3 p-3.5 rounded-2xl text-left"
                  style={{ border: paymentType === opt.id ? "2px solid #8B9F7E" : "0.5px solid var(--border-default)", background: paymentType === opt.id ? "var(--success-soft)" : "#fff" }}>
                  <span className="text-[20px]">{opt.icon}</span>
                  <div className="flex-1">
                    <div className="text-[12px] font-medium" style={{ color: paymentType === opt.id ? "#4A6B3F" : "inherit" }}>{opt.label}</div>
                    <div className="text-[11px] mt-0.5" style={{ color: paymentType === opt.id ? "#6B8F5C" : "var(--text-secondary)" }}>{opt.desc}</div>
                  </div>
                  {paymentType === opt.id && <IconCheck size={14} style={{ color: "#8B9F7E" }} />}
                </button>
              ))}
            </div>

            <FormRow label="จำนวนเงินที่รับ (฿)">
              <input type="number" className={inputCls} style={inputSty} value={paidAmount}
                onChange={e => setPaidAmount(Math.min(totalPrice, Math.max(0, Number(e.target.value) || 0)))} />
            </FormRow>

            <div className="rounded-2xl p-4 space-y-2" style={{ background: "var(--bg-muted)" }}>
              <div className="flex justify-between text-[11px]">
                <span style={{ color: "var(--text-secondary)" }}>ราคารวม</span><span>{formatBaht(totalPrice)}</span>
              </div>
              <div className="flex justify-between text-[11px]">
                <span style={{ color: "var(--text-secondary)" }}>รับเงิน</span>
                <span className="font-medium" style={{ color: "#4A6B3F" }}>{formatBaht(paidAmount)}</span>
              </div>
              {totalPrice - paidAmount > 0 && (
                <div className="flex justify-between text-[11px] pt-2" style={{ borderTop: "0.5px solid var(--border-default)" }}>
                  <span style={{ color: "var(--danger)" }}>ค้างชำระ</span>
                  <span className="font-medium" style={{ color: "var(--danger)" }}>{formatBaht(totalPrice - paidAmount)}</span>
                </div>
              )}
            </div>

            {/* Slip upload — แสดงเมื่อมีการชำระเงิน */}
            {paymentType !== "none" && (
              <div>
                <div className="text-[11px] font-medium mb-2" style={{ color: "var(--text-primary)" }}>
                  แนบสลิปโอนเงิน <span style={{ color: "var(--text-tertiary)" }}>(ถ้ามี)</span>
                </div>
                {slipFile ? (
                  <div className="relative">
                    <img src={slipFile} alt="slip" className="w-full rounded-xl object-contain"
                      style={{ maxHeight: 180, border: "0.5px solid var(--border-default)", background: "var(--bg-muted)" }} />
                    <button onClick={() => { setSlipFile(null); setSlipUrl(""); }}
                      className="absolute top-2 right-2 w-6 h-6 rounded-full flex items-center justify-center text-[10px]"
                      style={{ background: "var(--danger)", color: "#fff" }}>✕</button>
                  </div>
                ) : (
                  <label className="flex flex-col items-center justify-center gap-2 py-5 cursor-pointer rounded-xl transition-colors hover:bg-[var(--accent-sage-hover)]"
                    style={{ border: "1.5px dashed var(--border-default)" }}>
                    <span style={{ fontSize: 22 }}>📎</span>
                    <div className="text-center">
                      <div className="text-[12px] font-medium">คลิกเพื่อแนบสลิป</div>
                      <div className="text-[10px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>JPG, PNG — สลิปจะถูกบันทึกในหน้าชำระเงิน</div>
                    </div>
                    <input type="file" accept="image/*" className="hidden" onChange={handleSlip} />
                  </label>
                )}
              </div>
            )}
          </div>
        )}
      </div>

      <div className="flex gap-2 px-6 py-4" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
        {step > 1 && (
          <button onClick={() => setStep(step - 1)} className="text-[12px] py-2 px-4 rounded-md font-medium flex items-center gap-1"
            style={{ border: "0.5px solid var(--border-strong)" }}>
            <IconChevL size={12} /> ย้อนกลับ
          </button>
        )}
        <button onClick={onClose} className="text-[12px] py-2 px-4 rounded-md font-medium"
          style={{ border: "0.5px solid var(--border-strong)" }}>ยกเลิก</button>
        {step < 3 ? (
          <button
            onClick={() => {
              // Group mode skips step 3 — submit directly with paymentType="none"
              if (step === 2 && isGroup) {
                setPaymentType("none");
                setPaidAmount(0);
                setTimeout(() => handleSubmit(), 0);
              } else {
                setStep(step + 1);
              }
            }}
            disabled={step === 1 ? !canNext1 : !canNext2}
            className="flex-1 text-[12px] py-2 rounded-md font-medium flex items-center justify-center gap-1"
            style={{ background: (step === 1 ? canNext1 : canNext2) ? "#1A1A17" : "#E0E0DA", color: (step === 1 ? canNext1 : canNext2) ? "#C4A878" : "rgba(0,0,0,0.3)" }}>
            {step === 2 && isGroup ? <>✓ บันทึกคอร์ส (ไปจัดการชำระเงินทีหลัง)</> : <>ถัดไป <IconChevR size={12} /></>}
          </button>
        ) : (
          <button onClick={handleSubmit} className="flex-1 text-[12px] py-2 rounded-md font-medium"
            style={{ background: "#1A1A17", color: "#C4A878" }}>
            ✓ ยืนยันการขาย
          </button>
        )}
      </div>
    </>
  );
}

// ============ SCHEDULE ============
function SchedulePage({ ctx, onOpen }) {
  const { students, classes, notes, settings, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const teachers = (settings?.teachers || []).filter(t => t.active);
  const hasMultiTeacher = teachers.length > 1;
  const [anchor, setAnchor] = useState(new Date());
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [viewMode, setViewMode] = useState("week"); // 'week' | 'day'
  const [filterTeacherId, setFilterTeacherId] = useState("all");

  const weekStart = useMemo(() => {
    const d = new Date(anchor);
    const day = d.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
    const diff = day === 0 ? -6 : 1 - day; // shift to Monday
    d.setDate(d.getDate() + diff);
    return d;
  }, [anchor]);

  const days = [...Array(7)].map((_, i) => { const d = new Date(weekStart); d.setDate(d.getDate() + i); return d; });
  const hours = [];
  for (let h = 8; h <= 20; h++) hours.push(`${String(h).padStart(2, "0")}:00`);

  const shiftWeek = (n) => { const d = new Date(anchor); d.setDate(d.getDate() + n * 7); setAnchor(d); };
  const shiftDay = (n) => { const d = new Date(anchor); d.setDate(d.getDate() + n); setAnchor(d); };

  // Apply teacher filter
  const filteredClasses = filterTeacherId === "all"
    ? classes
    : classes.filter(c => c.teacherId === filterTeacherId || (!c.teacherId && filterTeacherId === "unassigned"));

  // Day view data
  const dayIso = `${anchor.getFullYear()}-${String(anchor.getMonth()+1).padStart(2,"0")}-${String(anchor.getDate()).padStart(2,"0")}`;
  const dayEvents = filteredClasses.filter(c => c.date === dayIso)
    .sort((a, b) => a.startTime.localeCompare(b.startTime));
  const isTodayAnchor = anchor.toDateString() === new Date().toDateString();

  const getTopHeight = (cls) => {
    const [h, m] = cls.startTime.split(":").map(Number);
    const startMin = h * 60 + m - 8 * 60;
    return { top: (startMin / 60) * 48, height: (cls.duration / 60) * 48 };
  };

  const selStudent = selectedEvent ? students.find(st => st.id === selectedEvent.studentId) : null;
  const selCat = selStudent
    ? (allCats.find(c => c.id === (selStudent.categoryId || selStudent.category)) || CATEGORIES[selStudent.category] || CATEGORIES.other)
    : CATEGORIES.other;
  const selNotes = selectedEvent
    ? notes.filter(n => n.studentId === selectedEvent.studentId).sort((a, b) => b.date.localeCompare(a.date))
    : [];
  const [eh, em] = selectedEvent ? selectedEvent.startTime.split(":").map(Number) : [0, 0];
  const endMin = eh * 60 + em + (selectedEvent?.duration || 60);
  const selEndTime = `${String(Math.floor(endMin / 60)).padStart(2, "0")}:${String(endMin % 60).padStart(2, "0")}`;

  return (
    <div className="p-4 sm:p-8">
      <div className="bg-[var(--bg-surface)]" style={{ border: "0.5px solid var(--border-soft)" }}>

        {/* Header with view toggle */}
        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 px-4 sm:px-5 py-3" style={{ borderBottom: "0.5px solid var(--border-default)" }}>
          <div className="flex items-baseline gap-3 flex-wrap">
            <div className="text-[15px] sm:text-[17px] font-medium">
              {viewMode === "week"
                ? weekStart.toLocaleDateString("th-TH", { month: "long", year: "numeric" })
                : anchor.toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
            </div>
            <div className="text-[11px]" style={{ color: "var(--text-secondary)" }}>
              {viewMode === "week"
                ? `${classes.filter(c => { const d = new Date(c.date); return d >= weekStart && d < new Date(weekStart.getTime() + 7 * 86400000); }).length} คลาสสัปดาห์นี้`
                : `${dayEvents.length} คลาสวันนี้`}
            </div>
          </div>

          <div className="flex items-center gap-2 sm:gap-4 flex-wrap">
            {/* Teacher filter — show only if multi-teacher */}
            {hasMultiTeacher && (
              <div className="flex items-center gap-2">
                <span className="text-[10px] label-eyebrow">ครู:</span>
                <select value={filterTeacherId} onChange={e => setFilterTeacherId(e.target.value)}
                  className="text-[11px] px-2.5 py-1.5"
                  style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", color: "var(--text-primary)", outline: "none", minWidth: 140 }}>
                  <option value="all">ทุกคน ({teachers.length})</option>
                  {teachers.map(tc => (
                    <option key={tc.id} value={tc.id}>{tc.nickname || tc.name}</option>
                  ))}
                  <option value="unassigned">{t("noTeacher") || "No teacher"}</option>
                </select>
                {filterTeacherId !== "all" && (
                  <span className="w-2 h-2 rounded-full" style={{ background: teachers.find(t => t.id === filterTeacherId)?.color || "#C4A878" }} />
                )}
              </div>
            )}

            {/* View toggle */}
            <div className="flex overflow-hidden" style={{ border: "0.5px solid var(--border-default)" }}>
              {[
                { id: "week", label: t ? (t("week") !== "week" ? t("week") : "สัปดาห์") : "สัปดาห์" },
                { id: "day", label: t ? (t("day") !== "day" ? t("day") : "วัน") : "วัน" },
              ].map(v => (
                <button key={v.id} onClick={() => setViewMode(v.id)}
                  className="text-[11px] px-3 py-1.5 font-medium transition-colors"
                  style={{
                    background: viewMode === v.id ? "#1A1A17" : "transparent",
                    color: viewMode === v.id ? "#C4A878" : "var(--text-secondary)",
                  }}>
                  {v.label}
                </button>
              ))}
            </div>

            {/* Navigation */}
            <div className="flex gap-1.5">
              <button onClick={() => viewMode === "week" ? shiftWeek(-1) : shiftDay(-1)}
                className="w-6 h-6 rounded flex items-center justify-center" style={{ background: "var(--bg-muted)" }}>
                <IconChevL size={12} />
              </button>
              <button onClick={() => setAnchor(new Date())}
                className="text-[10px] px-2 py-1 rounded" style={{ background: "var(--bg-muted)" }}>
                {t ? t("todayWord") : "วันนี้"}
              </button>
              <button onClick={() => viewMode === "week" ? shiftWeek(1) : shiftDay(1)}
                className="w-6 h-6 rounded flex items-center justify-center" style={{ background: "var(--bg-muted)" }}>
                <IconChevR size={12} />
              </button>
            </div>
          </div>
        </div>

        {viewMode === "week" && (
        <div className="schedule-week-resp" style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
        <div className="grid" style={{ gridTemplateColumns: "44px repeat(7, minmax(120px, 1fr))", minWidth: 800 }}>
          <div style={{ borderRight: "0.5px solid var(--border-default)", borderBottom: "0.5px solid var(--border-default)", background: "var(--bg-muted)" }} />
          {days.map((d, i) => {
            const isToday = d.toDateString() === new Date().toDateString();
            const isWeekend = i >= 5;
            return (
              <div key={i} className="text-center py-2.5" style={{
                borderRight: i < 6 ? "0.5px solid var(--border-default)" : "none",
                borderBottom: "0.5px solid var(--border-default)",
                background: isWeekend ? "#F0ECE1" : "var(--bg-muted)",
              }}>
                <div className="text-[10px]" style={{ color: isWeekend ? "var(--text-tertiary)" : "var(--text-secondary)" }}>
                  {d.toLocaleDateString("th-TH", { weekday: "short" })}
                </div>
                <div className="mt-0.5">
                  <span className="text-[14px] font-medium inline-flex items-center justify-center w-6 h-6 rounded-full" style={{
                    background: isToday ? "#1A1A17" : "transparent",
                    color: isToday ? "#C4A878" : "inherit",
                  }}>{d.getDate()}</span>
                </div>
              </div>
            );
          })}

          <div style={{ borderRight: "0.5px solid var(--border-default)" }}>
            {hours.map(h => (
              <div key={h} className="text-[9px] text-right pr-1.5 pt-0.5" style={{ height: 48, borderBottom: "0.5px solid var(--border-soft)", color: "var(--text-tertiary)" }}>{h}</div>
            ))}
          </div>

          {days.map((day, dayIdx) => {
            const iso = `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,"0")}-${String(day.getDate()).padStart(2,"0")}`;
            const events = filteredClasses.filter(c => c.date === iso);
            const isWeekendCol = dayIdx >= 5;
            return (
              <div key={dayIdx} className="relative" style={{
                borderRight: dayIdx < 6 ? "0.5px solid var(--border-default)" : "none",
                background: isWeekendCol ? "rgba(240,236,225,0.35)" : "transparent",
              }}>
                {hours.map((_, i) => <div key={i} style={{ height: 48, borderBottom: "0.5px solid var(--border-soft)" }} />)}
                {events.map(ev => {
                  const s = students.find(st => st.id === ev.studentId);
                  const sCat = allCats.find(c => c.id === (s?.categoryId || s?.category)) || CATEGORIES[s?.category || "other"];
                  const { top, height } = getTopHeight(ev);
                  const isDone = ev.status === "completed";
                  return (
                    <button key={ev.id}
                      onClick={() => setSelectedEvent(ev)}
                      className="absolute left-1 right-1 overflow-hidden text-left px-1.5 py-1 transition-all hover:brightness-95"
                      style={{
                        top, height: Math.max(height - 2, 24),
                        background: sCat.bg, color: sCat.text,
                        borderLeft: `2px solid ${sCat.color}`,
                        opacity: isDone ? 0.55 : 1,
                      }}>
                      <div className="text-[10px] font-medium truncate">{s?.name}</div>
                      {height > 40 && <div className="text-[9px] opacity-75 truncate">{ev.startTime}–{(() => { const [h,m]=ev.startTime.split(":").map(Number); const em=h*60+m+(ev.duration||60); return `${String(Math.floor(em/60)).padStart(2,"0")}:${String(em%60).padStart(2,"0")}`; })()}</div>}
                    </button>
                  );
                })}
              </div>
            );
          })}
        </div>
        </div>
        )}

        {/* Day view */}
        {viewMode === "day" && (
          <div className="p-6">
            {dayEvents.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-20 gap-3">
                <div style={{ color: "var(--text-quaternary)" }}><IconCal size={40} stroke={1} /></div>
                <div className="heading-serif text-[18px] italic" style={{ color: "var(--text-tertiary)" }}>
                  {t ? t("noClassToday") : "ไม่มีคลาสวันนี้"}
                </div>
                <div className="text-[11px]" style={{ color: "var(--text-quaternary)" }}>
                  พักผ่อนหรือเพิ่มนักเรียนใหม่ได้
                </div>
              </div>
            ) : (
              <div className="space-y-3">
                {dayEvents.map((ev, idx) => {
                  const s = students.find(st => st.id === ev.studentId);
                  const sCat = allCats.find(c => c.id === (s?.categoryId || s?.category)) || CATEGORIES[s?.category || "other"];
                  const [h, m] = ev.startTime.split(":").map(Number);
                  const em = h * 60 + m + (ev.duration || 60);
                  const endT = `${String(Math.floor(em/60)).padStart(2,"0")}:${String(em%60).padStart(2,"0")}`;
                  const isDone = ev.status === "completed";
                  const evNotes = notes.filter(n => n.studentId === ev.studentId).sort((a, b) => b.date.localeCompare(a.date));
                  const latestNote = evNotes[0];

                  // Gap indicator — time since previous event
                  let gapInfo = null;
                  if (idx > 0) {
                    const prev = dayEvents[idx - 1];
                    const [ph, pm] = prev.startTime.split(":").map(Number);
                    const prevEnd = ph * 60 + pm + (prev.duration || 60);
                    const curStart = h * 60 + m;
                    const gap = curStart - prevEnd;
                    if (gap > 0) {
                      const hh = Math.floor(gap / 60);
                      const mm = gap % 60;
                      gapInfo = hh > 0 ? `${hh} ชม. ${mm > 0 ? mm + " นาที" : ""}`.trim() : `${mm} นาที`;
                    }
                  }

                  return (
                    <div key={ev.id}>
                      {gapInfo && (
                        <div className="flex items-center gap-2 py-2 pl-4">
                          <div className="w-px h-4" style={{ background: "var(--border-default)" }} />
                          <span className="text-[10px]" style={{ color: "var(--text-quaternary)" }}>ว่าง {gapInfo}</span>
                        </div>
                      )}
                      <button onClick={() => setSelectedEvent(ev)}
                        className="w-full text-left transition-all hover:shadow-sm"
                        style={{
                          background: isDone ? "transparent" : "var(--bg-surface)",
                          border: "0.5px solid var(--border-soft)",
                          borderLeft: `4px solid ${isDone ? "var(--border-default)" : sCat.color}`,
                          opacity: isDone ? 0.6 : 1,
                          padding: "16px 20px",
                        }}>
                        <div className="flex gap-5 items-start">
                          {/* Left: time block */}
                          <div className="flex-shrink-0" style={{ minWidth: 120 }}>
                            <div className="num-display text-[28px] leading-none" style={{ color: isDone ? "var(--text-tertiary)" : "var(--text-primary)" }}>
                              {ev.startTime}
                            </div>
                            <div className="flex items-center gap-1.5 mt-1.5">
                              <div className="w-4 h-px" style={{ background: sCat.color, opacity: 0.5 }} />
                              <div className="num-display text-[16px]" style={{ color: "var(--text-tertiary)" }}>{endT}</div>
                            </div>
                            <div className="text-[10px] mt-1.5 label-eyebrow" style={{ color: "var(--text-quaternary)" }}>
                              {ev.duration} นาที
                            </div>
                          </div>

                          {/* Middle: details */}
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 mb-2">
                              <div className="w-8 h-8 flex items-center justify-center text-[12px] font-medium flex-shrink-0"
                                style={{ background: sCat.bg, color: sCat.text }}>
                                {s?.name?.charAt(0) || "?"}
                              </div>
                              <div>
                                <div className="text-[14px] font-medium">{s?.name || "ไม่พบ"}</div>
                                <div className="text-[11px]" style={{ color: "var(--text-secondary)" }}>
                                  {s?.subcategory} · {s?.level}
                                </div>
                              </div>
                              <span className="ml-auto text-[9px] px-2 py-0.5 font-medium flex-shrink-0"
                                style={{
                                  background: isDone ? "var(--success-soft)" : "var(--warning-soft)",
                                  color: isDone ? "var(--success)" : "var(--warning)",
                                }}>
                                {isDone ? "✓ สอนแล้ว" : "○ รอสอน"}
                              </span>
                            </div>

                            <div className="text-[11px] flex flex-wrap gap-x-3 gap-y-1 mb-2" style={{ color: "var(--text-secondary)" }}>
                              <span>📍 {ev.location}</span>
                              {s?.phone && <span>📞 {s.phone}</span>}
                              {s?.lineId && <span>💬 {s.lineId}</span>}
                            </div>

                            {ev.note && (
                              <div className="text-[11px] px-3 py-2 mt-2" style={{ background: "var(--bg-muted)", color: "var(--text-secondary)", borderLeft: `2px solid ${sCat.color}` }}>
                                📝 {ev.note}
                              </div>
                            )}

                            {latestNote && (
                              <div className="mt-2 text-[10px] flex items-center gap-1.5" style={{ color: "var(--text-tertiary)" }}>
                                <IconBook size={10} />
                                บันทึกล่าสุด: <span className="font-medium" style={{ color: "var(--text-secondary)" }}>{latestNote.title}</span>
                                <span style={{ color: "var(--text-quaternary)" }}>
                                  ({(() => { const [y,m,d] = latestNote.date.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("th-TH",{day:"numeric",month:"short"}); })()})
                                </span>
                              </div>
                            )}
                          </div>
                        </div>
                      </button>
                    </div>
                  );
                })}

                {/* Day summary */}
                <div className="mt-6 pt-5 flex justify-between items-center" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
                  <div className="text-[11px]" style={{ color: "var(--text-secondary)" }}>
                    รวม <span className="num-display text-[14px]" style={{ color: "var(--text-primary)" }}>{dayEvents.length}</span> คลาส
                    <span className="mx-2" style={{ color: "var(--text-quaternary)" }}>·</span>
                    <span className="num-display text-[14px]" style={{ color: "var(--text-primary)" }}>
                      {(dayEvents.reduce((sum, e) => sum + (e.duration || 0), 0) / 60).toFixed(1)}
                    </span> ชั่วโมง
                  </div>
                  <div className="text-[11px]" style={{ color: "var(--text-tertiary)" }}>
                    {dayEvents.filter(e => e.status === "completed").length} สอนแล้ว · {dayEvents.filter(e => e.status !== "completed").length} รอสอน
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Popup modal */}
      {selectedEvent && selStudent && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in"
          style={{ background: "rgba(15,31,24,0.45)", backdropFilter: "blur(4px)" }}
          onClick={() => setSelectedEvent(null)}>
          <div onClick={e => e.stopPropagation()}
            className="w-full max-w-md overflow-hidden"
            style={{ background: "var(--bg-surface)", boxShadow: "var(--shadow-elevated)", border: "0.5px solid var(--border-soft)", maxHeight: "80vh", display: "flex", flexDirection: "column" }}>

            {/* Header */}
            <div className="px-6 py-5 flex items-center gap-4 flex-shrink-0"
              style={{ background: selCat.bg, borderBottom: `2px solid ${selCat.color}` }}>
              <div className="w-11 h-11 flex items-center justify-center text-[15px] font-medium flex-shrink-0"
                style={{ background: "rgba(255,255,255,0.55)", color: selCat.text }}>
                {selStudent.name.charAt(0)}
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-[15px] font-medium truncate" style={{ color: selCat.text }}>{selStudent.name}</div>
                <div className="text-[11px] mt-0.5" style={{ color: selCat.text, opacity: 0.75 }}>
                  {selStudent.subcategory} · {selStudent.level}
                </div>
              </div>
              <button onClick={() => setSelectedEvent(null)} className="p-1.5 flex-shrink-0" style={{ color: selCat.color, opacity: 0.7 }}>
                <IconX size={16} />
              </button>
            </div>

            <div className="overflow-y-auto flex-1">

              {/* Class info */}
              <div className="px-6 py-5 space-y-2.5" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
                <div className="label-eyebrow mb-3">รายละเอียดคลาส</div>
                {(() => {
                  const tc = selectedEvent.teacherId ? teachers.find(t => t.id === selectedEvent.teacherId) : null;
                  return [
                    { icon: "📅", label: "วันที่", val: (() => { const [y,m,d] = selectedEvent.date.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); })() },
                    { icon: "⏰", label: "เวลา", val: `${selectedEvent.startTime} – ${selEndTime} น. (${selectedEvent.duration} นาที)` },
                    { icon: "📍", label: "สถานที่", val: selectedEvent.location },
                    ...(hasMultiTeacher ? [{ icon: tc ? "👨‍🏫" : "○", label: "ครูผู้สอน", val: tc ? (tc.nickname || tc.name) : "ไม่ระบุ", color: tc?.color }] : []),
                    { icon: "●", label: "สถานะ", val: selectedEvent.status === "completed" ? "✓ สอนแล้ว" : "○ รอสอน", color: selectedEvent.status === "completed" ? "var(--success)" : "var(--warning)" },
                  ];
                })().map((row, i) => (
                  <div key={i} className="flex items-start gap-3">
                    <span className="text-[13px] flex-shrink-0 mt-0.5">{row.icon}</span>
                    <div className="flex-1 min-w-0">
                      <div className="text-[10px] mb-0.5" style={{ color: "var(--text-tertiary)" }}>{row.label}</div>
                      <div className="text-[12px] font-medium" style={{ color: row.color || "var(--text-primary)" }}>{row.val}</div>
                    </div>
                  </div>
                ))}
                {selectedEvent.note && (
                  <div className="text-[11px] px-3 py-2.5 mt-1 leading-relaxed"
                    style={{ background: "var(--bg-muted)", color: "var(--text-secondary)", borderLeft: `2px solid ${selCat.color}` }}>
                    📝 {selectedEvent.note}
                  </div>
                )}
              </div>

              {/* Notes */}
              <div className="px-6 py-5">
                <div className="flex items-center justify-between mb-4">
                  <div className="label-eyebrow">บันทึกการสอนล่าสุด</div>
                  <span className="text-[10px] px-2 py-0.5 font-medium"
                    style={{ background: selCat.bg, color: selCat.text }}>
                    {selNotes.length} รายการ
                  </span>
                </div>

                {selNotes.length === 0 ? (
                  <div className="text-center py-8">
                    <div className="heading-serif text-[15px] italic mb-1" style={{ color: "var(--text-tertiary)" }}>ยังไม่มีบันทึก</div>
                    <div className="text-[11px]" style={{ color: "var(--text-quaternary)" }}>บันทึกได้จากหน้าจองเรียน</div>
                  </div>
                ) : (
                  <div className="space-y-2.5">
                    {selNotes.slice(0, 5).map(n => (
                      <div key={n.id} className="p-4"
                        style={{ background: "var(--bg-muted)", borderLeft: `2px solid ${selCat.color}` }}>
                        <div className="flex justify-between items-baseline mb-2">
                          <div className="text-[12px] font-medium truncate pr-3">{n.title}</div>
                          <div className="text-[10px] flex-shrink-0" style={{ color: "var(--text-tertiary)" }}>
                            {(() => { const [y,m,d] = n.date.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"numeric"}); })()}
                          </div>
                        </div>
                        {n.content && (
                          <div className="text-[11px] leading-relaxed" style={{ color: "var(--text-secondary)" }}>
                            {n.content}
                          </div>
                        )}
                      </div>
                    ))}
                    {selNotes.length > 5 && (
                      <div className="text-center text-[11px] py-1" style={{ color: "var(--text-tertiary)" }}>
                        และอีก {selNotes.length - 5} รายการ
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>

            {/* Footer */}
            <div className="px-6 py-4 flex-shrink-0" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
              <button onClick={() => setSelectedEvent(null)}
                className="w-full text-[13px] py-2.5 font-medium transition-colors hover:bg-[var(--accent-sage-hover)]"

}

      if (matchId) {
        if (s.categoryId !== filter && s.category !== filter) return false;
      } else {
        if (s.category !== filter) return false;
      }

    if (search && !s.name.toLowerCase().includes(search.toLowerCase())) return false;

function PaymentsPage({ ctx, onOpen }) {
  const { students, payments, setPayments, t } = ctx;
  const [filter, setFilter] = useState("all");
  const [expandedGroups, setExpandedGroups] = useState({});
  const [receiveModal, setReceiveModal] = useState(null);
  const [slipModal, setSlipModal] = useState(null); // url string

  const isUnpaid = (p) => p.status === "pending" || p.status === "overdue";

  const totalUnpaid = useMemo(() => payments.filter(isUnpaid).reduce((s, p) => s + Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)), 0), [payments]);
  const totalPartial = useMemo(() => payments.filter(p => p.status === "partial").reduce((s, p) => s + Math.max(0, (p.totalAmount || p.amount) - (p.paidAmount || 0)), 0), [payments]);
  const totalPaidMonth = useMemo(() => payments.filter(p => p.status === "paid" && new Date(p.date).getMonth() === new Date().getMonth()).reduce((s, p) => s + (p.totalAmount || p.amount), 0), [payments]);

  // Group by orderId — 1 order = 1 group เสมอ ไม่ merge ไม่ว่าจะขายซ้ำแค่ไหน
  const groups = useMemo(() => {
    const parentPayments = payments.filter(p => !p._txRecord);
    const groupMap = {};
    parentPayments.forEach(p => {
      const baseNote = (p.note || "").replace(/ · ค้างชำระ$/, "");
      const key = p.orderId || p.id;
      groupMap[key] = { key, studentId: p.studentId, note: baseNote, parentId: p.id, orderId: p.orderId || null, payments: [p] };
    });

    return Object.values(groupMap).map(g => {
      const parent = g.payments[0];
      const totalAmt = parent?.totalAmount || parent?.amount || 0;
      const paidAmt = parent?.paidAmount || (parent?.status === "paid" ? totalAmt : 0);
      const remaining = Math.max(0, totalAmt - paidAmt);
      const status = parent?.status || "pending";
      const txLines = payments.filter(p => p._parentId === parent?.id || (p._txRecord && p.studentId === g.studentId && p.note === g.note));
      return { ...g, totalAmt, paidAmt, remaining, status, txLines };
    }).filter(g =>
      filter === "all" || (filter === "unpaid" ? isUnpaid({ status: g.status }) : g.status === filter)
    ).sort((a, b) => {
      const pa = a.payments[0]?.date || "";
      const pb = b.payments[0]?.date || "";
      return pb.localeCompare(pa);
    });
  }, [payments, filter]);

  const toggleGroup = (key) => setExpandedGroups(prev => ({ ...prev, [key]: !prev[key] }));

  const statusChip = (status) => status === "paid"
    ? { bg: "var(--success-soft)", fg: "var(--success)", label: "ชำระเต็ม" }
    : status === "partial"
    ? { bg: "var(--info-soft)", fg: "var(--info)", label: "ชำระบางส่วน" }
    : { bg: "var(--warning-soft)", fg: "var(--warning)", label: "ยังไม่ชำระ" };

  const COLS = "2fr 100px 90px 90px 90px 90px 180px";

  return (
    <div className="responsive-page-pad p-8 space-y-5">
      {/* Stat cards */}
      <div className="grid grid-cols-3 stat-grid-resp" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)" }}>
        <StatCard label={t("paidThisMonth")} value={formatBaht(totalPaidMonth)} trend={t("monthRevenue")} up />
        <StatCard label={t("unpaidAmount")} value={formatBaht(totalUnpaid)} trend={`${payments.filter(isUnpaid).length} ${t("record")}`} up={false} />
        <StatCard label={t("partialPaid")} value={formatBaht(totalPartial)} trend={`${payments.filter(p => p.status === "partial").length} ${t("record")}`} up={false} />
      </div>

      {/* Filter pills */}
      <div className="flex gap-2 flex-wrap justify-center sm:justify-start">
        {[
          { id: "all", label: t("allItems") },
          { id: "unpaid", label: t("unpaidAmount") },
          { id: "partial", label: t("partialPaid") },
          { id: "paid", label: t("paidFull") },
        ].map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)}
            className={`filter-pill ${filter === f.id ? "active" : ""}`}>
            {f.label}
          </button>
        ))}
      </div>

      {/* Accordion table */}
      <div className="table-scroll" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", overflow: "hidden" }}>
       <div style={{ minWidth: 720 }} className="hide-mobile-block">
        {/* Header row */}
        <div className="grid text-[9px] font-medium px-4 py-2.5 label-eyebrow"
          style={{ gridTemplateColumns: COLS, background: "var(--bg-muted)", borderBottom: "0.5px solid var(--border-soft)" }}>
          <div>{t("student")} / {t("courseList")}</div>
          <div>{t("status")}</div>
          <div className="font-mono" style={{ fontSize: 8 }}>Order ID</div>
          <div className="text-right">{t("totalAmount")}</div>
          <div className="text-right">{t("paid")}</div>
          <div className="text-right">{t("remaining")}</div>
          <div></div>
        </div>

        {groups.length === 0 && (
          <div className="p-12 text-center heading-serif text-[18px] italic" style={{ color: "var(--text-tertiary)" }}>ไม่มีรายการ</div>
        )}

        {groups.map(g => {
          const s = students.find(st => st.id === g.studentId);
          const sc = statusChip(g.status);
          const isOpen = !!expandedGroups[g.key];
          const txCount = g.payments.length;

          return (
            <div key={g.key} style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
              {/* ===== GROUP HEADER ===== */}
              <div className="grid items-center px-4 py-3.5 cursor-pointer transition-colors hover:bg-[var(--accent-sage-hover)]"
                style={{ gridTemplateColumns: COLS, background: isOpen ? "var(--accent-sage-hover)" : "transparent" }}
                onClick={() => toggleGroup(g.key)}>

                {/* Student + nickname + course */}
                <div className="flex items-center gap-3 min-w-0">
                  <div className="w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-semibold flex-shrink-0"
                    style={{ background: "var(--bg-muted)", color: "var(--text-secondary)" }}>
                    {s?.name?.charAt(0) || "?"}
                  </div>
                  <div className="min-w-0">
                    <div className="text-[13px] font-medium flex items-baseline gap-1.5">
                      <span className="truncate">{s?.name || "—"}</span>
                      {s?.nickname && <span className="text-[11px] italic flex-shrink-0" style={{ color: "var(--text-tertiary)" }}>"{s.nickname}"</span>}
                    </div>
                    <div className="text-[11px] truncate" style={{ color: "var(--text-secondary)" }}>{g.note}</div>

                {/* Status */}
                <div>
