      )}
    </div>
  );
}

// ============ REMINDER MODAL ============
function ReminderModal({ booking, ctx, onClose }) {
  const { students, courses, enrollments, settings, t } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;

  const student = students.find(s => s.id === booking.studentId);
  const course = booking.courseId ? courses.find(c => c.id === booking.courseId) : null;
  const en = course ? (enrollments || []).find(e => e.studentId === booking.studentId && e.courseId === course.id && e.status === "active") : null;
  const remaining = en ? Math.round((en.totalSessions - en.completedSessions) * 10) / 10 : null;

  const [h, m] = booking.startTime.split(":").map(Number);
  const endMin = h * 60 + m + (booking.duration || 60);
  const endTime = `${String(Math.floor(endMin / 60)).padStart(2,"0")}:${String(endMin % 60).padStart(2,"0")}`;

  const [y, mo, d] = booking.date.split("-").map(Number);
  const thaiDate = new Date(y, mo - 1, d).toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  const thaiDateShort = new Date(y, mo - 1, d).toLocaleDateString("th-TH", { day: "numeric", month: "long" });

  const sCat = student ? (allCats.find(c => c.id === (student.categoryId || student.category)) || CATEGORIES[student.category] || CATEGORIES.other) : CATEGORIES.other;

  const [style, setStyle] = useState("formal");
  const [copied, setCopied] = useState(false);

  const templates = {
    formal: [
      `เรียน ${student?.name || "นักเรียน"} 🙏`,
      ``,
      `ขอแจ้งเตือนว่ามีคลาส${course ? course.name : "เรียน"}ในวัน${thaiDate}`,
      `เวลา ${booking.startTime} – ${endTime} น. (${booking.duration} นาที)`,
      `📍 สถานที่: ${booking.location}`,
      remaining !== null ? `⏱ ชั่วโมงคงเหลือ: ${remaining} ชม.` : "",
      ``,
      `กรุณาเตรียมตัวให้พร้อมนะคะ/ครับ 🎵`,
      `— ครูสมชาย`,
    ].filter(l => l !== null && l !== undefined).join("\n"),

    casual: [
      `สวัสดีครับ ${student?.name?.split(" ")[0] || "น้อง"} 😊`,
      ``,
      `เตือนไว้ก่อนนะ — ${thaiDateShort} นี้มีคลาสเรียน${course ? course.name : ""}`,
      `⏰ ${booking.startTime} – ${endTime} น.`,
      `📍 ${booking.location}`,
      remaining !== null ? `ชั่วโมงเหลืออีก ${remaining} ชม. นะ` : "",
      ``,
      `เจอกันนะครับ! 👋`,
    ].filter(l => l !== null && l !== undefined).join("\n"),

    short: [
      `📅 แจ้งเตือนคลาส`,
      `${student?.name?.split(" ")[0] || "น้อง"} — ${thaiDateShort}`,
      `⏰ ${booking.startTime} – ${endTime} น.`,
      `📍 ${booking.location}`,
      remaining !== null ? `⏱ เหลือ ${remaining} ชม.` : "",
    ].filter(Boolean).join("\n"),

    parent: [
      `เรียนคุณผู้ปกครองของ ${student?.name || "นักเรียน"} 🙏`,
      ``,
      `ขอแจ้งเตือนว่า${student?.name?.split(" ")[0] || "น้อง"}มีคลาส${course ? course.name : "เรียน"}`,
      `📅 ${thaiDate}`,
      `⏰ เวลา ${booking.startTime} – ${endTime} น.`,
      `📍 สถานที่: ${booking.location}`,
      remaining !== null ? `⏱ ชั่วโมงคงเหลือในแพ็กเกจ: ${remaining} ชม.` : "",
      ``,
      `หากต้องการเลื่อนนัด กรุณาแจ้งล่วงหน้าอย่างน้อย 24 ชั่วโมงนะคะ/ครับ`,
      `ขอบคุณครับ — ครูสมชาย`,
    ].filter(l => l !== null && l !== undefined).join("\n"),
  };

  const text = templates[style];

  const copyText = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    });
  };

  const styleOpts = [
    { id: "formal", label: t ? t("formal") : "Formal" },
    { id: "casual", label: t ? t("casual") : "Casual" },
    { id: "short", label: t ? t("short") || "Short" : "Short" },
    { id: "parent", label: t ? t("parent") : "Parent" },
  ];

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in"
      style={{ background: "rgba(15,31,24,0.55)", backdropFilter: "blur(4px)" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="w-full max-w-md"
        style={{ background: "var(--bg-surface)", boxShadow: "var(--shadow-elevated)", border: "0.5px solid var(--border-soft)" }}>

        {/* Header */}
        <div className="px-6 py-5 flex items-start justify-between" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
          <div>
            <div className="label-eyebrow mb-1">Reminder</div>
            <div className="heading-serif text-[20px]">{t ? t("notify") : "Notify"}</div>
            <div className="flex items-center gap-2 mt-1.5">
              <div className="w-6 h-6 flex items-center justify-center text-[10px] font-medium flex-shrink-0"
                style={{ background: sCat.bg, color: sCat.text }}>{student?.name?.charAt(0)}</div>
              <span className="text-[12px]" style={{ color: "var(--text-secondary)" }}>{student?.name}</span>
              <span className="text-[11px]" style={{ color: "var(--text-tertiary)" }}>· {thaiDateShort} · {booking.startTime}</span>
            </div>
          </div>
          <button onClick={onClose} className="p-1.5" style={{ color: "var(--text-tertiary)" }}><IconX size={15} /></button>
        </div>

        <div className="px-6 py-5 space-y-4">

          {/* Style selector */}
          <div>
            <div className="label-eyebrow mb-2">{t ? t("bookingFormat") : "Format"}</div>
            <div className="flex gap-2 flex-wrap">
              {styleOpts.map(opt => (
                <button key={opt.id} onClick={() => setStyle(opt.id)}
                  className="text-[11px] px-3 py-1.5 font-medium transition-all"
                  style={{
                    background: style === opt.id ? "#1A1A17" : "var(--bg-muted)",
                    color: style === opt.id ? "#C4A878" : "var(--text-secondary)",
                    border: style === opt.id ? "none" : "0.5px solid var(--border-default)",
                  }}>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          {/* Preview */}
          <div>
            <div className="label-eyebrow mb-2">{t ? t("sampleText") : "Sample"}</div>
            <div className="px-4 py-4 text-[12px] leading-relaxed whitespace-pre-wrap select-all"
              style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)", color: "var(--text-primary)", fontFamily: "inherit", minHeight: 120 }}>
              {text}
            </div>
            <div className="text-[10px] mt-1" style={{ color: "var(--text-quaternary)" }}>{t ? t("clickToCopy") : "Click to select"}</div>
          </div>

          {/* Line/Contact info */}
          {(student?.lineId || student?.phone) && (
            <div className="flex gap-3">
              {student.phone && (
                <div className="flex-1 px-3 py-2.5" style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)" }}>
                  <div className="label-eyebrow mb-0.5" style={{ fontSize: 9 }}>เบอร์โทร</div>
                  <div className="text-[12px] font-medium">{student.phone}</div>
                </div>
              )}
              {student.lineId && (
                <div className="flex-1 px-3 py-2.5" style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)" }}>
                  <div className="label-eyebrow mb-0.5" style={{ fontSize: 9 }}>Line ID</div>
                  <div className="text-[12px] font-medium">{student.lineId}</div>
                </div>
              )}
            </div>
          )}

        </div>

        {/* Footer */}
        <div className="flex gap-2 px-6 pb-6">
          <button onClick={onClose}
            className="text-[13px] py-3 px-5 font-medium transition-colors"
            style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
            ปิด
          </button>
          <button onClick={copyText}
            className="flex-1 text-[13px] py-3 font-medium flex items-center justify-center gap-2 transition-all hover:opacity-90"
            style={{ background: copied ? "var(--success)" : "#1A1A17", color: copied ? "#fff" : "#C4A878" }}>
            {copied ? (
              <><IconCheck size={14} /> คัดลอกแล้ว!</>
            ) : (
              <><IconSend size={14} /> คัดลอกข้อความ</>
            )}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============ QUICK NOTE MODAL ============
function QuickNoteModal({ booking, ctx, onClose }) {
  const { students, setNotes, setClasses, classes, courses, enrollments, settings } = ctx;
  const student = students.find(s => s.id === booking.studentId);
  const [title, setTitle] = useState("");
  const [content, setContent] = useState("");
  const [markDone, setMarkDone] = useState(true);
  const [selectedTopics, setSelectedTopics] = useState([]);
  const [customTopic, setCustomTopic] = useState("");

  // Resolve master topics from course > enrollment > student category
  let course = booking.courseId ? courses.find(c => c.id === booking.courseId) : null;

  // Fallback: if booking has no courseId, look up from student's active enrollment
  if (!course && student) {
    const activeEn = (enrollments || []).find(e => e.studentId === student.id && e.status === "active");
    if (activeEn) course = courses.find(c => c.id === activeEn.courseId);
  }

  const categoryId = course?.categoryId || course?.category || student?.categoryId || student?.category;
  const topicsBank = settings?.topics || DEFAULT_SETTINGS.topics;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const currentCatName = allCats.find(c => c.id === categoryId)?.name || CATEGORIES[categoryId]?.label || categoryId || "ไม่ระบุหมวด";
  const masterTopics = topicsBank[categoryId] || [];

  const toggleTopic = (t) => {
    setSelectedTopics(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
  };

  const addCustom = () => {
    const t = customTopic.trim();
    if (t && !selectedTopics.includes(t)) {
      setSelectedTopics([...selectedTopics, t]);
      setCustomTopic("");
    }
  };

  const submit = () => {
    if (!title.trim()) return alert("กรุณาใส่หัวข้อ");
    const isGroupBk = !!booking.groupClassId;

    if (isGroupBk) {
      // Group booking: create 1 note per student in the group
      const groupClasses = classes.filter(c => c.groupClassId === booking.groupClassId);
      const newNotes = groupClasses.map((gc, idx) => ({
        id: newId(),
        studentId: gc.studentId,
        classId: gc.id,
        date: gc.date,
        title,
        content,
        topics: selectedTopics,
        duration: gc.duration,
      }));
      setNotes(prev => [...newNotes, ...prev]);
      if (markDone) {
        setClasses(prev => prev.map(c => c.groupClassId === booking.groupClassId ? { ...c, status: "completed" } : c));
      }
    } else {
      setNotes(prev => [{
        id: newId(),
        studentId: booking.studentId,
        classId: booking.id,
        date: booking.date,
        title,
        content,
        topics: selectedTopics,
        duration: booking.duration,
      }, ...prev]);
      if (markDone) {
        setClasses(prev => prev.map(c => c.id === booking.id ? { ...c, status: "completed" } : c));
      }
    }
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in"
      style={{ background: "rgba(15,31,24,0.5)", backdropFilter: "blur(4px)" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="w-full max-w-lg overflow-hidden"
        style={{ background: "var(--bg-surface)", boxShadow: "var(--shadow-elevated)", border: "0.5px solid var(--border-soft)", maxHeight: "92vh", display: "flex", flexDirection: "column" }}>

        <div className="px-6 py-5 flex items-start justify-between flex-shrink-0" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
          <div className="min-w-0 flex-1">
            <div className="label-eyebrow mb-1">บันทึกการสอน{booking.groupClassId ? " · กลุ่ม" : ""}</div>
            {booking.groupClassId ? (() => {
              const groupClasses = classes.filter(c => c.groupClassId === booking.groupClassId);
              const course = booking.courseId ? courses.find(c => c.id === booking.courseId) : null;
              return (

                  <div className="heading-serif text-[20px]">{course?.name || "คอร์สกลุ่ม"}</div>
                  <div className="flex flex-wrap gap-1 mt-1.5 mb-1">

                    💡 บันทึกเดียว — เซฟให้ทั้ง {groupClasses.length} คน

            <div className="text-[11px] mt-0.5" style={{ color: "var(--text-secondary)" }}>

                  เลือก {selectedTopics.length} หัวข้อ

            {/* Selected chips */}
            {selectedTopics.length > 0 && (
              <div className="flex flex-wrap gap-1.5 mb-2.5 p-2.5"
                style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)" }}>
                {selectedTopics.map((t, i) => (
                  <span key={i} className="text-[11px] px-2.5 py-1 flex items-center gap-1.5 font-medium"
                    style={{ background: "#1A1A17", color: "#C4A878" }}>
                    {t}
                    <button onClick={() => toggleTopic(t)} style={{ opacity: 0.7, fontSize: 11 }}>✕</button>
                  </span>
                ))}
              </div>
            )}

            {/* Master topic chips */}
            {masterTopics.length > 0 ? (
              <div className="mb-2.5">
                <div className="text-[10px] mb-1.5 flex items-center gap-1.5" style={{ color: "var(--text-tertiary)" }}>
                  💡 หัวข้อที่สอนในหมวด <span className="font-medium" style={{ color: "var(--text-secondary)" }}>{currentCatName}</span>
                </div>
                <div className="flex flex-wrap gap-1.5 p-2.5"
                  style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)", maxHeight: 140, overflowY: "auto" }}>
                  {masterTopics.filter(t => !selectedTopics.includes(t)).map((t, i) => (
                    <button key={i} onClick={() => toggleTopic(t)}
                      className="text-[11px] px-2.5 py-1 transition-all hover:opacity-80"
                      style={{ background: "var(--bg-surface)", color: "var(--text-primary)", border: "0.5px solid var(--border-default)" }}>
                      + {t}
                    </button>
                  ))}
                  {masterTopics.filter(t => !selectedTopics.includes(t)).length === 0 && (
                    <div className="text-[11px] italic" style={{ color: "var(--text-tertiary)" }}>
                      เลือกครบแล้ว — ใช้ input ด้านล่างเพิ่มหัวข้อเอง
                    </div>
                  )}

              </div>
            ) : (
              <div className="px-3 py-2.5 mb-2.5 text-[11px]"
                style={{ background: "var(--info-soft)", color: "var(--info)", borderLeft: "2px solid var(--info)" }}>
                ℹ ยังไม่มีหัวข้อใน master สำหรับหมวด "{currentCatName}" — เพิ่มได้ที่ Settings → หัวข้อที่สอน หรือพิมพ์เพิ่มเองด้านล่าง
              </div>
            )}

            {/* Custom topic input */}
            <div className="flex gap-2">
              <input type="text" value={customTopic}
                onChange={e => setCustomTopic(e.target.value)}
                onKeyDown={e => e.key === "Enter" && (e.preventDefault(), addCustom())}
                placeholder="เพิ่มหัวข้อเอง (กด Enter)"
                className="flex-1 text-[12px] px-3 py-2"
                style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", outline: "none" }} />
              <button onClick={addCustom}
                disabled={!customTopic.trim()}
                className="text-[11px] px-3 py-2 font-medium"
                style={{
                  background: customTopic.trim() ? "var(--accent-bronze)" : "var(--bg-muted)",
                  color: customTopic.trim() ? "#fff" : "var(--text-tertiary)",
                }}>
                + เพิ่ม
              </button>
            </div>
            {masterTopics.length === 0 && (
              <div className="text-[10px] mt-1.5" style={{ color: "var(--text-tertiary)" }}>
                💡 ตั้งค่า master หัวข้อที่สอนได้ใน Settings → หัวข้อที่สอน
              </div>
            )}
          </div>

          <FormRow label="รายละเอียด / ข้อสังเกต">
            <textarea className={inputCls}
              style={{ ...inputSty, minHeight: 110, resize: "vertical" }}
              value={content} onChange={e => setContent(e.target.value)}

          <label className="flex items-center gap-3 px-3 py-3 cursor-pointer transition-colors"

              <div className="text-[12px] font-medium" style={{ color: markDone ? "var(--success)" : "var(--text-primary)" }}>

              <div className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>
                รายการนี้จะย้ายออกจากรายการจองเรียน
              </div>

          </label>
        </div>

        <div className="flex gap-2 px-6 pb-6 flex-shrink-0" style={{ borderTop: "0.5px solid var(--border-soft)", paddingTop: 16 }}>

            style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
            ยกเลิก

// ============ BOOKING MODAL ============
function BookingModal({ ctx, onClose, onNavigate }) {
  const { students, courses, classes, setClasses, enrollments, settings } = ctx;
  const allCats = settings?.categories || DEFAULT_SETTINGS.categories;
  const allLvls = settings?.levels || DEFAULT_SETTINGS.levels;
  const activeLocs = (settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active);
  const defaultLocation = activeLocs[0]?.name || "บ้านนักเรียน";

  const [step, setStep] = useState(1); // 1=นักเรียน, 2=คอร์ส/รายละเอียด, 3=สำเร็จ
  const [selectedStudentId, setSelectedStudentId] = useState(students[0]?.id || "");
  const [selectedCourseId, setSelectedCourseId] = useState("");
  const [date, setDate] = useState(todayISO());
  const [startTime, setStartTime] = useState("09:00");
  const [duration, setDuration] = useState(60);
  const [location, setLocation] = useState(defaultLocation);
  const [note, setNote] = useState("");

  const selectedStudent = students.find(s => s.id === selectedStudentId);
  const selectedCourse = courses.find(c => c.id === selectedCourseId);

  // Active enrollments of selected student
  const studentEnrollments = (enrollments || []).filter(e => e.studentId === selectedStudentId && e.status === "active");

  // When student changes, pre-fill course from their active enrollment
  useEffect(() => {
    if (studentEnrollments.length > 0 && !selectedCourseId) {
      setSelectedCourseId(studentEnrollments[0].courseId);
    }
  }, [selectedStudentId]);

  // When course changes, pre-fill duration and location
  useEffect(() => {
    if (selectedCourse) {
      setDuration(selectedCourse.duration || 60);
      setLocation(selectedCourse.location || "บ้าน");
    } else if (selectedStudent) {
      setLocation(selectedStudent.address || "บ้าน");
      setDuration(Math.round((selectedStudent.rate / (selectedStudent.rate / 60)) * 60 / 60) || 60);
    }
  }, [selectedCourseId, selectedStudentId]);

  const price = selectedCourse
    ? (selectedCourse.pricingMode === "total-hours" ? (selectedCourse.pricePerHour || 0) * (duration / 60) : selectedCourse.price || 0)
    : Math.round((selectedStudent?.rate || 500) * (duration / 60));

  const confirm = () => {
    const newClass = {
      id: newId(),
      studentId: selectedStudentId,
      courseId: selectedCourseId || undefined,
      date,
      startTime,
      duration: Number(duration),
      location,
      status: "scheduled",
      price: Math.round(price),
      note,
    };
    setClasses(prev => [...prev, newClass]);
    setStep(3);
  };

  const catOfStudent = allCats.find(c => c.id === (selectedStudent?.categoryId || selectedStudent?.category))
    || CATEGORIES[selectedStudent?.category] || CATEGORIES.other;

  if (step === 3) {
    return (
      <>
        <ModalHeader title="จองเรียนสำเร็จ" onClose={onClose} />
        <div className="p-8 flex flex-col items-center gap-5 text-center">
          <div className="w-16 h-16 flex items-center justify-center" style={{ background: "var(--success-soft)" }}>
            <IconCheckCircle size={32} style={{ color: "var(--success)" }} />
          </div>
          <div>
            <div className="heading-serif text-[22px] mb-1">จองเรียนแล้ว!</div>
            <div className="text-[13px]" style={{ color: "var(--text-secondary)" }}>{selectedStudent?.name}</div>
            {selectedCourse && <div className="text-[12px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>{selectedCourse.name}</div>}
            <div className="text-[12px] mt-2 font-medium">{formatDate(date)} · {startTime} · {duration} นาที</div>
          </div>
          <div className="grid grid-cols-2 gap-3 w-full">
            <div className="p-3 text-left" style={{ background: "var(--bg-muted)" }}>
              <div className="label-eyebrow mb-1" style={{ fontSize: 9 }}>สถานที่</div>
              <div className="text-[13px] font-medium">{location}</div>
            </div>
            <div className="p-3 text-left" style={{ background: "var(--bg-muted)" }}>
              <div className="label-eyebrow mb-1" style={{ fontSize: 9 }}>ราคา</div>
              <div className="num-display text-[18px]">{formatBaht(Math.round(price))}</div>
            </div>
          </div>
          <div className="flex gap-3 w-full">
            <button onClick={onClose}
              className="flex-1 text-[13px] py-3 font-medium transition-colors"
              style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
              ปิด
            </button>
            <button onClick={() => onNavigate("schedule")}
              className="flex-1 text-[13px] py-3 font-medium transition-all hover:opacity-90 flex items-center justify-center gap-2"
              style={{ background: "#1A1A17", color: "#C4A878" }}>
              <IconCal size={14} /> ดูตารางสอน
            </button>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <ModalHeader title="จองเรียน" onClose={onClose} />

      {/* Steps indicator */}
      <div className="px-6 py-3 flex items-center gap-2" style={{ background: "var(--bg-muted)", borderBottom: "0.5px solid var(--border-soft)" }}>
        {["เลือกนักเรียน", "รายละเอียด"].map((s, i) => (
          <div key={i} className="flex items-center gap-2">
            <div className="flex items-center gap-1.5">
              <div className="w-5 h-5 flex items-center justify-center text-[10px] font-medium"
                style={{ background: step > i + 1 ? "var(--success)" : step === i + 1 ? "#1A1A17" : "var(--bg-subtle)", color: step >= i + 1 ? "#fff" : "var(--text-tertiary)" }}>
                {step > i + 1 ? "✓" : i + 1}
              </div>
              <span className="text-[11px]" style={{ color: step === i + 1 ? "var(--text-primary)" : "var(--text-tertiary)", fontWeight: step === i + 1 ? 500 : 400 }}>{s}</span>
            </div>
            {i < 1 && <div className="w-8 h-px mx-1" style={{ background: step > 1 ? "var(--success)" : "var(--border-default)" }} />}
          </div>
        ))}
      </div>

      <div className="flex-1 overflow-y-auto p-6 space-y-4">

        {step === 1 && (
          <>
            <div className="label-eyebrow mb-3">เลือกนักเรียนที่ต้องการจอง</div>
            <div className="space-y-2">
              {students.filter(s => s.active).map(s => {
                const sCat = allCats.find(c => c.id === (s.categoryId || s.category)) || CATEGORIES[s.category] || CATEGORIES.other;
                const sEnr = (enrollments || []).filter(e => e.studentId === s.id && e.status === "active").length;
                const isSelected = selectedStudentId === s.id;
                return (
                  <button key={s.id} onClick={() => { setSelectedStudentId(s.id); setSelectedCourseId(""); }}
                    className="w-full flex items-center gap-4 p-4 text-left transition-all"
                    style={{
                      border: isSelected ? `2px solid ${sCat.color}` : "0.5px solid var(--border-soft)",
                      background: isSelected ? sCat.bg : "var(--bg-surface)",
                    }}>
                    <div className="w-10 h-10 flex items-center justify-center text-[14px] font-medium flex-shrink-0"
                      style={{ background: isSelected ? "rgba(255,255,255,0.7)" : sCat.bg, color: sCat.text }}>
                      {s.name.charAt(0)}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-[13px] font-medium">{s.name}</div>
                      <div className="flex items-center gap-1.5 mt-0.5">
                        <span className="text-[10px] px-1.5 py-0.5 font-medium" style={{ background: sCat.bg, color: sCat.text, border: `0.5px solid ${sCat.color}` }}>{sCat.name || sCat.label}</span>
                        <span className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>· {s.level}</span>
                        {sEnr > 0 && <span className="text-[10px]" style={{ color: "var(--success)" }}>· {sEnr} คอร์สที่ลงทะเบียน</span>}
                      </div>
                    </div>
                    {isSelected && <IconCheck size={16} style={{ color: sCat.color, flexShrink: 0 }} />}
                  </button>
                );
              })}
            </div>
          </>
        )}

        {step === 2 && selectedStudent && (
          <>
            {/* Student recap */}
            <div className="flex items-center gap-3 p-3 mb-2" style={{ background: catOfStudent.bg }}>
              <div className="w-8 h-8 flex items-center justify-center text-[12px] font-medium"
                style={{ background: "rgba(255,255,255,0.6)", color: catOfStudent.text }}>
                {selectedStudent.name.charAt(0)}
              </div>
              <div>
                <div className="text-[12px] font-medium" style={{ color: catOfStudent.text }}>{selectedStudent.name}</div>
                <div className="text-[10px]" style={{ color: catOfStudent.text, opacity: 0.8 }}>{selectedStudent.subcategory} · {selectedStudent.level}</div>
              </div>
            </div>

            {/* Course selector */}
            <FormRow label={t("courseOptional")}>
              <select className={inputCls} style={inputSty} value={selectedCourseId} onChange={e => setSelectedCourseId(e.target.value)}>
                <option value="">— {t("noCourseLabel")} —</option>
                {studentEnrollments.length > 0 && (
                  <optgroup label={t("enrolledCourse")}>
                    {studentEnrollments.map(en => {
                      const c = courses.find(cc => cc.id === en.courseId);
                      return c ? <option key={en.id} value={c.id}>{c.name} ({en.completedSessions}/{en.totalSessions} ชม.)</option> : null;
                    })}
                  </optgroup>
                )}
                <optgroup label={t("allCourses")}>
                  {courses.filter(c => c.active).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </optgroup>
              </select>
            </FormRow>

            <div className="grid grid-cols-2 gap-3">
              <FormRow label={t("date")}>
                <input type="date" className={inputCls} style={inputSty} value={date} onChange={e => setDate(e.target.value)} />
              </FormRow>
              <FormRow label={t("startTime")}>
                <input type="time" className={inputCls} style={inputSty} value={startTime} onChange={e => setStartTime(e.target.value)} />
              </FormRow>
            </div>

            <div className="grid grid-cols-2 gap-3">
              <FormRow label={t("duration")}>
                <select className={inputCls} style={inputSty} value={duration} onChange={e => setDuration(Number(e.target.value))}>
                  {[30, 45, 60, 90, 120].map(v => <option key={v} value={v}>{v} {t("minutes")}</option>)}
                </select>
              </FormRow>
              <FormRow label="สถานที่">
                <select className={inputCls} style={inputSty} value={location} onChange={e => setLocation(e.target.value)}>
                  {(ctx.settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active).map(l => (
                    <option key={l.id} value={l.name}>{l.icon} {l.name}</option>
                  ))}
                </select>
              </FormRow>
            </div>

            <FormRow label={t("note")}>
              <input className={inputCls} style={inputSty} value={note} onChange={e => setNote(e.target.value)} placeholder="เช่น เน้นเรื่อง backswing" />
            </FormRow>

            {/* Price preview */}
            <div className="p-4 flex justify-between items-center" style={{ background: "var(--bg-muted)" }}>
              <div>
                <div className="label-eyebrow mb-1" style={{ fontSize: 9 }}>ราคาโดยประมาณ</div>
                <div className="text-[11px]" style={{ color: "var(--text-tertiary)" }}>
                  {selectedCourse
                    ? selectedCourse.pricingMode === "total-hours"
                      ? `${formatBaht(selectedCourse.pricePerHour || 0)}/ชม. × ${duration / 60} ชม.`
                      : `${formatBaht(selectedCourse.price || 0)}/ครั้ง`
                    : `${formatBaht(selectedStudent.rate || 0)}/ชม. × ${duration / 60} ชม.`}
                </div>
              </div>
              <div className="num-display text-[22px]">{formatBaht(Math.round(price))}</div>
            </div>
          </>
        )}
      </div>

      <div className="flex gap-2 px-6 py-4" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
        {step > 1 && (
          <button onClick={() => setStep(step - 1)}
            className="text-[13px] py-3 px-5 font-medium flex items-center gap-1 transition-colors"
            style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
            <IconChevL size={13} /> ย้อนกลับ
          </button>
        )}
        <button onClick={onClose}
          className="text-[13px] py-3 px-5 font-medium"
          style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
          ยกเลิก
        </button>
        {step === 1 ? (
          <button onClick={() => setStep(2)} disabled={!selectedStudentId}
            className="flex-1 text-[13px] py-3 font-medium flex items-center justify-center gap-1.5 transition-all"
            style={{ background: selectedStudentId ? "#1A1A17" : "var(--bg-muted)", color: selectedStudentId ? "#C4A878" : "var(--text-tertiary)" }}>
            ถัดไป <IconChevR size={13} />
          </button>
        ) : (
          <button onClick={confirm} disabled={!date || !startTime}
            className="flex-1 text-[13px] py-3 font-medium flex items-center justify-center gap-2 transition-all hover:opacity-90"
            style={{ background: "#1A1A17", color: "#C4A878" }}>
            <IconCalPlus size={14} /> ยืนยันการจอง
          </button>
        )}
      </div>
    </>
  );
}

function ClassForm({ ctx, onClose, existing }) {
  const { students, setClasses, settings, t } = ctx;
  const activeLocs = (settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active);
  const defaultLocation = activeLocs[0]?.name || "บ้านนักเรียน";

  const [form, setForm] = useState(existing || {
    studentId: students[0]?.id || "", date: todayISO(), startTime: "14:00", duration: 60, location: defaultLocation, status: "scheduled", price: 500,
  });

  useEffect(() => {
    if (!existing && form.studentId) {
      const s = students.find(st => st.id === form.studentId);
      if (s) setForm(f => ({ ...f, price: Math.round(s.rate * (f.duration / 60)), location: s.address || f.location }));
    }
  }, [form.studentId, form.duration]);

  const submit = () => {
    if (!form.studentId) return alert("กรุณาเลือกนักเรียน");
    const n = { ...form, id: existing?.id || newId(), duration: Number(form.duration), price: Number(form.price) };
    setClasses(prev => existing ? prev.map(c => c.id === existing.id ? n : c) : [...prev, n]);
    onClose();
  };

  const remove = () => {
    if (!confirm("ลบคลาสนี้?")) return;
    setClasses(prev => prev.filter(c => c.id !== existing.id));
    onClose();
  };

  return (
    <>
      <ModalHeader title={existing ? "แก้ไขคลาส" : "จองคลาสใหม่"} onClose={onClose} />
      <div className="p-5 space-y-3 overflow-y-auto">
        <FormRow label="นักเรียน">
          <select className={inputCls} style={inputSty} value={form.studentId} onChange={e => setForm({ ...form, studentId: e.target.value })}>
            {students.map(s => <option key={s.id} value={s.id}>{s.name} — {s.subcategory}</option>)}
          </select>
        </FormRow>

function NoteForm({ ctx, onClose, prefill }) {
  const { students, classes, courses, enrollments, setNotes } = ctx;

  const [selectedDate, setSelectedDate] = useState(prefill?.date || todayISO());
  const [selectedClassId, setSelectedClassId] = useState(prefill?.classId || "");
  const [title, setTitle] = useState("");
  const [content, setContent] = useState("");

  // Find all classes/bookings on selected date
  // Group by groupClassId — 1 booking ของกลุ่ม = 1 รายการ
  const classesOnDate = (() => {
    const dateClasses = (classes || []).filter(c => c.date === selectedDate);
    const seen = new Set();
    const result = [];
    dateClasses.forEach(c => {
      if (c.groupClassId) {
        if (seen.has(c.groupClassId)) return;
        seen.add(c.groupClassId);
        const groupMembers = dateClasses.filter(x => x.groupClassId === c.groupClassId);
        result.push({ ...c, _isGroup: true, _members: groupMembers });
      } else {
        result.push({ ...c, _isGroup: false });
      }
    });
    return result.sort((a, b) => (a.startTime || "").localeCompare(b.startTime || ""));
  })();

  // Selected class detail
  const selectedClass = classesOnDate.find(c => (c.groupClassId || c.id) === selectedClassId);

  // Build display info for selected class
  const classInfo = (() => {
    if (!selectedClass) return null;
    const course = (courses || []).find(c => c.id === selectedClass.courseId);
    if (selectedClass._isGroup) {
      const memberStudents = selectedClass._members
        .map(m => students.find(s => s.id === m.studentId))
        .filter(Boolean);
      return {
        isGroup: true,
        course,
        students: memberStudents,
        members: selectedClass._members,
        startTime: selectedClass.startTime,
        duration: selectedClass.duration,
      };
    } else {
      const student = students.find(s => s.id === selectedClass.studentId);
      return {
        isGroup: false,
        course,
        student,
        startTime: selectedClass.startTime,
        duration: selectedClass.duration,
      };
    }
  })();

  const submit = () => {
    if (!title.trim()) return alert("กรุณาใส่หัวข้อ");
    if (!classInfo) return alert("กรุณาเลือกรายการจองเรียน");

    if (classInfo.isGroup) {
      // Create 1 note per student in group, share groupNoteId
      const groupNoteId = newId();
      const newNotes = classInfo.members.map((m, idx) => ({
        id: newId(),
        studentId: m.studentId,
        courseId: classInfo.course?.id || "",
        classId: m.id,
        groupNoteId,
        date: selectedDate,
        title: title.trim(),
        content: content.trim(),
      }));
      setNotes(prev => [...newNotes, ...prev]);
    } else {
      setNotes(prev => [{
        id: newId(),
        studentId: selectedClass.studentId,
        courseId: selectedClass.courseId || "",
        classId: selectedClass.id,
        date: selectedDate,
        title: title.trim(),
        content: content.trim(),
      }, ...prev]);
    }
    onClose();
  };

  const formatDateThai = (iso) => {
    if (!iso) return "";
    const [y, m, d] = iso.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString("th-TH", { weekday: "short", day: "numeric", month: "short", year: "numeric" });
  };

  return (
    <>
      <ModalHeader title="บันทึกการสอน" onClose={onClose} />
      <div className="p-5 space-y-4 overflow-y-auto">

        {/* Date picker */}
        <FormRow label="วันที่สอน">
          <input type="date" className={inputCls} style={inputSty} value={selectedDate}
            onChange={e => { setSelectedDate(e.target.value); setSelectedClassId(""); }} />
          <div className="text-[11px] mt-1.5" style={{ color: "var(--accent-bronze)" }}>
            {formatDateThai(selectedDate)}
          </div>
        </FormRow>

        {/* Class/booking dropdown */}
        <FormRow label={`รายการจองเรียน (${classesOnDate.length})`}>
          {classesOnDate.length === 0 ? (
            <div className="px-3 py-3 text-[12px]" style={{ background: "var(--warning-soft)", color: "#704F28", borderRadius: 4 }}>
              ⚠ ไม่มีการจองเรียนในวันนี้ — ไปจองเรียนที่หน้า <strong>"จองเรียน"</strong> ก่อน
            </div>
          ) : (
            <select className={inputCls} style={inputSty} value={selectedClassId}
              onChange={e => setSelectedClassId(e.target.value)}>
              <option value="">— เลือกรายการ —</option>
              {classesOnDate.map(c => {
                const key = c.groupClassId || c.id;
                const course = (courses || []).find(co => co.id === c.courseId);
                if (c._isGroup) {
                  return (
                    <option key={key} value={key}>
                      {c.startTime} · {course?.name || "—"} · 👥 {c._members.length} คน
                    </option>
                  );
                } else {
                  const st = students.find(s => s.id === c.studentId);
                  return (
                    <option key={key} value={key}>
                      {c.startTime} · {st?.name || "—"}{course ? ` · ${course.name}` : ""}
                    </option>
                  );
                }
              })}
            </select>
          )}
        </FormRow>

        {/* Selected class details */}
        {classInfo && (
          <div className="p-3 fade-in" style={{ background: "var(--bg-muted)", border: "0.5px solid var(--border-soft)", borderRadius: 6 }}>
            {classInfo.isGroup ? (
              <>
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-[11px] px-2 py-0.5 rounded font-medium" style={{ background: "rgba(196,168,120,0.15)", color: "#8B6F47" }}>
                    👥 กลุ่ม · {classInfo.students.length} คน
                  </span>
                  <span className="text-[11px]" style={{ color: "var(--text-secondary)" }}>
                    {classInfo.startTime} · {classInfo.duration} นาที
                  </span>
                </div>
                <div className="text-[12px] font-medium mb-1" style={{ color: "var(--text-primary)" }}>
                  {classInfo.course?.name || "—"}
                </div>
                <div className="flex flex-wrap gap-1">
                  {classInfo.students.map(st => (
                    <span key={st.id} className="text-[10px] px-2 py-0.5 rounded"
                      style={{ background: "rgba(63,107,74,0.12)", color: "var(--success)" }}>
                      {st.name}{st.nickname ? ` (${st.nickname})` : ""}
                    </span>
                  ))}
                </div>
                <div className="text-[10px] italic mt-2" style={{ color: "var(--text-tertiary)" }}>
                  💡 บันทึกนี้จะใช้กับนักเรียนทั้ง {classInfo.students.length} คน
                </div>
              </>
            ) : (
              <>
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-[11px] px-2 py-0.5 rounded font-medium" style={{ background: "var(--accent-sage-hover)", color: "var(--success)" }}>
                    👤 เดี่ยว
                  </span>
                  <span className="text-[11px]" style={{ color: "var(--text-secondary)" }}>
                    {classInfo.startTime} · {classInfo.duration} นาที
                  </span>
                </div>
                <div className="text-[13px] font-medium" style={{ color: "var(--text-primary)" }}>
                  {classInfo.student?.name || "—"}
                  {classInfo.student?.nickname && (
                    <span className="italic ml-2 text-[11px]" style={{ color: "var(--text-tertiary)" }}>
                      "{classInfo.student.nickname}"
                    </span>
                  )}
                </div>
                {classInfo.course && (
                  <div className="text-[11px] mt-0.5" style={{ color: "var(--text-secondary)" }}>
                    📚 {classInfo.course.name}
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {/* Title + Content (only after class selected) */}
        {classInfo && (
          <>
            <FormRow label="หัวข้อ">
              <input className={inputCls} style={inputSty} value={title}
                onChange={e => setTitle(e.target.value)} placeholder="เช่น ฝึกเพลงมะลิซ้อน" />
            </FormRow>
            <FormRow label="รายละเอียด">
              <textarea className={inputCls} style={{ ...inputSty, minHeight: 120, resize: "vertical" }} value={content}
                onChange={e => setContent(e.target.value)} placeholder="สิ่งที่เรียน · ข้อเสนอแนะ · การบ้าน..." />
            </FormRow>
          </>
        )}
      </div>
      <div className="flex gap-2 px-6 py-4" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
        <button onClick={onClose} className="flex-1 text-[13px] py-3 rounded-full font-medium transition-colors hover:bg-[var(--accent-sage-hover)]" style={{ border: "0.5px solid var(--border-default)", color: "var(--text-primary)" }}>ยกเลิก</button>
        <button onClick={submit}
          disabled={!classInfo || !title.trim()}
          className="flex-1 text-[13px] py-3 rounded-full font-medium transition-all hover:opacity-90"
          style={{
            background: "#1A1A17", color: "#C4A878",
            opacity: !classInfo || !title.trim() ? 0.5 : 1,
            cursor: !classInfo || !title.trim() ? "not-allowed" : "pointer",
            boxShadow: "var(--shadow-soft)",
          }}>
          {classInfo?.isGroup ? `บันทึก (${classInfo.students.length} คน)` : "บันทึก"}
        </button>
      </div>
    </>
  );
}

        h: Math.floor(diff / 3600000),
        m: Math.floor((diff % 3600000) / 60000),

            <div className="flex justify-between"><span style={{ color: "var(--text-secondary)" }}>ประเภทคลาส</span><span>{student.subcategory}</span></div>
            <div className="flex justify-between"><span style={{ color: "var(--text-secondary)" }}>ระดับ</span><span>{student.level}</span></div>
            <div className="flex justify-between"><span style={{ color: "var(--text-secondary)" }}>เรียนมาตั้งแต่</span><span>{formatDate(student.startDate)}</span></div>
          </div>

      </div>

      <div className="flex bg-white" style={{ borderTop: "0.5px solid var(--border-soft)", padding: "8px 0 12px" }}>
        {[
          { icon: IconHome, label: "หน้าหลัก", active: true },

          { icon: IconTrend, label: "ความก้าวหน้า" },

          return (

      {showAnalytics && (

          student={student}

    </div>
  );

// ============ STUDENT ANALYTICS MODAL (self-view) ============
function StudentAnalyticsModal({ student, classes, notes, cat, onClose }) {
  const [aiInsight, setAiInsight] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState(null);

  const studentNotes = notes.filter(n => n.studentId === student.id).sort((a, b) => b.date.localeCompare(a.date));
  const studentClasses = classes.filter(c => c.studentId === student.id);
  const completedClasses = studentClasses.filter(c => c.status === "completed");
  const totalMinutes = completedClasses.reduce((sum, c) => sum + (c.duration || 0), 0);
  const totalHours = totalMinutes / 60;

  // Topic analysis
  const topicMap = {};
  studentNotes.forEach(n => {
    const topics = n.topics || [];
    const dur = n.duration || 60;
    topics.forEach(t => {
      if (!topicMap[t]) topicMap[t] = { count: 0, totalMinutes: 0, lastDate: null };
      topicMap[t].count++;
      topicMap[t].totalMinutes += dur;
      if (!topicMap[t].lastDate || n.date > topicMap[t].lastDate) topicMap[t].lastDate = n.date;
    });
  });

  const topicStats = Object.entries(topicMap)
    .map(([topic, data]) => ({ topic, ...data, hours: data.totalMinutes / 60 }))
    .sort((a, b) => b.totalMinutes - a.totalMinutes);

  const firstClass = studentClasses.sort((a, b) => a.date.localeCompare(b.date))[0];
  const lastClass = completedClasses.sort((a, b) => b.date.localeCompare(a.date))[0];

  const generateAIInsight = async () => {
    setAiLoading(true);
    setAiError(null);
    setAiInsight(null);

    const topicSummary = topicStats.slice(0, 10).map(t =>
      `- ${t.topic}: สอนไป ${t.hours.toFixed(1)} ชม. (${t.count} ครั้ง)`
    ).join("\n");

    const recentComments = studentNotes.slice(0, 8).map(n =>
      `${n.date} [${n.title}]${n.content ? ": " + n.content : ""}`
    ).join("\n");

    const prompt = `คุณเป็นโค้ชผู้เชี่ยวชาญ กำลังเขียนข้อความให้นักเรียนชื่อ "${student.name}" ระดับ ${student.level || "-"} ในหมวด ${cat.name || cat.label || "-"} อ่านเอง เน้นให้กำลังใจและชี้ทาง

ข้อมูลการเรียน:
- เรียนมาแล้ว ${completedClasses.length} คลาส รวม ${totalHours.toFixed(1)} ชั่วโมง

หัวข้อที่เรียน:
${topicSummary || "(ยังไม่มีข้อมูลหัวข้อ)"}

บันทึกของครู:
${recentComments || "(ยังไม่มีบันทึก)"}

กรุณาวิเคราะห์ ตอบเป็นภาษาไทย เป็นคำพูดที่นักเรียนอ่านแล้วรู้สึกดี ในรูปแบบ JSON:
{
  "strengths": ["สิ่งที่ทำได้ดี 1", "สิ่งที่ทำได้ดี 2", ...],
  "improvements": ["สิ่งที่ควรฝึกเพิ่ม 1", "สิ่งที่ควรฝึกเพิ่ม 2", ...],
  "nextSteps": ["เป้าหมายถัดไป 1", "เป้าหมายถัดไป 2", ...],
  "summary": "คำพูดให้กำลังใจ 2-3 ประโยค"
}

ตอบเฉพาะ JSON เท่านั้น ไม่ต้องมี markdown code block`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-5",
          max_tokens: 1500,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      const data = await response.json();
      const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
      const cleaned = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(cleaned);
      setAiInsight(parsed);
    } catch (e) {
      setAiError("ขออภัย ไม่สามารถสร้างได้ตอนนี้: " + (e.message || ""));
    } finally {
      setAiLoading(false);
    }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center fade-in"
      style={{ background: "rgba(15,31,24,0.6)", backdropFilter: "blur(8px)" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="w-full overflow-hidden flex flex-col"
        style={{

        {/* Drag handle */}

        {/* Header */}
        <div className="flex items-start justify-between px-5 pb-3 flex-shrink-0">

              My Progress
            </div>
            <div className="heading-serif text-[22px] mt-0.5">ความก้าวหน้าของฉัน</div>
          </div>
          <button onClick={onClose} className="p-2 rounded-full" style={{ background: "var(--bg-muted)", color: "var(--text-secondary)" }}>
            <IconX size={16} />

        </div>

        <div className="overflow-y-auto flex-1 px-5 pb-8">

          {/* Hero profile */}
          <div className="flex items-center gap-4 p-4 mb-4" style={{ background: cat.bg, borderRadius: 16 }}>
            {student.photo ? (
              <img src={student.photo} alt={student.name} className="w-16 h-16 object-cover flex-shrink-0"
                style={{ border: `2px solid ${cat.color}`, borderRadius: 12 }} />

                style={{ background: cat.color, color: "#fff", borderRadius: 12 }}>
                {student.name.charAt(0)}
              </div>
            )}
            <div className="flex-1 min-w-0">
              <div className="text-[15px] font-medium" style={{ color: cat.text }}>{student.name}</div>
              <div className="text-[11px] mt-0.5" style={{ color: cat.text, opacity: 0.75 }}>
                {cat.name || cat.label} · {student.level || "-"}
              </div>
            </div>
          </div>

          {/* 3 stat cards */}
          <div className="grid grid-cols-3 gap-2 mb-5">

                        ))}
                      </ul>
                    </div>
                  )}

                  {aiInsight.improvements?.length > 0 && (
                    <div>
                      <div className="text-[10px] font-medium mb-2" style={{ color: "#E8B97A", letterSpacing: "0.08em", textTransform: "uppercase" }}>
                        ↗ สิ่งที่ควรฝึกเพิ่ม
                      </div>
                      <ul className="space-y-1.5">
                        {aiInsight.improvements.map((s, i) => (
                          <li key={i} className="text-[12px] leading-relaxed flex gap-2" style={{ color: "rgba(232,228,214,0.85)" }}>
                            <span style={{ color: "#E8B97A", flexShrink: 0 }}>•</span>
                            <span>{s}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}

                  {aiInsight.nextSteps?.length > 0 && (
                    <div>
                      <div className="text-[10px] font-medium mb-2" style={{ color: "#C4A878", letterSpacing: "0.08em", textTransform: "uppercase" }}>
                        → เป้าหมายถัดไป
                      </div>
                      <ul className="space-y-1.5">
                        {aiInsight.nextSteps.map((s, i) => (
                          <li key={i} className="text-[12px] leading-relaxed flex gap-2" style={{ color: "rgba(232,228,214,0.85)" }}>
                            <span style={{ color: "#C4A878", flexShrink: 0 }}>•</span>
                            <span>{s}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>

          {/* Topics */}
          {topicStats.length > 0 && (
            <div className="mb-5" style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", borderRadius: 16 }}>
              <div className="px-4 py-3" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
                <div className="text-[9px] font-medium" style={{ color: "var(--text-tertiary)", letterSpacing: "0.08em", textTransform: "uppercase" }}>
                  Skills
                </div>
                <div className="text-[14px] font-medium mt-0.5">ทักษะที่เรียนมา ({topicStats.length})</div>
              </div>
              <div className="p-4 space-y-2.5">
                {topicStats.slice(0, 10).map((t, i) => {
                  const maxHours = topicStats[0].hours;
                  const pct = (t.hours / maxHours) * 100;
                  return (
                    <div key={i}>
                      <div className="flex items-baseline justify-between mb-1">
                        <div className="flex items-center gap-2">
                          <span className="w-5 h-5 flex items-center justify-center text-[9px] font-medium flex-shrink-0"
                            style={{ background: cat.color, color: "#fff", borderRadius: 3 }}>
                            {i + 1}
                          </span>
                          <span className="text-[12px] font-medium">{t.topic}</span>
                        </div>
                        <div className="flex items-baseline gap-1">
                          <span className="num-display text-[13px]" style={{ color: cat.color }}>{t.hours.toFixed(1)}</span>
                          <span className="text-[9px]" style={{ color: "var(--text-tertiary)" }}>ชม.</span>
                        </div>
                      </div>
                      <div className="h-1 overflow-hidden ml-7" style={{ background: "var(--bg-muted)", borderRadius: 2 }}>
                        <div className="h-full transition-all" style={{ width: `${pct}%`, background: cat.color }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Recent notes from teacher */}
          {studentNotes.length > 0 && (
            <div style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-soft)", borderRadius: 16 }}>
              <div className="px-4 py-3" style={{ borderBottom: "0.5px solid var(--border-soft)" }}>
                <div className="text-[9px] font-medium" style={{ color: "var(--text-tertiary)", letterSpacing: "0.08em", textTransform: "uppercase" }}>
                  Teacher Notes
                </div>
                <div className="text-[14px] font-medium mt-0.5">บันทึกจากครู ({studentNotes.length})</div>
              </div>
              <div className="p-4 space-y-3">
                {studentNotes.slice(0, 5).map(n => {
                  const [y, m, d] = n.date.split("-").map(Number);
                  return (
                    <div key={n.id} className="p-3" style={{ background: "var(--bg-muted)", borderLeft: `2px solid ${cat.color}`, borderRadius: 6 }}>
                      <div className="flex justify-between items-baseline mb-1.5">
                        <div className="text-[12px] font-medium">{n.title}</div>
                        <div className="text-[10px]" style={{ color: "var(--text-tertiary)" }}>
                          {new Date(y, m-1, d).toLocaleDateString("th-TH", { day: "numeric", month: "short" })}
                        </div>
                      </div>
                      {n.topics && n.topics.length > 0 && (
                        <div className="flex flex-wrap gap-1 mb-1.5">
                          {n.topics.map((t, i) => (
                            <span key={i} className="text-[9px] px-1.5 py-0.5"
                              style={{ background: cat.bg, color: cat.text }}>
                              {t}
                            </span>
                          ))}
                        </div>
                      )}
                      {n.content && (
                        <div className="text-[11px] leading-relaxed" style={{ color: "var(--text-secondary)" }}>{n.content}</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============ STUDENT BOOKING FORM ============
function StudentBookingForm({ student, studentId, courses, classes, enrollments, bookingRequests, setBookingRequests, settings, onClose }) {
  const myEnrollments = (enrollments || []).filter(e => e.studentId === studentId && e.status === "active");
  const activeLocs = (settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active);
  const defaultLocation = activeLocs[0]?.name || "บ้านนักเรียน";

  const [courseId, setCourseId] = useState(myEnrollments[0]?.courseId || "");
  const [requestedDate, setRequestedDate] = useState(addDays(todayISO(), 1));
  const [requestedTime, setRequestedTime] = useState("10:00");
  const [duration, setDuration] = useState(60);
  const [location, setLocation] = useState(defaultLocation);
  const [note, setNote] = useState("");
  const [submitted, setSubmitted] = useState(false);

  const selectedCourse = courses.find(c => c.id === courseId);
  const selectedEn = myEnrollments.find(e => e.courseId === courseId);
  const remainingHrs = selectedEn ? Math.round((selectedEn.totalSessions - selectedEn.completedSessions) * 10) / 10 : null;

  const formatThaiDate = (iso) => {
    if (iso === todayISO()) return "วันนี้";
    if (iso === addDays(todayISO(), 1)) return "พรุ่งนี้";
    const [y, m, d] = iso.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long" });
  };

  const endTime = (() => {
    const [h, m] = requestedTime.split(":").map(Number);
    const em = h * 60 + m + Number(duration);
    return `${String(Math.floor(em/60)).padStart(2,"0")}:${String(em%60).padStart(2,"0")}`;
  })();

  // Check for conflicts: my own upcoming classes + my other pending requests
  const conflictInfo = (() => {
    const toMs = (d, t) => {
      const [y, mo, dd] = d.split("-").map(Number);
      const [h, mi] = t.split(":").map(Number);
      return new Date(y, mo - 1, dd, h, mi).getTime();
    };
    const start = toMs(requestedDate, requestedTime);
    const end = start + Number(duration) * 60000;

    // My own classes
    const myClassConflict = (classes || [])
      .filter(c => c.studentId === studentId && c.status === "scheduled" && c.date === requestedDate)
      .find(c => {
        const cs = toMs(c.date, c.startTime);
        const ce = cs + (c.duration || 60) * 60000;
        return start < ce && cs < end;
      });

    // My other pending requests
    const myPendingConflict = (bookingRequests || [])
      .filter(r => r.studentId === studentId && r.status === "pending" && r.requestedDate === requestedDate)
      .find(r => {
        const rs = toMs(r.requestedDate, r.requestedTime);
        const re = rs + r.duration * 60000;
        return start < re && rs < end;
      });

    if (myClassConflict) return { type: "class", data: myClassConflict };
    if (myPendingConflict) return { type: "request", data: myPendingConflict };
    return null;
  })();

  const submit = () => {
    if (conflictInfo) {
      alert("ช่วงเวลานี้คุณมีคลาสหรือคำขอจองอื่นอยู่แล้ว กรุณาเลือกเวลาอื่น");
      return;
    }
    const newReq = {
      id: newId(),
      studentId,
      courseId: courseId || null,
      requestedDate,
      requestedTime,
      duration: Number(duration),
      location,
      note,
      status: "pending",
      createdAt: new Date().toISOString(),
    };
    setBookingRequests(prev => [newReq, ...prev]);
    setSubmitted(true);
    setTimeout(() => { onClose(); }, 2000);
  };

  if (submitted) {
    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in"
        style={{ background: "rgba(15,31,24,0.5)", backdropFilter: "blur(4px)" }}>
        <div className="w-full max-w-sm p-8 text-center"
          style={{ background: "var(--bg-surface)", borderRadius: 16 }}>
          <div className="w-16 h-16 mx-auto mb-4 flex items-center justify-center rounded-full" style={{ background: "var(--success-soft)" }}>
            <IconCheck size={28} style={{ color: "var(--success)" }} />
          </div>
          <div className="heading-serif text-[20px] mb-2">ส่งคำขอแล้ว</div>
          <div className="text-[12px]" style={{ color: "var(--text-secondary)" }}>
            กำลังรอครูอนุมัติ คุณจะเห็นสถานะในหน้าหลัก
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in"
      style={{ background: "rgba(15,31,24,0.55)", backdropFilter: "blur(4px)" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="w-full max-w-md overflow-hidden"
        style={{ background: "var(--bg-surface)", boxShadow: "var(--shadow-elevated)", maxHeight: "92vh", display: "flex", flexDirection: "column", borderRadius: 16 }}>

        {/* Header */}
        <div className="px-6 py-5 flex items-center justify-between flex-shrink-0"
          style={{ background: "#1A1A17", color: "#fff", borderRadius: "16px 16px 0 0" }}>
          <div>
            <div className="text-[10px] label-eyebrow" style={{ color: "#C4A878", letterSpacing: "0.08em" }}>Book a class</div>
            <div className="heading-serif text-[20px]" style={{ color: "#fff" }}>ขอจองเรียน</div>
          </div>
          <button onClick={onClose} style={{ color: "rgba(232,228,214,0.7)" }}>
            <IconX size={16} />
          </button>
        </div>

        <div className="overflow-y-auto flex-1 px-6 py-5 space-y-4">

          {myEnrollments.length === 0 ? (
            <div className="text-center py-6">
              <div className="heading-serif text-[16px] italic mb-2" style={{ color: "var(--text-tertiary)" }}>ไม่มีคอร์สที่ลงทะเบียน</div>
              <div className="text-[11px]" style={{ color: "var(--text-quaternary)" }}>ติดต่อครูเพื่อลงทะเบียนก่อน</div>
            </div>
          ) : (
            <>
              {/* Course select */}
              <div>
                <div className="label-eyebrow mb-2">คอร์สที่ต้องการเรียน</div>
                <div className="space-y-2">
                  {myEnrollments.map(en => {
                    const c = courses.find(cc => cc.id === en.courseId);
                    if (!c) return null;
                    const rem = Math.round((en.totalSessions - en.completedSessions) * 10) / 10;
                    const selected = courseId === c.id;
                    return (
                      <button key={en.id} onClick={() => setCourseId(c.id)}
                        className="w-full text-left px-4 py-3 transition-all"
                        style={{
                          background: selected ? "var(--bg-muted)" : "var(--bg-surface)",
                          border: selected ? "2px solid var(--accent-bronze)" : "0.5px solid var(--border-default)",
                        }}>
                        <div className="flex justify-between items-baseline mb-0.5">
                          <div className="text-[13px] font-medium">{c.name}</div>
                          {selected && <IconCheck size={12} style={{ color: "var(--accent-bronze)" }} />}
                        </div>
                        <div className="text-[11px]" style={{ color: rem < 2 ? "var(--danger)" : "var(--text-secondary)" }}>
                          เหลือ {rem} ชั่วโมง · {c.duration} นาที/คลาส
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Date */}
              <div>
                <div className="label-eyebrow mb-2">วันที่ต้องการ</div>
                <input type="date" value={requestedDate}
                  min={todayISO()}
                  onChange={e => setRequestedDate(e.target.value)}
                  className="w-full text-[13px] px-3 py-2.5"
                  style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", outline: "none" }} />
                <div className="text-[11px] mt-1" style={{ color: "var(--text-tertiary)" }}>
                  {formatThaiDate(requestedDate)}
                </div>
              </div>

              {/* Time + Duration */}
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <div className="label-eyebrow mb-2">เวลาเริ่ม</div>
                  <input type="time" value={requestedTime}
                    onChange={e => setRequestedTime(e.target.value)}
                    className="w-full text-[13px] px-3 py-2.5"
                    style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", outline: "none" }} />
                </div>
                <div>
                  <div className="label-eyebrow mb-2">ระยะเวลา</div>
                  <select value={duration} onChange={e => setDuration(Number(e.target.value))}
                    className="w-full text-[13px] px-3 py-2.5"
                    style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", outline: "none" }}>
                    <option value={30}>30 นาที</option>
                    <option value={45}>45 นาที</option>
                    <option value={60}>60 นาที</option>
                    <option value={90}>90 นาที</option>
                    <option value={120}>120 นาที</option>
                  </select>
                </div>
              </div>

              <div className="text-[11px] text-center py-2" style={{ color: "var(--text-secondary)", background: "var(--bg-muted)" }}>
                {requestedTime} – {endTime} น.
              </div>

              {/* Conflict warning */}
              {conflictInfo && (() => {
                const cfData = conflictInfo.data;
                const cfStart = conflictInfo.type === "class" ? cfData.startTime : cfData.requestedTime;
                const [h, m] = cfStart.split(":").map(Number);
                const em = h * 60 + m + (cfData.duration || 60);
                const cfEnd = `${String(Math.floor(em/60)).padStart(2,"0")}:${String(em%60).padStart(2,"0")}`;
                return (
                  <div className="px-3 py-2.5 flex items-start gap-2"
                    style={{ background: "var(--danger-soft)", border: "0.5px solid var(--danger)", borderLeft: "3px solid var(--danger)" }}>
                    <span style={{ color: "var(--danger)", fontSize: 14, flexShrink: 0 }}>⚠</span>
                    <div className="flex-1">
                      <div className="text-[11px] font-medium" style={{ color: "var(--danger)" }}>
                        ช่วงเวลานี้ชนกับ{conflictInfo.type === "class" ? "คลาสที่คุณจองแล้ว" : "คำขอจองที่รอครูอนุมัติ"}
                      </div>
                      <div className="text-[10px] mt-0.5" style={{ color: "var(--text-secondary)" }}>
                        {cfStart} – {cfEnd} น. · {cfData.duration} นาที · {cfData.location}
                      </div>
                      <div className="text-[10px] mt-0.5" style={{ color: "var(--text-tertiary)" }}>
                        กรุณาเลือกเวลาอื่น
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* Location */}
              <div>
                <div className="label-eyebrow mb-2">สถานที่</div>
                <select value={location}
                  onChange={e => setLocation(e.target.value)}
                  className="w-full text-[13px] px-3 py-2.5"
                  style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", outline: "none" }}>
                  {(settings?.locations || DEFAULT_SETTINGS.locations).filter(l => l.active).map(l => (
                    <option key={l.id} value={l.name}>{l.icon} {l.name}</option>
                  ))}
                </select>
              </div>

              {/* Note */}
              <div>
                <div className="label-eyebrow mb-2">ข้อความถึงครู (ไม่บังคับ)</div>
                <textarea value={note}
                  onChange={e => setNote(e.target.value)}
                  placeholder="เช่น อยากเน้นเรื่องใดเป็นพิเศษ..."
                  className="w-full text-[12px] px-3 py-2.5"
                  style={{ background: "var(--bg-surface)", border: "0.5px solid var(--border-default)", outline: "none", minHeight: 70, resize: "vertical" }} />
              </div>
            </>
          )}
        </div>

        {/* Footer */}
        {myEnrollments.length > 0 && (
          <div className="flex gap-2 px-6 pb-5 pt-3 flex-shrink-0" style={{ borderTop: "0.5px solid var(--border-soft)" }}>
            <button onClick={onClose}
              className="text-[13px] py-3 px-5 font-medium"
              style={{ border: "0.5px solid var(--border-default)", color: "var(--text-secondary)" }}>
              ยกเลิก
            </button>
            <button onClick={submit}
              disabled={!courseId || !requestedDate || !requestedTime}
              className="flex-1 text-[13px] py-3 font-medium flex items-center justify-center gap-2 transition-all hover:opacity-90"
              style={{
                background: courseId ? "#1A1A17" : "var(--bg-muted)",
                color: courseId ? "#C4A878" : "var(--text-tertiary)",
              }}>
              <IconSend size={13} /> ส่งคำขอจอง
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
